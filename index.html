box":"","c":["부인과질환의 수술비","일상생활장해상태의 간병비","변액보험의 변동보험금","암진단급여금"]},{"num":32,"q":"다음 중 제3보험에 대한 설명으로 틀린 것은?","box":"","c":["보험사고의 대상이 사람의 신체에 관한 것이다.","보험금은 주로 실손보상 방법으로 지급한다.","생명보험회사와 손해보험회사 모두 판매할 수 있다.","특약을 부가하여 판매할 수 있다."]},{"num":33,"q":"다음 중 상해보험에 대한 설명으로 맞는 것은?","box":"","c":["직업·직무 변경 사실을 보험설계사에게 알렸을 경우 법적 효력이 있다.","직업·직무 변경 사실을 알리지 않았을 경우 보험사고 발생 시 보험금을 지급받을 수 없다.","약관상 보장하지 않는 원인으로 사망시에는 사망보험금을 지급하고 계약은 소멸한다.","만기환급금의 유무에 따라 순수보장형과 만기환급형으로 구분된다."]},{"num":34,"q":"다음 보기의 보험상품 가운데 질병보험에 해당되는 것을 모두 고른 것은? (가) 교통재해보험 (나) 암보험 (다) 치아보험 (라) 간병보험","box":"","c":["(가), (나), (다)","(가), (다), (라)","(나), (다)","(나), (라)"]},{"num":35,"q":"다음 중 질병보험의 보장내용이 아닌 것은?","box":"","c":["뇌혈관질환 입원급여금","암수술급여금","특정질병진단비","재해장해급여금"]},{"num":36,"q":"다음 중 암보험에 대한 설명으로 옳은 것은?","box":"","c":["우리나라에서는 만기환급형으로 설계할 수 없다.","특정암을 집중적으로 보장하는 상품도 존재한다.","연령이 증가해도 보험료는 동일하다.","가입 후 1년 이내에 암으로 진단되었을 경우에 보험금을 지급하지 않는다."]},{"num":37,"q":"다음 중 암직접치료입원급여금에 대한 설명으로 틀린 것은?","box":"","c":["동일한 암의 치료를 목적으로 2회 이상 입원시 2회 입원으로 보아 입원일수를 별도로 계산한다.","암수술로 인해 면역력이 저하되어 발생하는 합병증 치료를 위해 입원한 비용에 대해서는 암직접입원급여금이 지급되지 않는다.","암의 직접적인 치료를 목적으로 입원시 지급된다.","책임개시일 이후 암으로 입원하여 치료를 받던 중 보험기간이 만료되었을 경우 회당 최고한도일 기준으로 암입원급여금이 지급된다."]},{"num":38,"q":"다음 중 실손의료보험의 비례보상에 대한 설명으로 틀린 것은?","box":"","c":["보험계약 체결 전에 중복가입 여부를 반드시 확인해야 한다.","모든 제3보험 상품은 비례보상 대상 계약에 해당한다.","정액보상상품은 비례보상의 대상계약이 아니다.","상법의 실손보상원칙에 따라 보험사고 발생시 각각의 보험계약에서 지급하는 보험금은 보상책임액에 비례한다."]},{"num":39,"q":"제4세대 실손의료보험의 입원·통원 치료시 비급여의 연간 최고 보장 한도는 얼마인가?","box":"","c":["1,000만원","5,000만원","30만원","1억원"]},{"num":40,"q":"다음 중 노인장기요양보험제도에 대한 설명으로 틀린 것은?","box":"","c":["장기간의 간병·요양문제를 사회연대원리에 따라 국가와 사회가 분담하는 제도이다.","장기요양인정점수를 토대로 판정된 등급에 따라 장기요양 서비스를 제공받고 그 비용에 대한 지원을 받을 수 있다.","재가급여는 요양시설에 입소하여 간호, 목욕 등 서비스를 제공받는 것을 말한다.","공적 장기간병보험에 해당한다. 1월1회모의고사"]}],"02":[{"num":1,"q":"다음 중 생명보험자산의 특성으로 맞는 것은?","box":"","c":["기본적으로 단기자금의 성격을 띠고 있다.","소수 계약자의 고액자금이 모여서 형성된 것이기 때문에 공공적인 성격이 강하다.","보험사고 발생시 반드시 보험금으로 지급되어야 하므로 신탁재산적인 성격을 갖고 있다."]},{"num":2,"q":"다음 중 배당에 대한 설명으로 틀린 것은?","box":"","c":["모든 생명보험회사의 배당률은 동일하다.","계약자가 납입해야 하는 보험료를 배당금으로 상계할 수 있다.","보험회사는 유배당 보험계약에 대하여 잉여금의 일정비율을 적립하였다가 보험계약자에게 배당금으로 지급한다."]},{"num":3,"q":"다음 중 약관의 장해분류표상 장해 등의 정의에 대한 내용으로 맞는 것은?","box":"","c":["약관상 장해의 정의에서 상해 또는 질병에 대하여 치유된 후 신체에 남아있는 영구적인 정신 훼손상태는 제외한다.","장해는 질병과 부상의 주 증상과 합병증상 및 이에 대한 치료를 받는 과정에서 일시적으로 나타나는 증상을 포함한다.","“치유된 후”라 함은 상해 또는 질병에 대한 치료의 효과를 기대할 수 없게 되고 또한 그 증상이 고정된 상태를 말한다."]},{"num":4,"q":"다음 중 보험계약의 무효에 대한 설명으로 틀린 것은?","box":"","c":["보험계약의 무효란 법률상 보험계약이 성립한 때로부터 그 효력이 발생하지 않는 것을 말한다.","보험계약이 무효가 되면 보험계약자에게 보험료를 반환해야 한다.","만 19세 미만자의 사망을 보험금 지급사유로 한 계약은 무효이다."]},{"num":5,"q":"다음 중 보험료 납입최고(독촉)에 대한 설명으로 틀린 것은?","box":"","c":["보험기간이 1년 미만인 경우에는 7일 이상의 기간을 납입최고(독촉) 기간으로 한다.","계약자와 보험수익자가 다른 경우 계약자와 보험수익자 모두에게 납입최고(독촉)에 대한 내용을 안내해야 한다.","납입최고(독촉)기간 내에 연체보험료를 납입하지 아니할 경우 납입최고(독촉)이 끝나는 날에 계약이 해지된다."]},{"num":6,"q":"다음 중 보험계약자의 주요 의무에 대한 설명으로 맞는 것은?","box":"","c":["청약서에서 질문한 사항에 대하여 반드시 사실대로 알려야 한다.","제1회 보험료는 계약의 성립이 완료된 이후 제2회 보험료와 함께 납입해야 한다.","보험수익자의 주소가 변경된 경우 즉시 보험계약자에게 알려야 한다."]},{"num":7,"q":"다음 중 보험계약대출 및 상환에 대한 설명으로 틀린 것은?","box":"","c":["보험회사는 보험수익자에게 보험계약대출 사실을 통지할 수 있다.","보험회사는 계약이 해지되는 때에는 즉시 해지환급금에서 보험계약대출 원금과 이자를 차감할 수 있다.","저축성보험의 경우 보험계약대출이 불가하다."]},{"num":8,"q":"다음 중 표준미달체의 보험가입에 대한 설명으로 틀린 것은?","box":"","c":["표준미달체의 경우 보험금 삭감 형태로 계약을 인수할 수 있다.","표준체보다 위험이 낮은 경우를 표준미달체라고 한다.","피보험자의 위험정도에 따라 보험료 할인혜택을 부여하기도 한다."]},{"num":9,"q":"다음 중 보험설계사가 지켜야 할 3대 기본지키기에 해당하지 않는 것은?","box":"","c":["허위 과장광고 행위 금지","보험약관 교부 및 중요한 내용 설명","청약서 사본 전달 1월2회모의고사"]},{"num":10,"q":"다음 중 생명보험사회공헌위원회에 대한 설명으로 틀린 것은?","box":"","c":["생명보험사회공헌위원회는 2007년 설립되었다.","학술교육, 자살예방 지원사업 등 사회공헌사업을 추진 중에 있다.","한국형 자살예방교육 프로그램인 ‘보고듣고말하기’를 개발·보급한다. ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음 중 보험설계사가 되지 못하는 자에 해당하지 않는 경우는?","box":"","c":["보험업법에 따라 금고 이상 형의 집행유예를 선고받고 그 유예기간이 종료된 자","파산선고를 받은 자로서 복권되지 아니한 자","피성년후견인 또는 피한정후견인"]},{"num":12,"q":"다음 중 보험중개사에 대한 설명으로 맞는 것은?","box":"","c":["보험중개사는 영업보증금을 금융감독원에 예탁해야 한다.","특정 보험회사에 소속되어 보험계약의 체결을 중개하는 자이다.","보험중개사는 금융위원회로부터 업무를 위탁 받은 보험협회에 등록 신청해야 한다."]},{"num":13,"q":"다음 중 보험안내자료에 대한 설명으로 틀린 것은?","box":"","c":["보험안내자료는 방송 및 인터넷 홈페이지 등을 통해 불특정 다수에게 알리는 자료를 포함한다.","보험안내자료 내용이 약관과 다를 경우 보험계약자에게 유리한 내용으로 계약이 성립한 것으로 본다.","고객에게 제공하는 보험안내자료는 사실에 근거한 경우에는 모집인이 직접 작성하여 제공할 수 있으며, 보험회사의 승인을 받지 않아도 된다."]},{"num":14,"q":"다음 중 금융분쟁조정위원회를 운영하는 곳은?","box":"","c":["생명보험협회","금융감독원","금융위원회"]},{"num":15,"q":"다음 중 보험상품 광고시 필수안내사항에 해당하지 않는 것은?","box":"","c":["계약체결 전에 상품설명서 및 약관을 읽어볼 것을 권유하는 내용","기존계약 해지 후 다른 계약 체결시 계약체결이 거절되거나 보험료 등이 인상될 수 있다는 내용","보험금이 큰 특정 내용만을 강조하거나 고액 보장 사례 등을 소개하는 행위"]},{"num":16,"q":"다음 중 보험정보 공시와 공시기간이 맞게 짝지어진 것은?","box":"","c":["결산공시 - 공시일로부터 5년간","수시공시 - 공시일로부터 3년간","상반기 결산공시 - 공시일로부터 3년간"]},{"num":17,"q":"다음 중 보험계약 무효처리, 보험료 납입방법 변경요청 등과 관련된 보험민원 유형에 해당하는 것은?","box":"","c":["보험모집 유형","고지 및 통지의무 위반 유형","계약의 성립 및 해지 유형"]},{"num":18,"q":"다음 표의 연금계좌 세액공제에 대한 설명 가운데 (가), (나)에 들어갈 내용을 맞게 나열한 것은? 종합소득금액이 ( 가 )만원 이하 또는 근로소득만 있는 경우로 총급여액이 ( 나 )만원 이하인 자는 연금계좌 납입액의 15% (지방소득세 별도)에 해당하는 금액을 세액공제 받을 수 있다.","box":"","c":["(가) 4,000 (나) 5,500","(가) 5,000 (나) 5,500","(가) 4,000 (나) 2,000"]},{"num":19,"q":"다음 중 종합소득금액 계산으로 틀린 것은?","box":"","c":["이자소득 = 이자수입금액 – 필요경비","근로소득 = 총 급여액 - 근로소득공제","사업소득 = 사업수입급액 – 필요경비"]},{"num":20,"q":"다음 보기의 내용에서 틀린 것은 무엇인가? 보험설계사가 (가)연말정산 대상 사업소득 외에 다른 종합소득이 있는 경우, (나)직전 과세기간의 수입금액이 7,500만원 이상인 경우에는 연말정산으로 납세의무가 종결되지 않으므로, 반드시 (다)다음연도 3월에 종합소득세 확정신고를 해야한다.","box":"","c":["(가)","(나)","(다) 1월2회모의고사"]},{"num":21,"q":"다음 중 생명보험 관련 법규에 해당하지 않는 것은?","box":"","c":["「상법」","「금융중심지의 조성 및 발전을 위한 법률」","「독점규제 및 공정거래에 관한 법률」","「자본시장과 금융투자업에 관한 법률 」"]},{"num":22,"q":"다음 생명보험계약의 특성 중 하나인 부합계약성에 대한 설명으로 거리가 먼 것은?","box":"","c":["작성자 불이익의 원칙이 적용되며, 보험계약자의 보호가 필요하다.","보험계약자는 보험료 납입, 보험회사는 보험금 지급의무를 지니게 된다.","보험계약은 미리 작성된 정형화된 약관에 따른다.","보험계약자는 약관을 전체로서 동의 또는 거절의 선택밖에는 할 수 없다."]},{"num":23,"q":"다음 중 보장을 추가·확대하기 위한 특약으로만 나열된 것은?","box":"","c":["암보장특약, 연금전환특약","수술특약, 우량체할인특약","성인병특약, 선지급서비스특약","정기특약, 휴일재해보장특약"]},{"num":24,"q":"다음의 생명보험 상품의 분류 기준에 대한 설명으로 맞게 짝지어진 것은?","box":"","c":["적립금 운용방식에 따른 계정 분리 여부 - 금리확정형보험, 금리연동형보험","보험계약 대상 - 생존보험, 사망보험","주계약의 보험사고 - 보장성보험, 저축성보험","보험기간 - 정기보험, 종신보험"]},{"num":25,"q":"다음 중 특별계정보험에 대한 설명으로 틀린 것은?","box":"","c":["보험계약자 간의 형평성이 어긋난다는 단점이 있다.","계정을 별도로 분리하는지 여부에 따라 일반계정보험과 특별계정보험으로 분류한다.","특별계정은 계정 간 자산을 엄격히 구분하고 발생하는 손익을 명확하게 구분한다.","변액보험과 퇴직연금보험이 대표적인 상품이다."]},{"num":26,"q":"다음 중 갱신형보험에 대한 설명으로 틀린 것은?","box":"","c":["보험가입 후 일정기간이 경과시 연령과 위험률을 변경하여 보험료를 다시 산정해 유지하는 보험이다.","갱신형보험은 갱신시 보험료를 조정함으로써 안정적인 보험계약 운용을 위해 도입되었다.","갱신형보험은 일부 질병보험과 간병보험에 적용된다.","대부분의 생명보험 상품은 갱신형 상품이다."]},{"num":27,"q":"다음 중 종신보험에 대한 설명 중 옳은 것은?","box":"","c":["종신보험은 저축성보험에 해당한다.","대표적인 질병보험 상품이다.","보장기간이 평생인 보험이다.","대표적인 사망보험이므로 세액공제 혜택을 받을 수 없다."]},{"num":28,"q":"다음 중 어린이보험에 대한 설명으로 맞는 것은?","box":"","c":["교육보험 성격이 가미된 상품도 있다.","만 15세 미만 사망시에 해지환급금과 책임준비금 중에서 큰 금액을 지급한다.","교육보험에서 학자금 등을 지급하는 상품이 출시되면서 판매량이 감소하고 있다.","어린이보험은 사망보장을 위한 상품이다."]},{"num":29,"q":"다음 중 장애인보험에 대한 설명으로 틀린 것은?","box":"","c":["장애인은 「장애인복지법」에 따라 정의된다.","장애인이라는 이유로 보험가입을 차별한다면 「장애인 차별금지 및 권리구제 등에 관한 법률」에 따라 처벌된다.","생명보험업계는 회사에서 임의로 인수를 거절하는 것을 방지 하기 위해 「장애인 보험계약 인수를 위한 모범규준」을 제정하였다.","장애인을 보험수익자로 하는 보험계약은 「장애인복지법」에 따라 증여세에 대해 세제혜택이 있다."]},{"num":30,"q":"다음 중 변액보험에 대한 설명으로 틀린 것은?","box":"","c":["보험금이 자산운용성과에 따라 변동되는 보험계약이다.","변액보험은 생명보험과 투자상품의 성격을 동시에 가지게 되므로 법적으로 「자본시장과 금융투자업에 관한 법률」만을 적용받는다.","변액보험판매자격시험에 합격한 사람만이 판매할 수 있다.","변액연금보험에서 피보험자가 연금개시 전 제1보험기간 내에 사망시 기본보험금과 계약자적립금을 더하여 사망보험금으로 지급한다. 1월2회모의고사"]},{"num":31,"q":"다음 중 제3보험에 대한 설명으로 맞는 것은?","box":"","c":["「보험업법」은 원칙적으로 생명보험업과 손해보험업의 겸영을 허용하고 있다.","제3보험업은 「보험업법」에 근거가 마련되어 있다.","「상법」(보험편)에 간병보험 관련 규정이 반영되어 있다.","제3보험과 손해보험의 보험사고는 동일하다."]},{"num":32,"q":"다음 중 보험종목별로 보험상품이 알맞게 연결된 것은?","box":"","c":["생명보험상품 - 보증보험","생명보험상품 - 연금보험","제3보험상품 - 해상보험","제3보험상품 - 재보험"]},{"num":33,"q":"다음 표의 ( )안에 들어갈 모든 숫자의 합계는? 손해보험회사에서 판매중인 질병사망특약의 보험기간은 ( 가 )세 만기, 보험금액 한도는 개인당 ( 나 )억원까지만 부가할 수 있다.","box":"","c":["81","82","83","85"]},{"num":34,"q":"다음 중 상해보험 가입자가 보험기간 중 재해로 인한 직접치료를 목적으로 입원하였을 경우 받는 보상으로 맞는 것은?","box":"","c":["재해사망보험금","재해장해급여금","재해입원급여금","재해수술급여금"]},{"num":35,"q":"다음 중 상해보험의 특징으로 맞는 것은?","box":"","c":["만기환급형 상품으로만 판매된다.","상해란 외관상 분명한 상처자국을 남기는 것에 한정한다.","상해를 발생시키는 사고가 완만하여도 연속적으로 발생한다면 보상한다.","주보험에서 질병사망을 부가할 수 없다."]},{"num":36,"q":"다음 중 상해보험과 질병보험의 공통점으로 올바른 것은?","box":"","c":["고연령의 경우 가입이 제한될 수 있다.","단일률, 군단율을 이용하여 보험료를 산출할 수 있다.","순수보장성 보험으로 개발해야 한다.","다양한 주계약과 특약 형태로 판매되고 있다."]},{"num":37,"q":"다음 중 질병에 대해 틀리게 설명한 것은?","box":"","c":["물건을 들다가 허리를 다쳐 요통이 발생한 경우 질병에 포함되지 않는다.","노화에 따라 무릎에 통증이 발생한 경우 질병에 포함된다.","일반인과 비교하여 정상이 아닌 상태가 존재한다.","외래성이 인정된다."]},{"num":38,"q":"다음 중 암보험에 대한 설명으로 맞는 것은?","box":"","c":["암의 직접적인 치료비는 보장하지 않는다.","암보험은 도덕적 해이 발생가능성이 높아 일정기간 이후 보장이 개시되는 면책기간이 존재한다.","제자리암의 경우 일반암과 동일한 암관련보험금을 지급한다.","암보험은 특약 형태로만 판매되고 있다."]},{"num":39,"q":"다음 중 실손의료보험이 보장하는 영역을 바르게 나열한 것은?","box":"","c":["급여 항목 중 법정본인부담금 + 개인부담 급여","급여 항목 중 법정본인부담금 + 개인부담 비급여","급여 항목 중 건강보험공단부담금 + 개인부담 급여","급여 항목 중 건강보험공단부담금 + 개인부담 비급여"]},{"num":40,"q":"다음 표의 ( )안에 들어갈 내용으로 맞는 것은? ( )란 의료기술의 발달 등으로 실제 위험발생률이 보험가입 당시 예측한 위험률과 상이한 경우, 보험기간 중에 금융위원회의 인가를 얻어 위험률을 조정하는 제도를 말한다.","box":"","c":["위험률 변동제도","직종별 위험등급제도","비례보상제도","단일위험률제도 1월2회모의고사"]}],"03":[{"num":1,"q":"다음 표에서 A국가의 인구구조로 알 수 있는 사회구분으로 맞는 것은? · A국가 총인구 100만명 · 60세 이상 인구 : 25만명 · 65세 이상 인구 : 17만명","box":"","c":["고령사회","초고령사회","고령화사회"]},{"num":2,"q":"다음의 용어 가운데 의미가 다른 것은 무엇인가?","box":"","c":["위험기간","보험기간","납입기간"]},{"num":3,"q":"다음 중 청약철회가 가능한 계약에 해당하는 것은?","box":"","c":["보험증권을 교부받고 10일, 청약일로부터 20일이 경과한 계약","보험기간이 60일 이내인 계약","건강상태 진단을 지원하는 계약"]},{"num":4,"q":"다음 중 보험약관의 설명의무에 대한 설명으로 틀린 것은?","box":"","c":["보험약관의 설명의무를 위반하였을 경우에 계약이 성립한 날로부터 1년 이내에 그 계약을 취소할 수 있다.","보험계약자에게 설명해야 할 약관의 중요한 내용은 보험종류에 따라 다르다.","거래상 일반적이고 공통적인 내용은 설명의무의 대상에서 제외된다."]},{"num":5,"q":"다음 중 납입최고에 대한 설명으로 틀린 것은?","box":"","c":["보험료 납입이 연체 중인 경우에는 회사는 14일 이상의 기간을 납입최고기간으로 정해야 한다.","보험기간이 1년 미만일 경우에는 10일 이상의 기간을 납입최고기간으로 정해야 한다.","납입최고기간 안에 보험료가 납입되지 않은 경우 보험회사는 납입최고기간이 끝나는 날의 다음 날에 보험계약을 해지한다."]},{"num":6,"q":"다음 중 부활에 대한 설명으로 틀린 것은?","box":"","c":["부활시 계약 전 알릴 의무는 신계약과 동일하게 이루어진다.","위험선택(승낙, 거절, 조건부 인수 등)은 신계약과 동일하게 이루어지지 않는다.","계약이 부활되면 그 계약은 해지 이전의 상태로 되돌아간다."]},{"num":7,"q":"다음 중 보험회사의 손해배상책임에 대한 설명으로 틀린 것은?","box":"","c":["계약과 관련하여 임직원, 보험설계사에 의해 계약자에게 발생된 손해에 대해서 배상한다.","보험회사는 보험금 지급거절 및 지연지급의 사유가 없음을 알 수 있었는데도 소를 제기하여 계약자에게 손해를 가한 경우에 배상한다.","보험금 지급여부 및 지급금액에 관하여 현저하게 공정을 잃은 합의로 수익자에게 손해를 가한 경우 배상책임이 없다."]},{"num":8,"q":"다음 보기 중 언더라이팅 정보의 원천에 해당하는 것을 모두 고른 것은? (가) 계약 전 알릴 의무 고지 (나) 판매채널의 모집보고서 (다) 계약적부 확인에 의한 조사보고서 (라) 계약자의 가족관계 정보","box":"","c":["(가), (다), (라)","(가), (나), (다)","(가), (나), (라)"]},{"num":9,"q":"다음 중 보험사기에 대한 설명으로 옳은 것은?","box":"","c":["보험사기 피해는 보험회사에 한정된다.","선의의 계약자에게 피해가 전가된다.","생명보험의 경우 보험사기 입증이 용이하다."]},{"num":10,"q":"다음 중 자살예방프로그램인 ‘보고듣고말하기’에 대한 설명으로 틀린 것은?","box":"","c":["보험회사들의 공동사회공헌활동으로 운영하는 프로그램이다.","게이트키퍼 양성에 활용되는 프로그램이다.","생활 속 사람들의 자살위험신호를 인지하여 전문기관에 연계하도록 교육하는 프로그램이다. 2월1회모의고사"]},{"num":11,"q":"다음 중 보험을 모집할 수 있는 자를 맞게 나열한 것은?","box":"","c":["보험중개사, 보험회사 직원, 보험설계사","보험대리점, 금융투자상담사, 보험회사 대표이사","보험중개사, 보험회사 사외이사, 금융투자상담사"]},{"num":12,"q":"다음 보기의 설명 중 ( )안에 들어갈 말로 알맞은 것은? 보험설계사는 보험회사에 소속되어 보험계약의 체결을 ( )하는 자이다.","box":"","c":["대리","중개","알선"]},{"num":13,"q":"다음 중 보험회사가 우월적 지위를 이용하여 소비자에게 피해를 주는 경우에 포함되지 않는 것은?","box":"","c":["대출 계약체결과 관련하여 소비자의 의사에 반하여 보험계약의 체결을 강요하는 행위","보험상품에 관한 계약체결을 위해 금융상품의 이자율을 우대하는 행위","연계·제휴서비스 등을 축소한다는 사실을 미리 알리는 행위"]},{"num":14,"q":"다음 중 생명보험 우수인증설계사 인증에 대한 설명으로 맞는 것은?","box":"","c":["보험계약 유지율이 13회차 90%, 25회차 80% 이상의 인증기준을 충족해야 한다.","금융위원회에서 자격을 심사한 후 인증을 부여하고 있다.","우수인증설계사 인증기간은 해당연도 1월 1일부터 12월 31일까지이다."]},{"num":15,"q":"다음 중 보험소비자 보호제도에 대한 설명으로 맞는 것은?","box":"","c":["생명보험협회에서는 생존자 및 사망자에 대한 보험가입 조회제도를 운영하고 있다.","금융위원회에서는 예금자보호법에 따라 예금자에게 예금보험금을 지급함으로써 예금자의 재산을 보호해 주고 있다.","생명보험협회에서는 금융분쟁조정위원회를 운영하고 있다."]},{"num":16,"q":"다음 중 경영공시에 대한 설명으로 틀린 것은?","box":"","c":["결산공시는 매 사업연도 결산일로부터 3개월 이내에 공시해야 한다.","경영공시는 정기공시와 수시공시로 나누어진다.","변액보험 운용설명서, 상품요약서 등이 경영공시 항목에 해당한다."]},{"num":17,"q":"다음 중 보험민원이 발생하는 경우와 가장 거리가 먼 것은?","box":"","c":["보험회사의 계약에 따른 의무 이행에 불만족할 때","보험사고가 발생하여 청구한 보험금을 수령했을 때","보험상품 및 서비스가 기대에 미치지 못했을 때"]},{"num":18,"q":"다음 보기의 ( )안에 들어갈 가장 알맞은 용어는? 피상속인의 사망으로 인하여 지급받는 보험금으로 피상속인이 보험계약자인 보험계약에 따라 받는 것은 ( )으로 본다.","box":"","c":["상속재산","증여재산","근로재산"]},{"num":19,"q":"다음 중 금융소득의 종합과세 기준금액은 얼마인가?","box":"","c":["4천만원","2천만원","3천만원"]},{"num":20,"q":"다음 중 소득구분이 가장 적절하게 연결된 것은?","box":"","c":["저축성보험의 보험차익 – 연금소득","보험설계사의 수당 – 사업소득","집합투자기구로부터의 이익 – 이자소득 2월1회모의고사"]},{"num":21,"q":"다음의 보기 중 ( ) 안에 들어갈 알맞은 용어는? ｢보헙업법｣에서는 보험상품을 ( )을 목적으로 ( ) 사고 발생에 관하여 금전 및 그 밖의 급여를 지급할 것을 약정하고 대가를 수수하는 계약으로 정의하고 있다.","box":"","c":["손해보장 – 고정적","위험보장 – 우연한","위험보장 – 고정적","손해보장 – 우연한"]},{"num":22,"q":"보험계약 중 보험회사가 수많은 보험계약자를 상대하기 때문에 보험계약자별로 보험약관을 새로 작성하는 것이 사실상 불가능하기 때문에 갖는 법적 특성은 무엇인가?","box":"","c":["불요식계약성","낙성계약성","부합계약성","선의계약성"]},{"num":23,"q":"다음에서 생명보험 상품에 대한 설명으로 틀린 것은?","box":"","c":["생명보험 상품은 일반적으로 주계약과 특약으로 이루어진다.","대수의 법칙을 기초로 개발·판매되고 있다.","금융위원회에 사전 신고 없이 자율판매를 할 수 있다.","기초서류에는 사업방법서, 보험약관, 보험료 및 책임준비금 산출방법서 등이 있다."]},{"num":24,"q":"다음의 생명보험 상품의 분류에 대한 설명으로 틀린 것은?","box":"","c":["정액보험은 보험사고 발생시 지급되는 보험금의 액수가 보험계약시 확정되어 있는 상품이다.","실손보험은 보험사고시 발생하는 비용 및 손실을 전부 보상하는 보험이다.","진단보험은 보험계약 인수여부 결정을 위해 의사의 진단이 필요한 보험이다.","대부분의 생명보험 상품은 정액보험이다."]},{"num":25,"q":"다음 중 종신보험에 대한 맞는 설명은 무엇인가?","box":"","c":["종신보험의 납입기간과 보장기간은 동일하다.","변액보험으로는 판매할 수 없다.","종신보험 이외에도 사망을 보장하는 상품 설계가 가능하다.","종신보험은 사망보험이므로 다양한 특약부가는 어렵다."]},{"num":26,"q":"다음 중 교육보험에 대한 설명으로 틀린 것은?","box":"","c":["대표적인 저축성보험 상품이다.","생명보험 상품 분류상 생존보험에 해당한다.","부모 생존시 각종 학자금 등 교육자금이 지급된다.","부모 사망시 해약환급금을 지급하고 계약은 소멸된다."]},{"num":27,"q":"다음 중 장애인전용보험에 대한 설명으로 틀린 것은?","box":"","c":["장애인도 보험상품 가입시 심사과정을 거쳐서 보험에 가입한다.","일반보장성보험의 보험료 세액공제를 받은 경우 장애인전용보험의 보험료 세액공제는 받을 수 없다.","일반인과 동일한 심사기준에 의해서 보험가입 여부를 결정한다.","장애인이 피보험자 또는 수익자로 가입하는 장애인전용 보장성보험의 보험료에 대해 세액공제 혜택을 받을 수 있다."]},{"num":28,"q":"다음 표의 (가)와 (나)에 들어갈 내용을 맞게 나열한 것은? 대부분의 연금보험에서 위험보장기간인 ( 가 )에 사망시 ( 나 )을/를 지급하고 계약이 소멸된다.","box":"","c":["(가) 연금지급기간 (나) 기납입보험료","(가) 연금지급기간 (나) 최저보증준비금","(가) 제1보험기간 (나) 책임준비금","(가) 제1보험기간 (나) 기납입보험료"]},{"num":29,"q":"다음 중 변액보험에 대한 설명으로 맞는 것은?","box":"","c":["계약자는 펀드를 직접 선택하여 운용할 수 있다.","보험기간 중에는 펀드를 변경할 수 없다.","특별계정 운용실적은 매월 평가하여 계약자적립금에 반영된다.","변액보험은 특약부가가 제한적이다."]},{"num":30,"q":"다음 중 생명보험 상품에 대한 설명으로 틀린 것은?","box":"","c":["어린이보험은 사망을 보장하는 급부설계를 할 수 없다.","세제적격 연금저축의 근거법령은 조세특례제한법 이다.","변액보험은 보험금이 자산운용성과에 따라 변동하는 보험계약이다.","연금보험은 연금개시 전 위험보장기간과 연금지급기간으로 구분된다. 2월1회모의고사"]},{"num":31,"q":"다음 중 제3보험에 대한 설명으로 옳은 것은?","box":"","c":["생명보험이나 손해보험 중 온전히 어느 한 분야에 속했다고 볼 수 있다.","사람의 신체에 대한 보험이므로 손해보험에 해당한다.","비용손해와 의료비 등에 있어서 실손보상적 측면을 가지고 있다.","2003년 8월 상법 개정시 최초로 법체계에 편입되었다."]},{"num":32,"q":"다음 중 보험업에 대한 설명으로 틀린 것은?","box":"","c":["생명보험과 손해보험의 리스크는 서로 상이하다.","생명보험업과 손해보험업은 겸영을 할 수 없다.","생명보험업과 손해보험업은 제3보험업을 겸영할 수 있다.","제3보험업은 상법에 정의되어 있다."]},{"num":33,"q":"다음 중 상해보험에 대한 설명으로 맞는 것은?","box":"","c":["질병사망은 주계약에서 보장하지 않는다.","상해사고의 요건인 급격성, 우연성, 외래성 가운데 1개 이 상은 충족해야 한다.","질병이 원인이 되어 발생한 상해사고는 보장한다.","보험업법상 생명보험 상품에 해당한다."]},{"num":34,"q":"다음 중 상해의 개념에 대한 설명으로 틀린 것은?","box":"","c":["신체의 상해란 몸에 상처를 입는 부상보다 넓은 의미로 쓰인다.","상해로 인한 사망을 포함한다.","상해로 인한 신체장해를 포함한다.","외관상 분명한 상처자국을 남기는 것에 한정한다."]},{"num":35,"q":"다음 보기의 ( )안에 들어갈 알맞은 내용이 순서대로 나열된 것은? 상해보험에서 직업·직무 변경통지를 게을리 한 경우 보험회사는 그 사실을 안 날로부터 ( ) 이내에 계약을 해지할 수 있고, 이 경우 회사는 ( )을/를 지급한다.","box":"","c":["1개월 - 해지환급금","3개월 - 기납입보험료","6개월 - 기납입보험료","1년 - 해지환급금"]},{"num":36,"q":"다음 보기의 내용 중 질병보험에서 보장하는 것을 모두 고른 것은? (가) 진단확정 (나) 수술 (다) 입원 (라) 요양","box":"","c":["(가), (나)","(가), (나), (다)","(가), (나), (라)","(가), (나), (다), (라)"]},{"num":37,"q":"다음 중 암보험에 대한 설명으로 맞는 것은?","box":"","c":["직종별 위험등급체계가 적용된다.","암보장개시일 이전에 암으로 진단확정되고, 그 암으로 인해 사망할 경우 보장하지 않는다.","갱신형 상품의 경우 갱신시 계약자에게 별도의 안내를 하지 않아도 된다.","암으로 인한 사망은 주계약에서 보장한다."]},{"num":38,"q":"다음 중 실손의료보험이 보장하는 영역을 바르게 나열한 것은?","box":"","c":["급여 항목 중 법정본인부담금 + 개인부담 급여","급여 항목 중 법정본인부담금 + 개인부담 비급여","급여 항목 중 건강보험공단부담금 + 개인부담 급여","급여 항목 중 건강보험공단부담금 + 개인부담 비급여"]},{"num":39,"q":"다음 중 간병보험에 대해 틀리게 설명한 것은?","box":"","c":["주계약 또는 특약 형태로 모두 가입할 수 있다.","생명보험과 손해보험에서 모두 판매하고 있다.","고령자의 경우 가입시 갱신형으로 설계할 수 없다.","암보험처럼 면책기간을 설정할 수 있다."]},{"num":40,"q":"다음 중 상해보험과 질병보험에 대한 설명으로 맞는 것은?","box":"","c":["질병보험은 직종별 위험등급체계가 적용된다.","상해보험은 상해사고의 발생 원인은 신체에 내재되어 있어야 한다.","상해보험은 상해사고의 결과로 발생한 질병은 보장한다.","질병보험은 보험업법상 생명보험 상품에 해당한다. 2월1회모의고사"]}],"04":[{"num":1,"q":"다음 중 보험슈퍼마켓(보험다모아)에 대한 설명으로 틀린 것은?","box":"","c":["보험다모아는 금융감독원에서 운영하고 있다.","IT와 금융이 결합된 핀테크에 대한 관심을 반영하여 보험소비자의 편의를 위해 개발되었다.","보험종목을 8가지로 분류하여 보험소비자가 보다 저렴한 상품을 손쉽게 비교하여 가입할 수 있도록 가입경로를 안내하고 있다."]},{"num":2,"q":"다음 중 배당에 대한 설명으로 맞는 것은?","box":"","c":["무배당보험은 보험계약에 대하여 잉여금이 발생할 경우 잉여금의 일정비율을 계약자에게 배당금으로 지급하는 보험상품이다.","배당률은 2000년 4월부터 보험가격 자유화가 시행됨에 따라 완전 자유화되었다.","2000년 4월 이전에도 일부 생명보험회사에서는 배당률을 차등 적용하였다."]},{"num":3,"q":"다음 중 보험계약의 무효사유에 해당하지 않는 경우는?","box":"","c":["타인의 사망을 보험금 지급사유로 하는 보험계약에서 계약을 체결할 때까지 피보험자의 서면에 의한 동의를 얻지 않은 경우","파산자를 보험계약자로 한 계약의 경우","만 15세 미만자를 피보험자로 하여 사망을 보험금 지급사유로 한 계약의 경우"]},{"num":4,"q":"다음 중 생명보험 약관상의 계약 전 알릴 의무에 대한 설명으로 맞는 것은?","box":"","c":["회사가 계약 당시에 계약 전 알릴 의무 위반사실을 알고 있었던 경우에 그 위반사실을 이유로 해지할 수 있다.","계약 전 알릴 의무 위반을 이유로 계약을 해지하였을 때는 기납입보험료를 지급한다.","계약 전 알릴 의무 위반을 이유로 보장을 제한하였을 때는 보험료, 보험가입금액 등이 조정될 수 있다."]},{"num":5,"q":"다음 중 ( ) 안에 들어갈 단어로 알맞은 것은? 보험계약자를 변경하기 위해서는 ( )의 승낙을 얻어야 한다.","box":"","c":["보험회사","보험수익자","모집종사자"]},{"num":6,"q":"다음 중 보험나이에 대한 설명으로 틀린 것은?","box":"","c":["피보험자의 나이는 보험나이를 기준으로 한다.","만 15세 미만자를 피보험자로 하여 사망을 보험금 지급사유로 한 계약의 경우에는 실제 만 나이를 적용한다.","보험나이는 매년 1월 1일에 증가한다."]},{"num":7,"q":"다음 중 클레임의 업무에 해당하지 않는 것은?","box":"","c":["보험금 지급업무","보험사고 조사","보험계약 위험의 분류"]},{"num":8,"q":"다음 중 보험사기 방지활동에 대한 내용으로 옳은 것은?","box":"","c":["금융감독원, 건강보험공단, 생명보험·손해보험협회는 건강보험과 민영보험이 연계된 대규모 보험사기 등에 대해 공동조사를 실시한다.","금융감독원에서는 보험사기특별조사반(SIU)를 설치하여 보험사기를 방지한다.","금융위원회는 보험범죄 신고센터를 설치하여 운영하고 있다."]},{"num":9,"q":"다음 보기의 ( )안에 들어갈 용어가 알맞게 연결된 것은? ( 가 ) : 보험기간 중의 특정시점에 살아 있을 경우 지급하는 보험금 ( 나 ) : 보험기간이 끝날 때까지 살아있을 경우 지급하는 보험금 ( 다 ) : 보험기간 중에 입원, 요양 발생시 지급하는 보험금","box":"","c":["(가) 생존보험금 – (나) 만기보험금 – (다) 사망보험금","(가) 중도보험금 – (나) 만기보험금 – (다) 입원보험금","(가) 중도보험금 – (나) 사망보험금 – (다) 입원보험금 2월2회모의고사"]},{"num":10,"q":"다음 중 자살예방 게이트키퍼에 대한 설명으로 맞는 것은?","box":"","c":["주변 사람의 자살위험 신호를 재빨리 인지하여 전문가에게 연계하도록 훈련받은 사람","농약안전보관함을 보급하는 역할을 한다.","자살자의 사망 원인을 다각도로 분석하고 자살 유족 및 전문 인력 지원 등에 필요한 역할을 수행하는 사람 ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음 중 금융기관보험대리점으로 등록할 수 없는 기관은?","box":"","c":["은행","상호저축은행","우체국"]},{"num":12,"q":"다음 중 보험안내자료에 대한 설명으로 틀린 것은?","box":"","c":["보험안내자료는 보험계약자가 이해하기 쉽고 간결하게 제작되어야 한다.","보험안내자료 내용이 약과의 내용과 다른 경우에는 계약자에게 유리한 내용으로 계약이 성립된 것으로 본다.","보험설계사가 직접 제작한 보험안내자료가 사실에 근거한 경우 보험회사의 승인을 받지 않아도 된다."]},{"num":13,"q":"다음 중 ｢생명보험 공정경쟁질서 유지에 관한 협정｣에서 정한 준수사항 중 승환계약에 대한 설명으로 틀린 것은?","box":"","c":["보험설계사가 소속된 동일 점포의 다른 보험설계사 명의로 신계약이 체결된 경우도 제재대상에 해당된다.","보험계약 1건당 100만원의 제재금을 부과한다.","보험설계사 본인 및 배우자, 직계존비속, 형제·자매의 계약은 사회통념을 감안하여 제재대상에서 제외된다."]},{"num":14,"q":"다음 중 우수인증설계사에 대한 인증기준으로 틀린 것은?","box":"","c":["보험계약 유지율이 13회차 90%, 25회차 80% 이상인 자","금융감독원의 인증기준을 충족하는 자","직전 1년간 불완전판매 건이 없는 자"]},{"num":15,"q":"다음 중 보험금 대리청구인 지정제도에 대한 설명으로 틀린 것은?","box":"","c":["치매 등 보험사고 발생으로 본인의 보험금 청구가 현실적으로 어려운 상황에 대비하여 보험금을 대신 청구하는 자를 미리 지정하는 제도이다.","생명보험회사는 신계약 체결시 상품설명서와 해피콜 등을 통해 안내하고 있다.","가입한 모든 보험계약의 경우 해당 보험회사에 연락하여 대리청구인 지정제도를 신청할 수 있다."]},{"num":16,"q":"다음 중 소비자가 직접 가입설계 및 보험료 조회를 할 수 있도록 홈페이지에 가격공시실을 운영하고 있는 곳은?","box":"","c":["생명보험협회","보험연구원","생명보험회사"]},{"num":17,"q":"다음 중 보험민원에 대한 설명으로 틀린 것은?","box":"","c":["금융소비자는 보험회사와의 분쟁발생시 금융감독원, 한국소비자원 등에 금융민원 또는 분쟁조정을 신청할 수 있다.","금융민원 발생시 금융소비자는 우편, 팩스 및 인터넷을 이용하여 접수할 수 있으나 금융감독원에 직접 신청신청은 할 수 없다.","보험민원은 타 금융업권과는 달리 악성민원인에 의해 남용될 소지가 상대적으로 크다."]},{"num":18,"q":"다음 보기에서 ( ) 안에 들어갈 숫자의 합은? 보장성보험료의 세액공제액 [일반 보장성보험료] × ( )%* + [장애인전용 보장성보험료] × ( )%* * 지방소득세 별도","box":"","c":["24","27","30"]},{"num":19,"q":"다음 중 (가), (나)에 들어갈 내용으로 알맞은 것은? 50세 미만, 종합소득금액 8천만원인 거주자 연금저축납입액 퇴직연금납입액 세액공제 대상금액 300 500 (가) 500 200 (나)","box":"","c":["(가) 700만원 (나) 600만원","(가) 800만원 (나) 700만원","(가) 600만원 (나) 700만원 2월2회모의고사"]},{"num":20,"q":"다음 표의 ( ) 안에 들어갈 금액으로 맞는 것은? * 보험설계사의 간편장부대상자 적용 요건 - 해당 과세기간에 신규로 사업을 개시한 보험설계사 - 직전 과세기간의 수입금액의 ( ) 미만인 보험설계사","box":"","c":["6,000만원","7,500만원","8,000만원 ＜생명보험＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 4점)"]},{"num":21,"q":"다음 중 생명보험계약의 특성으로 틀린 것은?","box":"","c":["보험기간의 단기, 확정성","사람의 생존보장","정액보상","사람의 사망보장"]},{"num":22,"q":"다음 중 생명보험계약의 특성으로 맞는 것은?","box":"","c":["보험계약은 장래의 우연한 사고의 발생을 보장한다.","계약의 성립요건으로 특별한 형식이나 절차를 요구하는 요식계약이다.","생명보험은 구매에 따른 효과를 곧바로 느낄 수 있다.","계약자의 청약만 있으면 보험계약은 성립한다."]},{"num":23,"q":"다음 보기의 ( )안에 들어갈 단어가 순서대로 알맞게 연결된 것은? 보장성보험은 ( )시 지급되는 급부금이 전혀 없는 순수보장성보험과 만기까지 ( ) 했을 경우에 이미 납입한 보험료를 환급해 주는 만기환급형보험으로 설계할 수 있다.","box":"","c":["사망 - 사망","생존 - 생존","사망 - 생존","생존 - 사망"]},{"num":24,"q":"다음 중 보장을 추가·확대하기 위한 특약에 해당하지 않는 것은?","box":"","c":["성인병특약","정기특약","재해사망특약","우량체 할인특약"]},{"num":25,"q":"다음 보기에서 설명하는 보험상품은 무엇인가? 보험회사가 보험기간 중 일정기간 동안 해약환급금을 적게 주는 것을 조건으로 보험료를 낮게 책정하는 상품이다.","box":"","c":["실적배당형상품","자산연계형상품","저해지환급형상품","금리연동형상품"]},{"num":26,"q":"다음 중 종신보험에 대한 설명으로 틀린 것은?","box":"","c":["다양한 특약 부가를 통해 종합보장형 설계가 가능하다.","피보험자의 유가족이 처하게 될 경제적 어려움에 대비할 수 있다.","피보험자가 일정시점에 생존한 경우에만 약정된 보험금을 지급한다.","보장성보험료 세액공제를 받을 수 있다."]},{"num":27,"q":"다음 중 어린이보험에 대한 설명으로 맞는 것은?","box":"","c":["어린이와 청소년기에 나타날 수 있는 각종 질병과 상해 등을 중점 보장하기 위한 상품이다.","아동기 안전사고, 사기 노출 위험을 보장하는 상품이다.","15세 미만 사망시 해지환급금을 지급하고 계약은 소멸한다.","원칙적으로 사망을 보장하는 급부설계를 할 수 있다."]},{"num":28,"q":"다음 중 연금보험에 대한 설명으로 맞는 것은?","box":"","c":["위험보장기간에 사망시 기납입보험료를 지급한다.","생존기간에 적립금의 이자만 지급하는 방법은 확정연금형이다.","세제적격 연금저축의 최소보험료 납입기간은 10년이다.","세제적격 연금저축의 근거법령은 「소득세법」이다."]},{"num":29,"q":"다음 중 변액유니버설보험에 대한 설명으로 틀린 것은?","box":"","c":["보험기간은 종신이다.","펀드의 운용실적에 따라 사망보험금과 해약환급금이 변동된다.","해약환급금의 일정범위 내에서 중도인출이 가능하다.","변액유니버설보험(보장형)은 저축성보험에 해당한다."]},{"num":30,"q":"다음 중 생명보험 상품에 대한 설명으로 틀린 것은?","box":"","c":["종신보험은 계약자의 소득수준 및 라이프사이클에 맞게 다양한 보장의 조합이 가능한 맞춤형 보험상품이다.","어린이보험은 보장기간이 30세 미만으로 한정된 상품이다.","연금보험은 노후의 생활자금 마련을 위한 보험이다.","유니버설보험은 보험료 추가납입, 중도인출을 할 수 있다. 2월2회모의고사"]},{"num":31,"q":"다음 중 제3보험에 대한 설명으로 틀린 것은?","box":"","c":["제3보험의 종류에는 상해보험, 질병보험, 간병보험이 있다.","제3보험업을 영위하기 위해서는 사전에 생명보험협회의 허가를 받아야 한다.","제3보험은 정액보상과 실손보상 모두 가능하다.","제3보험업은 독립된 하나의 보험업으로서의 지위를 갖는다."]},{"num":32,"q":"다음 중 제3보험에 해당하는 것을 모두 고르시오. (가) 암보험 (나) 사망보험 (다) 화재보험 (라) 상해보험 (마) 연금보험 (바) 간병보험","box":"","c":["(가), (다), (라)","(가), (라), (바)","(나), (라), (마)","(다), (마), (바)"]},{"num":33,"q":"다음 중 상해보험 가입자가 보험기간 중 재해로 인한 직접치료를 목적으로 입원하였을 경우 받는 보상으로 맞는 것은?","box":"","c":["재해사망보험금","재해장해급여금","재해수술급여금","재해입원급여금"]},{"num":34,"q":"다음 중 상해보험의 직업·직무 변경 통지의무에 대한 설명으로 맞는 것은?","box":"","c":["위험한 직업·직무로 변경시 사고발생 위험도가 증가해도 보험료는 변경되지 않는다.","발생한 사고가 변경된 직업·직무와 관계가 없는 경우에 변경사실을 통지하지 않았다면 보장받을 수 없다.","보험계약자 또는 피보험자는 직업·직무 변경시 지체없이 보험회사에 통지해야 한다.","전직 카레이서 무직자 ‘갑’이 상해보험에 가입 후 택시기사로 직업이 변경된 경우 위험이 증가한 것으로 보지 않는다."]},{"num":35,"q":"다음 중 질병보험에 대한 설명으로 틀린 것은?","box":"","c":["물건을 들다가 허리를 다친 경우에 보상한다.","연령이 높아지면 보험료도 높아진다.","질병사망보장은 특약을 통해서 이루어진다.","과로사 관련 특정질병, 뇌혈관질환 등을 보장하는 보험상품이다."]},{"num":36,"q":"다음 중 암보험에 대한 설명으로 틀린 것은?","box":"","c":["갱신형보험으로 설계할 수 있다.","면책기간이 존재한다.","제자리암(0기암)은 보장대상에서 제외된다.","주계약·특약 형태로 모두 판매되고 있다."]},{"num":37,"q":"다음 중 (가), (나) 안에 들어갈 내용으로 알맞은 것은? 보험금의 지급사유가 발생하기 전에 사망한 경우에는 계약자에게 ( 가 )을 지급하고 보험계약은 ( 나 )한다.","box":"","c":["(가) 해약환급금 (나) 해지","(가) 책임준비금 (나) 소멸","(가) 사망보험금 (나) 소멸","(가) 책임준비금 (나) 해지"]},{"num":38,"q":"다음 보기의 ( )안에 들어갈 알맞은 말은 무엇인가? 동일인이 다수의 실손의료보험에 가입하더라도 초과이익 금지를 위해 본인이 부담한 치료비를 상품별로 보상책임액 비율에 따라 ( )한다.","box":"","c":["정액보상","최소보상","비례보상","초과보상"]},{"num":39,"q":"다음 중 제4세대 실손의료보험의 보장내용 중 비급여의 자기부담률은 얼마인가?","box":"","c":["10%","20%","30%","40%"]},{"num":40,"q":"다음 중 간병보험에서 위험률 변동제도의 적용과정으로 맞는 것은?","box":"","c":["금융위원회의 인가","금융감독원의 승인","생명보험협회의 인가","기획재정부의 허가 2월2회모의고사"]}],"05":[{"num":1,"q":"다음 중 사회보험과 민영보험에 대한 설명으로 틀린 것은?","box":"","c":["사회보험과 민영보험은 상호보완과 경쟁이라는 양면성을 가지고 있다.","사회보험의 운영취지는 사회적 형평성이다.","사회보험의 급여는 계약에 의해 결정된다."]},{"num":2,"q":"다음 중 보험료 산출방식에 대한 설명으로 틀린 것은?","box":"","c":["현금흐름방식은 우리나라와 일본, 대만이 사용하고, 3이원방식은 미국, 캐나다, 호주 등이 사용한다.","현금흐름방식은 계약유지율, 판매량, 투자수익률 등 다양한 가격요소를 반영하여 보험료를 산출한다.","3이원방식은 새로운 가격요소 적용이 불가능해 정교한 보험료 산출이 곤란하다."]},{"num":3,"q":"다음 표에서 설명하는 보험계약의 보장개시일로 맞는 것은? (단, 무진단계약으로 가정함) - 청약일 : 9/2(월) - 승낙일 : 9/3(화) - 제1회 보험료 납입일 : 9/4(수)","box":"","c":["9/4(수)","9/3(화)","9/2(월)"]},{"num":4,"q":"다음의 보기에서 설명하는 제도는 무엇인가? 사고내용이 복잡하거나 의학적 판단이 필요하여 보험금 지급액 산정까지 상당 시간이 소요될 것으로 예상될 경우 회사가 추정 하는 보험금의 50% 이내의 금액을 수익자에게 미리 지급하고 보험금 지급액 확정시 정산하는 제도","box":"","c":["보험금 정산제도","보험금 선지급제도","보험금 가지급제도"]},{"num":5,"q":"다음 중 납입최고에 대한 설명으로 사실과 다른 것은?","box":"","c":["보험회사는 14일(보험기간이 1년 미만일 경우 7일) 이상의 기간을 납입최고기간으로 정해야 한다.","납입최고기간이 끝나는 날에 계약이 해지된다는 내용을 서면, 전화 또는 전자문서 등으로 알려주어야 한다.","보험회사가 전자문서로 안내하고자 할 경우 계약자에게 서면 또는 전자서명법에 따른 전자서명으로 동의를 얻어 수신확인을 조건으로 전자문서를 송신해야 한다."]},{"num":6,"q":"다음 중 보험계약자 등이 가지는 통지의무에 대한 설명으로 맞는 것은?","box":"","c":["피보험자는 주소 또는 연락처가 변경된 경우 즉시 보험회사에 알려야 한다.","계약자와 피보험자만이 가지는 의무이다.","보험계약자가 회사에 알린 최종의 주소로 등기우편 등 우편물에 대한 기록이 남는 방법으로 보험회사가 보험계약자에게 알린 사항은 일반적으로 도달하는데 필요한 시일이 지난 때에 보험계약자에게 도달한 것으로 본다."]},{"num":7,"q":"다음 보기에서 설명하는 김생명씨의 직업은 무엇인가? 김생명씨는 피보험자의 보험계약 청약에 대한 인수여부 및 보험료와 보장한도를 결정한다.","box":"","c":["보험중개사","언더라이터","클레임 담당자"]},{"num":8,"q":"다음 중 보험소비자 보호에 대한 설명으로 맞는 것은?","box":"","c":["금융소비자보호법에 따른 금융소비자 의사에 반하여 보험계약 체결을 강요해서는 안 된다.","보험계약 체결과 관련한 수수료의 일부를 고객에게 지급할 수 있다.","동일한 보험회사일 경우에는 다른 설계사 명의로 계약을 체결할 수 있다. 3월1회모의고사"]},{"num":9,"q":"다음 중 3대 기본지키기에 대한 설명으로 맞는 것은?","box":"","c":["보험설계사가 3대 기본지키기를 위반하였을 경우 보험계약자는 위반일로부터 3개월 이내에 계약을 취소하고 기납입보험료를 반환받을 수 있다.","보험설계사는 계약자 보관용 청약서 전달을 보험약관의 교부와 중요한 내용에 대한 설명으로 대체할 수 있다.","자필서명은 보험계약자와 피보험자의 청약의사표시이므로 보험설계사는 반드시 보험계약자와 피보험자로부터 직접 서명을 받아야 한다."]},{"num":10,"q":"다음 중 보험사기의 사회적 피해와 관련된 내용으로 틀린 것은?","box":"","c":["보험제도 존립기반 위협","보험금 지급지연 감소","공보험 재정 악화 ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음 중 설계사가 될 수 있는 자에 해당하는 것은?","box":"","c":["업무정지 및 등록취소 처분이 있었던 날부터 2년이 지나지 아니한 자","파산되어 복권되지 아니한 자","음주운전으로 사고를 일으킨 자"]},{"num":12,"q":"다음 중 보험설계사 교차모집제도에 대한 설명으로 틀린 것은?","box":"","c":["보험업법령에서는 교차모집을 위탁한 보험회사와 교차모집설계사 양측에 대한 금지사항을 규정하고 있다.","생명보험회사에 속한 보험설계사가 제3보험업을 영위하는 1개의 대리점을 위하여 모집하는 경우 교차모집에 해당된다.","교차모집을 하려는 보험설계사는 모집하고자 하는 보험계약의 종류에 따른 등록요건을 갖추어 해당 협회에 등록해야 한다."]},{"num":13,"q":"다음 중 통신수단을 이용한 모집관련 준수사항에 대한 설명으로 틀린 것은?","box":"","c":["전화, 컴퓨터 통신 등 통신수단을 이용하여 모집하려는 자는 보험업법상 별도의 보험모집 자격이 필요 없다.","통신수단을 이용하여 보험계약을 청약한 경우 청약철회, 계약내용 확인 등도 통신수단을 이용할 수 있도록 해야 한다.","통신수단을 이용한 모집에 동의한 자를 대상으로 모집해야 한다."]},{"num":14,"q":"다음 중 금융기관보험대리점에서 점포별로 모집에 종사할 수 있는 최대 인원은?","box":"","c":["2명","3명","5명"]},{"num":15,"q":"다음 중 보험금 대리청구인 지정제도를 신청 받을 수 있는 기관은?","box":"","c":["보험협회","금융감독원","보험회사"]},{"num":16,"q":"다음 중 ( )안에 들어갈 용어로 알맞은 것은? ( )란 생명보험협회 홈페이지를 통해 각 보험사 상품에 대해 공시이율, 보험료, 해지환급금 등을 비교공시하는 것을 말한다.","box":"","c":["생명보험 상품 비교공시","변액보험 특별계정 비교공시","모집수수료율 비교공시"]},{"num":17,"q":"다음 중 보험민원의 현황과 특징에 대한 설명으로 틀린 것은?","box":"","c":["한국소비자원에 금융민원을 신청할 수 있다.","인터넷 등 무선화기기 이용 증대로 직접 방문하여 민원 신청은 불가능하다.","대다수의 보험민원은 금융감독원에 접수되고 있다."]},{"num":18,"q":"다음 중 월적립식 저축성보험의 비과세요건으로 틀린 것은?","box":"","c":["기본보험료의 선납기간이 12개월 이내일 것","매월 납입하는 보험료 합계액이 150만원 이하일 것","매월 납입하는 기본보험료가 균등할 것"]},{"num":19,"q":"다음 표 ( )안에 들어갈 용어와 금액이 알맞게 연결된 것은? 장애인을 ( )로 하는 보험계약의 보험금은 연간 ( ) 한도로 증여세를 비과세한다.","box":"","c":["피보험자 - 4천만원","보험수익자 - 4천만원","보험수익자 - 5천만원"]},{"num":20,"q":"다음 중 소득별 과세소득 분류가 맞게 연결된 것은?","box":"","c":["저축성보험의 보험차익 - 연금소득","보험설계사의 모집수당 - 사업소득","집합투자기구로부터의 이익 - 이자소득 3월1회모의고사"]},{"num":21,"q":"다음 중 생명보험 관련 법규에 대한 설명으로 틀린 것은?","box":"","c":["「예금자보호법」으로 보험계약관계를 규정한다.","「보험업법」은 보험업 허가, 감독관련 근거 법률이다.","보험회사의 공동행위와 관련하여「독점규제 및 공정거래에 관련한 법률」의 적용을 받는다.","변액보험에 대해서 「자본시장과 금융투자업에 관한 법률」의 적용을 받는다."]},{"num":22,"q":"다음 중 생명보험계약의 법적 특성에 대한 설명으로 틀린 것은?","box":"","c":["보험계약은 일반계약보다 더 강한 선의계약성이 요구된다.","계약당사자 간 의무가 수반되는 편무계약이다.","보험계약의 성립은 청약서 작성, 보험증권 교부 등이 필요 없는 불요식계약이다.","계약당사자가 서로에게 대가성 재산을 지급해야 하는 유상계약이다."]},{"num":23,"q":"다음 중 생명보험 상품의 분류에 관한 설명으로 틀린 것은?","box":"","c":["개인보험과 단체보험은 보험계약의 대상에 의한 분류이다.","주계약의 보험사고를 기준으로 생존보험, 사망보험, 생사혼합보험으로 분류한다.","단체보험은 단체 또는 단체의 대표자를 주피보험자로 하여 가입하는 보험이다.","단체보험은 보험료 일괄납입 등 계약관리가 편리하기 때문에 보험료가 비교적 저렴하다."]},{"num":24,"q":"다음 중 종신보험에 대한 설명으로 틀린 것은?","box":"","c":["사망을 보장하는 보험은 모두 종신보험이다.","종신보험은 변액보험으로도 설계 가능하다.","일반적으로 피보험자 사망시 유가족의 생활보장을 위해 가입한다.","종신보험과 정기보험의 가장 큰 차이점은 보험기간이다."]},{"num":25,"q":"다음 중 어린이보험에 대한 설명으로 맞는 것은?","box":"","c":["어린이와 청소년기에 나타날 수 있는 각종 질병과 상해 등을 중점 보장하기 위한 상품이다.","아동기 안전사고, 사기 노출 위험을 보장하는 상품이다.","15세 미만 사망시 해지환급금을 지급하고 계약은 소멸한다.","원칙적으로 사망을 보장하는 급부설계를 할 수 있다."]},{"num":26,"q":"다음 중 장애인전용보험에 대한 설명으로 틀린 것은?","box":"","c":["장애인전용 보장성보험의 보험료는 일반보장성보험의 보험료 세액공제와는 별도로 세액공제를 받을 수 있다.","장애인전용보험은 일반보험에 비하여 보험회사의 심사절차가 간단하게 진행된다.","장애인전용보험은 사업비율과 이자율을 우대적용하여 일반보험에 비해 보험료가 상대적으로 저렴하다.","장애인복지법에 등록된 장애인 및 국가유공자 등 예우에 관한 법률에 의해 등록된 상이자는 장애인 보장성보험 가입이 가능하다."]},{"num":27,"q":"다음 중 연금보험에 대한 설명으로 틀린 것은?","box":"","c":["위험보장기간에 피보험자 사망시 책임준비금(사망보험금)을 지급하고 계약은 소멸한다.","연금보험은 노후의 안정적인 생활자금 마련을 위한 상품이다.","종신연금형은 연금지급개시 이후에는 계약을 해지할 수 없다.","세제적격 연금저축은 만 20세 이상부터 가입할 수 있다."]},{"num":28,"q":"다음 중 세제적격 연금저축에 대한 설명으로 틀린 것은?","box":"","c":["근거법령은 「소득세법」이다.","최소보험료 납입기간이 설정되어 있다.","보험료의 공제는 소득공제 방식이다.","금융기관간 연금이전이 가능하다."]},{"num":29,"q":"다음 중 생명보험 상품에 대한 설명으로 틀린 것은?","box":"","c":["변액보험은 상품설명서에 기재된 해약환급금을 최저보증한다.","교육보험은 부모사망시 교육자금 및 양육자금을 지급한다.","변액보험을 판매하기 위해서는 전문적인 자격증을 보유해야 한다.","장애인전용 연금보험은 일반 종신연금보다 많은 연금액을 지급한다."]},{"num":30,"q":"다음 중 퇴직연금에 대한 설명으로 틀린 것은?","box":"","c":["근로자의 퇴직금을 외부의 금융기관에 적립하여 근로자 퇴직시 연금 또는 일시금으로 지급하는 제도이다.","도입 초기에는 10인 이상 근로자를 고용하는 사업장을 대상으로 실시하였다.","2010년 12월부터 전 사업장으로 확대되어 실행중이다.","2017년부터는 자영업자, 근속기간 1년 미만 또는 단시간 근로자 등으로 가입범위가 확대되었다. 3월1회모의고사"]},{"num":31,"q":"다음 중 제3보험에 대한 설명으로 틀린 것은?","box":"","c":["사람의 신체에 대한 질병보장상품의 경우 생명보험의 영역으로 볼 수 있다.","생명보험이나 손해보험 중 온전히 어느 한 분야에 속했다고 보기 어려워 Gray Zone으로 불리기도 한다.","질병으로 인한 소득상실의 보장은 손해보험의 영역으로 볼 수 있다.","치료비의 실손보상은 질병치료에 대한 부분으로 생명보험 영역에 해당한다."]},{"num":32,"q":"다음 중 질병보험과 상해보험의 공통점이 아닌 것은?","box":"","c":["원칙적으로 피보험이익이 없다.","주계약에서 사망을 보장할 수 있다.","생명보험회사 및 손해보험회사 모두 판매 가능하다.","주로 종합형 상품이 많다."]},{"num":33,"q":"다음 중 피보험이익에 대한 설명으로 틀린 것은?","box":"","c":["현재 100만원 가치의 자동차가 있다면 100만원이 자동차의 피보험이익이다.","손해보험과 제3보험에서는 필수적인 요소이다.","금전으로 산정할 수 있다.","피보험이익을 넘어서는 중복가입이나 초과가입은 불가능하다."]},{"num":34,"q":"다음 표의 상해보험에 대한 설명으로 틀린 것은? 상해보험에서 말하는 신체의 상해란 (가)몸에 상처를 입는 부상보다는 넓은 의미로, 반드시 (나)외관상 분명한 상처자국을 남기는 것을 말하며 상해로 인한 사망 또는 (다)상해로 인한 신체장해를 포함한다. 또한 (라)상해사고의 결과로 발생한 질병도 상해보험의 보장대상이 된다.","box":"","c":["(가)","(나)","(다)","(라)"]},{"num":35,"q":"다음 중 제3보험 상품의 분류가 바르게 연결된 것은?","box":"","c":["치아보험 - 상해보험","재해보험 - 간병보험","교통재해보험 - 상해보험","치매보험 – 질병보험"]},{"num":36,"q":"다음 중 상해보험에 대한 설명으로 알맞은 것은?","box":"","c":["약관상 보장하지 않는 원인에 의한 사망으로 피보험자가 사망한 경우 기납입보험료를 지급하고 보험계약은 소멸한다.","보험기간은 일반적으로 10년 이상이다.","사고발생 위험성이 연령별 차이가 클 경우 단일률을 이용하여 보험료를 산출할 수 있다.","질병사망은 특약을 통해 보장받을 수 있다."]},{"num":37,"q":"다음 중 상해보험에서 보험금 지급이 제한될 수 있는 경우에 해당하는 것은?","box":"","c":["사무직에서 생산직으로 직업이 변경되어 보험회사에 통지한 후 상해가 발생한 경우","유전적 질병으로 가족이 사망하였으나 보험회사에 통지하지 않은 상태에서 상해가 발생한 경우","질병이 원인이 되어 상해가 발생한 경우","변경된 직업을 통지하지 않았으나 이와 관계없이 상해가 발생한 경우"]},{"num":38,"q":"다음 중 질병보험에 해당되는 보험의 개수는? 교통재해보험, 암보험, 치아보험, 장기간병보험(LTC), 치매보험, 연금보험, 화재보험","box":"","c":["2개","3개","4개","5개"]},{"num":39,"q":"다음 중 질병보험에 대한 내용으로 맞는 것은?","box":"","c":["상법에서는 20세 미만의 가입은 불가한 것으로 명시하고 있다.","모든 질병보험은 실손보험 형태로만 판매되고 있다.","연령이 높아질수록 보험료가 저렴해지는 특징을 갖고 있다.","고연령 또는 건강상태에 따라 위험률이 현저히 높을 경우 가입이 제한될 수 있다."]},{"num":40,"q":"다음 중 간병보험에서 면책사항에 해당하지 않는 것은?","box":"","c":["의사 처방이 없는 약물 투여로 인한 인지기능 장애","면책기간 중 재해로 인한 중증치매상태","정신분열병으로 인한 인지기능 장애","알콜중독 3월1회모의고사"]}],"06":[{"num":1,"q":"다음 중 재무설계의 필요성에 대한 설명으로 틀린 것은?","box":"","c":["소득의 흐름과 소비지출의 흐름은 불일치한다.","중년기의 가계소득이 생애주기 전체에서 가장 높다.","자산의 유동성을 상승시키기 위해 부동산에 투자한다."]},{"num":2,"q":"다음 중 현금흐름방식에 대한 설명으로 틀린 것은?","box":"","c":["계약유지율, 판매량, 투자수익률 등 다양한 가격요소를 반영이 가능하다.","보수적인 표준기초율 가정을 통해 안정적인 이익을 확보할 수 있다.","보험소비자의 경우 상품선택의 폭이 확대되는 장점이 있다."]},{"num":3,"q":"다음 중 보험계약의 무효에 해당하는 것은?","box":"","c":["만 17세 미만자를 피보험자로 하여 사망을 보험금 지급사유로 하는 경우","보험계약자가 청약철회 기간이 지난 후 청약철회를 요청한 경우","타인의 사망을 보험금 지급사유로 하는 보험계약을 체결한 후 피보험자의 서면동의를 얻은 경우"]},{"num":4,"q":"다음 중 보험금 지급기일에 대한 설명으로 바르지 못한 것은?","box":"","c":["보험금 청구와 관련된 구비서류 제출시 접수일로부터 3영업일 이내에 지급해야 한다.","분쟁조정신청이 필요한 경우 60영업일 이내 지급해야 한다.","보험금 지급사유 조사가 필요한 경우 10영업일 이내 지급해야 한다."]},{"num":5,"q":"다음 중 보험료 납입최고(독촉)에 대한 설명으로 틀린 것은?","box":"","c":["보험기간이 1년 미만인 경우에는 7일 이상의 기간을 납입최고(독촉)기간으로 한다.","계약자와 보험수익자가 다른 경우 계약자와 보험수익자 모두에게 납입최고(독촉)에 대한 내용을 안내해야 한다.","납입최고(독촉)기간 내에 연체보험료를 납입하지 아니할 경우 납입최고(독촉)가 끝나는 날에 계약이 해지된다."]},{"num":6,"q":"다음 중 ( ) 안에 들어갈 숫자의 합은? 보험계약자는 계약이 해지된 날부터 ( )년 이내에 회사가 정한 절차에 따라 계약의 부활을 청약할 수 있으며, 부당한 계약전환시 기존 보험계약이 소멸한 날로부터 ( )개월 이내에 소멸계약의 부활을 청구하고 새로운 보험계약을 취소할 수 있다.","box":"","c":["6","9","4"]},{"num":7,"q":"다음 중 보험계약의 해지에 대한 설명으로 틀린 것은?","box":"","c":["계약이 해지될 경우 해약환급금은 보험계약자에게 지급한다.","보험계약자는 보험회사에서 정한 사유에 해당하는 경우 임의해지할 수 있다.","종신형 연금보험의 경우 연금 지급이 개시된 이후에는 해지할 수 없다."]},{"num":8,"q":"다음 보기 중 언더라이팅 정보의 원천에 해당하는 것을 모두 고른 것은? (가) 계약 전 알릴 의무 고지 (나) 판매채널의 모집보고서 (다) 계약적부 확인에 의한 조사보고서 (라) 계약자의 가족관계 정보","box":"","c":["(가), (다), (라)","(가), (나), (다)","(가), (나), (라)"]},{"num":9,"q":"다음 중 보험설계사의 전문성 개발에 대한 설명으로 틀린 것은?","box":"","c":["보험설계사는 보험상품과 관련된 지식습득에만 집중하는 것이 바람직하다.","고객들에게 보험회사의 상품과 서비스에 대한 정확한 설명을 제공하기 위해 필요하다.","보험설계사는 고객의 생애주기별 다양한 위험을 예측하고 고객이 이를 대비할 수 있도록 도와주는 역할을 담당하기 때문에 전문성 개발이 필요하다."]},{"num":10,"q":"다음 중 보험사기의 사회적 피해에 대한 내용으로 옳지 않은 것은?","box":"","c":["부당한 보험금 지급으로 인해 보험료가 인상된다.","보험사기로 인한 피해는 건강보험과 같은 공보험과 관련이 없다.","보험산업의 이미지 악화를 초래한다. ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음 중 보험모집에 대한 내용으로 틀린 것은?","box":"","c":["보험회사의 홍보부서 직원은 보험모집을 할 수 없다.","보험대리점은 보험회사를 위하여 보험계약의 체결을 대리한다.","보험회사의 사외이사는 보험모집을 할 수 있는 자에서 제외된다."]},{"num":12,"q":"다음 중 보험대리점에 대한 설명으로 맞는 것은?","box":"","c":["보험설계사 또는 보험중개사로 등록된 자는 보험대리점이 되지 못한다.","보험대리점은 생명보험과 손해보험을 겸업할 수 없다.","보험대리점은 보험계약자를 위해 보험계약의 체결을 대리하는 자이다."]},{"num":13,"q":"다음 중 금융기관보험대리점의 금지행위에 해당하지 않는 것은?","box":"","c":["해당 금융기관의 점포 외의 장소에서 모집을 하는 행위","모집과 관련이 없는 금융거래를 통하여 취득한 개인정보를 미리 그 개인의 동의를 받고 모집에 이용하는 행위","대출 등을 받는 자의 동의를 미리 받지 아니하고 보험료를 대출 등의 거래에 포함시키는 행위"]},{"num":14,"q":"다음 중 「생명보험 공정경쟁질서 유지에 관한 협정」 에서 정한 승환계약에 대한 설명으로 틀린 것은?","box":"","c":["승환계약이 발생한 경우 보험계약 1건당 50만원의 제재금을 부과한다.","승환계약이라도 보험설계사 본인 및 배우자 직계존비속 계약은 사회통념을 감안하여 제재대상에서 제외된다.","보험설계사가 소속된 동일 점포의 다른 보험설계사 명의로 신계약이 체결된 경우도 제재대상이다."]},{"num":15,"q":"다음 우수인증설계사 제도에 대한 설명 중 잘못된 것만 고른 것은? (가) 근속기간 : 동일회사 3년 이상 재직 (나) 보험계약 유지율 : 13회차 95%, 25회차 90% 이상 (다) 정도영업 : 직전 3년간 품질보증해지․민원해지․무효, 불완전판매건 ‘0건’","box":"","c":["가, 나","나, 다","가, 다"]},{"num":16,"q":"다음 중 광고심의제도에 대한 설명으로 틀린 것은?","box":"","c":["단순히 브랜드를 홍보하는 경우에는 심의규정 대상에서 제외한다.","일부 상품에 대해서 예외적으로 사후심의 절차를 진행할 수 있다.","광고심의필의 유효기간은 심의필을 받은 날로부터 6개월이다."]},{"num":17,"q":"다음 중 정기공시의 수시공시에 대한 설명으로 틀린 것은?","box":"","c":["수시는 기업이 경영활동을 통하여 이해관계자들에게 중대한 영향을 미칠 수 있는 중요한 사항이다.","수시공시사항이 발생한 즉시 금융감독원과 생명보험협회에 그 사실을 보고하고 회사 홈페이지에 공시해야 한다.","수시공시는 공시일로부터 3개월간 공시해야 한다."]},{"num":18,"q":"다음 중 ｢민법｣에 규정된 배우자의 법정상속지분에 대한 설명으로 맞는 것은?","box":"","c":["자녀 2명과 배우자가 공동으로 상속받는 경우 배우자의 법정상속지분율은 1.5/3.5 이다.","직계비속이 없고 직계존속만 있는 경우 배우자는 직계존속보다 상속순위가 우선한다.","배우자의 법정상속분은 직계비속 또는 직계존속의 상속분과 동일하다."]},{"num":19,"q":"다음 중 연금소득 과세에 대한 설명으로 틀린 것은?","box":"","c":["연금소득은 금융회사에서 연금을 지급하는 시점에 금융회사가 원천징수하고 추후 다른 종합소득과 합산하여 종합과세하는 것이 원칙이다.","사적연금소득의 합계액이 연 1,200만원 이하일 경우 분리과세를 선택할 수 있다.","연금소득자의 나이가 70세 미만일 경우 4%의 세율이 적용된다 3월2회모의고사"]},{"num":20,"q":"다음 표의 ( ) 안에 들어갈 금액으로 맞는 것은? [보험설계사의 간편장부대상자 적용 요건] - 해당과세기간에 신규로 사업을 개시한 보험설계사 - 직전 과세기간의 수입금액이 ( ) 미만인 보험설계사","box":"","c":["6,500만원","7,500만원","8,000만원 ＜생명보험＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 4점)"]},{"num":21,"q":"다음 중 생명보험계약의 특징에 대한 내용으로 틀린 것은?","box":"","c":["사람의 생존 및 사망을 보장한다.","정액보상을 주된 보상원칙으로 한다.","보험사고 발생시 약정한 금액을 지급한다.","재산상의 손해는 실손보상한다."]},{"num":22,"q":"다음 중 생명보험 상품의 기능적 특성으로 틀린 것은?","box":"","c":["생명보험은 형태가 보이지 않는 무형의 상품이다.","생명보험 상품은 불확실한 미래에 대한 보장을 주기능으로 하는 미래지향적 상품이다.","생명보험 계약은 보험회사가 청약하고 이를 계약자가 승낙하면 성립된다.","생명보험 상품은 계약자의 라이프사이클에 맞춰 필요한 위험보장 및 재정설계가 가능한 상품이다."]},{"num":23,"q":"다음 중 특약의 구분과 내용이 바르게 연결된 것은?","box":"","c":["보장을 추가․확대하기 위한 특약 - 우량체 할인특약","보장을 추가․확대하기 위한 특약 - 연금전환특약","제도성 특약 - 휴일재해보장특약","제도성 특약 - 선지급서비스특약"]},{"num":24,"q":"다음 중 생명보험 상품의 분류에 관한 설명으로 틀린 것은?","box":"","c":["개인보험과 단체보험은 보험계약의 대상에 의한 분류이다.","개인보험은 피보험자를 개인으로 한정하여 체결하는 보험이다.","생존보험, 사망보험, 생사혼합보험은 주계약의 보험사고를 기준으로 분류한 것이다.","보장성보험은 사망보험의 보장기능과 생존보험의 저축기능을 동시에 겸비한 보험이다."]},{"num":25,"q":"다음 중 ( ) 안에 들어갈 내용으로 알맞은 것은? 종신보험은 ( 가 )을 보장하는 ( 나 ) 상품이다.","box":"","c":["(가) 사망 (나) 보장성보험","(가) 생존 (나) 저축성보험","(가) 생존 및 사망 (나) 보장성보험","(가) 사망 (나) 저축성보험"]},{"num":26,"q":"다음 중 장애인의 보험가입에 대한 설명으로 맞는 것은?","box":"","c":["장애인이란 「보험업법」에서 정의하는 자를 지칭한다.","보험회사는 장애인이란 이유만으로 보험가입을 차별할 수 없지만 보험금 감액은 가능하다.","정당한 사유없이 장애인의 보험계약 청약을 거절시 3년 이하의 징역 또는 2천만원 이하의 벌금에 처한다.","장애인은 장애인전용 보장성보험뿐만 아니라 일반보장성 보험도 가입할 수 있다."]},{"num":27,"q":"다음 중 장애인보험에 대한 설명으로 틀린 것은","box":"","c":["보험가입시 비장애인과 동일한 절차를 통해 가입가능 여부를 결정한다.","정당한 사유없이 장애인의 보험계약 청약을 거절할 수 없다.","과거 암질병 이력이 있는 경우 암보험 가입이 제한될 수 있다.","금융위원회에서 장애인 보험가입차별 방지를 위한 신고센터를 운영하고 있다."]},{"num":28,"q":"다음 중 변액종신보험과 일반종신보험의 공통점에 해당하지 않는 것은?","box":"","c":["계약자적립금 운용방식","다양한 특약 부가","보험료 할인 혜택","보험기간"]},{"num":29,"q":"다음 중 ( ) 안에 공통으로 들어갈 알맞은 용어는 무엇인가? - 연금보험에서 제1보험기간에 사망시 ( )을/를 지급하고 계약은 소멸한다. - 만 15세 미만 사망시에는 납입한 보험료 전액과 ( ) 중에서 큰 금액을 지급한다.","box":"","c":["해약환급금","책임준비금","미상각신계약비","사망보험금 3월2회모의고사"]},{"num":30,"q":"다음 중 변액보험에 대한 설명으로 틀린 것은?","box":"","c":["기본보험계약과 변동보험계약으로 이루어져 있다.","선택특약은 일반계정에서 운용한다.","변동보험계약은 별도의 보험료를 추가 납입하여야 한다.","기본보험계약은 보험료 산출의 기초가 되는 계약이다. ＜제3보험＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 4점)"]},{"num":31,"q":"다음 중 「상법」 인보험(제3장)의 보험종류에 해당하지 않는 것은?","box":"","c":["생명보험","질병보험","간병보험","상해보험"]},{"num":32,"q":"다음 중 보험업종에 대한 설명으로 맞는 것은?","box":"","c":["생명보험업은 단기·거대한 위험을 대상으로 한다.","보험업법에서는 생·손보 겸영에 대해 특별한 제한을 하지 않고 있다.","생명보험과 손해보험의 상이한 리스크를 고려하여 겸영이 금지되어 있다.","제3보험은 겸영이 금지되어 있다."]},{"num":33,"q":"다음 중 상해보험에 대한 설명으로 맞는 것은?","box":"","c":["급격성은 원인에서 결과에 이르는 과정이 외부적 요인에 기인한 것을 의미한다.","상해보험의 보험사고는 급격성, 우연성, 외래성을 동시에 충족하면서 사고의 발생과 신체의 상해 사이에 인과관계가 존재해야 한다.","상해를 발생시키는 사고가 연속적으로 발생하는 경우 외래성을 충족하지 못하게 된다.","상해보험은 발생여부는 확정되어 있으나 발생시기만 불확정적이다."]},{"num":34,"q":"다음 중 상해보험에서 보장하는 내용이 아닌 것은?","box":"","c":["중대질병 수술비","교통사고 사망보험금","재해수술비","재해골절치료비"]},{"num":35,"q":"다음 중 ( ) 안에 들어갈 내용이 알맞은 것은? ( 가 )에서는 보험계약자 또는 피보험자의 직업․직무 변경시 지체없이 그 사실을 ( 나 )에 통지하도록 하고 있다.","box":"","c":["(가) 상법 (나) 보험설계사","(가) 보험업법 (나) 보험회사","(가) 상법 (나) 보험회사","(가) 보험업법 (나) 보험설계사"]},{"num":36,"q":"다음 중 질병보험에 대한 설명으로 옳지 않은 것은?","box":"","c":["질병보험에는 암보험, 실손의료보험 등이 있다.","물건을 들다가 허리가 다친 경우는 해당하지 않는다.","보험기간은 10년 미만이며 단일률, 군단율을 이용하여 보험료를 산출한다.","연령이 증가함에 따라 보험료는 높아진다."]},{"num":37,"q":"다음 중 암보험에 대한 설명으로 틀린 것은?","box":"","c":["가입 후 일정기간 동안 보장하지 않는 상품도 있다.","보장개시일 이전에 암이 발병하고 보장개시일 이후에 해당 암으로 사망할 경우 암사망보험금은 지급되지 않는다.","암수술급여금은 암수술비로 지출한 금액 이상으로는 지급할 수 없다.","암의 종류에 따라 암진단금이 다르게 지급될 수도 있다."]},{"num":38,"q":"다음 중 실손의료보험에 대한 설명으로 맞는 것은?","box":"","c":["동일인이 다수의 실손의료보험을 가입하더라도 초과이익 금지를 위해 본인이 부담한 치료비를 상품별로 보상책임액 비율에 따라 비례보상한다.","과잉진료를 방지하기 위해 중복계약체결을 금지하고 있다.","중복계약에 따른 비례보상 대상계약은 모든 제3보험 상품이다.","상해·질병보험에 특약으로 부가되어 판매되고 있다."]},{"num":39,"q":"다음 ( ) 안에 들어갈 단어로 알맞은 것은? 간병보험은 일반적으로 일상생활장해보장의 경우 면책기간을 ( 가 )로 설정하고 있으며, 중증치매보장의 경우 면책기간을 ( 나 )으로 두고 있다.","box":"","c":["(가) 90일 (나) 2년","(가) 60일 (나) 3년","(가) 30일 (나) 1년","(가) 120일 (나) 4년"]},{"num":40,"q":"다음 중 제3보험에 대한 설명으로 틀린 것은?","box":"","c":["순수보장성보험으로만 개발해야 한다.","정액보상도 가능하고, 실손보상도 가능하다.","저축성보험으로는 개발할 수 없다.","수술비의 경우 약정한 금액으로 지급할 수도 있고 실제 수술비를 기준으로 지급할 수도 있다. 3월2회모의고사"]}],"07":[{"num":1,"q":"다음 중 사회보장제도 가운데 공공부조에 해당하는 것은 무엇인가?","box":"","c":["기초생활보장, 의료급여","국민연금, 장애인복지","가정복지, 생계급여"]},{"num":2,"q":"다음 중 생명보험계약 내용에 대한 설명으로 맞는 것은?","box":"","c":["보험기간은 계약자가 보험료를 납입하는 기간을 말한다.","보험금액은 보험계약자가 위험부담의 대가로 보험회사에 지불하는 금액을 말한다.","보험사고는 보험금 지급사유와 동일한 개념으로 사용되고 있다."]},{"num":3,"q":"다음 중 현금흐름방식에 대한 설명으로 틀린 것은?","box":"","c":["계약유지율, 판매량, 투자수익률 등의 새로운 가격요소 반영이 가능하다.","보수적인 표준기초율 가정을 통해 안정적인 이익을 확보할 수 있다.","보험소비자의 경우 상품선택의 폭이 확대되는 장점이 있다."]},{"num":4,"q":"다음 중 보험회사가 제1회 보험료를 받은 경우 청약의 승낙 및 거절에 대한 설명으로 맞는 것은?","box":"","c":["무진단계약은 제1회 보험료를 받은 날로부터 30일 이내에 승낙 또는 거절하여야 한다.","진단계약은 진단일(재진단의 경우에는 최종진단일)로부터 15일 이내에 승낙 또는 거절하여야 한다.","보험약관에서 정한 기간 내에 청약의 승낙여부를 보험계약 자에게 통지하지 않은 경우 승낙한 것으로 본다."]},{"num":5,"q":"다음 중 보험금 지급기일에 대한 설명으로 바르지 못한 것은?","box":"","c":["보험금 청구와 관련된 구비서류 제출시 접수일로부터 3영업일 이내에 지급하여야 한다.","보험금 지급사유 조사·확인 필요시 접수일로부터 10영업일 이내에 지급하여야 한다.","10영업일 이내에 지급하지 못할 것으로 예상시 접수일로부터 60영업일 이내에 지급하여야 한다."]},{"num":6,"q":"다음 중 보험계약의 부활에 대한 설명으로 틀린 것은?","box":"","c":["부활청약자의 고의에 의한 역선택 개연성이 높다.","계약 전 알릴 의무는 신계약과 동일하게 적용하지 않는다.","계약이 부활되면 그 계약의 효력은 해지 이전 상태로 돌아간다."]},{"num":7,"q":"다음 중 보험금 수령 방법의 변경에 대한 설명으로 틀린 것은?","box":"","c":["보험회사가 일시금을 분할하여 지급하는 경우에는 보험계약의 평균공시이율을 연단위 복리로 계산한 금액을 더하여 지급한다.","보험회사가 분할지급액을 일시금으로 지급하는 경우에는 이 계약의 평균공시이율을 연단위 복리로 계산한 금액을 더하여 지급한다.","보험계약자는 사망보험금 전부에 대하여 나누어 지급하거나, 일시금 지급 방법으로 변경할 수 있다."]},{"num":8,"q":"다음 보기에서 언더라이팅 단계와 내용이 적절하게 연결된 것은? (가) 1차 선택 (a) 의적진단에 의한 선택 (나) 2차 선택 - (b) 모집조직에 의한 선택 (다) 3차 선택 (c) 언더라이터에 의한 선택","box":"","c":["(가) - (a)","(나) - (b)","(다) - (c)"]},{"num":9,"q":"다음 중 보험설계사의 보험회사에 대한 책임에 대해 맞게 설명한 것은?","box":"","c":["고객으로부터 보험료를 수령한 경우 본인 이름으로 된 영수증을 교부하고 자필서명 한다.","고객으로부터 제기되는 불만사항을 구두상이나 문서 또는 전화로 접수했을 경우 지체없이 보험회사에 알린다.","어떠한 경우라도 고객의 보험료를 유용하여서는 안 되므로 일일수금 방법으로 보험료를 받을 수 있다."]},{"num":10,"q":"다음 중 보험설계사 보험사기 연루사례로 맞는 것을 모두 고른 것은? (가) 통원치료가 가능한 경미한 보험사고임에도 허위로 장기 입원하도록 유도 (나) 계약자와 공모하여 다수 보험에 가입한 후 고의사고를 유발하여 보험금 편취 (다 병원과 공모하여 환자를 소개받은 후 보험에 가입하도록 유도","box":"","c":["(가), (나)","(나), (다)","(가), (나), (다) ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음 중 보험감독방식에 대한 설명으로 맞는 것은?","box":"","c":["보험감독방식의 유형으로는 공시주의, 준거주의, 실질적 감독주의에 의한 감독방식이 있다.","우리나라는 공시주의 감독방식을 채택하고 있다.","대부분의 나라가 실질적 준거주의를 채택하고 있다."]},{"num":12,"q":"다음 중 금융기관보험대리점으로 등록할 수 있는 기관이 아닌 것은?","box":"","c":["상호저축은행","은행","우체국"]},{"num":13,"q":"다음 중 통신수단을 이용한 모집관련 준수사항으로 틀린 것은?","box":"","c":["동의를 받지 않은 고객을 대상으로 전화·우편·컴퓨터통신 등으로 보험모집을 할 수 있다.","전화를 이용한 보험모집의 경우에도 보험계약자로부터 자필서명을 반드시 받아야 한다.","질문 또는 설명에 대한 보험계약자의 답변 및 확인내용을 음성녹음하는 등 증거자료를 확보하고 유지해야 한다."]},{"num":14,"q":"다음 중 「예금자보호법」에 의한 예금보험금 지급사유에 해당하지 않는 것은?","box":"","c":["보험회사 인가취소","보험회사 파산","보험회사 인수합병"]},{"num":15,"q":"다음 중 보험금 대리청구인 지정제도에 대한 설명으로 틀린 것은?","box":"","c":["치매 등 보험사고 발생으로 본인의 보험금 청구가 현실적으로 어려운 상황에 대비하여 보험금을 대신 청구하는 자를 미리 지정하는 제도이다.","생명보험회사는 신계약 체결시 상품설명서와 해피콜 등을 통해 안내하고 있다.","가입한 모든 보험계약의 경우 해당 보험회사에 연락하여 대리청구인 지정제도를 신청할 수 있다."]},{"num":16,"q":"다음 표에서 ( )안에 들어갈 금액으로 맞는 것은? 보험광고 제재와 관련하여 광고심의 대상에 해당하나 심의를 받지 않고 광고하는 경우, 심의를 받은 원안과 다른 내용으로 임의 변경하여 광고하는 경우는 ( ) 이하의 제재금이 부과될 수 있다.","box":"","c":["3천만원","5천만원","1억원"]},{"num":17,"q":"다음 중 경영공시에 대한 설명으로 옳은 것은?","box":"","c":["정기공시는 결산공시와 분기별 임시결산공시로 나누어진다.","결산공시는 결산일로부터 6개월 이내에 공시해야 한다.","결산공시는 공시일로부터 6개월간 공시한다."]},{"num":18,"q":"다음 중 보험민원 감축을 위한 보험회사의 노력으로 틀린 것은?","box":"","c":["상품기획 단계에서부터 민원소지가 없는지 스스로 판단하는 제도를 운영한다.","구체적인 입증자료가 없고 관련법규 등이 허용하는 범위를 초과하는 민원일지라도 성실하게 수용한다.","판매채널에 의한 불완전판매가 발생하지 않도록 각종 교육 및 안내를 실시한다."]},{"num":19,"q":"다음 중 상속 및 증여와 관련된 보험세제에 해당하지 않는 것은?","box":"","c":["장애인 등을 보험수익자로 하는 계약의 보험금에 대한 증여세 비과세","상속받은 보험금 등에 대한 금융재산 상속공제","일반보장성보험의 세액공제"]},{"num":20,"q":"다음 보기의 ( )안에 들어갈 내용으로 알맞은 것은? 보험회사 등 원천징수의무자는 보험설계사에게 매월 모집수당 등을 지급할 때 ( )%(지방소득세 별도)를 원천징수하여 다음 달 10일까지 관할 세무서에 신고·납부하여야 한다.","box":"","c":["3","5","10 4월1회모의고사"]},{"num":21,"q":"다음 중 생명보험 상품에 대한 설명으로 틀린 것은?","box":"","c":["보험상품이란 위험보장을 목적으로 우연한 사건 발생에 관하여 금전 및 그 밖의 급여를 지급할 것을 약정하는 계약이다.","보험기간은 상대적으로 장기이다.","실손보상을 주된 보상원칙으로 한다.","생명보험 상품은 위험보장을 목적으로 사람의 생존 또는 사망에 관하여 약정한 금전 및 그 밖의 급여를 지급할 것을 약속하고 대가를 수수하는 계약이다."]},{"num":22,"q":"보험계약에서 보험회사가 미리 마련한 정형화된 약관에 따르고, 보험계약자는 보험계약 체결시 그 약관을 전체로서 동의하든지 또는 거절의 선택밖에는 할 수 없는 것을 생명보험계약의 어떤 법적 특성이라고 하는가?","box":"","c":["불요식계약성","낙성계약성","부합계약성","선의계약성"]},{"num":23,"q":"다음 표의 ( )안에 들어갈 내용으로 알맞은 것은? 보험회사에서 보험상품을 개발하여 판매하고자 할 때에 사업방법서, 보험약관, 보험료 및 책임준비금 산출방법서 등의 ( 가 )를 작성해야 한다. 다만 보험업법령상 ( 나 )사항에 해당 하는 경우 금융위원회에 ( 나 )하여야 한다.","box":"","c":["(가) 사용설명서 (나) 보고","(가) 기초서류 (나) 신고","(가) 사용설명서 (나) 제출","(가) 기초서류 (나) 보고"]},{"num":24,"q":"다음 중 보험가입의 주목적에 따른 생명보험 상품의 분류에 대한 설명으로 틀린 것은?","box":"","c":["보장성보험은 생존시 지급되는 급부금이 전혀 없는 순수보장성보험과 만기까지 생존했을 경우에 이미 납입한 보험료를 돌려주는 만기환급형보험으로 설계할 수 있다.","저축성보험은 생존시 지급되는 보험금의 합계액이 이미 납입한 보험료를 초과하는 보험이다.","보장성보험은 만기 생존시 보험금이나 연금이 지급되는 저축기능을 강화한 상품이다.","보장성보험은 보험기간 중의 사망이나 질병, 재해 발생시 큰 보장을 받을 수 있는 상품이다."]},{"num":25,"q":"다음 중 종신보험에 대한 설명으로 맞는 것은?","box":"","c":["대표적인 저축성보험 상품이다.","사람의 질병 또는 질병으로 인한 입원·수술 등의 위험에 관해 보장한다.","다양한 특약 부가를 통해 종합보장형 보험설계가 가능하다.","보험기간을 미리 정해 놓고 피보험자가 보험기간 내에 사망하였을 때 보험금을 지급한다."]},{"num":26,"q":"다음 중 교육보험에 대한 설명으로 틀린 것은?","box":"","c":["주계약의 보험사고를 기준으로 생존보험에 해당한다.","대표적인 저축성보험이다.","부모 생존시 각종 학자금 등 교육자금을 지급하는 보험상품이다.","부모 사망시 사망보험금을 지급하고 계약은 소멸된다."]},{"num":27,"q":"다음 중 생명보험 종목과 사망보험금 지급사유가 잘못 연결된 것은?","box":"","c":["연금보험 - 연금개시 전 위험보장기간에 피보험자 사망","종신보험 - 피보험자 사망","정기보험 - 피보험자 사망","어린이보험 - 만 15세 미만 피보험자 사망"]},{"num":28,"q":"다음 중 세제적격 연금저축에 대한 설명으로 틀린 것은?","box":"","c":["최소보험료 납입기간은 10년이다.","상품의 근거법령은 「소득세법」이다.","위험보장기간에 사망시 책임준비금을 지급하고 계약은 소멸한다.","상속연금형은 피보험자의 생존기간에 이자만 지급하는 형태이다."]},{"num":29,"q":"다음 보기에서 설명하는 퇴직연금제도는 무엇인가? 근로자가 퇴직급여금을 일시금으로 수령하거나 퇴직연금에 이미 가입되어 있으면서 자기부담으로 추가 가입할 수 있는 퇴직연금제도","box":"","c":["DB","IRP","DC","VUL"]},{"num":30,"q":"다음 중 변액종신보험과 일반종신보험의 공통점에 해당하는 것은?","box":"","c":["투자위험의 부담 주체","예금자보호법 적용","보장성 선택특약","적립금의 운용 방식 4월1회모의고사"]},{"num":31,"q":"다음 중 제3보험에 대한 설명으로 맞는 것은?","box":"","c":["연금보험전문회사에서 제3보험을 운영할 수 있다.","제3보험 상품을 모집하고자 하는 자는 보험연수원에 등록해야 한다.","제3보험은 「상법」에 정의되어 있다.","「보험업법」상 별도로 독립된 제3보험회사를 운영할 수 있다."]},{"num":32,"q":"다음 중 피보험이익에 대한 설명으로 맞는 것은?","box":"","c":["보험회사는 피보험이익을 최고한도로 책임을 진다.","피보험이익은 금전으로 산정할 수는 없다.","존재여부와 귀속이 보험사고 후에 확정되어야 한다.","생명보험에서는 필수적인 요소이다."]},{"num":33,"q":"다음 중 보험상품 판매시 모집자격에 대한 설명으로 틀린 것은?","box":"","c":["연금보험과 상해보험을 판매하기 위해서는 생명보험협회와 손해보험협회에 모두 등록해야 한다.","상해보험과 해상보험을 판매하기 위해서는 손해보험협회에 등록하면 모집이 가능하다.","질병보험과 상해보험을 판매하기 위해서는 생명보험협회와 손해보험협회 중 한 곳에 등록하면 된다.","종신보험과 연금보험을 판매하기 위해서는 생명보험협회에 등록하면 모집이 가능하다."]},{"num":34,"q":"다음 표에 나열된 보험상품들의 공통사항은 무엇인가? 치매보험, 재해보험, 장기간병보험, 건강보험","box":"","c":["저축성보험 상품이다.","피보험이익이 존재하는 상품이다.","질병보험 상품이다.","제3보험이다."]},{"num":35,"q":"다음 중 상해사고 요건에 대한 설명으로 틀린 것은?","box":"","c":["원인 또는 결과의 발생이 예견되지 않아야 한다.","신체 상해의 발생원인에서 결과에 이르는 과정이 내부적 요인에 기인해야 한다.","결과의 발생을 피할 수 없을 정도로 급박한 상태이어야 한다.","사고의 발생과 신체의 상해 사이에 인과관계가 존재하여야 한다."]},{"num":36,"q":"다음 중 상해보험의 직업 및 직무 변경 통지에 대한 설명으로 틀린 것은?","box":"","c":["변경된 직업과 관계없이 발생한 사고에 대해 회사는 보험금을 전액 지급한다.","사무직에서 농업종사자로 직업을 변경한 경우 위험한 직업으로 변경한 것이 아니므로 보험계약자는 통지할 의무가 없다.","위험한 직업으로 변경되었음에도 회사에 변경사실을 통지하지 않을 경우 회사는 그 사실을 안 날부터 1개월 이내에 계약을 해지할 수 있다.","위험이 증가했음에도 통지를 하지 않은 채로 보험사고가 발생한 경우 회사는 보험금을 삭감하여 지급할 수 있다."]},{"num":37,"q":"다음 중 질병보험에 대한 설명으로 맞는 것은?","box":"","c":["질병보험 시장이 포화됨에 따라 점차 종신보험 판매가 증가하고 있다.","글로벌 환경변화에 따라 질병형태가 변화하면서 발생하는 의료비는 점차 줄고 있다.","질병보험은 암보험, 실손의료보험, 치아보험이 하나로 통합되어 주로 판매되고 있다.","평균수명의 연장으로 노인인구가 증가하면서 질병기간이 장기화되고 있다."]},{"num":38,"q":"다음 표에서 설명하는 암보험금의 종류는 무엇인가? 피보험자가 암의 직접적인 치료를 목적으로 하여 입원시 지급되며, 피보험자가 동일한 암의 직접적인 치료를 목적으로 2회 이상 입원한 경우에는 1회 입원으로 보아 각 입원일수를 합산하여 계산한다.","box":"","c":["암진단보험금","암직접치료입원보험금","암직접치료통원보험금","암수술보험금"]},{"num":39,"q":"다음 중 제3보험 상품에 대한 설명으로 틀린 것은?","box":"","c":["실손상해에서는 직업을 위험등급에 따라 3단계로 위험률을 차등 적용하고 있다.","실손의료보험은 상해보험과 질병보험의 특약으로 부가되어 판매되고 있다.","질병보험은 순수보장형과 만기환급형으로 개발이 가능하다.","간병보험은 암보험과 마찬가지로 보험회사가 면책기간을 설정할 수 있다."]},{"num":40,"q":"다음 중 간병보험에 대한 설명으로 맞는 것은?","box":"","c":["만 60세 이상부터 가입이 가능하다.","보험기간은 대부분 80세 만기형 상품이다.","피보험자의 사망이나 간병연금수령 종료시 계약은 소멸된다.","우리나라는 위험률 산출을 위한 경험데이터가 충분하기 때문에 위험률이 변동되지 않는다. 4월1회모의고사"]}],"08":[{"num":1,"q":"다음 중 우리나라 생명보험의 역사에 대한 설명으로 틀린 것은?","box":"","c":["우리나라에 생명보험이 도입된 것은 일본과 강화도조약을 체결한 이후이다.","1950년대 들어 생명보험회사가 국민저축기관으로 지정되면서 개인보험이 크게 성장하였다.","우리나라 최초의 생명보험회사는 1921년 설립된 조선생명보험회사이다."]},{"num":2,"q":"다음 중 ( ) 안에 들어갈 내용으로 알맞은 것은? 생애주기에서 중년기에는 ( 가 )이 ( 나 )보다 많아 ( 다 )이 발생한다.","box":"","c":["(가) 소득 (나) 소비지출 (다) 잉여소득","(가) 소비지출 (나) 소득 (다) 잉여소득","(가) 근로소득 (나) 사업소득 (다) 잉여소득"]},{"num":3,"q":"다음 중 보험계약관계자에 대한 설명으로 틀린 것은?","box":"","c":["보험계약자는 1인이든 2인 이상이든 관계가 없다.","보험계약자 자신이 피보험자가 될 수도 있고 타인을 피보험자로 할 수도 있다.","수익자는 보험사고 발생시 보험금 지급책임이 있는 당사자이다."]},{"num":4,"q":"다음 중 청약철회가 불가능한 경우에 해당하지 않는 것은?","box":"","c":["보험증권을 받은 날로부터 10일, 청약일로부터 20일이 경과한 경우","보험기간이 60일 이내인 보험","계약체결전 건강진단을 지원하는 보험"]},{"num":5,"q":"다음 중 진단계약의 보장개시일에 대한 설명으로 맞는 것은?","box":"","c":["계약의 청약을 승낙하고 제1회 보험료를 받은 경우 제1회 보험료를 받은 날로부터 보장이 개시된다.","건강진단 후 제1회 보험료를 납입한 경우 건강진단일로부터 보장이 개시된다.","제1회 보험료를 받고 건강진단을 받은 경우 건강진단일로부터 보장이 개시된다."]},{"num":6,"q":"다음 중 보험계약의 내용 변경에 대한 설명으로 맞는 것은?","box":"","c":["보험회사는 계약자가 보험가입금액을 감액하고자 할 때에는 그 감액된 부분은 해지된 것으로 본다.","보험가입금액 등의 변경시 회사가 지급하여야 할 해지환급금이 있을 때에는 보험료 및 책임준비금 산출방법서에 따라 사망보험금을 계약자에게 지급한다.","보험수익자 변경을 위해서는 보험회사의 승낙을 얻어야 한다."]},{"num":7,"q":"다음 표의 ( )안에 들어갈 내용으로 맞는 것은? 보험회사가 보험계약자의 요구에 의해 일시금을 분할하여 지급하는 경우에는 그 미지급금액에 대하여 이 계약의 ( )을/를 연단위 복리로 계산한 금액을 더하여 지급한다.","box":"","c":["평균공시이율","보험계약대출이율","평균공시이율 + 1%"]},{"num":8,"q":"다음 중 환경적 언더라이팅의 평가대상에 해당하는 것은?","box":"","c":["흡연","병력","생활환경 및 소득수준"]},{"num":9,"q":"다음 중 3대 기본지키기에 대한 설명이 잘못된 것은?","box":"","c":["3대 기본지키기 위반시 계약자는 계약이 성립된 날로부터 3개월 이내 취소가능하다.","보험계약자 보관용 청약서(청약서 부본)는 보험수익자에게 전달한다.","보험약관은 분량이 많고 이해하기 어려우므로 보험설계사에게 중요한 내용에 대한 설명의무가 부과된다."]},{"num":10,"q":"다음 중 자살예방 게이트키퍼에 대한 설명으로 맞지 않는 것은?","box":"","c":["생명보험사회공헌위원회에서 운영하고 있다.","주변사람의 자살 위험신호를 재빨리 인지하여 전문가에게 연계하도록 훈련받은 사람이다.","자살예방 프로그램인 ‘보고듣고말하기’를 통해 양성하고 있다. ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음 표의 (가)~(다)에 들어갈 내용을 맞게 나열한 것은? 생명보험설계사란 생명보험회사 등을 위하여 보험계약의 체결을 중개하는 자로서 ( 가 )에 따라 ( 나 )의 업무를 위탁받은 ( 다 )에 등록하고 있다.","box":"","c":["(가) 상법 (보험편) (나) 금융감독원 (다) 보험연수원","(가) 보험업법 (나) 금융위원회 (다) 생명보험협회","(가) 보험업감독규정 (나) 생명보험협회 (다) 해당 생명보험회사"]},{"num":12,"q":"다음 중 교차모집 보험설계사의 금지사항이 아닌 것은?","box":"","c":["교차모집을 위탁한 보험회사에 대하여 다른 교차모집보험 설계사 유치를 조건으로 대가를 요구하는 행위","모집을 위탁한 보험회사에 대하여 회사가 정한 수수료· 수당 외에 추가로 대가를 지급하도록 요구하는 행위","TV, 홈쇼핑채널에서 보험상품 판매를 하는 행위"]},{"num":13,"q":"다음 중 보험대리점에 대한 설명 중 틀린 것은?","box":"","c":["보험대리점은 보험회사를 위해 보험계약의 체결을 대리하는 자를 말한다.","보험업종에 따라 개인대리점 및 법인대리점으로 구분된다.","보험대리점은 일사전속제가 적용되지 않는다."]},{"num":14,"q":"다음 중 금융기관보험대리점의 모집 방법에 대한 설명으로 틀린 것은?","box":"","c":["금융기관 점포내의 지정된 장소에서 2인까지만 판매가 가능하다.","모든 금융기관보험대리점은 전화, 우편, 컴퓨터 통신, 방문판매, 인터넷 홈페이지를 이용하여 불특정 다수의 고객을 대상으로 보험상품을 안내 또는 설명하여 모집하는 것이 가능하다.","은행법에 의해 설립된 은행, 상호저축은행은 금융기관보험 대리점 등록이 가능하다."]},{"num":15,"q":"다음 중 ｢생명보험 공정경쟁질서 유지에 관한 협정｣에 대한 설명으로 틀린 것은?","box":"","c":["적용범위는 보험회사와 그 소속 모집종사자이다.","협정 위반시 피해를 본 보험회사는 위반행위가 있는 날로부터 6개월 이내 생명보험협회에 신고 가능하다.","신고 접수시 생명보험협회 내에 설치된 공정경쟁질서유지 위원회의 심의·의결을 거쳐 과태료를 부과한다."]},{"num":16,"q":"다음 중 금융분쟁조정위원회에 대한 설명으로 맞는 것은?","box":"","c":["금융회사, 금융소비자 등은 금융과 관련하여 분쟁이 발생한 때에는 금융분쟁조정위원회에 분쟁의 조정을 신청할 수 있다.","분쟁조정위원회가 조정안을 작성한 때에는 신청인과 관계당사자에게 이를 제시하고 수락하지 않은 경우도 재판상의 화해와 동일한 효력을 가진다.","분쟁조정을 신청한 후 소를 제기한 경우 회부하지 않을 수 있다."]},{"num":17,"q":"다음 중 ( ) 안에 들어갈 내용으로 알맞은 것은? 분기별 임시결산공시는 분기결산일로부터 ( 가 ) 이내에 다음 분기 임시결산공시 전까지 공시하고, 결산공시는 매 사업년도 결산일로부터 ( 나 ) 이내에 실시한다.","box":"","c":["(가) 2개월 (나) 3개월","(가) 3개월 (나) 3개월","(가) 3개월 (나) 2개월"]},{"num":18,"q":"다음 중 보험민원에 대한 설명으로 맞는 것은?","box":"","c":["매년 금융민원 중 보험민원의 비중이 가장 낮은 편이다.","금융감독원에 민원을 제기하고자 할 때에는 직접 방문하여야만 접수할 수 있다.","금융소비자는 생명보험회사와의 민원, 분쟁 발생시 해당 금융회사, 금융감독원 등에 직접 민원을 제기할 수 있다."]},{"num":19,"q":"다음 중 생명보험상품의 세제 혜택을 부여하는 의의가 아닌 것은?","box":"","c":["사회보장기능의 보완","단기자금의 높은 수익","산업자금 조달을 위한 저축 유인책"]},{"num":20,"q":"다음 중 보험설계사 세제에 대한 설명으로 맞는 것은?","box":"","c":["보험설계사가 지급받는 모집수당은 근로소득에 해당한다.","연말정산 사업소득금액은 해당 과세기간에 지급한 사업소득 수입금액에 기타소득의 소득률을 곱하여 계산한다.","간편장부대상자가 받는 사업소득에 대하여는 원천징수 의무자가 해당소득에 대하여 연말정산을 함으로써 납세의무가 종결된다. 4월2회모의고사"]},{"num":21,"q":"다음 중 생명보험계약 관련 법규에 대한 설명으로 틀린 것은?","box":"","c":["「예금자보호법」은 생명보험 계약관계를 규율하는 근거 법률이다.","「보험업법」은 보험업 인허가 및 감독 관련 근거법률이다.","보험사의 공동행위와 관련하여 「독점규제 및 공정거래에 관한 법률」이 적용된다.","변액보험에 대하여 「자본시장과 금융투자업에 관한 법률」이 적용된다."]},{"num":22,"q":"다음 표에서 설명하는 생명보험 계약의 법적 특성은 무엇인가? 보험계약자가 보험회사에 보험료를 납입하고, 보험회사는 피보험자에게 우연한 사고가 발생한 경우 약정한 보험금을 지급해야 한다.","box":"","c":["유상·쌍무계약성","불요식 계약성","낙성계약성","사행계약성"]},{"num":23,"q":"다음 중 보험계약의 특약에 대한 설명으로 틀린 것은?","box":"","c":["우량체할인특약에 가입하기 위해서는 추가로 보험료를 납입해야 한다.","연금보험상품에 암보장 특약 추가로 보장내역을 확대시킬 수 있다.","암보장특약과 우량체할인 특약은 그 성질이 다르다.","특약만으로 보험계약은 성립할 수 없지만 특약은 주계약과 동일하게 상품개발 절차를 거친다."]},{"num":24,"q":"다음 중 종신보험과 정기보험의 차이점으로 맞는 것은?","box":"","c":["납입기간","보험기간","사망보장","세액공제"]},{"num":25,"q":"다음 보기에서 틀린 것을 고르시오. 종신보험은 보장기간이 (가)평생(종신)인 대표적인 (나)사망보험 상품으로 (다)보장성보험 세액공제가 가능하며 (라)계약자 사망시 유가족의 경제적 곤궁을 해결해 주는 상품이다.","box":"","c":["(가)","(나)","(다)","(라)"]},{"num":26,"q":"다음 중 교육보험에 대한 설명으로 틀린 것은?","box":"","c":["어린이보험의 다양화로 판매가 감소하고 있는 추세이다.","각종 인성프로그램, 진학 상담 서비스를 추가한 상품도 판매된다.","부모 사망시 양육자금 및 교육자금을 지급한다.","보장성보험에 해당되어 세액공제를 받을 수 있다."]},{"num":27,"q":"다음 중 장애인보험에 대한 설명으로 틀린 것은?","box":"","c":["장애인의 보험청약 심사시 가입당시의 건강상태 등을 고려하여 보험가입 가능여부를 결정한다.","장애인은 일반보험에 가입할 수 없다.","장애인전용 보장성보험의 보험료는 일반보장성 보험의 보험료 세액공제와는 별도로 세액공제를 받을 수 있다.","장애인도 비장애인과 차별없이 동일한 심사과정을 거쳐 보험에 가입할 수 있다."]},{"num":28,"q":"다음 중 연금보험과 연금저축보험의 공통점으로 맞는 것은?","box":"","c":["연간 납입한도가 동일하다.","금융기관간 이전이 가능하다.","제1보험기간 중 사망시 사망보험금을 지급하고 계약은 소멸된다.","세제혜택이 동일하다."]},{"num":29,"q":"다음 중 변액보험에 대한 설명으로 틀린 것은?","box":"","c":["변액보험 운용설명서는 보험계약 체결 후에 방문하여 지급한다.","보험계약관리내용은 분기별 1회 이상 통보한다.","변액보험 운용설명서와 보험계약관리내용은 회사 인터넷 홈페이지를 통해서 확인 가능하다.","계약자는 보험기간 중 다른 펀드로 변경 가능하다."]},{"num":30,"q":"다음 중 생명보험상품에 대한 설명으로 틀린 것은?","box":"","c":["변액종신보험은 연금전환특약을 이용하여 연금으로 전환할 수 있다.","어린이보험에 가입한 피보험자가 만 15세 미만시에 사망한 경우 책임준비금과 기납입보험료 중 큰 금액을 지급한다.","교육보험은 종신보험의 활성화 등으로 판매량이 감소하고 있다.","장애인전용 연금보험은 일반 종신연금보다 적은 연금액을 지급한다. 4월2회모의고사"]},{"num":31,"q":"다음 중 제3보험에 대한 설명으로 맞는 것은?","box":"","c":["제3보험이라는 용어는 상법 에 정의되어 있다.","간병보험은 손해보험절에 반영되어 있다.","상법 에는 상해보험과 질병보험에 대한 규정이 반영되어 있다.","인보험은 제3보험의 하위 개념이다."]},{"num":32,"q":"다음 중 제3보험의 특징에 대한 설명으로 맞는 것은?","box":"","c":["손해보험은 장기·안정적 위험을 보장한다.","생명보험은 단기·거대위험을 보장한다.","사람의 신체에 대한 보험이므로 생명보험에 해당하고 비용손해와 의료비 등 실손보상적 급부를 보상하는 측면에서는 손해보험으로 볼 수 있다.","생명보험업에 해당하는 보험종목의 전부에 관하여 허가를 받은 자는 상법에 의거하여 제3보험업에 해당하는 보험종목에 대한 허가를 받은 것으로 본다."]},{"num":33,"q":"다음 상해보험의 주요 보장내용 중 ( )안에 들어갈 내용으로 알맞은 것은? - 재해사망보험금 : 피보험자가 보험기간 중 발생한 재해를 ( ) 원인으로 사망하였을 경우 보상 - 재해수술급여금 : 피보험자가 보험기간 중 재해분류표에서 정하는 재해를 ( ) 원인으로 수술을 받았을 경우 보상","box":"","c":["직접적인, 간접적인","간접적인, 간접적인","간접적인, 직접적인","직접적인, 직접적인"]},{"num":34,"q":"다음 중 상해보험 피보험자 직업·직무 변경시 통지의무에 대한 설명으로 틀린 것은?","box":"","c":["위험성이 높은 직업으로 변경시 보험료는 높아지고 위험성이 낮은 직업으로 변경시 보험료는 낮아진다.","통지의무 불이행시 계약해지 또는 보험금 지급 제한이 가능하다.","보험회사에 통지하여야 하며 보험설계사에게 알리는 것만으로는 법적효력이 없다.","변경된 직업을 알리지 않았더라도 변경된 직업과 관계없는 사고에 대해서는 보험금을 일부 지급한다."]},{"num":35,"q":"다음 중 질병보험에 대한 설명으로 틀린 것은?","box":"","c":["보장내용에 따라 암보험, 실손의료보험 등이 있다.","물건을 들다가 허리를 다친 경우는 질병보험의 보장대상이 아니다.","대부분 상품의 보험기간은 10년 이상이며, 연령 및 건강상태와 상관없이 가입 가능하다.","일반사망보험금이 없기 때문에 상대적으로 저렴한 보험료로 각종 질병에 대한 보장을 받을 수 있다."]},{"num":36,"q":"다음 중 암보험에 대한 설명으로 맞는 것은?","box":"","c":["암보험은 가입 즉시 보장이 가능하다.","제자리암은 진단보험금을 수령해도 보험계약이 소멸되지 않는다.","나이와 상관없이 보험료는 동일하다.","암으로 인하여 사망할 경우 주계약에서 보장한다."]},{"num":37,"q":"다음 중 암 보험금 지급에 대한 설명으로 틀린 것은?","box":"","c":["보장개시일 이후 암으로 진단 확정되었을 경우 약정된 암진단보험금을 지급한다.","동일한 암의 직접적인 치료를 목적으로 2회 이상 입원시 1회 입원으로 간주해 합산하여 계산한다.","암 직접치료를 위해 입원 치료 중 보험기간 만료시에는 보장도 종료된다.","암사망보험금은 특약으로만 보장이 가능하다."]},{"num":38,"q":"다음 중 현재 판매되고 있는 실손의료보험에 대한 설명으로 맞는 것은?","box":"","c":["실손의료보험은 종신보험과 질병보험에 특약으로 부가되어 판매되고 있다.","급여의 자기부담률은 20%, 비급여의 자기부담률은 30%이다.","급여는 특약으로 부가되어 판매되고 있다.","특약 보험료의 경우 급여 의료이용량과 연계하여 보험료를 차등 적용한다."]},{"num":39,"q":"다음 중 우리나라의 실손의료보험 도입순서를 순서대로 맞게 나열한 것은? (가) 손해보험회사의 개인실손의료보험 (나) 생명보험회사의 개인실손의료보험 (다) 생명보험회사의 표준형 단독실손의료보험 (라) 생명보험회사의 단체실손의료보험","box":"","c":["(가) → (라) → (나) → (다)","(가) → (나) → (다) → (라)","(나) → (라) → (다) → (가)","(나) → (가) → (라) → (다)"]},{"num":40,"q":"다음 중 장기요양등급 판정에 의한 간병보험 보험금 지급 기준에 맞는 대상자가 아닌 것은?","box":"","c":["70세 장기요양등급 2등급","60세 장기요양등급 3등급","55세 노인성질환으로 장기요양등급 1등급","65세 장기요양등급 2등급 4월2회모의고사"]}],"09":[{"num":1,"q":"다음 중 사회보장제도 가운데 공공부조와 사회서비스에 해당하는 것은?","box":"","c":["산재보험, 의료급여","기초생활보장, 노인복지","국민건강보험, 기초생활보장"]},{"num":2,"q":"다음의 보험계약관계자에 대한 설명 중에서 맞는 것은?","box":"","c":["1인이든 2인 이상이든 보험계약자가 될 수 있다.","보험계약자와 피보험자는 동일인이어야 한다.","보험수익자는 보험회사로부터 보험금청구권을 지정받은 사람이다."]},{"num":3,"q":"다음 중 무배당보험에 대한 설명으로 틀린 것은?","box":"","c":["계약자배당을 실시하지 않는 보험상품이다.","보험료 계산시 실제 경험률과 비슷하게 설정하여 보험료를 할증하고 있다.","유배당상품에 비해 보험료가 비교적 저렴하다."]},{"num":4,"q":"다음 표의 (가), (나)안에 들어갈 내용으로 맞는 것은? ( 가 )은 부재자의 생사가 5년간 분명하지 아니한 때에 법원이 실종선고를 하고 사망한 것으로 보는 제도이며, ( 나 )은 사망의 원인이 될 위난을 당한 자의 생사가 위난 종료 후 1년간 분명하지 아니한 때 법원이 사망한 것으로 보는 제도이다.","box":"","c":["(가) 일반실종 (나) 특별실종","(가) 일반실종 (나) 인정사망","(가) 특별실종 (나) 인정사망"]},{"num":5,"q":"다음 중 보험료 납입최고(독촉)기간에 대한 내용으로 틀린 것은?","box":"","c":["일반적으로 14일 이상의 기간을 납입최고기간으로 정한다.","납입최고기간이 끝나는 날까지 보험료를 납입하지 아니할 경우 납입최고기간이 끝나는 날의 다음 날에 보험계약이 해지된다.","보험기간이 1년 미만인 경우 10일을 납입최고기간으로 한다."]},{"num":6,"q":"다음 중 보험계약의 부활을 청약할 수 있는 경우에 해당하지 않는 것은?","box":"","c":["보험료의 납입연체로 계약이 해지되었으나 해지환급금을 받지 아니한 경우","보험계약대출 등에 의하여 해지환급금을 차감하고 해지환급금을 수령한 경우","보험료의 납입연체로 계약이 해지되었으나 해지환급금이 없는 경우"]},{"num":7,"q":"다음 ‘김생명’씨의 보험나이에 대한 내용으로 틀린 것은? ‘김생명’씨의 보험계약일의 보험나이 : 30년 11개월","box":"","c":["‘김생명’씨의 보험나이는 31세이다.","‘김생명’씨를 피보험자로 한 사망보험 계약은 불가능하다.","매년 계약해당일에 나이가 증가한다."]},{"num":8,"q":"다음 중 언더라이팅에 대한 설명으로 맞는 것은?","box":"","c":["우리나라 보험회사의 언더라이팅은 우량체 중심으로 되어 있다.","표준미달체의 경우 보험금 삭감 방법으로만 계약을 인수할 수 있다.","표준체보다 위험이 높은 경우를 표준미달체라고 한다."]},{"num":9,"q":"다음 중 보험설계사가 지켜야 할 영업행위 윤리에 해당하지 않는 내용은 무엇인가?","box":"","c":["자신이 모집한 계약을 다른 모집종사자의 명의를 이용하여 계약을 체결하였다.","고객에게 계약 전 알릴 의무(고지의무)에 대해 충분히 설명하고 권유하였다.","보험회사가 제작하여 승인된 안내자료만으로 설명하였다."]},{"num":10,"q":"다음 중 보험설계사가 연루된 보험사기에 관한 설명으로 맞는 것은?","box":"","c":["보험설계사 등이 연루된 보험사기는 일반범죄에 비해 모방범죄에 의한 파급효과가 적다.","보험사기에 연루된 경우 형사처벌 외에도 지급받은 보험금 전액을 변제해야 함은 물론 관련된 보험계약은 해지된다.","보험사기로 유죄확정판결이 나면 금융감독원에 금융질서문란자로 등재된다. ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음의 보기에서 보험설계사가 될 수 있는 자를 모두 고르시오. (가) 파산선고 후 복권된 자 (나) 집행유예를 선고받고 유예기간이 종료된 자 (다) 보험료를 다른 용도로 유용하고 3년이 지난 자","box":"","c":["(가), (나)","(나), (다)","(가), (나), (다)"]},{"num":12,"q":"다음 중 금융기관보험대리점으로 등록할 수 있는 기관에 해당하지 않는 것은?","box":"","c":["「자본시장법」에 따른 투자중개업자","「여신전문금융업법」에 따른 겸영여신업자","「상호저축은행법」에 의한 상호저축은행"]},{"num":13,"q":"다음의 사례 중 특별이익 제공 금지행위에 해당되는 것은?","box":"","c":["월보험료 16,000원인 어린이보험에 가입한 고객에게 20,000원의 도서상품권을 제공하였다.","월보험료 20,000원인 보험계약을 체결한 계약자에게 22,000원 상당의 선물을 제공하였다.","월보험료 65,000원인 암보험을 체결한 계약자에게 30,000원 상당의 상품권을 제공하였다."]},{"num":14,"q":"다음 중 우수인증설계사에 대한 인증기준으로 틀린 것은?","box":"","c":["보험계약 유지율이 13회차 90%, 25회차 80% 이상인 자","금융감독원의 인증기준을 충족하는 자","직전 1년간 불완전판매 건이 없는 자"]},{"num":15,"q":"다음 중 보험상품에 관하여 광고를 하는 경우에 반드시 포함해야 하는 내용에 해당하지 않는 것은?","box":"","c":["금융상품에 관한 계약을 체결하기 전에 상품설명서 및 약관을 읽어볼 것을 권유하는 내용","광고의 유효기간이 있는 경우 해당 유효기간","장래에 있을 이익의 배당 또는 잉여금의 분배에 대한 예상에 관한 사항"]},{"num":16,"q":"다음 중 보험회사의 수시공시 내용에 대한 설명으로 틀린 것은?","box":"","c":["적기시정조치 등 법령에 의한 주요 조치사항은 수시공시해야 한다.","발생 즉시 공시하여야 하며, 3년간 공시해야 한다.","수시공시 항목을 통하여 보험회사의 경영실적, 재무상황, 재무제표 등을 파악할 수 있다."]},{"num":17,"q":"다음 중 보험민원의 특징에 대한 설명으로 맞는 것은?","box":"","c":["보험회사의 상품개발 및 판매정책과는 무관하다.","타 금융업권의 민원과 달리 악성민원인에 의해 남용될 소지가 크다.","보험민원 감축을 위한 노력에 힘입어 보험민원건수 절대치는 매년 큰 폭으로 줄어들고 있다."]},{"num":18,"q":"다음 중 「민법」에 규정된 상속순위를 올바르게 나열한 것은?","box":"","c":["직계비속 →직계존속 →형제자매 →4촌 이내의 방계혈족","직계존속 →직계비속 →4촌 이내의 방계혈족 →형제자매","배우자 → 직계비속 → 직계존속 → 형제자매"]},{"num":19,"q":"다음 표에서 ‘김생명’씨에 대한 보험금의 과세방법으로 맞는 것은? 보험계약자 피보험자 보험수익자 보험료납입자 보험사고 부 모 김생명(본인) 부 모사망","box":"","c":["증여세 과세","상속세 과세","과세 안함"]},{"num":20,"q":"다음 중 연금소득 분리과세에 대한 설명으로 틀린 것은?","box":"","c":["연금지급시 적용되는 세율이 2가지 이상에 해당하는 경우에는 낮은 세율을 적용한다.","연금계좌에서 연금외 형태로 지급받는 경우에는 연금소득이 아닌 퇴직소득으로 과세한다.","연금수령연차가 11년 이상일 경우에는 연간 연금수령한도를 적용하지 않는다. 5월1회모의고사"]},{"num":21,"q":"다음 중 생명보험 관계법령에 대한 설명으로 맞는 것은?","box":"","c":["생명보험표준약관의 주요 내용은 「보험업법 시행령」을 토대로 작성되었다.","「독점규제 및 공정거래에 관한 법률」은 국민건강보험의 독점적 지위에 관한 사항을 다룬다.","「금융산업의 구조개선에 관한 법률」은 보험업 인허가 관련 사항을 다룬다.","생명보험회사의 감독은 「금융위원회의 설치 등에 관한 법률」의 적용을 받고 있다."]},{"num":22,"q":"다음 중 생명보험계약의 법적 특성에 대한 설명으로 틀린 것은?","box":"","c":["보험계약의 부합계약성으로 인하여 보험계약자의 보호를 위한 규제가 필요하다.","보험계약은 도박이나 복권과 마찬가지로 사행계약성이 인정된다.","보험계약은 선의계약이기 때문에 계약당사자의 합의만으로는 계약이 성립되지 않는다.","표준약관에서는 고지의무를 위반한 경우 보험회사가 계약을 해지할 수 있도록 규정하고 있다."]},{"num":23,"q":"다음 중 생명보험 상품의 분류가 틀리게 연결된 것은?","box":"","c":["보험계약자의 수 : 개인보험과 단체보험","보험가입의 주목적 : 보장성보험과 저축성보험","주계약의 보험사고 : 생존보험, 사망보험, 생사혼합보험","의사의 진단 필요 여부 : 진단보험과 무진단보험"]},{"num":24,"q":"다음 표에서 ( )안에 들어갈 기호를 순서대로 맞게 나열한 것은? · 보장성보험 = 만기환급금 ( ) 기납입보험료 · 저축성보험 = 만기환급금 ( ) 기납입보험료","box":"","c":["＞, ＜","≧, ＜","＜, ≧","≦, ＞"]},{"num":25,"q":"다음 중 종신보험에 대한 설명으로 틀린 것은?","box":"","c":["피보험자가 언제 어떤 경우로 사망하더라도 약정된 보험금을 지급한다.","보험기간을 미리 정해놓고 피보험자가 보험기간 내에 사망하였을 때 보험금을 지급한다.","유가족이 처하게 될 경제적 곤궁을 해결해주는 생활보장 상품이다.","다양한 특약 부가를 통해 종합보장형 보험설계도 가능하다."]},{"num":26,"q":"다음 중 어린이보험에 대한 설명으로 틀린 것은?","box":"","c":["어린이와 청소년기에 나타날 수 있는 각종 질병과 상해 등을 중점 보장하는 상품이다.","교육보험 성격이 가미된 상품도 있다.","사망을 보장하는 급부설계를 할 수 있다.","만 15세 미만 사망시에는 납입한 보험료 전액과 책임준비금 중에서 큰 금액을 지급하고 계약이 소멸된다."]},{"num":27,"q":"다음 중 유니버설보험에 대한 설명으로 틀린 것은?","box":"","c":["보험료 추가납입, 중도인출이 가능한 상품이다.","변동보험금에 공시이율을 적용하여 추가 적립된 금액을 보험금으로 지급하는 상품이다.","최근에는 유니버설보험의 중도인출 추가납입 기능을 기존상품에 도입한 상품도 판매되고 있다.","유니버설보험은 일반계정에서 운용하거나 특별계정에서 운용할 수 있다."]},{"num":28,"q":"다음 중 연금보험에 대한 설명으로 사실과 다른 것은?","box":"","c":["연금보험은 연금개시 전의 위험보장기간과 연금지급기간으로 구분된다.","위험보장기간에 피보험자 사망시 책임준비금을 지급하고 계약은 소멸한다.","연금지급기간에 피보험자 사망시 사망보험금을 지급한다.","종신연금의 경우 연금지급개시 이후에는 계약을 해지할 수 없다."]},{"num":29,"q":"다음 보기의 내용 중에 맞게 설명된 내용을 모두 고르시오. (가) 확정급여형(DB형) : 근로자가 퇴직시 수령할 퇴직급여 수준이 사전적으로 확정되어 있는 제도 (나) 개인형 퇴직연금제도(IRP) : 급여의 수준이나 부담금의 수준이 확정되지 않은 퇴직연금제도 (다) 확정기여형(DC형) : 회사의 부담금이 사전에 확정되고 근로자가 지급받을 퇴직급여가 적립금의 운용실적에 따라 변동되는 제도","box":"","c":["(가), (나)","(가), (다)","(나), (다)","(가), (나), (다)"]},{"num":30,"q":"다음 중 변액보험에 대한 설명으로 맞는 것은?","box":"","c":["변액보험은 계약자가 납입한 보험료 전액이 특별계정에 투입된다.","보험계약관리내용을 다른 보험회사에 제공해서는 안 된다.","계약자적립금은 특별계정의 평가 등에 의하여 매월 변동한다.","변액보험 계약자는 보험기간 중 다른 펀드로 변경할 수 없다. 5월1회모의고사"]},{"num":31,"q":"다음 중 제3보험업의 허가에 대한 설명으로 맞는 것은?","box":"","c":["보험업을 영위하고자 하는 자는 보험종목별로 법원의 허가를 받아야 한다.","재산상의 손해를 보상하기 위한 상품을 판매하기 위해서는 별도로 독립된 제3보험회사를 설립해야 한다.","생명보험업에 해당하는 보험종목의 전부에 관하여 허가를 받은 회사는 간병보험 상품을 판매할 수 있다","자동차전문보험회사(단종보험회사)는 질병으로 인한 통원 등을 보장하는 상품을 판매 할 수 있다."]},{"num":32,"q":"다음 중 우리나라에서 인정되는 피보험이익에 대한 설명으로 틀린 것은?","box":"","c":["불확실한 보험사고로부터 손해를 보상받을 수 있는 이익을 말한다.","피보험이익의 존재여부와 귀속이 보험사고 전에 확정되어야 한다.","원칙적으로 생명보험에서 피보험이익은 필수요소이다.","금전으로 산정할 수 있어야 한다."]},{"num":33,"q":"다음 중 제3보험에 대한 설명으로 틀린 것은?","box":"","c":["순수보장성보험으로만 개발해야 한다.","정액보상도 가능하고, 실손보상도 가능하다.","저축성보험으로는 개발할 수 없다.","수술비의 경우 약정한 금액으로 지급할 수도 있고 실제 수술비를 기준으로 지급할 수도 있다."]},{"num":34,"q":"다음 표에서 설명하는 상해사고의 요건은 무엇인가? 보험사고의 핵심적인 요건으로 원인 또는 결과의 발생이 예견 되지 않는 상태를 말하며, 피보험자의 의사에 기인하지 않았음 을 말한다.","box":"","c":["우연성","외래성","확실성","급격성"]},{"num":35,"q":"다음 중 상해보험의 피보험자 직업·직무 변경 통지의무와 관련된 설명에서 틀린 것은?","box":"","c":["직업별 위험등급은 총 5등급으로 구분되며 등급에 따라 3단계로 위험률을 차등 적용한다.","사고가 변경된 직업·직무와 관계가 없는 경우에는 보험금이 삭감되지 않고 전액 지급된다.","보험계약자 또는 피보험자의 직업·직무 변경 통지시에는 추후 분쟁의 소지를 방지하기 위해 서면으로 변경 통지하고 보험증권에 확인을 받아두는 것이 안전하다.","위험성이 낮은 직업·직무로 변경된 경우에 납입할 보험료는 낮아지지 않는다."]},{"num":36,"q":"다음 중 질병보험에 대한 설명으로 틀린 것은?","box":"","c":["물건을 들다가 허리를 다친 경우에 보상한다.","연령이 높아지면 보험료도 높아진다.","질병사망보장은 특약을 통해서 이루어진다.","과로사 관련 특정질병, 뇌혈관질환 등을 보장하는 보험상품이다."]},{"num":37,"q":"다음 중 상해보험과 질병보험의 일반적 가입조건을 비교한 내용이다. 맞는 것을 모두 고르시오. (가) 상해보험의 주보험에서 질병사망은 부가할 수 없다. (나) 상해보험은 위험률 변동제도를 채택하고 있다. (다) 질병보험의 가입기간은 일반적으로 1년 이상이다. (라) 질병보험은 연령이 증가하면 보험료도 증가한다.","box":"","c":["(가), (나)","(가), (다)","(가), (라)","(나), (라)"]},{"num":38,"q":"다음 중 암보험의 주계약에서 보장하지 않는 것은?","box":"","c":["암진단보험금","암수술보험금","암직접치료입원보험금","암사망보험금"]},{"num":39,"q":"다음 중 실손의료보험에 대한 설명으로 틀린 것은?","box":"","c":["특약(비급여) 보험료의 경우 실손의료보험 가입자간 보험료 부담의 형평성 문제를 해소하기 위해 비급여 의료이용량과 연계하여 보험료를 차등 적용한다.","과잉진료를 방지하기 위해 실손의료보험은 실제 지출한 의료비의 일부를 본인이 부담하도록 운영하고 있다.","지속적이고 충분한 치료가 필요한 의료취약계층은 중증질환 치료를 위해 신의료기술 등 다양한 비급여 의료서비스를 이용할 수 있도록 보험료를 차등 적용한다.","자기부담금 비율은 주계약(급여)과 특약(비급여)가 서로 다르다."]},{"num":40,"q":"다음 중 간병보험에 대한 설명으로 맞는 것은?","box":"","c":["보험회사의 자체판정이 아닌 공적기준인 장기요양등급 판정이 있어야 보험금 지급이 가능하다.","장기간병보험은 갱신형으로 판매할 수 없다.","보험금 지급대상은 만 65세 이상이어야 한다.","간병보험도 면책기간을 설정할 수 있다. 5월1회모의고사"]}],"10":[{"num":1,"q":"다음 표에서 ( )안에 알맞은 숫자는 무엇인가? 노인빈곤율은 65세 이상 인구 중 중위소득 ( )% 이하의 비율을 말한다.","box":"","c":["50","25","20"]},{"num":2,"q":"다음 중 승낙 전 보험사고시 보장하는 범위에 대한 설명으로 틀린 것은?","box":"","c":["회사에 알린 내용 또는 건강진단 내용이 보험금 지급 사유에 영향을 미쳤다는 것을 회사가 증명하는 경우에는 보장하지 않는다.","한도액을 초과하여 청약한 보험사고의 경우 초과 청약에 대해선 보장하지 않는다.","청약철회한 이후 보험회사가 보험료를 계약자에게 반환하기 전에 발생한 보험사고에 대해서는 보장한다."]},{"num":3,"q":"다음에서 청약철회가 가능한 계약에 해당하는 것은?","box":"","c":["보험증권으로 교부받고 10일, 청약일로부터 20일이 경과한 계약","보험기간이 60일 이내인 계약","건강상태 진단을 지원하는 계약"]},{"num":4,"q":"다음 중 보험금 지급기일에 대한 설명으로 틀린 것은?","box":"","c":["보험금 지급사유 조사·확인 필요시 서류 접수일로부터 10영업일 이내","보험금 청구와 관련된 구비서류 접수시 서류 접수일로부터 3영업일 이내","수사기관의 조사 필요시 서류 접수일로부터 3개월 이내"]},{"num":5,"q":"다음 중 계약 전 알릴 의무에 대한 설명으로 틀린 것은?","box":"","c":["중요한 알릴 의무 대상이 되는 중요한 사항은 청약서의 질문표를 사용한다.","중요한 사항은 보험가입금액 한도 제한, 일부 보장 제외, 보험금 삭감 등 계약승낙에 영향을 미칠 수 있는 사항을 말한다.","중요한 사항을 알릴 의무자는 보험계약자와 보험수익자이다."]},{"num":6,"q":"다음 중 계약내용 변경에 대한 설명으로 옳은 것은?","box":"","c":["보험수익자를 변경하고자 할 경우에는 보험회사의 승낙이 필요하지 않다.","보험계약자를 변경하고자 할 경우에는 보험회사의 승낙이 필요하지 않다.","보험종목은 변경할 수 없다."]},{"num":7,"q":"다음 보기의 ( )안에 해당되지 않는 것은 무엇인가? 보험회사는 계약과 관련하여 ( )의 책임있는 사유로 계약자, 피보험자 및 보험수익자에게 발생된 손해에 대하여 관계법령 등에 따라 손해배상의 책임을 진다.","box":"","c":["보험중개사","임직원","보험대리점"]},{"num":8,"q":"다음 중 언더라이팅에 대한 설명으로 맞는 것은?","box":"","c":["우리나라 보험회사의 언더라이팅은 우량체 중심으로 되어 있다.","표준미달체의 경우에는 보험금 삭감 방법으로만 계약을 인수할 수 있다.","표준체보다 위험이 높은 경우를 표준미달체라고 한다."]},{"num":9,"q":"다음 중 보험범죄 신고센터에 대한 설명으로 틀린 것은?","box":"","c":["금융감독원과 보험회사에서 설치하고 운영하고 있다.","접수된 제보 건이 보험사기로 확인되는 경우 포상금을 지급한다.","인터넷을 통해서만 신고할 수 있다. 5월2회모의고사"]},{"num":10,"q":"다음에서 생명보험업계의 자살예방 프로그램에 해당하지 않는 것은?","box":"","c":["SNS를 통한 청소년종합상담시스템 ‘다 들어줄 개’ 운영","한강교량 20곳에 SOS생명의 전화 운영","한국형 자살예방교육 프로그램인 ‘보고듣고말하기’ 운영 ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음 중 보험중개사에 대한 설명으로 틀린 것은?","box":"","c":["영업보증금은 금융감독원에 예탁해야 한다.","특정 보험회사에 소속되지 않고 독립적으로 보험계약의 체결을 중개하는 자이다.","보험중개사는 영업개시 7일 전까지 보험협회에 등록해야 한다."]},{"num":12,"q":"다음에서 교차모집시 보험회사의 금지행위에 해당하지 않는 것은?","box":"","c":["보험회사가 정한 수수료·수당 외에 추가로 대가를 지급하기로 약속하거나 이를 지급하는 행위","소속 보험설계사에게 특정 보험회사를 지정하지 않고 보험설계사가 선택하여 교차모집을 하도록 하는 행위","교차모집보험설계사를 소속 보험설계사보다 우대하는 행위"]},{"num":13,"q":"다음 중 보험계약 체결 또는 모집에 관한 금지행위에 해당하지 않는 것은?","box":"","c":["실제 명의인이 아닌 자의 보험계약을 모집하는 행위","다른 모집종사자의 명의를 이용하여 보험계약을 모집하는 행위","전화 등 통신수단을 이용한 모집시 우편이나 팩스 등을 통하여 지체없이 청약서에 자필서명을 받는 행위"]},{"num":14,"q":"다음 보기의 내용에서 생명보험 우수인증설계사 인증 기준으로 틀린 것을 모두 고르시오. (가) 근속기간 : 동일회사에 3년 이상 재직 (나) 보험계약 유지율 : 13회차 95%, 25회차 85% 이상 (다) 정도영업 : 직전 3년간 품질보증해지/민원해지/무효 0건","box":"","c":["(가), (나)","(나), (다)","(가), (다)"]},{"num":15,"q":"다음 보기에서 예금자보호법에 따라 예금자 김생명씨가 보호 받을 수 있는 금액을 얼마인가? ＜김생명씨 가입 내역＞ (가) A저축은행에 예금 5,000만원을 가입한 이후에 예금 지급 정지로 B저축은행과 합병 (나) C생명보험회사에 최저보증금 6,000만원인 변액보험에 가입하였으나, C생명보험회사의 파산으로 D생명보험회사로 완전 계약이전 (다) E은행 I 지점에 예금 3,000만원, 대출 1,000만원, II 지점에 예금 2,000만원 가입하였으나, 인·허가가 취소","box":"","c":["4,000만원","5,000만원","6,000만원"]},{"num":16,"q":"다음에서 공시 항목과 공시기간이 알맞게 연결된 것은?","box":"","c":["주요 경영현황 – 결산일로부터 6개월 이내","파생상품거래 등으로 인한 거액의 손실 – 결산일로부터 3개월 이내","손익구조의 중대한 변동에 관한 사항 – 발생 즉시"]},{"num":17,"q":"다음 중 보험민원에 대한 설명으로 틀린 것은?","box":"","c":["금융감독원은 2002년부터 금융민원 현황을 발표하고 있다.","매년 금융민원 중 보험업권이 차지하는 비중이 가장 높다.","금융소비자는 금융회사와의 민원·분쟁 발생시 생명보험협회에 민원을 접수할 수 있다."]},{"num":18,"q":"다음에서 보험상품과 세제혜택이 올바르게 연결된 것은?","box":"","c":["저축성보험 – 보험료 소득공제","연금계좌 – 보험료 세액공제","보장성보험 – 보험금 수령시 보험차익 비과세"]},{"num":19,"q":"다음에서 과세방법이 다른 소득은 무엇인가?","box":"","c":["퇴직소득","양도소득","연금소득"]},{"num":20,"q":"다음 중 보험설계사의 세제에 대해 틀린 설명은?","box":"","c":["보험회사는 매년 보험설계사에게 모집수당을 지급할 때 3%(지방소득세 별도)를 원천징수해야 한다.","보험설계사의 수당은 사업소득에 해당한다.","연말정산 대상 사업소득 외에 다른 종합소득이 없는 경우 해당 사업소득에 대한 연말정산을 하는 것으로 납세의무가 종결된다. 5월2회모의고사"]},{"num":21,"q":"다음에서 생명보험과 관련된 법규와 거래가 먼 것은?","box":"","c":["상법","금융중심지의 조성과 발전에 관한 법률","약관의 규제에 관한 법률","독점규제 및 공정거래에 관한 법률"]},{"num":22,"q":"다음 중 생명보험계약의 법적 특성에 대한 설명으로 틀린 것은?","box":"","c":["금전거래가 수반되는 유상계약이다.","보험회사가 제시하는 약관을 보험계약자가 승낙함으로써 계약이 성립한다.","계약을 이행하는 선의성이 요구된다.","보험계약자는 정형화된 약관을 전체로서 동의 또는 거절의 선택밖에는 할 수 없다."]},{"num":23,"q":"다음 중 보장을 추가·확대하기 위한 특약이 아닌 것은?","box":"","c":["성인병특약","휴일재해보장특약","연금전환특약","입원특약"]},{"num":24,"q":"다음의 생명보험 상품에 대한 설명으로 틀린 것은?","box":"","c":["생존보험, 사망보험, 생사혼합보험은 보험가입의 주목적에 따른 분류이다.","생명보험계약은 정액보상을 주된 보상원칙으로 한다.","계약자의 의사와 관계없이 의무적으로 부가되는 특약이 존재한다.","대부분의 생명보험 상품은 비갱신형 상품이다."]},{"num":25,"q":"다음 중 종신보험에 대한 설명으로 틀린 것은?","box":"","c":["사망보험과 생존보험의 장단점을 서로 보완한 상품이다.","다양한 특약을 부가할 수 있다.","대표적인 사망보험이다.","만기환급형으로는 설계할 수 없다."]},{"num":26,"q":"다음 보기의 ( )안에 들어갈 알맞은 말은? 어린이보험은 원칙적으로 사망을 보장하는 급부설계를 할 수 없으며, 만 15세 미만 사망시에는 ( )을 지급하고 계약은 소멸한다.","box":"","c":["사망보험금과 책임준비금 중 적은 큰 금액","사망보험금과 책임준비금 중 큰 금액","납입한 보험료 전액과 책임준비금 중 적은 금액","납입한 보험료 전액과 책임준비금 중 큰 금액"]},{"num":27,"q":"다음에서 장애인전용보험에 대한 설명으로 맞는 것은?","box":"","c":["장애인은 장애인전용보험에만 가입할 수 있다.","생명보험업계는 장애인 보험계약 인수를 위한 모범규준 을 제정하여 장애인을 위한 별도의 심사절차를 마련하여 시행하고 있다.","장애인의 보험계약 청약을 거절할 경우 장애인 차별금지 및 권리구제 등에 관한 법률 에 따라 처벌받는다.","보험청약 심사시 가입 당시의 건강상태는 고려하지 않는다."]},{"num":28,"q":"다음 중 연금보험에 대한 설명으로 틀린 것은?","box":"","c":["종신연금형은 연금지급개시 이후에는 계약을 해지할 수 없다.","퇴직연금은 일시금으로만 수령할 수 있다.","위험보장기간에 사망시 책임준비금을 지급하고 계약은 소멸한다.","위험보장기간과 연금지급기간으로 구분된다."]},{"num":29,"q":"다음 보기에서 설명하는 변액보험은 무엇인가? (가) 피보험자 사망시 사망보험금을 기납입보험료와 비교하여 더 큰 금액을 지급한다. (나) 중도인출, 추가납입 기능이 있다.","box":"","c":["변액종신보험","변액연금보험","변액유니버설보험 적립형","변액유니버설보험 보장형"]},{"num":30,"q":"다음에서 생명보험 상품에 대한 설명으로 틀린 것은?","box":"","c":["장애인을 보험수익자로 하는 보험계약의 보험금은 연간 4천만원 한도로 증여세를 비과세한다.","교육보험은 종신보험의 활성화로 인해 판매량이 감소하고 있다.","종신보험은 다양한 보장의 조합이 가능한 맞춤형 보험상품이다.","일반 종신연금은 장애인전용 연금보험보다 더 많은 연금액을 지급한다. 5월2회모의고사"]},{"num":31,"q":"다음 보기의 제3보험에 대한 설명으로 맞는 것을 모두 고른 것은? (가) 생명보험이나 손해보험 중 온전히 한 분야에 속했다고 보기 어려워 Gray Zone이라고 부르기도 한다. (나) 상법상 상해보험과 질병보험은 인보험으로 분류된다. (다) 제3보험은 실손보상으로만 설계할 수 있다.","box":"","c":["(가), (나)","(가), (다)","(나), (다)","(가), (나), (다)"]},{"num":32,"q":"다음 중 제3보험의 설계 기준에 대한 설명으로 틀린 것은?","box":"","c":["제3보험은 저축성보험으로 개발이 가능하다.","상해보험은 상해 이외의 원인으로 사망할 경우 책임준비금을 지급한다.","정액보상 및 실손보상이 모두 가능하다.","실손보상 급부가 있는 계약은 보험사고시 비례보상한다."]},{"num":33,"q":"다음 보기의 ( )안에 들어갈 말이 바르게 연결된 것은? 생명보험(사망담보) 확정 ( 가 ) 상해보험 불확정 ( 나 ) 구분 보험사고 발생시기","box":"","c":["확정 – 확정","확정 – 불확정","불확정 – 확정","불확정 – 불확정"]},{"num":34,"q":"다음 중 상해보험의 주계약에서 보장하지 않는 것은?","box":"","c":["재해사망보험금","질병사망보험금","재해장해급여금","재해입원급여금"]},{"num":35,"q":"다음의 피보험자 직업·직무 변경 통지의무에 대한 설명으로 틀린 것은?","box":"","c":["피보험자가 직업·직무 변경 통지를 게을리 한 경우 보험회사는 언제든지 보험계약을 해지할 수 있다.","보험사고가 발생하였더라도 변경된 직업·직무와 관계가 없는 경우에는 보험금이 삭감되지 않고 전액 지급된다.","위험한 직업·직무로 변경된 경우 보험료가 높아진다.","직업·직무 변경 사실을 보험설계사에게 알린 것은 법적 효력이 없다."]},{"num":36,"q":"다음 중 질병보험에 대한 설명으로 틀린 것은?","box":"","c":["다양한 주계약과 특약 형태로 판매하고 있다.","연령이 증가함에 따라 보험료가 높아진다.","보험기간은 10년 이상이다.","실손으로 보상하는 치료비 보장상품은 손해보험회사에만 취급할 수 있다."]},{"num":37,"q":"다음에서 암보험에 대한 설명으로 틀린 것은?","box":"","c":["도덕적 해이 발생가능성이 높지 않다.","암으로 인한 치료자금 및 요양자금을 보장한다.","갱신형 상품의 경우 갱신시 보험료 변동이 클 수 있으므로 계약자에게 이 사실을 정확하게 안내해야 한다.","만기환급형으로 설계할 수 있다."]},{"num":38,"q":"다음 중 실손의료보험에 대한 설명으로 틀린 것은?","box":"","c":["상해·질병 치료시 부담한 의료비의 일부를 보상하는 상품이다.","2018년 4월 1일부터 단독형 상품으로만 판매되고 있다.","연령에 관계없이 보험료는 동일하다.","중복가입시 상품별로 보상책임액 비율에 따라 비례보상한다."]},{"num":39,"q":"다음 중 간병보험에 대해 틀리게 설명한 것은?","box":"","c":["장기간병보험은 생명보험회사에서만 취급 가능하다.","갱신형 또는 비갱신형으로 설계할 수 있다.","주계약 또는 특약 형태로 모두 판매된다.","피보험자의 간병연금 수령 종료시 계약은 소멸한다."]},{"num":40,"q":"다음 중 질병보험에 대한 설명으로 맞는 것은?","box":"","c":["일반적으로 면책기간이 존재하지 않는다.","질병 수술시, 입원시, 요양에 따른 비용발생시 필요자금을 보장한다.","질병보험은 주계약 형태로만 판매된다.","상해로 인한 질병을 보장한다. 5월2회모의고사"]}],"11":[{"num":1,"q":"다음 중 ( ) 안에 들어갈 내용으로 알맞게 나열된 것은? 소득의 흐름과 소비지출 흐름의 불일치를 완화하려면 ( 가 )의 잉여소득을 융자나 소비자 신용의 방법을 통해 ( 나 )로 이전하고, 연금보험이나 저축 등을 통해 ( 다 )로 이월할 필요가 있다.","box":"","c":["(가) 중년기 (나) 신혼기 (다) 노년기","(가) 중년기 (나) 노년기 (다) 신혼기","(가) 신혼기 (나) 중년기 (다) 노년기"]},{"num":2,"q":"다음 중 보험안내자료상 배당에 대한 설명으로 옳은 것은?","box":"","c":["보험모집을 위해 사용하는 보험안내자료에 보험회사의 장래 이익배당 또는 잉여금 분배에 대한 예상을 기재하지 못하도록 규정하고 있으며, 예외적인 부분은 두고 있지 않다.","계약자배당이 있는 연금보험의 경우 직전 3개년도 실적을 근거로 장래의 계약자배당을 예시할 수 있다.","보험계약자가 오해하지 않도록 장래의 계약자배당 금액은 예상금액이므로 실제금액과 차이가 있음을 명시하여야 한다."]},{"num":3,"q":"다음 중 보험회사가 제1회 보험료를 받은 경우 청약의 승낙 및 거절에 대한 설명으로 맞는 것은?","box":"","c":["무진단계약은 제1회 보험료를 받은 날로부터 30일 이내에 승낙 또는 거절하여야 한다.","진단계약은 진단일(재진단의 경우에는 최종진단일)로부터 15일 이내에 승낙 또는 거절하여야 한다.","보험약관에서 정한 기간 내에 청약의 승낙여부를 보험계약자에게 통지하지 않은 경우 승낙한 것으로 본다."]},{"num":4,"q":"다음 표에서 ( ) 안에 들어갈 숫자가 바르게 나열된 것은? 보험회사는 피보험자가 영구히 고정된 증상은 아니지만 치료 종결 후 한시적으로 나타나는 장해를 가질 경우, 그 기간이 ( )년 이상일 때, 해당 장해지급률의 ( )%를 장해지급률로 하여 보험금을 지급한다.","box":"","c":["1, 10","3, 15","5, 20"]},{"num":5,"q":"다음 중 보험계약의 부활에 대한 설명으로 맞는 것은?","box":"","c":["소멸된 보험계약을 부활하기 위해서는 보험계약자가 수령한 해약환급금을 반환하야여 한다.","기존 보험계약의 소멸과 새로운 보험계약의 체결이 동일한 보험회사를 대상으로 하여 이루어진 경우에만 적용된다.","보험중개사가 행한 부당한 보험계약의 전환도 부활제도가 적용된다."]},{"num":6,"q":"다음 중 보험약관의 해석에 대한 설명으로 옳은 것은?","box":"","c":["보험안내자료 내용이 약관의 내용과 다른 경우에는 약관에 의해 계약이 성립된 것으로 본다.","보험약관은 계약자에 따라 다르게 해석될 수 있다.","약관의 뜻이 명확하지 아니한 경우에는 계약자에게 유리하게 해석한다."]},{"num":7,"q":"다음 중 언더라이팅에 대한 설명으로 틀린 것은?","box":"","c":["보험설계사는 1차 위험선택의 기능을 수행한다.","계약인수 과정상 건강진단을 필요로 하는 경우 서류진단은 직장에서 진단받은 근로자 건강검진 결과로 대신할 수 없다.","언더라이터는 보험계약내용 및 조건, 보험료 등을 최종 결정한다."]},{"num":8,"q":"다음 중 보험계약심사의 목적으로 가장 알맞은 것은?","box":"","c":["보험금 지급 여부를 결정하기 위해","보험회사의 사업비 절감을 위해","계약인수 여부 및 보험가입조건을 결정하기 위해"]},{"num":9,"q":"다음 중 보험사기 유형이 다른 하나는 무엇인가?","box":"","c":["고의적으로 사고를 일으켜 부당하게 보험금을 청구하는 행위","보험사고가 아닌 것을 보험사고로 조작하는 행위","계약 전 고지의무를 위반하여 보험을 가입하는 행위"]},{"num":10,"q":"다음 중 한국생명존중희망재단에 대한 설명으로 옳은 것은?","box":"","c":["생명보험사회공헌위원회에서 운영한다.","한강교량에 SOS 생명의 전화를 운영한다.","누구나 주변인의 자살징후를 쉽게 발견하고 적절하게 대응하여 자살을 예방할 수 있도록 한다. ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음 중 보험중개사에 대한 설명으로 틀린 것은?","box":"","c":["특정 보험회사와 계약관계를 맺고 보험계약의 체결을 중개 또는 대리한다.","부채가 자산을 초과하는 법인은 보험중개사 될 수 없다.","보험중개사가 되고자 하는 자는 금융감독원에 등록신청해야 한다."]},{"num":12,"q":"다음 중 전화를 이용한 보험계약 모집시 자필서명을 면제할 수 있는 경우가 아닌 것은?","box":"","c":["신용생명보험계약","사망보험 종신계약","보험계약자와 피보험자가 동일하고 보험금이 비영리법인에게 기부되는 보험계약"]},{"num":13,"q":"다음 중 「생명보험 공정경쟁질서 유지에 관한 협정」에 대한 설명으로 틀린 것은?","box":"","c":["무자격자의 보험계약 모집시 100만원 이하의 제재금을 부과한다.","허위사실을 유포하는 경우에는 200만원 이하의 제재금을 부과한다.","협정의 적용범위는 보험회사와 그 소속 모집종사자이다."]},{"num":14,"q":"다음 중 우수인증설계사 제도에 대한 설명으로 틀린 것은?","box":"","c":["매 3년마다 우수인증설계사 자격 심사 후 인증을 부여하고 있다.","생명보험협회의 인증기준을 충족해야 한다.","2008년부터 우수인증설계사 제도를 도입하여 운영하고 있다."]},{"num":15,"q":"다음 중 ｢예금자보호법｣에 따라 예금자보호를 받을 수 있는 계약은?","box":"","c":["변액보험계약의 특약","보험계약자가 법인인 보험계약","재보험계약"]},{"num":16,"q":"다음 중 경영공시의 목적에 해당하지 않는 것은?","box":"","c":["보험상품 비교","이해관계자의 참여기회 확대","기업 경영의 투명성 확보"]},{"num":17,"q":"다음 중 보험민원의 특징으로 잘못된 것은?","box":"","c":["매년 금융민원 중 보험업이 차지하는 비중이 가장 높다.","금융감독원에 금융민원을 제기하고자 하는 경우 직접 방문 접수만 가능하다.","한국소비자원에 금융민원 또는 분쟁조정을 신청할 수 있다."]},{"num":18,"q":"다음 중 보장성보험료 세액공제에 대한 설명으로 옳은 것은?","box":"","c":["연간 소득금액이 100만원을 초과하는 부양가족을 피보험자로 하여 보장성보험에 가입하고 보험료를 납입한 경우 세액공제 대상에 해당한다.","기본공제대상자에 해당하지 않는 부양가족을 피보험자로 하여 보장성보험에 가입하고 보험료를 납입한 경우 세액공제 대상에 해당한다.","근로소득자인 김생명씨가 태아를 피보험자로 하여 일반 보장성보험에 가입한 경우 공제대상에 해당하지 않는다."]},{"num":19,"q":"다음 ( )안에 들어갈 내용으로 알맞은 것은? 과세방법 소득종류 적용기준 소득금액이 종합과세 ( ) 연 300만원을 초과하는 경우","box":"","c":["연금소득","기타소득","양도소득"]},{"num":20,"q":"다음 중 보험회사가 보험설계사에게 매월 모집수당을 지급하는 경우 원천징수하는 세율(지방소득세 별도)로 맞는 것은?","box":"","c":["3%","4%","5% 6월1회모의고사"]},{"num":21,"q":"다음 중 생명보험 관련 법규에 대한 설명으로 맞는 것은?","box":"","c":["생명보험 계약관계를 규율하는 근거법률은 자본시장과 금융투자업 에 관한 법률이다.","보험회사의 건전한 경영을 도모하고 보험회사의 권익을 보호하기 위한 감독법규 체계가 필요하다.","생명보험계약은 예금자보호법 이 적용되지 않는다.","보험회사의 공동행위와 관련하여 독점규제 및 공정거래에 관련한 법률 의 적용을 받는다."]},{"num":22,"q":"다음 중 생명보험의 특징으로 해당하지 않는 것은?","box":"","c":["대수의 법칙","수지상등의 원칙","작성자불이익의 원칙","개별약관 후순위 원칙"]},{"num":23,"q":"다음 내용에서 설명하는 생명보험 상품의 기능적 특성은 무엇인가? 생명보험은 공산품처럼 구매에 따른 효과를 곧바로 느끼기 어렵기 때문에 상품 권유단계부터 가입자에게 필요한 가입설계, 보장내용 및 보험금 지급절차에 대한 충분한 설명이 필요하다.","box":"","c":["무형의 상품","미래지향적 상품","다양한 설계가 가능한 상품","계약 후 관리가 필요한 상품"]},{"num":24,"q":"다음 중 가입자의 편의를 위한 제도성 특약으로 맞는 것은?","box":"","c":["암보장특약","연금전환특약","정기특약","재해사망특약"]},{"num":25,"q":"다음 보기에서 공통으로 설명하는 것은? 정기보험, 변액종신보험, 종신보험","box":"","c":["저축성보험, 생존보험","보장성보험, 사망보험","단체저축성보험, 사망보험","저축성보험, 생사혼합보험"]},{"num":26,"q":"다음 중 종신보험에 대한 설명으로 맞는 것은?","box":"","c":["종신보험은 제도성 특약을 부가할 수 없다.","피보험자가 언제 어떤 경우로 사망하더라도 약정된 보험금을 지급한다.","종신보험은 보험사고 발생시 피보험자의 경제적 곤궁 해결을 위한 상품이다.","변액보험은 실적배당형 상품이므로 종신보험으로 판매할 수 없다."]},{"num":27,"q":"다음 중 어린이보험과 교육보험에 대한 설명으로 틀린 것은?","box":"","c":["교육보험은 부모 사망시에 교육자금 및 양육자금이 지급된다.","교육보험은 어린이보험에서 학자금 등을 지급하는 상품이 출시되면서 판매량이 감소하고 있다.","어린이보험은 만 15세 미만 사망시에는 납입한 보험료 전액과 해약환급금 중에서 큰 큼액을 지급하고 계약은 소멸한다.","어린이보험은 사망을 보장하는 급부설계를 할 수 없다."]},{"num":28,"q":"다음 중 장애인보험에 대한 설명으로 틀린 것은?","box":"","c":["장애인전용 보장성보험은 일반보장성보험과 별도로 세액공제를 받을 수 있다.","생명보험협회는 장애인 보험가입차별 방지를 위한 신고센터를 운용하고 있다.","장애인이라는 이유만으로 보험가입을 거절할 수 없다.","장애인의 특수한 상황을 고려하여 가입시 심사과정을 생략할 수 있다."]},{"num":29,"q":"다음 중 변액보험 운용설명서에서 확인할 수 있는 내용이 아닌 것은?","box":"","c":["용어 정의","펀드의 수수료","상품구조","계약자적립금"]},{"num":30,"q":"다음 중 변액보험의 상품구조에 대한 설명으로 틀린 것은?","box":"","c":["기본보험계약은 보험료산출의 기초가 되는 계약이다.","변동보험계약은 일반계정에서 운영한 실적에 따라 추가로 계산되는 계약이다.","선택특약은 일반계정에서 운용한다.","계약자적립금은 매일 평가하여 계약자별로 배분한다. 6월1회모의고사"]},{"num":31,"q":"다음 중 다른 보험업종을 모두 포괄하는 개념은 무엇인가?","box":"","c":["생명보험","손해보험","보험업","제3보험"]},{"num":32,"q":"다음 표의 제3보험 질병사망특약 부가요건 중 ( ) 안에 들어갈 내용으로 올바른 것은? 구분 생명보험회사 손해보험회사 보험기간 제한없음 ( (가) ) 보험금액 ( (나) ) 개인당 2억원","box":"","c":["(가) 80세 (나) 개인당 2억원","(가) 80세 (나) 제한없음","(가) 제한없음 (나) 제한없음","(가) 제한없음 (나) 개인당 2억원"]},{"num":33,"q":"다음 중 제3보험 상품에 대한 설명으로 틀린 것은?","box":"","c":["상해보험은 일반적인 생명보험에 비해 보험회사와 계약자 간 다툼이 생길 여지가 크지 않다.","약관상 보장하지 않는 원인으로 피보험자 사망시 책임준비금을 지급하고 계약이 소멸한다.","제3보험 상품은 정액보상 및 실손보상 모두 가능하다.","제3보험 상품 중 실손보상 급부가 있는 계약은 보험사고 발생시 보험회사간 비례보상한다."]},{"num":34,"q":"다음 중 상해사고 요건에 대한 설명으로 틀린 것은?","box":"","c":["원인 또는 결과의 발생이 예견되지 않아야 한다.","신체 상해의 발생원인에서 결과에 이르는 과정이 내부적 요인에 기인해야 한다.","결과의 발생을 피할 수 없을 정도로 급박한 상태이어야 한다.","사고의 발생과 신체의 상해 사이에 인과관계가 존재하여야 한다."]},{"num":35,"q":"다음 중 보기에서 설명하는 것으로 알맞은 것은? 피보험자가 보험기간 중 발생한 재해를 직접적인 원인으로 사망하였을 경우 보상","box":"","c":["재해사망보험금","재해장해급여금","재해수술급여금","재해입원급여금"]},{"num":36,"q":"다음 중 (가), (나)에 들어갈 내용이 바르게 나열된 것은? 상해보험의 보험기간은 일반적으로 ( (가) )이고, 보험계약자 또는 피보험자가 직업·직무 변경통지를 게을리 할 경우 보험회사는 그 사실을 안 날로부터 ( (나) )개월 내에 보험료의 증액을 청구하거나 보험계약을 해지할 수 있다.","box":"","c":["(가) 1년 미만 (나) 6개월","(가) 1년 이상 (나) 3개월","(가) 1년 미만 (나) 3개월","(가) 1년 이상 (나) 1개월"]},{"num":37,"q":"다음 중 우리나라 상해보험에 적용되고 있는 원칙에 해당되지 않는 것은?","box":"","c":["직종별 위험등급체계","단일률·군단율(위험률)","위험률 변동제도","직업·직무 변경시 통지의무"]},{"num":38,"q":"다음 중 암보험에 대한 설명으로 맞는 것은?","box":"","c":["암진단보험금을 수령하면 계약은 소멸한다.","2019년부터 특약으로 가입할 수 없다.","요양비를 지급하는 경우도 있다.","만기환급형으로는 설계할 수 없다."]},{"num":39,"q":"4세대 실손의료보험에서 이전에 비해 보장이 축소된 항목으로 알맞은 것은?","box":"","c":["급여항목 중 불임관련 질환","급여항목 중 선천성 뇌질환","급여항목 중 피부질환","비급여항목 중 도수치료"]},{"num":40,"q":"다음 중에서 간병보험에 대한 설명으로 옳은 것은?","box":"","c":["현재 우리나라에서는 정액보상과 실손보상의 2가지 형태로 판매되고 있다.","장기요양 1등급 또는 2등급으로 판정 받아야 가입이 가능하다.","주로 주계약으로 가입하거나 다른 상해보험이나 질병보험에 선택특약으로도 가입이 가능하다.","가입가능연령은 만 65세 이상이다. 6월1회모의고사"]}],"12":[{"num":1,"q":"다음 중 생명보험자산의 운용원칙에 대한 설명 중 틀린 것은?","box":"","c":["생명보험자산은 전 국민이 의무적으로 납입한 보험료로 형성된 것이기 때문에 공익성을 바탕으로 운용되어야 한다.","생명보험자산은 대부분 장래의 보험금 등으로 지급되어야 하기 때문에 안정적으로 운용되어야 한다.","생명보험회사는 보험금 등의 지급이 일시에 집중되는 경우를 대비하여 즉시 현금화할 수 있는 자산도 일정부분 확보해야 한다."]},{"num":2,"q":"다음 보기의 ( )안에 단어가 알맞게 연결된 것은? 계약자 배당이 있는 ( )의 경우 직전 ( )개년도 실적을 근거로 장래의 계약자 배당을 예시할 수 있으나, 보험계약자가 오해하지 않도록 장래의 계약자배당 금액은 예상금액이므로 실제금액과 차이가 있을 수 있음을 명시해야 한다.","box":"","c":["연금보험 – 5","변액보험 – 3","변액보험 – 1"]},{"num":3,"q":"다음에서 청약철회에 대한 설명으로 틀린 것은?","box":"","c":["전문보험계약자가 체결한 계약은 청약철회가 불가능하다.","단기여행자보험은 청약철회가 가능하다.","건강상태 진단을 지원하는 계약은 청약철회가 불가능하다."]},{"num":4,"q":"다음 중 보험금 청구와 지급에 관한 설명으로 맞는 것은?","box":"","c":["사고증명서는 의료법 제3조에서 규정한 국내의 병원이나 의원에서 발급한 것이어야 한다.","보험회사의 조사가 필요한 경우 약관에서는 회사의 조사권을 정하고 이에 대해 계약자가 협조토록 하고 있다.","사망보험금은 보험수익자가 구비서류를 준비하여 직접 청구해야 한다."]},{"num":5,"q":"다음 중 통지의무에 대한 설명으로 옳은 것은?","box":"","c":["보험금 지급사유 발생 통지의무는 보험수익자에게만 있다.","보험계약자의 주소변경은 통지의무 대상이 아니다.","보험계약자가 회사에 알린 최종의 주소로 발송된 등기우편 등 우편물에 대해서는 일반적으로 도달하는데 필요한 시일이 지난 때에 보험계약자에게 도달한 것으로 본다."]},{"num":6,"q":"다음 중 계약내용 변경에 대한 설명으로 옳은 것은?","box":"","c":["계약자가 보험가입금액을 감액하고자 할 때에는 그 감액된 부분은 해지된 것으로 본다.","보험수익자 변경시 보험회사의 승낙이 필요하지 않지만 보험금 지급사유가 발생하기 전에 보험회사가 서면으로 동의하여야 한다.","보험종목의 변경은 새로운 계약체결에 해당하므로 변경이 불가능하다."]},{"num":7,"q":"다음 보기의 내용 중 맞는 것을 모두 고르시오. (가) 보험계약 대출 사실을 보험수익자에게 제공할 수 있다. (나) 모집과정에서 회사 제작의 보험안내자료 내용이 약관의 내용과 다른 경우에는 약관에 의해 계약이 성립된 것으로 본다. (다) 보험계약자는 가입한 보험계약의 기납입보험료 범위 내에서 보험계약대출을 받을 수 있다. (라) 보험회사는 보험계약의 체결, 유지, 보험금 지급 등을 위하여 관계법령에 따라 계약자 및 피보험자의 동의를 받아 다른 보험회사 및 보험관련단체 등에 정보를 제공할 수 있다.","box":"","c":["(가), (나)","(나), (다)","(가), (라)"]},{"num":8,"q":"다음 중 클레임 업무 담당자의 업무요건에 해당하지 않는 것은?","box":"","c":["상당한 수준의 의학지식을 숙지하고 있어야 한다.","약관 및 보험관련 법규정을 올바르게 해석·적용할 수 있어야 한다.","FKLU 자격증을 취득해야 한다."]},{"num":9,"q":"다음 중 보험인의 윤리강령과 관련이 없는 것은?","box":"","c":["새로운 보험기술 개발","성실과 봉사","주주가치 극대화"]},{"num":10,"q":"다음 중 보험사기의 특성에 해당하지 않는 것은?","box":"","c":["입증의 곤란성","다른 보험사기 유발","보험사기의 개인화 ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음에서 보험대리점에 대한 설명으로 틀린 것은?","box":"","c":["보험대리점은 특정 보험회사를 위하여 보험계약 체결의 대리, 보험료 수령, 영수증 발급, 보험계약 인수심사, 보험금 지급심사 업무를 대리하는 자이다.","보험대리점이 되고자 하는 자는 생명보험회사와 위탁계약을 체결하고 금융위원회에 대리점 등록을 해야 한다.","보험대리점은 여러 생명·손해보험회사와 계약체결을 통해 보험모집을 할 수 있다."]},{"num":12,"q":"다음에서 교차모집보험설계사에 대한 설명으로 틀린 것은?","box":"","c":["보험업법령에서는 교차모집을 위탁한 보험회사와 교차모집 보험설계사 양측 모두의 금지사항을 규정하고 있다.","생명보험회사에 속한 보험설계사가 1개의 제3보험업을 전업으로 영
