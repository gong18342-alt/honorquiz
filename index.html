위하는 보험회사를 위하여 모집하는 경우 교차모집에 해당한다.","교차모집보험설계사가 되고자 하는 자는 보험 종목별로 등록요건을 갖추어 해당 보험협회에 등록해야 한다."]},{"num":13,"q":"다음 보기의 ( )안에 들어갈 단어가 알맞게 연결된 것은? 특별이익의 제공금지에 따라 처벌대상이 되는 금품은 보험계약 체결시부터 최초 1년간 납입하는 보험료의 ( )와 ( ) 중 적은 금액을 초과하는 금품을 말한다.","box":"","c":["10% - 3만원","20% - 5만원","30% - 3만원"]},{"num":14,"q":"다음 중 우수인증설계사 도입취지와 거리가 먼 것은?","box":"","c":["우수한 생명보험설계사들이 자긍심을 갖고 영업현장에서 활동할 수 있도록 하기 위해","보험계약자에게 양질의 서비스를 제공하기 위해","우수한 생명보험설계사들에게 더 많은 수당을 제공하여 다른 설계사들과 차별화하기 위해"]},{"num":15,"q":"다음에서 ｢예금자보호법｣에 따른 예금자보호 대상이 틀린 것은?","box":"","c":["개인형 퇴직연금","변액보험 주계약","변액보험 특약"]},{"num":16,"q":"다음에서 공시 항목과 공시기한에 대한 설명으로 올바른 것은?","box":"","c":["분기별 임시결산공시 항목과 결산공시 항목은 동일하다.","결산공시는 매 사업연도 말 결산일로부터 3개월 이내에 공시한다.","분기별 임시결산공시는 분기결산일로부터 3개월 이내에 공시한다."]},{"num":17,"q":"다음 중 보험민원에 대한 설명으로 맞는 것은?","box":"","c":["매년 금융민원 중 보험업권이 차지하는 비중이 가장 높다.","금융감독원에 금융민원을 제기하고자 하는 소비자는 우편, 팩스, 인터넷을 통해 접수할 수 있으나, 직접 방문하여 접수할 수는 없다.","금융소비자는 금융회사와의 민원·분쟁 발생시 생명보험협회에 민원을 접수할 수 있다."]},{"num":18,"q":"다음에서 연금계좌에 해당하지 않는 것은?","box":"","c":["개인형 퇴직연금","연금저축보험","저축성보험"]},{"num":19,"q":"다음에서 퇴직소득의 과세방법은 무엇인가?","box":"","c":["종합과세","분류과세","분리과세"]},{"num":20,"q":"다음 보기의 ( )안에 알맞은 금액을 얼마인가? *보험설계사의 간편장부대상자 적용 요건 - 해당 과세기간에 신규로 사업을 개시한 보험설계사 - 직전 과세기간의 수입금액이 ( ) 미만인 보험설계사","box":"","c":["6,500만원","7,000만원","7,500만원 6월2회모의고사"]},{"num":21,"q":"다음에서 생명보험과 관련된 법규와 내용의 연결이 틀린 것은?","box":"","c":["상법 – 보험계약관계 규정","보험업법 – 보험업 허가","금융산업의 구조개선에 관한 법률 – 보험감독의 근거","자본시장과 금융투자업에 관한 법률 –변액보험의 운영 규율"]},{"num":22,"q":"다음 중 작성자 불이익의 원칙이 적용되는 생명보험계약의 법적 특성은 무엇인가?","box":"","c":["불요식계약성","부합계약성","낙성계약성","선의계약성"]},{"num":23,"q":"다음 중 보험회사에서 보험상품을 개발하여 판매하고자 할 때 작성하는 기초서류에 해당하지 않는 것은?","box":"","c":["사업방법서","보험료 및 책임준비금 산출방법서","청약서","보험약관"]},{"num":24,"q":"다음 보기의 ( ) 안에 들어갈 알맞은 단어는 무엇인가? ( )이란 기준연령요건에서 생존시 지급되는 보험금의 합계액이 이미 납입한 보험료를 초과하지 아니하는 보험을 말한다.","box":"","c":["저축성보험","생사혼합보험","생존보험","보장성보험"]},{"num":25,"q":"다음 중에서 종신보험에 대한 설명으로 틀린 것은?","box":"","c":["사망을 보장하는 모든 보험상품은 종신보험이다.","피보험자 사망시 유가족이 처하게 될 경제적 곤궁을 해결해 주는 생활보장 상품이다.","다양한 특약 부가를 통해 종합보장형 보험설계가 가능한 상품이다.","정기보험과 종신보험의 가장 큰 차이는 보험기간이다."]},{"num":26,"q":"다음 중 교육보험과 어린이보험에 대한 설명으로 틀린 것은?","box":"","c":["어린이보험에서 학자금 등을 지급하는 상품이 출시되면서 교육보험의 판매량이 감소하고 있다.","교육보험은 변액형 상품으로도 판매되고 있다.","어린이보험은 만 15세 미만 사망시 납입한 보험료 전액과 해약환급금 중에서 큰 금액을 지급하고 계약은 소멸한다.","교육보험은 부모 사망시 교육자금 및 양육자금이 지급된다."]},{"num":27,"q":"다음 중 「장애인 차별금지 및 권리구제 등에 관한 법률」에 따른 보험회사의 장애인 보험가입시 위반행위 사례에 해당하지 않는 것은?","box":"","c":["비장애인과 다른 심사절차를 거쳐 보험에 가입할 수 있도록 하였다.","장애인이라는 이유로 보험가입을 거절하였다.","최근 2년 이내의 암 경력을 이유로 보험가입을 거절하였다.","장애인이기 때문에 종신보험 가입시 보험금을 감액하여 인수하였다."]},{"num":28,"q":"다음 중 세제적격 연금저축의 특징에 대한 설명으로 틀린 것은?","box":"","c":["보험료 세제혜택이 있다.","금융기관 간 계약이전이 가능하다.","일시에 납입하고 바로 연금액을 수령한다.","특별계정으로 운영된다."]},{"num":29,"q":"다음 중 ( )에 들어갈 알맞은 것은? 변액보험이란 보험금이 ( 가 )에 따라 변동하는 보험계약으로, 유가증권 등에 투자하여 발생한 이익을 배분해주는 ( 나 )보험을 의미한다.","box":"","c":["(가) 적용이율 (나) 자산연계형","(가) 자산운용성과 (나) 실적배당형","(가) 예정이율 (나) 확정금리형","(가) 적립이율 (나) 금리연동형"]},{"num":30,"q":"다음에서 생명보험상품에 대한 설명으로 틀린 것은?","box":"","c":["연금보험은 특별계정으로만 운영해야 한다.","종신보험은 유가족의 경제적 곤궁을 해결해 주는 생활보장 상품이다.","종신연금형 연금보험은 연금지급개시 이후에는 계약을 해지할 수 없다.","교육보험은 부모생존시 각종 학자금 등 교육자금을 지급하는 상품이다. 6월2회모의고사"]},{"num":31,"q":"다음 중 제3보험에 대한 설명으로 틀린 것은?","box":"","c":["생명보험의 정액보상적 성격을 가지고 있다.","손해보험의 실손보상적 성격을 가지고 있다.","Gray Zone에 위치하는 보험이다.","생명보험회사와 손해보험회사는 제3보험업을 겸영할 수 없다."]},{"num":32,"q":"다음 중 질병사망특약 설계가 올바르게 된 것은?","box":"","c":["생명보험회사 90세 만기 - 보험금액 5억원","손해보험회사 90세 만기 - 보험금액 2억원","화재보험회사 80세 만기 - 보험금액 5억원","손해보험회사 100세 만기 - 보험금액 1억원"]},{"num":33,"q":"다음 보기의 내용에서 제3보험에 대한 맞는 설명을 모두 고르시오. (가) 손해보험회사의 질병사망 특약의 만기환급금은 납입보험료 합계액 이내이어야 한다. (나) 제3보험은 정액보상 및 실손보상이 모두 가능하다. (다) 상법에는 간병보험 관련 규정이 반영되어 있다. (라) 상해와 질병이 함께 보장되는 종합형 상품은 판매되지 않는다.","box":"","c":["(가), (나)","(나), (다)","(가), (라)","(가), (나), (라)"]},{"num":34,"q":"다음 중 상해보험에서 보상하는 담보에 해당하는 것은?","box":"","c":["급격히 진행된 질병","상해사고의 결과로 발생된 질병","질병이 원인이 되어 발생한 상해","신체허약으로 인해 발생된 질병"]},{"num":35,"q":"다음 보기의 ( )안에 들어갈 알맞은 숫자는 무엇인가? 상해보험은 직업·〮직무의 성격에 따라 사고 발생위험이 달라지므로 직업별 위험등급을 총 ( )등급으로 구분하며 등급에 따라 ( )단계로 위험률을 차등 적용하고 있다.","box":"","c":["3, 3","5, 3","3, 5","5, 5"]},{"num":36,"q":"다음 중 질병보험에 대한 설명으로 맞는 것은?","box":"","c":["노화로 인한 요통은 질병에 해당하지 않는다.","질병의 경우 외래성은 인정하지 않는다.","물건을 들다가 허리를 다친 경우 질병에 해당한다.","노화로 인한 건강훼손은 질병에 해당하지 않는다."]},{"num":37,"q":"다음 중 암보험에 대한 설명으로 맞는 것은?","box":"","c":["암보험은 도덕적 해이 발생가능성이 낮다. ➁ 2019년부터 특약으로만 판매하고 있다. ➂ 암으로 인한 요양자금 비용을 보장한다. ➃ 만기환급형으로는 설계할 수 없다."]},{"num":38,"q":"다음 중 실손의료보험의 보험료 차등적용 제외 대상에 해당하는 것은?","box":"","c":["국민건강보험법상 산정특례대상자(암질환, 심장질환 등)","노인장기요양보호법상 장기요양대상자 중 3~4등급 판정자","국가유공자 등 예우 및 지원에 관한 법률 에 의해 등록된 상이자","의료법 상 의료인"]},{"num":39,"q":"다음 중 공적장기간병보험에 대한 설명으로 맞는 것은?","box":"","c":["민영장기간병보험보다 먼저 판매되었다.","만 60세 이상 노인을 대상으로 한다.","장기간의 간병·요양 문제를 사회연대원리에 따라 국가와 사회가 분담하는 제도이다.","만 65세 이상이 되어야 보상을 받을 수 있다."]},{"num":40,"q":"다음 중 제3보험 상품에 대한 설명으로 맞는 것은?","box":"","c":["생명보험회사에서는 단체실손의료보험을 판매하지 않는다.","간병보험은 장기요양 1~2등급 판정을 받아야 가입이 가능하다.","사고발생 위험성의 연령별 차이가 미미할 것으로 일반적으로 인정될 경우에는 단일률을 이용하여 보험료를 산출할 수 있는 제3보험이 존재한다.","상해보험의 보험기간은 일반적으로 10년 이상이다. 6월2회모의고사"]}],"13":[{"num":1,"q":"다음 중 우리나라 생명보험의 역사에 대한 설명으로 틀린 것은?","box":"","c":["1945년 우리나라 최초의 생명보험회사가 설립되었다.","1977년을 보험의 해로 지정하여 근대화 대책을 추진하였다.","1990년대에는 보험시장의 개방, 금융자율화 등에 따라 본격적인 경쟁체제로 전환되었다."]},{"num":2,"q":"다음 표 ( )안에 들어갈 알맞은 말은? 보험료 납입기간이 보험기간과 동일한 경우를 ( ), 보험기간 보다 보험료 납입기간이 짧은 경우를 ( )이라고 한다","box":"","c":["전기납 – 일시납","단기납 - 전기납","전기납 - 단기납"]},{"num":3,"q":"다음에서 청약의 승낙 및 거절에 대한 설명으로 틀린 것은?","box":"","c":["보험회사는 청약을 받고 제1회 보험료를 받은 경우 30일 이내에 이를 승낙 또는 거절을 통지하지 않으면 승낙한 것으로 본다.","보험회사가 청약을 거절한 경우 계약자에게 기납입보험료만 반환하면 된다.","보험계약의 청약을 승낙한 때에는 보험증권을 교부한다."]},{"num":4,"q":"다음 중 보험계약의 무효에 대한 설명으로 틀린 것은?","box":"","c":["보험계약의 무효란 법률상 보험계약이 성립한 때로부터 그 효력이 발생하지 않는 것을 말한다.","타인의 사망을 보험금 지급사유로 한 보험계약에서 피보험자의 서명동의를 받지 않은 계약은 무효사유에 해당한다.","만 19세 미만자를 피보험자로하여 사망을 보험금 지급사유로 한 계약은 무효이다."]},{"num":5,"q":"다음 중 보험금 등의 청구시 구비서류에 대한 설명으로 틀린 것은?","box":"","c":["사망진단서 등의 사고증명서를 제출해야 한다.","사망진단서는 국내병원에서 발급되어야 하며 국외병원에서 발급된 경우 인정되지 않는다.","보험금 청구와 관련된 구비서류 접수시 서류접수일로부터 3영업일 이내에 지급한다."]},{"num":6,"q":"다음 중 통지의무와 관련하여 틀린 것은?","box":"","c":["계약자 또는 피보험자나 보험수익자는 보험금 지급사유가 발생하였을 때 지체없이 보험 회사에 알려야 한다.","피보험자는 주소 또는 연락처가 변경된 경우 즉시 보험회사에 알려야 한다.","보험회사가 보험계약자 또는 보험수익자가 회사에 알린 최종의 주소로 등기우편 등 우편물에 대한 기록이 남는 방법으로 알린 사항은 일반적으로 도달하는데 필요한 시일이 지난 때에 도달한 것으로 본다."]},{"num":7,"q":"다음 중 계약내용 변경에 대한 설명으로 옳은 것은?","box":"","c":["보험수익자 변경시에는 보험회사의 승낙이 필요하지 않지만 보험금 지급사유가 발생하기 전에 피보험자가 서면으로 동의해야 한다.","피보험자를 변경하려면 보험회사의 승낙을 얻어야 한다.","보험가입금액은 변경할 수 없다."]},{"num":8,"q":"다음 중 클레임에 대한 설명으로 틀린 것은?","box":"","c":["선의의 가입자를 보호하고 보험경영의 건전성을 도모하기 위해서 클레임 업무의 전문성이 필요하다.","계약적부 확인을 통한 조사는 클레임 업무이다.","상당한 수준의 의학지식을 숙지하고 있어야 한다."]},{"num":9,"q":"다음 중 보험설계사의 보험회사에 대한 책임으로 맞는 것은?","box":"","c":["고객으로부터 보험료를 수령한 경우 본인이름으로 된 영수증을 교부하고 자필서명 한다.","고객으로부터 제기되는 불만사항을 구두상이나 문서 또는 전화로 접수했을 경우 지체없이 보험회사에 알린다.","어떠한 경우라도 고객의 보험료를 유용하여서는 안 되므로 일일수금 방법으로 보험료를 받을 수 있다. 7월1회모의고사"]},{"num":10,"q":"다음 중 보험사기의 사회적 피해에 대한 내용으로 옳지 않은 것은?","box":"","c":["보험제도 존립기반에 대한 위협이 된다.","보험산업의 이미지 악화를 초래한다.","보험사기로 인한 피해는 공보험의 재정악화를 초래하지 않는다. ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음 보험설계사의 등록 및 말소에 대한 설명 중 틀린 것은?","box":"","c":["보험설계사 말소는 보험회사를 통하거나 본인이 직접 말소를 신청할 수 있다.","보험설계사가 직접 등록 신청을 할 수 있다.","보험설계사 말소 처리 이후 일정한 절차를 거쳐 타 보험회사에 등록이 가능하다."]},{"num":12,"q":"｢생명보험 다음 표에서 설명하는 공정경쟁질서 유지에 관한 협정｣에 대한 내용은 무엇인가? 보험계약자의 청약이 없음에도 계약자 또는 피보험자의 명의를 가명, 도명 또는 차명으로 하여 보험모집종사자가 보험계약 청약서를 임의로 작성하여 성립시키는 것","box":"","c":["작성계약","허위계약","승환계약"]},{"num":13,"q":"다음 중 우수인증설계사의 인증기간으로 맞는 것은?","box":"","c":["해당연도 1월 1일 ~ 해당연도 12월 31일","해당연도 5월 1일 ~ 다음해 4월 30일","해당연도 6월 1일 ~ 다음해 5월 31일"]},{"num":14,"q":"다음 중 ｢예금자보호법｣에 따라 예금자보호를 받을 수 있는 계약은?","box":"","c":["변액보험계약의 특약","보험료납부자가 법인인 보험계약","재보험계약"]},{"num":15,"q":"다음 중 광고심의제도에 대한 설명으로 틀린 것은?","box":"","c":["광고심의는 사전심의와 사후심의로 이루어진다.","동영상광고는 상시모니터링 제도를 활용한다.","광고심의위원회는 광고의 심의 및 제재업무 등을 수행한다."]},{"num":16,"q":"다음 중 공시항목과 공시기간이 잘못 연결된 것은?","box":"","c":["상반기 임시결산공시 – 3년간","결산공시 - 3년간","수시공시 - 3년간"]},{"num":17,"q":"다음 중 민원이 발생하는 원인으로 맞지 않는 것은?","box":"","c":["계약자가 납입하는 보험료에 비해 지급되는 보험금이 더 크기 때문이다.","계약자와 보험회사가 직접적으로 계약하기 때문이다.","보험회사의 보험금 지급책임이 장래의 우연한 사고의 발생에 달려 있기 때문이다."]},{"num":18,"q":"다음 표의 ( )안에 들어갈 알맞은 금액은 얼마인가? [월적립식 저축성보험의 보험차익 비과세 요건] · 계약자 1명당 매월 납입하는 보험료 합계액이 ( )만원 이하","box":"","c":["150","200","250"]},{"num":19,"q":"다음 표의 ( )에 들어갈 알맞은 내용은? 종합소득 과세표준 8,800만원 초과 1억 5,000원 이하인 경우 세율은 ( )%이다.","box":"","c":["24%","35%","38%"]},{"num":20,"q":"다음 중 보험설계사의 세제에 대한 설명으로 맞는 것은?","box":"","c":["보장성보험료 세액공제를 적용 받을 수 있다.","연금계좌 세액공제를 적용 받을 수 있다.","보험설계사가 지급받는 모집수당은 기타소득에 해당한다. ＜생명보험＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 4점)"]},{"num":21,"q":"다음 중 생명보험계약 관련 법규에 대한 설명으로 틀린 것은?","box":"","c":["상법 은 생명보험, 손해보험, 제3보험에 대한 근거 법률이다.","금융위원회의 설치 등에 관한 법률 은 보험감독의 근거 법률이다.","자본시장과 금융투자업에 관한 법률 은 변액보험의 운영을 규율한다.","약관의 규제에 관한 법률 은 보험약관의 해석을 규정하는 법률이다. 7월1회모의고사"]},{"num":22,"q":"다음 중 생명보험의 기능적 특성으로 옳지 않은 것은?","box":"","c":["유형의 상품이므로 보험계약 체결시 상품설계서, 약관 등을 제시해야 한다.","계약자의 라이프사이클에 맞춰 필요한 위험보장 및 재정설계가 가능하다.","계약이 체결된 이후에도 지속적인 정보가 제공되어야 하는 상품이다.","계약체결과정에서 사전에 건강진단 등 여러 절차를 거치게 된다."]},{"num":23,"q":"다음 중 특약의 기능에 따른 분류가 다른 것은?","box":"","c":["정기특약","휴일재해보장특약","우량체 할인특약","성인병특약"]},{"num":24,"q":"다음 중 보험상품에 대한 설명으로 맞는 것은?","box":"","c":["생존보험은 사망을 보장하는 상품설계가 불가능하다.","단체보험은 보험계약체결 이후 계약관리가 어렵기 때문에 보험료가 비교적 비싸다.","저축성보험은 보험 본래의 기능인 각종 위험보장에 중점을 둔 보험이다.","보장성보험이란 기준연령요건에서 생존시 지급되는 보험금의 합계액이 이미 납입한 보험료를 초과하지 아니하는 보험을 말한다."]},{"num":25,"q":"다음 보기에서 설명하는 준비금의 이자 적립방식은 무엇인가? 보험료적립금을 펀드로 운용하여 유가증권 등에 투자하고 운용실적을 매일 평가하여 보험금에 반영하는 보험","box":"","c":["금리확정형","실적배당형","금리연동형","자산연계형"]},{"num":26,"q":"다음 중 갱신형 및 비갱신형 보험상품에 대한 설명으로 맞는 것은?","box":"","c":["갱신형보험은 보험가입 후 일정기간 경과시 연령과 위험률을 변경하여 보험금을 다시 산정해 유지하는 보험이다.","현재 대부분의 생명보험 상품은 갱신형이다.","갱신형보험은 계약 갱신 전에 보험계약자 등에게 알려주지 않아도 된다.","갱신형보험은 위험률 변동이 너무 커 갱신시 보험료 등을 조정하여 안정적인 보험계약 운용을 위해 도입되었다."]},{"num":27,"q":"다음 중 교육보험에 대한 설명으로 틀린 것은?","box":"","c":["종신보험이 활성화되면서 교육보험의 판매량이 급증하고 있다.","각종 인성프로그램, 진학상담 서비스를 추가한 상품도 판매된다.","부모 사망시에는 교육자금 및 양육자금이 지급된다.","변액형 상품으로도 판매되고 있다."]},{"num":28,"q":"다음 중 장애인보험에 대한 설명으로 틀린 것은?","box":"","c":["보험회사는 가입당시의 건강상태 등을 고려하여 보험가입 가능여부 및 인수조건을 결정한다.","장애인전용 보장성보험은 일반보장성보험과 별도로 세액공제를 받을 수 있다.","2년 전 앓은 암 병력을 이유로 보험계약의 청약을 거절할 수 있다.","장애인전용 연금보험은 일반 종신연금보다 적은 연금액을 지급한다."]},{"num":29,"q":"다음 표의 연금저축에 대한 설명으로 틀린 것은? 현행 연금저축은 (가)소득세법에 따라 (나)누구나 가입할 수 있 으며, (다)최소 보험료 납입기간을 5년으로 하여 (라)분기당 300만원을 한도로 세제혜택을 받을 수 있다.","box":"","c":["(가)","(나)","(다)","(라)"]},{"num":30,"q":"다음 표에서 설명하는 것은 무엇인가? 근로자에게 지급될 퇴직급여가 근무기간과 평균임금에 의해 사전에 결정된다.","box":"","c":["확정기여형(DC형)","확정급여형(DB형)","개인형 퇴직연금","종신연금형 ＜제3보험＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 4점)"]},{"num":31,"q":"다음 중 ( )안에 들어갈 내용으로 알맞은 것은? 제3보험업은 별도로 독립된 제3보험회사를 설립하여 운영하거나, 아니면 ( ) 및 ( )로서 해당 보험업의 모든 보험종목에 대하여 허가를 받은 경우 영위할 수 있다.","box":"","c":["생명보험회사, 손해보험회사","생명보험회사, 화재보험회사","손해보험회사, 재보험회사","생명보험회사, 보증보험회사 7월1회모의고사"]},{"num":32,"q":"다음 중 제3보험 모집자격에 대한 설명으로 옳은 것은?","box":"","c":["제3보험과 생명보험 상품을 모집하기 위해서는 보험연수원에 등록해야 한다.","제3보험만을 모집하기 위해서는 금융감독원에 등록해야 한다.","모집에 관한 연수과정은 보험회사의 규정에 따른다.","금융위원회로부터 등록업무를 위탁받은 보험협회에 등록해야 한다."]},{"num":33,"q":"다음 중 제3보험에 관한 설명으로 맞는 것은?","box":"","c":["간병보험은 상법의 인보험장에 반영되어 있다.","보험금은 주로 실손보상 방법으로 지급한다.","제3보험은 신체의 질병, 상해 등을 주로 보장한다.","제3보험은 겸영이 금지되어 있다."]},{"num":34,"q":"다음 표에서 설명하는 내용은 무엇인가? 보험계약의 목적을 금전으로 산정할 수 있어야 하며 존재여부와 귀속이 보험사고 전에 확정되어야 하는 것","box":"","c":["피보험이익","피보험자","초과이익","보험수익자"]},{"num":35,"q":"다음 중 상해보험 사고에 대한 내용으로 맞는 것은?","box":"","c":["보장대상사고 → 의료치료 → 결과 사이의 인과관계 여부에 따라 보험회사의 면책여부가 결정된다.","신체상해의 발생 원인이 자신의 신체에 내재되어 있는 것이다.","상해사고는 완만하고 연속적으로 발생한다.","사고발생을 예측할 수 있어야 한다."]},{"num":36,"q":"다음 중 계약이 소멸되는 경우가 아닌 것은?","box":"","c":["간병보험 – 질병사망","질병보험 – 일반사망","상해보험 – 재해수술","간병보험 – 간병연금수령 종료"]},{"num":37,"q":"다음 표의 ( )안에 들어갈 내용이 알맞게 나열된 것은? (가) 상해보험의 보험기간은 일반적으로 ( ) 이상이다. (나) 직업·직무 변경 통지를 게을리한 경우 보험회사는 그 사실을 안 날로부터 ( )내에 보험료의 증액을 청구하거나 보험 계약을 해지할 수 있다.","box":"","c":["1년 –1개월","1년 – 6개월","10년 – 1개월","10년 – 3개월"]},{"num":38,"q":"다음 중 질병보험에 대한 설명으로 틀린 것은?","box":"","c":["순수보장형과 만기환급형이 있다.","외래, 우연, 급격의 요건을 만족하는 보험사고에 대해 보장한다.","대부분 상품의 보험기간은 10년 이상이며 가입가능 연령은 만 15세 이상이다.","사람의 질병 또는 질병으로 인한 입원·수술 등에 대한 필요자금을 보장한다."]},{"num":39,"q":"다음 중 실손의료보험에 대한 설명으로 사실과 다른 것은?","box":"","c":["보험계약 체결 전 중복가입 여부를 반드시 확인해야 한다.","2018년부터 단독형 상품으로만 판매되고 있다.","중복계약에 따른 비례보상 대상계약은 제3보험 상품 중 실손보상 급부가 있는 계약에 한정한다.","국민건강보험 급여 중 법정본인부담액과 개인부담비급여 항목 합계액의 전부를 보험회사가 보상하는 상품이다."]},{"num":40,"q":"다음 중 간병보험의 설명으로 틀린 것은?","box":"","c":["만 65세 이상의 노인만을 보장대상으로 한다.","장기요양인정점수를 토대로 등급을 판정한다.","우리나라에서는 정액보상형태로 장기간병보험이 판매되고 있다.","보험회사는 보험기간 중에 금융위원회의 인가를 얻어 위험률을 조정할 수 있다. 7월1회모의고사"]}],"14":[{"num":1,"q":"다음 중 중세 생명보험의 역사에 대한 설명으로 맞는 것은?","box":"","c":["13~14세기경부터 독일에서 발달된 길드는 동업자간의 상호부조조합이었다.","프랑스의 수학자 파스칼은 최초의 사망표를 작성하였다.","영국의 천문학자 핼리는 사람의 생존율을 연구하였다."]},{"num":2,"q":"다음의 생명보험의 기본원리에 대한 설명 중 틀린 것은?","box":"","c":["다수의 사람보다는 개인을 대상으로 한 보험사고 발생확률 측정이 더 쉽다.","수지상등의 원칙은 다수의 동일 연령의 피보험자가 같은 보험종류를 동시에 계약했을 때 보험기간이 끝나면 수입과 지출이 균형이 맞도록 순보험료를 계산하는 것을 의미한다.","사망률은 1년을 단위로 측정한다."]},{"num":3,"q":"다음 중 보험계약의 단체취급에 대한 설명으로 틀린 것은?","box":"","c":["동일한 단체에 소속된 계약자 또는 피보험자를 대상으로 한다.","계약자 또는 피보험자 3인 이상을 대상으로 한다.","동일한 상품을 구입하는 경우를 대상으로 한다."]},{"num":4,"q":"다음에서 사망보험금 지급사유로 틀린 것은?","box":"","c":["항공기의 추락 기타 위난이 종료한 후 1년간 분명하지 아니한 때에 법원이 검사의 청구에 의해 사망한 것으로 인정한 경우","부재자의 생사가 3년간 분명하지 아니한 때 법원이 검사의 청구에 의해 실종선고를 한 경우","수해로 인하여 사망한 사람이 있는 경우 이를 조사한 관공서가 지체없이 사망지의 시·읍·면의 장에게 통보하여 사망한 것으로 인정한 경우"]},{"num":5,"q":"다음 보기의 ( )안에 들어갈 단어가 알맞게 연결된 것은? 회사는 계약자 또는 ( )가 고의 또는 ( )로 중요한 사항에 대하여 사실과 다르게 알릴 경우에는 계약을 해지하거나 보장을 제한할 수 있다.","box":"","c":["피보험자 - 과실","피보험자 - 중대한 과실","보험수익자 과실 -"]},{"num":6,"q":"다음 보기의 ( )안에 들어갈 알맞은 단어는? 계약을 부활(효력회복)할 경우 책임개시일, 회사의 승낙거절시 보험료 반환, 계약 전 알릴 의무 등은 신계약절차와 동일하게 이루어지는데, 그 이유는 계약부활(효력회복)시 일반적으로 부활(효력회복) 청약자의 고의에 의한 ( ) 개연성이 높아 이를 방지하기 위해서이다.","box":"","c":["도덕적 해이","보험사기","역선택"]},{"num":7,"q":"다음 중 약관의 해석에 대한 설명으로 틀린 것은?","box":"","c":["회사는 공정하게 약관을 해석해야 한다.","계약자에 따라 다르게 해석하지 않아야 한다.","보험안내자료 내용이 약관의 내용과 다른 경우 약관에 의해 계약이 성립된 것으로 본다."]},{"num":8,"q":"다음에서 체감성 위험에 적용하는 보험계약 인수 방법은 무엇인가?","box":"","c":["보험금 삭감","부담보 인수","보험료 할증"]},{"num":9,"q":"다음 중 분쟁방지 및 민원 처리에 대한 설명으로 옳은 것은?","box":"","c":["보험회사는 모집종사자의 편의를 위해 독립적이고 공정한 민원처리와 구제절차를 마련해야 한다.","보험회사는 일원화된 민원접수 채널을 운영하고 빠른 민원해결이 가능한 전산시스템을 구축해야 한다.","보험회사는 분쟁 발생시 보험소비자에게 분쟁해결에 관한 내부절차를 알려야 하며 보험소비자가 분쟁처리 결과에 이의가 있는 경우에는 이의 제기 방법에 대해 안내해야 한다."]},{"num":10,"q":"다음 중 보험사기의 고의적 유발행위에 해당하는 것은?","box":"","c":["고혈압을 숨기고 보험에 가입하는 행위","인위적으로 신체의 일부를 절단하는 행위","감기임에도 폐렴으로 속이고 입원하여 입원보험금을 수령하는 행위 ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음 보기에서 금융기관보험대리점으로 등록할 수 있는 기관에 해당하지 않는 것은? (가) ｢자본시장과 금융투자업에 관한 법률｣에 따른 투자매매업자 (나) ｢한국산업은행법｣에 의하여 설립된 한국산업은행 (다) ｢여신전문금융업법｣에 의하여 허가를 받은 겸영여신업자","box":"","c":["(가)","(나)","(다)"]},{"num":12,"q":"다음에서 보험설계사의 등록과 말소에 대한 설명으로 틀린 것은?","box":"","c":["보험설계사 등록은 신규등록과 경력등록으로 구분된다.","보험설계사 말소는 보험회사를 통하거나 또는 본인이 직접 보험협회에 신청할 수 있다.","소속 보험회사를 거치지 않고 보험협회에 직접 등록신청을 할 수 있다."]},{"num":13,"q":"다음 중 보험계약 체결 단계에서 설명해야 하는 중요사항에 해당하지 않는 것은?","box":"","c":["보험계약의 승낙절차","청약서에 자필서명을 해야 한다는 사실","연금저축보험 경우 자산운용 방식"]},{"num":14,"q":"다음 보기의 내용에서 생명보험 우수인증설계사 인증 기준으로 틀린 것을 모두 고르시오. (가) 근속기간 : 동일회사에 3년 이상 재직 (나) 보험계약 유지율 : 13회차 95%, 25회차 85% 이상 (다) 정도영업 : 직전 3년간 품질보증해지/민원해지/무효 0건","box":"","c":["(가), (나)","(나), (다)","(가), (다)"]},{"num":15,"q":"다음 중 광고심의위원회의 업무에 해당하지 않는 것은?","box":"","c":["광고심의 제반업무 수행","규정위반의 내용 정도, 위반행위의 기간 및 횟수를 고려하여 시정요구 및 제재조치 결정","상품설명서, 계약관리내용 등 보험안내자료의 내용 결정"]},{"num":16,"q":"다음에서 경영공시 항목과 공시기간이 알맞게 연결된 것은?","box":"","c":["결산공시 – 공시일로부터 5년간","수시공시 – 공시일로부터 3년간","상반기 임시결산공시 – 공시일로부터 3년간"]},{"num":17,"q":"다음 중 보험민원이 발생하는 원인에 대한 설명으로 틀린 것은?","box":"","c":["계약자가 납입하는 보험료에 비해 지급되는 보험금이 더 크기 때문","보험회사와 계약자 간에 직접적으로 계약을 체결하는 형태이기 때문","보험회사의 보험금 지급책임이 장래의 우연한 사고의 발생에 달려 있기 때문"]},{"num":18,"q":"다음에서 퇴직연금보험에 대한 설명으로 틀린 것은?","box":"","c":["2005년 12월부터 기존의 퇴직금제도를 대체하기 위해 도입되었다.","확정기여형(DC형)의 회사 납입분에 대해서는 일정 한도 내에서 손금으로 인정받을 수 있다.","퇴직금 지급재원을 외부의 금융기관에 적립하여 근로자의 지시에 따라 운용한다."]},{"num":19,"q":"다음에서 이자소득에 해당하지 않는 것은?","box":"","c":["집합투자기구로부터의 이익","사채의 이자와 할인액","저축성보험의 보험차익"]},{"num":20,"q":"다음 보기의 보험설계사의 세제 내용 가운데 맞는 것을 모두 고른 것은? (가) 보험설계사의 소득은 기타소득에 해당되어 다음연도 5월 중에 종합소득세 신고를 해야 한다. (나) 간편장부대상자가 받는 소득에 대하여는 이를 지급하는 원천징수의무자가 해당소득에 대하여 연말정산을 함으로써 납세의무가 종결된다. (다) 연말정산 사업소득금액은 해당 과세기간에 지급한 사업소득 수입금액에 연말정산 사업소득의 소득률을 곱하여 계산한다.","box":"","c":["(가), (나)","(가), (다)","(나), (다) 7월2회모의고사"]},{"num":21,"q":"다음에서 생명보험 상품에 대한 설명으로 틀린 것은?","box":"","c":["보험업법 에서 생명보험 상품에 대해 정의하고 있다.","사람의 생존과 사망을 보장대상으로 한다.","계약자 사망시 보험금을 지급한다.","보험의 목적은 위험보장이다."]},{"num":22,"q":"다음 중 생명보험계약의 특성에 대해 틀리게 설명한 것은?","box":"","c":["유상·쌍무계약의 특성을 가지고 있다.","보험계약자별로 보험약관을 다르게 작성한다.","계약당사자 간의 합의가 매우 중요하다.","실거래에서는 정형화된 보험계약청약서를 이용하는 등 사실상 요식계약화 되어가는 경향을 보인다."]},{"num":23,"q":"다음 보기의 ( )안에 들어갈 단어가 알맞게 연결된 것은? 생명보험 상품은 인간의 ( )와/과 ( )을/를 보험의 목적으로 하기 때문에 대수의 법칙, 수지상등의 원칙 등을 기초로 하여 과학적이고 합리적인 방법으로 개발되고 있다.","box":"","c":["생명, 재산","생명, 신체","주택, 신체","신체, 재산"]},{"num":24,"q":"다음 보기의 ( )안에 들어갈 알맞은 단어는 무엇인가? ( )이란 기준연령요건에서 생존시 지급되는 보험금의 합계액이 이미 납입한 보험료를 초과하지 아니하는 보험을 말한다.","box":"","c":["저축성보험","생사혼합보험","생존보험","보장성보험"]},{"num":25,"q":"다음 중에서 종신보험에 대한 설명으로 틀린 것은?","box":"","c":["보험료를 낮게 책정하는 저해지환급형으로도 판매되고 있다.","기준연령에서 생존시 지급되는 보험금의 합계액이 이미 납입한 보험료를 초과하는 경우도 존재한다.","원칙적으로 15세 미만은 가입이 불가능하다.","다양한 특약 부가를 통해 종합보장형 보험설계가 가능한 상품이다."]},{"num":26,"q":"다음 중 교육보험에 대한 설명으로 틀린 것은?","box":"","c":["교육보험은 자녀의 교육기간 동안 교육자금을 지급하는 상품이다.","각종 인성 프로그램과 해외유학 및 진학상담 서비스가 추가되어 판매된다.","부모 사망시 교육자금 및 양육자금이 지급된다.","사망보험으로 보장성보험에 해당한다."]},{"num":27,"q":"다음 중 장애인보험에 대해 틀리게 설명한 것은?","box":"","c":["비장애인과 동일한 심사절차를 거쳐 보험가입 가능여부를 결정해야 한다.","장애인의 보험가입시 차별을 할 경우 법률에 의해 처벌 받을 수 있다.","2년 이내의 암을 앓은 이력이 있는 경우 보험가입을 거절할 수 있다.","금융위원회에서는 장애인 보험가입차별 방지를 위한 신고센터를 운용하고 있다."]},{"num":28,"q":"다음 중 연금보험에 대한 설명으로 틀린 것은?","box":"","c":["종신연금형은 피보험자의 생존기간 동안 평생 연금을 지급한다.","연금보험은 위험보장기간과 연금지급기간으로 구분한다.","확정연금형은 생존기간에 적립금의 이자만 지급하는 방식이다.","위험보장기간에 사망시 책임준비금을 지급하고 계약은 소멸한다."]},{"num":29,"q":"다음 중 변액보험에 대한 설명으로 맞는 것은?","box":"","c":["생명보험 상품이므로 투자상품의 성격을 가지지 않는다.","고객이 납입한 보험료를 모아 펀드를 구성한 후 주식, 채권과 같은 유가증권 등에 투자하여 발생한 이익을 배분해 주는 상품이다.","변액보험은 안정성을 좀 더 중시하여 운용하는 상품이다.","투자위험은 보험회사가 부담하는 특성을 가지고 있다."]},{"num":30,"q":"다음에서 생명보험상품에 대한 설명으로 틀린 것은?","box":"","c":["장애인전용 보장성보험의 보험료는 세제혜택을 받을 수 있다.","생명보험회사에서 변액보험 펀드별로 공시되는 수익률은 개별계약자에게 실제 적용되는 수익률은 아니다.","근로자가 지급받을 퇴직급여가 사전에 결정되는 퇴직연금 제도는 확정기여형이다.","유니버설보험은 추가납입이 가능한 상품이다. ＜제3보험＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 4점)"]},{"num":31,"q":"다음에서 생명보험업에 대한 모든 보험종목에 대하여 허가를 받은 경우 영위할 수 없는 보험상품은?","box":"","c":["간병보험","상해보험","질병보험","화재보험 7월2회모의고사"]},{"num":32,"q":"다음 중 제3보험에 대한 설명으로 옳은 것은?","box":"","c":["순수보장형으로만 개발해야 한다.","실손보장 급부가 있는 계약은 그 보험가입내역을 보험회사 간에 교환할 수 있다.","제3보험 특약은 저축성보험으로 설계할 수 있다.","제3보험 특약은 정액보상형으로 설계할 수 없다."]},{"num":33,"q":"다음 보기의 ( )안에 들어갈 단어가 알맞게 연결된 것은? 상해보험은 사망 또는 상해의 정도에 따라 일정한 보험금액을 지급하는 ( )의 성질과 실제로 소요된 치료비 기타의 비용을 지급하는 ( )의 성질을 가지고 있다.","box":"","c":["정액보험 – 실손보험","정액보험 – 변액보험","실손보험 – 변액보험","실손보험 – 정액보험"]},{"num":34,"q":"다음 중 상해보험의 주요 보장내용에 대한 설명으로 옳은 것은?","box":"","c":["피보험자가 보험기간 중 발생한 재해를 원인으로 재해분류표에서 정한 각 장해지급률에 해당하는 장해상태가 되었을 경우 재해장해급여금을 지급한다.","상해사망은 생명보험회사와 손해보험회사 모두 제약없이 설계할 수 있다.","피보험자가 보험기간 중 장해분류표에서 정하는 재해를 직접적인 원인으로 수술을 받을 경우 재해수술급여금을 지급한다.","질병이 원인이 되어 발생한 상해를 보장한다."]},{"num":35,"q":"다음 중 상해보험 피보험자 직업·직무 변경시 통지의무에 대한 설명으로 틀린 것은?","box":"","c":["피보험자의 직업이 위험한 직종으로 변경된 경우 보험계약자 또는 피보험자는 보험회사에 즉시 알려야 한다.","보험계약자 또는 피보험자가 직업·직무 변경사실을 알리지 않은 경우 보험금 지급이 제한될 수 있다.","보험회사에 통지하여야 하며 보험설계사에게 알리는 것만으로는 법적효력이 없다.","직업·직무 변경 통지를 게을리 한 경우 보험회사는 그 사실을 안 날로부터 3개월 내에 보험료의 증액을 청구하거나 보험계약을 해지할 수 있다."]},{"num":36,"q":"다음 중 질병의 개념에 대한 설명으로 틀린 것은?","box":"","c":["외래성이 인정된다.","심신의 전체 또는 일부가 일차적 또는 계속적으로 장애를 일으켜서 정상적인 기능을 할 수 없는 상태를 말한다.","일반인과 비교하여 정상이 아닌 상태가 존재하여 결과적으로 건강이 훼손된 상태를 말한다.","물건을 들다가 허리를 다친 경우 질병에 해당하지 않는다."]},{"num":37,"q":"다음 중 암보험에 대한 설명으로 맞는 것은?","box":"","c":["암의 직접적인 치료에는 암 치료로 인하여 발생한 합병증의 치료를 포함한다. ➁ 암으로 인해 입원 치료를 받던 중 보험기간이 만료되었을 때에는 보장기간도 함께 종료된다. ➂ 일반적으로 일정시점 이후부터 책임이 개시된다. ➃ 암의 종류에 따라 진단금을 다르게 설정할 수 없다."]},{"num":38,"q":"다음 중 실손의료보험에 대한 설명으로 틀린 것은?","box":"","c":["피보험자가 질병·상해로 입원 또는 통원 치료시 소요되는 의료비를 보상하는 상품이다.","소비자가 실제 부담한 의료비 전액을 보험회사가 보상하는 상품이다.","계약자가 다수의 실손의료보험에 가입하였을 경우 상품별로 보상책임액 비율에 따라 비례보상한다.","주계약(급여)와 특약(비급여)로 구성되어 있다."]},{"num":39,"q":"다음 ( )안에 들어갈 단어로 알맞은 것은? 간병보험은 일반적으로 ‘일상생활장해보장’의 경우 면책기간을 ( )로 설정하고 있으며 ‘중증치매보장’의 경우 ( )으로 두고 있다","box":"","c":["90일, 1년","90일, 2년","180일, 1년","180일, 2년"]},{"num":40,"q":"다음 중 제3보험의 주계약에서 보장하지 않는 것은?","box":"","c":["부인과 질환","일상생활장해상태로 인한 간병비","변액보험의 변동보험금","암 진단금 7월2회모의고사"]}],"15":[{"num":1,"q":"다음 중 톤틴연금에 대한 설명으로 맞는 것은?","box":"","c":["사회적 약자나 하층민들이 서로 돕기 위해 만든 상호부조 조합이다.","프랑스의 수학자 파스칼이 건의하였다.","국고에 유휴자금을 융자해주는 자에 대해 원리금을 지불하는 대신 종신연금을 지급하는 제도이다."]},{"num":2,"q":"다음 중 3이원방식 대비 현금흐름방식에 대한 설명으로 틀린 것은?","box":"","c":["정교한 보험료 산출이 가능하다.","3이원방식 대비 보험료 산출이 복잡하다.","미국, EU 등에서 주로 사용하며 전산시스템 관리 비용이 저렴하다."]},{"num":3,"q":"다음 중 보험회사가 계약을 인수하고자 할 때 위험정도에 따라 붙일 수 있는 별도의 조건에 해당하지 않는 것은?","box":"","c":["보험금 삭감","보험료 할증","사업비 증액"]},{"num":4,"q":"다음 표의 (가), (나)안에 들어갈 내용으로 맞는 것은? ( 가 )은 부재자의 생사가 5년간 분명하지 아니한 때에 법원이 실종선고를 하고 사망한 것으로 보는 제도이며, ( 나 )은 사망의 원인이 될 위난을 당한 자의 생사가 위난 종료 후 1년간 분명 하지 아니한 때 법원이 사망한 것으로 보는 제도이다.","box":"","c":["(가) 일반실종 (나) 특별실종","(가) 일반실종 (나) 인정사망","(가) 특별실종 (나) 인정사망"]},{"num":5,"q":"다음 중 피보험자의 의무에 해당하지 않는 것은?","box":"","c":["주소변경 통지","보험금 지급 사유의 발생 통지","계약 전 알릴 의무"]},{"num":6,"q":"다음 중 보험계약의 부활에 대한 설명으로 틀린 것은?","box":"","c":["부활청약자의 고의에 의한 역선택 개연성이 높다.","계약 전 알릴 의무는 신계약과 동일하게 적용하지 않는다.","계약이 부활되면 그 계약의 효력은 해지 이전 상태로 돌아간다."]},{"num":7,"q":"‘김생명’의 다음 표에서 보험나이에 대한 설명으로 틀린 것은? ‘김생명’씨의 출생일로부터 계약일 현재까지 개월 수 : 14년 8개월","box":"","c":["보험나이는 15세이다.","‘김생명’의 사망을 보험금 지급사유로 하는 계약은 유효하다.","피보험자의 만 나이를 기준으로 6개월 미만의 끝수는 버리고 6개월 이상의 끝수는 1년으로 계산한다."]},{"num":8,"q":"다음 중 클레임에 대한 설명으로 틀린 것은?","box":"","c":["클레임 담당자는 의학지식을 숙지하고 있어야 한다.","보험금 청구에서 지급까지 관련된 일련의 업무를 의미한다.","계약적부확인을 통한 조사는 클레임 업무이다."]},{"num":9,"q":"다음 중 보험사고의 고의적 유발에 해당하는 보험사기는 무엇인가?","box":"","c":["고혈압을 숨기고 보험에 가입한 경우","악의적으로 신체의 일부를 절단한 경우","감기를 폐렴으로 속이고 보험금을 수령한 경우"]},{"num":10,"q":"다음 중 생명보험업계의 자살예방을 위한 노력에 대한 설명으로 맞는 것은?","box":"","c":["2010년 생명보험사회공헌위원회를 설립하였다.","자살예방 게이트키퍼를 교육한다.","생명보험사회공헌재단을 통해 농약안전보관함을 보급하고 있다. 8월1회모의고사"]},{"num":11,"q":"다음 중 보험중개사에 대한 내용으로 틀린 것은?","box":"","c":["특정 보험회사에 소속되어 보험계약의 체결을 중개하는 자이다.","보험업종에 따라 생명보험중개사, 제3보험중개사, 손해보험중개사로 구분한다.","금융감독원에 등록신청한다."]},{"num":12,"q":"다음 중 교차모집 보험설계사의 금지사항에 해당하는 것은?","box":"","c":["모집을 위탁한 보험회사에 대하여 회사가 정한 수수료· 수당 외에 추가로 대가를 지급하도록 요구하는 행위","교차모집을 위탁한 보험회사에 대하여 다른 보험설계사보다 우대하여 줄 것을 요구하지 않는 행위","소속 보험설계사에게 교차모집보험설계사가 될 자의 유치를 강요하는 행위"]},{"num":13,"q":"다음 중 보험안내자료의 기재사항에 대한 내용으로 틀린 것은?","box":"","c":["변액보험자산의 운용성과에 따라 납입한 보험료의 원금에 손실이 발생할 수 있으며 그 손실은 보험계약자에게 귀속된다는 사실을 기재해야 한다.","금리연동형 보험상품의 경우 적용금리 및 보험금 변동에 관한 사항을 기재해야 한다.","유배당 종신보험의 경우에는 직전 5개년도 실적을 근거로 장래의 계약자배당을 예시할 수 있다."]},{"num":14,"q":"다음 중 우수인증설계사에 대한 설명으로 틀린 것은?","box":"","c":["불완전판매비율은 3% 미만이어야 한다.","보험계약 유지율이 13회차 90%, 25회차 80%이어야 한다.","인증기간은 1년이다."]},{"num":15,"q":"다음 중 금융분쟁조정위원회에 대한 설명으로 맞는 것은?","box":"","c":["금융위원회에서 금융분쟁조정위원회를 운영한다.","분쟁조정위원회가 작성한 조정안은 당사자의 수락과 관계없이 재판상 화해에 우선하는 효력을 가진다.","분쟁조정위원회는 조정의 회부를 받은 때에 이를 심사하여 조정안을 60일 이내에 작성해야 한다."]},{"num":16,"q":"다음 중 경영공시의 목적에 해당하지 않는 것은?","box":"","c":["보험상품 비교정보 제공","이해관계자의 참여기회 확대","기업 경영의 투명성 확보"]},{"num":17,"q":"다음 중 보험민원의 현황과 특징에 대한 설명으로 틀린 것은?","box":"","c":["현재 대다수의 보험민원은 한국소비자원에 접수된다.","매년 금융민원 중 보험업권이 차지하는 비중이 가장 높다.","원칙적으로 수용할 수 없는 민원까지도 수용할 경우 악성민원인을 증가시킨다."]},{"num":18,"q":"다음 보기에 연금계좌 세액공제에 대한 설명 가운데 (가), (나)에 들어갈 내용으로 맞게 나열한 것은? 2023년 기준으로, 종합소득금액 ( (가) ) 이하 또는 근로소득만 있는 경우 총급여액 ( (나) ) 이하인 경우에는 연금계좌 납입액의 15%(지방소득세 별도)에 해당하는 금액을 세액공제 받을 수 있다.","box":"","c":["(가) 4,500만원 (나) 5,500만원","(가) 4,000만원 (나) 5,000만원","(가) 3,200만원 (나) 2,000만원"]},{"num":19,"q":"다음 중 연금소득 분리과세에 대한 설명으로 틀린 것은?","box":"","c":["연금지급시 적용되는 세율이 2가지 이상에 해당하는 경우에는 낮은 세율을 적용한다.","연금계좌에서 연금외 형태로 지급받는 경우에는 연금소득이 아닌 퇴직소득으로 과세한다.","연금수령연차가 11년 이상일 경우에는 연간 연금수령 한도를 적용하지 않는다."]},{"num":20,"q":"다음 보기의 보험설계사의 세제 내용 가운데 맞는 것을 모두 고른 것은? (가) 보험설계사의 소득은 사업소득에 해당되어 다음연도 1월 중에 종합소득세 신고를 해야 한다. (나) 간편장부대상자가 받는 소득에 대하여는 이를 지급하는 원천징수의무자가 해당소득에 대하여 연말정산을 함으로써 납세의무가 종결된다. (다) 연말정산 사업소득금액은 해당 과세기간에 지급한 사업소득 수입금액에 연말정산 사업소득의 소득률을 곱하여 계산한다.","box":"","c":["(가), (나)","(가), (다)","(나), (다) 8월1회모의고사"]},{"num":21,"q":"다음 보기에서 ( ) 안에 들어갈 알맞은 용어는? ｢보험업법｣에서는 “생명보험 상품은 위험보장을 목적으로 사람의 생존 또는 ( (가) )에 관하여 약정한 금전 및 그 밖의 ( (나) )를 지급할 것을 약속하고 대가를 수수하는 계약으로서 대통령령으로 정하는 계약”으로 정의하고 있다.","box":"","c":["(가) 퇴직 (나) 급여","(가) 퇴직 (나) 보험금","(가) 사망 (나) 급여","(가) 사망 (나) 보험금"]},{"num":22,"q":"다음 중 생명보험계약의 법적 특성으로 맞게 짝지어진 것은?","box":"","c":["요식계약성, 사행계약성","선의계약성, 유상계약성","부합계약성, 요식계약성","무상계약성, 낙성계약성"]},{"num":23,"q":"다음 중 추가 보험료 납입의 부담이 있는 특약으로 알맞은 것은?","box":"","c":["우량체 할인특약","연금전환특약","휴일재해보장특약","선지급서비스특약"]},{"num":24,"q":"다음 중 사망보험에 대한 설명으로 틀린 것은?","box":"","c":["대표적인 상품으로 종신보험과 정기보험이 있다.","사망시 고액의 보장을 받을 수 있다.","우리나라에서는 만기환급형 상품으로는 판매되지 않는다.","정기보험은 피보험자가 보험기간 내에 사망하였을 때 보험금을 지급하는 상품이다."]},{"num":25,"q":"다음 중 종신보험에 대한 설명으로 옳은 것은?","box":"","c":["다양한 특약부가를 통해 하나의 보험가입으로 여러 개의 보험을 가입한 효과를 누릴 수 있는 상품이다.","대표적인 저축성보험 상품이다.","보험기간을 미리 정해 놓고 피보험자가 보험기간 내에 사망하였을 때 보험금을 지급하는 보험상품이다.","질병 발병시 이에 대해 보장하는 보험이다."]},{"num":26,"q":"다음 중 장애인보험에 대한 설명으로 맞는 것은?","box":"","c":["세제혜택을 받을 수 있다.","일반보험에 비해 보험료가 비싸다.","보험가입시 보험회사의 가입심사를 거치치 않는다.","장애인을 보험수익자로 가입하는 경우 별도의 한도 없이 세액공제 받을 수 있다."]},{"num":27,"q":"다음 세제적격 연금저축의 가입 조건에 대한 내용 중 틀린 것은? 세제적격 연금저축상품은 (가) 최소 보험료 납입 기간이 10년에서 5년으로 단축되었으며 (나) 가입나이 제한이 삭제되었다. (다) 보험료 납입한도는 분기한도(1,800만원)로 변경되었고, (라) 근거법령이 ｢조세특례제한법｣에서 ｢소득세법｣으로 변경되었다.","box":"","c":["(가)","(나)","(다)","(라)"]},{"num":28,"q":"다음 중 변액보험에 대한 설명으로 맞는 것은?","box":"","c":["저축성 변액보험의 경우에는 사망보험금을 기납입보험료와 비교하여 더 큰 금액을 지급한다.","변액보험은 안정성을 중시하여 운영하는 상품이다.","변액보험은 매년 1회 이상 보험계약정보를 통보해야 한다.","변액유니버설 적립형과 보장형은 최저사망보증 설정과 변동보험금 계산방식이 동일하다."]},{"num":29,"q":"다음 중 변액보험의 자산운용에 대한 설명으로 맞는 것은?","box":"","c":["계약자가 납입한 보험료 전액을 특별계정으로 투입한다.","투자성과와 운용에 대한 위험을 보험회사가 부담한다.","계약자적립금은 특별계정의 평가 등에 의하여 매월 변동한다.","투자실적에 따라 보험금과 해약환급금이 변동된다."]},{"num":30,"q":"다음 중 보험상품에 대한 설명으로 틀린 것은?","box":"","c":["유니버설보험은 일반계정과 특별계정에서 모두 운용할 수 있다.","변액연금보험은 피보험자가 연금개시 전 제1보험기간 내에 사망시, 기본보험금과 특별계정에서 적립된 계약자적립금을 더하여 사망보험금으로 지급한다.","교육보험은 부모사망시에도 교육자금과 양육자금이 지급된다.","기업형 IRP는 상시근로자 5인 미만 사업장에 한해 적용되는 제도이다. 8월1회모의고사"]},{"num":31,"q":"다음 중 제3보험에 대한 설명으로 맞는 것은?","box":"","c":["제3보험은 보장성보험이다.","연금보험을 판매할 수 있는 자격을 가진 사람은 제3보험을 판매할 수 있다.","상해보험은 상법 에서 손해보험으로 분류된다.","질병에 의한 사망은 주계약에서 보장받을 수 있다."]},{"num":32,"q":"다음 보기에서 제3보험설계사의 등록요건에 대한 내용 중 맞는 것은?","box":"","c":["기획재정부에서 실시하는 연수과정을 이수해야 한다.","등록신청일로부터 3년 이내에 생명보험 관계업무에 1년 이상 종사한 경력이 있으면 등록이 가능하다.","제3보험만을 모집하고자 하는 경우에는 금융위원회에 직접 등록할 수 있다.","생명보험과 제3보험을 모집하고자 하는 경우에는 생명보험협회에서 모두 등록할 수 있다."]},{"num":33,"q":"다음 보기에서 설명하는 상해사고의 요건으로 알맞은 것은? 결과의 발생을 피할 수 없을 정도로 급박한 상태","box":"","c":["우연성","외래성","예측성","급격성"]},{"num":34,"q":"다음 중 상해보험에 대한 설명으로 맞는 것은?","box":"","c":["상해란 외관상 분명한 상처자국을 남기는 것에 한정한다.","질병이 원인이 되어 발생한 상해는 보장대상에서 제외된다.","생명보험에 비해 보험사고 발생여부에 대한 다툼이 생길 여지가 크지 않다.","위험한 직업을 가진 사람과 고연령자는 일반적으로 가입이 제한된다."]},{"num":35,"q":"다음 중 상해보험의 피보험자 직업·직무 변경 통지의무와 관련된 설명에서 틀린 것은?","box":"","c":["직업별 위험등급은 총 5등급으로 구분되며 등급에 따라 3단계로 위험률을 차등 적용한다.","사고가 변경된 직업·직무와 관계가 없는 경우에는 보험금이 삭감되지 않고 전액 지급된다.","보험계약자 또는 피보험자의 직업·직무 변경 통지시에는 추후 분쟁의 소지를 방지하기 위해 서면으로 변경 통지하고 보험증권에 확인을 받아두는 것이 안전하다.","위험성이 낮은 직업·직무로 변경된 경우에 납입할 보험료는 낮아지지 않는다."]},{"num":36,"q":"다음 중 질병보험에 대한 설명으로 틀린 것은?","box":"","c":["다양한 주계약 및 특약 형태로 판매하고 있다.","주계약에서 질병사망을 보장한다.","일반인과 비교하여 상대적으로 정상이 아닌 상태를 질병이라고 한다.","노화로 인한 요통을 보장한다."]},{"num":37,"q":"다음 중 암보험에 대한 설명으로 틀린 것은?","box":"","c":["연령이 증가하면 보험료도 높아진다.","도덕적 해이 가능성이 높아 면책기간이 존재한다.","특정암을 집중적으로 보장하는 형태의 상품도 존재한다.","암 치료로 인하여 발생한 후유증을 치료하기 위해 입원한 경우 암직접치료입원보험금을 지급한다."]},{"num":38,"q":"다음 중 실손의료보험에 대한 설명으로 틀린 것은?","box":"","c":["급여와 비급여로 구성되어 있다.","소비자가 실제 부담한 의료비 전액을 보험회사가 보상하는 상품이다.","자기부담금 비율은 주계약과 특약이 서로 다르다.","계약자가 여러 개의 실손의료보험에 가입하였을 경우 상품별로 보상책임액 비율에 따라 비례보상한다."]},{"num":39,"q":"다음 표의 ( ) 안에 들어갈 내용으로 맞는 것은? 간병보험에서 중증치매상태란 재해 또는 질병으로 중증치매 상태가 되고 이로 인해 인지기능의 장애(CDR척도검사 결과가 ( )점 이상)가 발생한 상태를 말한다.","box":"","c":["1","2","3","5"]},{"num":40,"q":"다음 중 연결이 올바르지 않은 것은?","box":"","c":["상해보험 – 직종별 위험등급체계","질병보험 – 단일률·군단율","간병보험 – 위험률 변동제도","실손의료보험 – 비례보상제도 8월1회모의고사"]}],"16":[{"num":1,"q":"다음 중 생명보험의 정의에 대한 설명으로 틀린 것은? 보장기능 뿐만 아니라 저축기능을 동시에 갖추고 있다. 독일의 경제학자 알프레트 마네스의 “만인을 위한 일인의 희생정신”은 생명보험의 근간이 되고 있다. 우연한 사고로 인한 경제적 손실을 보전하는 상부상조의 정신이 바탕이 된 제도이다.","box":"","c":[]},{"num":2,"q":"다음에서 보험료 산출에 대한 설명으로 맞는 것은? 국내 생명보험업계는 전통적으로 예정위험률, 예정이율, 예정사업비율을 기초로 하는 현금흐름방식으로 보험료를 산출해 왔다. 2010년 4월부터 새로운 보험료 산출방식이 도입되면서 3이원방식의 사용은 전면 중단되었다. 현금흐름방식은 3이원방식에 비해 산출방법이 복잡하고 전산시스템 관련 비용이 더 많이 든다.","box":"","c":[]},{"num":3,"q":"다음 중 전문금융소비자에 대한 설명으로 틀린 것은? 전문성, 또는 소유자산규모 등에 비추어 금융상품 계약에 따른 위험감수능력이 있는 금융소비자이다. 금융회사는 포함되지만 단체보험계약자는 제외된다. 금융소비자보호에 관한 법률 제2조에 근거한다.","box":"","c":[]},{"num":4,"q":"다음 중 사망의 추정 및 인정제도에 대한 설명으로 옳은 것은? 일반실종은 부재자의 생사가 5년간 분명하지 아니한 때에 관공서가실종선고를하고사망한것으로인정하는제도이다. 특별실종은 사망의 원인이 될 위난을 당한 자의 생사가 3년간 분명하지 아니한 때에 법원이 실종선고를 하고 사망한 것으로 보는 제도이다. 인정사망은 재난으로 인하여 사망한 사람이 있는 경우 관공서가 사망지의 시·읍·면의 장에게 통보하여 사망한 것으로 인정하는 제도이다. 1","box":"","c":[]},{"num":5,"q":"다음 보기의 ( )안에 들어갈 알맞은 기간은? 보험료 납입이 연체중인 경우에는 회사는 ( )일(보험기간이 1년 미만인 경우에는 7일) 이상의 기간을 납입최고(독촉) 기간 으로 정해야 한다. 14일 15일 20일","box":"","c":[]},{"num":6,"q":"다음 중에서 보험계약의 내용 변경이 불가능한 것은? 보험계약자 보험가입금액 피보험자","box":"","c":[]},{"num":7,"q":"다음에서 임의해지에 대한 설명으로 틀린 것은? 연금보험의 경우 연금이 지급개시된 이후에도 언제든지 계약을 해지할 수 있다. 종신보험은 계약이 소멸하기 전에 언제든지 임의로 해지할 수 있다. 해지로 인해 계약이 해지되어 회사가 지급하여야 할 해지환급금이 있을 때에는 회사는 보험료 및 책임준비금 산출방법서에 따라 해지환급금을 계약자에게 지급한다.","box":"","c":[]},{"num":8,"q":"다음에서 클레임에 대한 설명으로 틀린 것은? 계약적부 확인에서 보험금 지급시까지 이루어지는 일련의 업무를 말한다. 보험사고의 원인에 따라 재해와 질병으로 구분한다. 클레임 업무과정에서 발생하는 민원업무 등의 부수업무가 수행되기도 한다.","box":"","c":[]},{"num":9,"q":"다음 보기의 설명하는 보험설계사의 자세는 무엇인가? 단순히상품을판매하는것에그치지않고기존보험을분석하여 부족한 보장을 보완하거나, 고객의 가족 구성원별 보장설계를 별도로 제안하는 등 고객에게 제공할 수 있는 모든 서비스와 정보를 자발적으로 안내하는 것 전문성 사명감 관련법규 준수와 윤리규범 실천 2회 모의고사","box":"","c":[]},{"num":10,"q":"다음 중 보험설계사의 보험사기 방지노력에 대한 설명으로 틀린 것은? ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점) 보험계약모집시보험사기유발가능성등을파악하기위해 노력해야 한다. 적극적으로 보험사기의 적발에 참여해야 한다. 본인도 모르는 사이 보험사기에 연루되지 않도록 항상 주의를 기울여야 한다.","box":"","c":[]},{"num":11,"q":"다음에서 보험설계사의 등록과 말소에 대한 설명으로 맞는 것은? 보험설계사시험합격후등록교육이수후생명보험협회에 본인이 직접 신청할 수 있다. 보험설계사말소는본인이직접보험협회에신청할수있다. 생명보험관계업무에6개월이상종사한경력이있는경우 시험에 합격하지 않아도 등록할 수 있다.","box":"","c":[]},{"num":12,"q":"다음에서 생명보험대리점 등록에 관한 설명으로 틀린 것은? 임직원 수가 200명 이상인 법인의 경우 소속 임직원 중 30명이 생명보험설계사 등록요건을 갖출 경우 생명보험 대리점으로 등록할 수 있다. 개인 생명보험대리점을 등록하기 위해서는 생명보험협회 에서 실시하는 대리점자격시험에 합격하여야 한다. 생명보험 관계업무에 2년 이상 종사한 경력(등록신청일로 부터 4년 이내)이 있는 경우 교육만 이수하면 생명보험 대리점 등록이 가능하다.","box":"","c":[]},{"num":13,"q":"다음 생명보험 공정경쟁질서 유지에 관한 협정에서 정하고 있는 위반행위로 인하여 피해를 본 경우 생명 보험협회에 신고할 수 있는 대상자에 해당하는 것은? (가) 보험대리점 (나) 보험중개사 (다) 보험회사 (가), (나), (다) (가), (다) (다)","box":"","c":[]},{"num":14,"q":"다음에서 현재 생명보험 우수인증설계사 인증 기준으로 틀린 것은? 보험계약 유지율은 13회차 90%, 25회차 80% 이상이어야 한다. 금융감독원에서 인정하고 있다. 직전 1년간 품질보증해지·민원해지가 0건이어야 한다. 2","box":"","c":[]},{"num":15,"q":"다음중광고심의제도의운영목적에해당하지않는것은? 허위 또는 과장광고 차단 생명보험 상품 판매 촉진 건전한 보험시장 질서를 확립하고 보험소비자 보호 및 보험산업 이미지 제고","box":"","c":[]},{"num":16,"q":"다음에서 경영공시 항목과 공시기간이 알맞게 연결된 것은? 결산공시 공시일로부터 5년간 수시공시 공시일로부터 3년간 상반기 임시결산공시 공시일로부터 3년간","box":"","c":[]},{"num":17,"q":"다음에서 생명보험업계의 보험민원 감축 노력에 대한 설명으로 틀린 것은? 상품기획 단계에서부터 민원소지나 불완전판매 소지가 없는지 회사 스스로 판단하는 제도를 운영하고 있다. 구체적인 입증자료 없이 관련법규 등이 허용하는 범위를 초과하는 민원도 수용해야 한다. 보험민원은 보험회사의 상품개발 및 판매정책 등에 의해 영향을 받기도 한다.","box":"","c":[]},{"num":18,"q":"다음 중 종신형 연금보험의 보험차익 비과세 한도는 얼마인가? 한도없음 150만원 1억원","box":"","c":[]},{"num":19,"q":"다음 보기의 ( )안에 알맞은 것은? 종합소득 과세표준이 8,800만원 초과 1억 5,000만원 이하인 경우 ( )의 세율을 적용한다. 35% 38% 40%","box":"","c":[]},{"num":20,"q":"다음 중 보험설계사의 세제 내용에 대한 설명으로 틀린 것은? 8월 2회 모의고사 보험설계사의 소득은 사업소득에 해당되어 원칙적으로 다음연도 5월중에 종합소득세 신고를 해야 한다. 해당과세기간에지급한사업소득수입금액에대하여연말 정산 사업소득의 경비공제율을 곱하여 계산한다. 연말정산 대상 사업소득 외에 다른 종합소득이 없는 경우 연말정산으로 납세의무가 종결된다.","box":"","c":[]},{"num":21,"q":"다음 중 생명보험계약에 대한 설명이 올바르게 연결된 것은? 보장대상 재산상의 손해 보상원칙 정액보상 보험기간 단기, 확정기간 취급회사 손해보험회사 유상계약성: 보험료, 보험금이라는대가성재산을지급하는 금전거래가 수반된다. 낙성계약성: 계약당사자간에의사표시가합치하기만하면 계약이 성립된다. 사행계약성 : 보험금 지급책임이 장래의 우연한 사고의 발생에 달려있다. 부합계약성: 보험계약자는보험료납입, 보험회사는보험금 지급의무를 지닌다.","box":"","c":[]},{"num":23,"q":"다음 중 주계약에 대한 설명으로 맞는 것은? 독립적으로 판매할 수 없다. 계약성립의 기본이 되는 부분이다. 주계약에 가입하지 않고 특약만 가입할 수 있다. 임의로 가입하지 않아도 계약은 성립한다.","box":"","c":[]},{"num":24,"q":"다음 중 자산연계형보험에 대한 설명으로 옳은 것은? 최저보증이율이 없고, 예금자보호에도 해당하지 않는다. 특정자산의 운용실적에 연계하여 투자성과를 지급하는 상품이다. 유가증권등에투자하고운용실적을매일평가하여보험금에 반영하는 보험이다. 변액보험보다 높은 수익률을 기대할 수 있다.","box":"","c":[]},{"num":25,"q":"다음 중에서 종신보험에 대한 설명으로 틀린 것은? 사망을 보장하는 모든 보험상품은 종신보험이다. 피보험자사망시유가족이처하게될경제적곤궁을해결해 주는 생활보장 상품이다. 다양한 특약 부가를 통해 종합보장형 보험설계가 가능한 상품이다. 정기보험과 종신보험의 가장 큰 차이는 보험기간이다. 3","box":"","c":[]},{"num":26,"q":"다음 중 교육보험에 대한 설명으로 틀린 것은? 변액형 상품으로는 판매되지 않는다. 부모 생존시 각종 학자금 등 교육자금이 지급된다. 부모 사망시 교육자금 및 양육자금이 지급된다. 각종 인성 프로그램과 해외유학 및 진학상담 서비스가 추가되어 판매된다.","box":"","c":[]},{"num":27,"q":"다음 보기의 ( )안에 해당되는 보험상품이 아닌 것은? 2019년 1월부터 장애인전용보험 제도성 특약이 도입되어, ( )에 가입한 장애인도 장애인 세액공제를 받을 수 있게 되었다. 종신보험 암보험 상해보험 저축보험","box":"","c":[]},{"num":28,"q":"다음 보기의 ( )안에 들어갈 숫자의 합은 얼마인가? 세제적격 연금저축은 최소보험료 납입기간이 ( )년으로 단축되었으며, 보험료 납입한도가 분기한도에서 연간한도 ( )만원으로 변경되었다. 1,605 1,810 1,805 2,010","box":"","c":[]},{"num":29,"q":"다음 중 변액보험에 대한 설명으로 맞는 것은? 일반계정에서 운용한다. 중도해지시 환급금에 대한 최저보증이 이루어진다. 투자위험은 보험계약자와 보험회사가 공동으로 부담한다. 일반적인 변액종신보험에 유니버설 기능을 추가하여 판매되기도 한다.","box":"","c":[]},{"num":30,"q":"다음에서 다양한 생명보험 상품에 대한 설명으로 틀린 것은? 8월 2회 모의고사 저축성 변액보험은 사망보험금을 책임준비금과 비교하여 큰 금액을 지급한다. 변액연금보험은제1보험기간내에사망할경우기본보험금과 특별계정에서적립한계약자적립금을더하여사망보험금으로 지급한다. 연금보험은 보험료 납입시 세제혜택이 없으나, 세제적격 연금저축은 보험료 납입시 세액공제를 적용받을 수 있다. 일반계정에서 운용되는 유니버설보험은 기본보험금에 공시이율을 적용하여 추가적립된 금액을 보험금으로 지급 한다.","box":"","c":[]},{"num":31,"q":"다음에서 제3보험에 대한 설명으로 틀린 것은? 1977년보험업법개정으로처음으로법체계에편입되었다. 사람의신체에대한보험이므로생명보험의성격을가지고 있다. 실손보상적 측면에서 손해보험의 성격을 가지고 있다. 생명보험업에 대한 모든 보험종목에 대하여 허가를 받은 경우 제3보험업을 영위할 수 있다.","box":"","c":[]},{"num":32,"q":"다음중제3보험의설계기준에대한설명으로틀린것은? 실손의료보험은 실손보상으로만 설계할 수 있다. 하나의상품에서정액보상과실손보상방식을모두적용할 수 있다. 약관상보장하지않는원인으로사망시책임준비금을지급 하고 계약은 소멸한다. 기준연령요건에서 생존시 지급되는 보험금의 합계액이 이미 납입한 보험료를 초과할 수 있다.","box":"","c":[]},{"num":33,"q":"다음 중 상해사고의 요건에 해당하지 않는 것은? 지속성 급격성 우연성 외래성","box":"","c":[]},{"num":34,"q":"다음보기의( )안에들어갈말이알맞게연결된것은? 상해보험의 보험기간은 일반적으로 ( ) 이상이며, 회사별 차이가 있지만 가입대상 및 연령은 ( ) 고연령자(65세 ~75세)까지 가입이 가능하다. 1년 일부 위험직을 제외하고 10년 지극히 제한적으로 1년 지극히 제한적으로 10년 일부 위험직을 제외하고","box":"","c":[]},{"num":35,"q":"다음중상해보험피보험자직업직무변경시통지의무에 대한 설명으로 틀린 것은? 보험계약자 또는 피보험자가 직업·직무변경사실을 알리지 않은 경우 보험금 지급이 제한될 수 있다. 보험회사에 통지하여야 하며 보험설계사에게 알리는 것만 으로도 법적효력이 있다. 직업·직무 변경시 보험계약자 또는 피보험자는 지체없이 그 사실을 보험회사에 알려야 한다. 사고가변경된직업·직무와관계가없는경우에는보험금이 삭감되지 않고 전액 지급된다. 4","box":"","c":[]},{"num":36,"q":"다음 중 질병보험에 대한 설명으로 틀린 것은? 보험기간은 10년 이상이다. 일반적으로 연령이 증가함에 따라 보험료가 높아진다. 상법에서는 질병보험의 보험기간 및 가입가능연령에 대한 제한이 없다. 외래성이 인정된다.","box":"","c":[]},{"num":37,"q":"다음 중 암보험에 대한 설명으로 맞는 것은? 암사망보험금은 주계약에서 보장한다. 일반적으로 면책기간이 존재하지 않는다. 암 보장개시일 이후에 암으로 진단 확정되었을 경우 암진단보험금을 지급한다. 3대 주요암, 고액암 및 소액암 등은 제도적으로 정해진 기준이다.","box":"","c":[]},{"num":38,"q":"다음 중 현재 판매되고 있는 실손의료보험에 대한 설명 으로 틀린 것은? 일부의과다한의료서비스이용으로대다수소비자의보험료 부담이 가중되는 문제점을 해결하기 위해 도입되었다. 의료 이용이 적은 가입자는 보험료를 적게 낸다. 일부 비급여 항목은 주계약에서 보장한다. 도수치료는 특약으로만 보장한다.","box":"","c":[]},{"num":39,"q":"다음 ( )안에 들어갈 단어로 알맞은 것은? 일상생활장해상태란 재해 또는 질병으로 특별한 보조기구 (휠체어, 목발, 의수, 의족 등)를 사용하여도 생명유지에 필요한 기본동작을스스로할수없는상태로서, ( )를스스로할수 없으면서 식사하기, 화장실 사용하기, 목욕하기, 옷입기중 어느 하나라도스스로 할수 없는상태를 말한다. 이동하기 듣기 운동하기 말하기","box":"","c":[]},{"num":40,"q":"다음 중 상해보험과 질병보험의 공통점으로 맞는 것은? 8월 2회 모의고사 보장성보험이다. 직종별위험등급체계가 적용된다. 면책기간이 존재한다. 고연령인 경우 가입이 제한될 수 있다.","box":"","c":[]}],"17":[{"num":1,"q":"다음 생명보험의 운용자산 중 비중이 큰 순서대로 나열한 것은? 유가증권 ＞ 대출채권 ＞ 현금과 예치금 대출채권 ＞ 유가증권 ＞ 현금과 예치금 현금과 예치금 ＞ 대출채권 ＞ 유가증권","box":"","c":[]},{"num":2,"q":"다음 생명보험을 필요로 하는 사회적 배경에 대한 설명 중 틀린 것은? 충분한 공적 사회보장체계 핵가족화 재해와 성인병 증가","box":"","c":[]},{"num":3,"q":"다음 보기에서 설명하는 생명보험의 기본원리는 무엇인가? 어떠한 사건의 발생확률은 1회나 2회의 관찰로는 예측이 어렵지만 관찰의 횟수를 늘리면 일정한 수치에 가까워진다. 수지상등의 원칙 대수의 법칙 사망률과 생명표","box":"","c":[]},{"num":4,"q":"다음 중 청약의 승낙과 거절에 대한 설명으로 틀린 것은? 진단계약은 건강검진을 받고 보험회사에서 승낙하더라도 제1회 보험료를 납입하지 않은 경우 보장 받을 수 없다. 진단계약은 제1회 보험료를 납입하고 건강검진을 받은 경우 보험회사의 승낙과 상관없이 보장 받을 수 있다. 무진단계약은 제1회 보험료를 납입하더라도 보험회사에서 승낙하지 않으면 보장 받을 수 없다.","box":"","c":[]},{"num":5,"q":"다음 중 보험계약의 무효사유에 해당하지 않는 것은? 타인의 사망을 보험금 지급사유로 하는 보험계약에서 계약을 체결할 때까지 피보험자의 서면에 의한 동의를 전자서명으로 받은 경우 만 15세 미만자를 피보험자로 하여 사망을 보험금 지급사유로 한 계약의 경우 도박을 목적으로 보험계약을 체결한 경우 1","box":"","c":[]},{"num":6,"q":"다음 중 보험금 지급기일에 대한 설명으로 틀린 것은? 일반적으로 보험금 청구와 관련된 구비서류 접수시 서류 접수일로부터 3영업일 이내에 지급 분쟁조정신청 필요시 서류 접수일로부터 60영업일 이내 지급 보험금 지급사유 조사 필요시 서류 접수일로부터 10영업일 이내 지급","box":"","c":[]},{"num":7,"q":"다음 중 생명보험 약관상 계약 전 알릴 의무에 대한 설명으로 맞는 것은? 회사가 계약 당시에 계약 전 알릴 의무 위반사실을 알고 있었던 경우에 그 위반사실을 이유로 해지할 수 있다. 계약 전 알릴 의무 위반을 이유로 계약을 해지하였을 때는 기납입보험료를 지급한다. 계약 전 알릴 의무 위반을 이유로 보장을 제한하였을 때는 보험료, 보험가입금액 등이 조정될 수 있다.","box":"","c":[]},{"num":8,"q":"다음 ( )안에 들어갈 숫자의 합으로 알맞은 것은? 기존 보험계약이 소멸된 날부터 ( )개월 이내에 새로운 보험 계약을 청약하게 하거나 새로운 보험계약을 청약하게 한 날부터 ( )개월 이내에 기존 보험계약을 소멸하게 한 경우 부당한 계약전환에 해당한다. 2 3 6","box":"","c":[]},{"num":9,"q":"다음 중 클레임에 대한 설명으로 틀린 것은? 법규정을 올바르게 해석, 적용할 수 있어야 한다. 의학지식을 숙지하고 있어야 한다. FKLU자격증을 취득해야 한다.","box":"","c":[]},{"num":10,"q":"다음 중 보험사기 방지를 위한 모집종사자의 역할로 틀린 것은? 9월 1회 모의고사 보험계약 모집시 보험계약자의 보험사기 유발가능성을 파악해야 한다. 보험사기계약의 적발은 모집종사자의 중요한 역할이다. 보험설계사는 보험사기자가 되지 않도록 해야 한다.","box":"","c":[]},{"num":11,"q":"다음 중 보험을 모집할 수 있는 자에 대한 설명으로 맞는 것은? 보험회사 홍보직원은 보험을 모집할 수 없다. 보험회사를 위하여 보험계약의 체결을 대리하는 자는 모집 할 수 없다. 보험회사 사외이사는 보험을 모집할 수 없다.","box":"","c":[]},{"num":12,"q":"다음 중 등록취소 및 영업정지에 대한 설명으로 맞는 것 은? 보험설계사가 등록 당시 보험업법 에 따라 보험설계사가 되지 못하는 자일 경우 등록취소가 된다. 보험설계사에 대해 등록을 취소하거나 영업의 정지를 명하기 위해서는 금융감독원이 사전에 청문을 실시해야 한다. 보험업법 에 따라 업무정지 처분을 2회 이상 받은 경우 보험설계사는 6개월 이내의 영업정지 또는 등록취소가 된다.","box":"","c":[]},{"num":13,"q":"다음 중 생명보험 공정경쟁질서 유지에 관한 협정 에 대한 설명으로 맞는 것은? 금융위원회의 인가를 받아 시행한다. 승환계약이 발생한 경우 1건당 200만원의 제재금을 부과 한다. 특별이익 제공한 경우 4,000만원 이하의 제재금을 부과한다.","box":"","c":[]},{"num":14,"q":"다음 생명보험 우수인증설계사에 대한 설명 중 틀린 것은? 인증기간은 해당연도 6월 1일부터 다음해 5월 31일까지 이다. 직전 1년간 품질보증해지·민원해지·무효 0건을 기준으로 한다. 보험설계사의 근속기간, 보험계약유지율, 모집실적, 불완전 판매 유무 등 금융위원회의 인증기준을 충족해야 한다.","box":"","c":[]},{"num":15,"q":"다음 중 예금자보호법 에 의한 예금보험금 지급사유가 아닌 것은? 보험회사의 상장폐지 보험회사의 해산 보험금의 지급정지 2","box":"","c":[]},{"num":16,"q":"다음 중 수시공시 사항에 해당하는 것은? 채권채무관계의 중대한 변동사항 연차보고서 경영실적","box":"","c":[]},{"num":17,"q":"다음 중 생명보험 민원에 대한 설명으로 맞는 것은? 상품기획 단계에서부터 민원소지나 불완전판매 소지가 없는지 회사가 스스로 판단하는 제도를 운영한다. 구체적인 입증자료 없이 관련법규 등이 허용하는 범위를 초과하는 민원까지 수용하려고 노력한다. 인터넷으로만 접수가 가능하다.","box":"","c":[]},{"num":18,"q":"다음 중 ( )안에 들어갈 소득으로 맞는 것은? ( )이 있는 거주자가 연금계좌에 납입한 금액이 있는 경우 세액공제를 받을 수 있다. 퇴직소득 근로소득 양도소득","box":"","c":[]},{"num":19,"q":"다음 ( ) 안에 들어갈 내용으로 알맞은 것은? 과세방법 소득종류 적용기준 소득금액이 연 300만원을 종합과세 ( ) 초과하는 경우 연금소득 기타소득 양도소득","box":"","c":[]},{"num":20,"q":"다음 보기에서 김생명씨의 사업소득금액은 얼마인가? 보험설계사인 김생명씨의 사업소득 수입금액은 5,000만원이고 연말정산 사업소득의 소득률은 30%이다. 5,000만원 3,500만원 1,500만원 ＜생명보험＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 4점)","box":"","c":[]},{"num":21,"q":"다음 중 생명보험계약의 특징을 알맞게 나열한 것은? (가) 사람의 생존과 사망을 보장 (나) 재산상의 손해를 보장 (다) 최대 종신까지 보장 (가), (나) (나), (다) (가), (다) (가), (나), (다) 9월 1회 모의고사","box":"","c":[]},{"num":22,"q":"다음 중 생명보험 계약에 대한 설명으로 맞는 것은? 도박과 마찬가지로 사행계약성이 인정된다. 보험료 납입, 보험금 지급의무를 지니고 있는 편무계약이다. 부합계약성으로 인하여 보험회사 보호를 위한 규제 및 감독이 필요하다. 요식계약으로 계약당사간의 합의만으로 계약이 성립된다.","box":"","c":[]},{"num":23,"q":"다음 중 특약에 대한 설명으로 틀린 것은? 의무적으로 결합되는 특약이 있다. 주계약과 동일한 개발절차를 거치는 별개의 상품이다. 특별약관의 줄임말이다. 주계약을 가입하지 않고 특약만의 가입이 가능하다.","box":"","c":[]},{"num":24,"q":"다음 중 생사혼합보험에 대한 설명으로 틀린 것은? 보험기간 중 피보험자가 사망했을 경우 사망보험금을 지급 한다. 생존보험과 사망보험의 장단점을 서로 보완한 것으로 볼 수 있다. 만기까지 생존했을 경우 만기보험금을 지급한다. 정기보험은 생사혼합보험에 해당하는 상품이다.","box":"","c":[]},{"num":25,"q":"다음 중 종신보험에 대한 맞는 설명은 무엇인가? 종신보험의 납입기간과 보장기간은 동일하다. 변액보험으로는 판매할 수 없다. 종신보험 이외에도 사망을 보장하는 상품 설계가 가능하다. 종신보험은 사망보험이므로 다양한 특약부가는 어렵다.","box":"","c":[]},{"num":26,"q":"다음 중 교육보험과 어린이보험에 대한 설명으로 맞는 것은? 교육보험은 어린이보험에서 학자금 등을 지급하는 상품이 출시되면서 판매가 증가하였다. 교육보험은 변액형 상품으로 설계할 수 없다. 어린이보험은 만 15세 미만 사망시 기납입보험료를 지급한다. 어린이보험은 사망을 보장하는 급부설계를 할 수 없다.","box":"","c":[]},{"num":27,"q":"다음 중 장애인전용 보험에 대한 설명으로 맞는 것은? 장애인차별금지 및 권리구제 등에 관한 법률 에 따라 보험가입 심사없이 보험계약을 체결할 수 있다. 개인보험으로만 판매하고 있다. 국가유공자 등 예우 및 지원에 관한 법률 에 의해 등록된 상이자는 가입대상이 된다. 유사한 일반보험에 비하여 보험료가 상대적으로 비싸다. 3","box":"","c":[]},{"num":28,"q":"다음 중 연금보험에 대한 설명으로 틀린 것은? 연금개시 전 계약자가 2개 이상의 급부를 병행 선택할 수 있다. 종신연금형은 연금지급 개시 이후에 계약을 해지할 수 없다. 변액연금보험이 일시납즉시연금보다 먼저 도입되었다. 일정 기간동안 납입한 보험료로 연금재원을 마련한다.","box":"","c":[]},{"num":29,"q":"다음 중 변액보험에 대한 설명으로 틀린 것은? 예금자보호법에 적용을 받지 않지만 최저보증보험금은 보호대상이 된다. 보험업법과 자본시장과 금융투자업에 관한 법률의 적용을 받는다. 납입한 보험료에서 사업비와 위험보험료 등을 제외한 금액을 특별계정에 투입한다. 변액연금보험은 연금개시 전 피보험자 사망시 계약자 적립금을 지급한다.","box":"","c":[]},{"num":30,"q":"다음 중 생명보험상품에 대한 설명으로 틀린 것은? ＜제3보험＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 4점) 어린이보험은 만 15세 미만자의 사망을 보장하는 급부설계를 할 수 없다. 현행 세제적격 연금저축보험은 조세특례제한법 을 근거 법령으로 선택하고 있다. 변액보험의 보험금은 자산운용성과에 따라 변동된다. 연금보험은 위험보장기간과 연금지급기간으로 구분된다.","box":"","c":[]},{"num":31,"q":"다음 중 상해보험 사고에 해당하는 것은? 심혈관 질환으로 인한 입원 주택의 화재로 인한 재산손해 자동차 사고로 인한 휴업손실 스키를 타다가 팔을 골절","box":"","c":[]},{"num":32,"q":"다음 피보험이익에 대한 설명 중 틀린 것은? 9월 1회 모의고사 피보험이익은 금전으로 산정할 수 없다. 보험회사는 피보험이익을 최고한도로 책임진다. 존재여부와 귀속이 보험사고 전에 확정되어야 한다. 생명보험에서는 피보험이익이 존재하지 않는다.","box":"","c":[]},{"num":33,"q":"다음 중 상해보험에 대한 설명으로 틀린 것은? 연령별 차이가 미미할 경우 군단율을 이용한다. 질병으로 인하여 사망시 기납입보험료를 지급한다. 위험한 직업·직무로 변경시 보험료가 높아진다. 직업·직무 변경사실을 보험설계사에게 알린 것은 법적효력이 없다.","box":"","c":[]},{"num":34,"q":"다음 보기에서 설명하는 내용 중 틀린 것은? 상해보험에서 말하는 신체의 상해란 (가) 몸에 상처를 입은 부상보다는 넓은 의미로 쓰이며, (나) 외관상 분명한 상처자국을 남기는 것에 한정하지 않는다. (다) 상해사고의 결과로 발생된 질병은 보장대상이 되며 (라) 상해로 인한 사망사고는 주계약 에서 보장하지 않는다. (가) (나) (다) (라)","box":"","c":[]},{"num":35,"q":"다음 중 ( ) 안에 들어갈 내용으로 알맞은 것은? 보험계약자 및 피보험자는 직업직무 변경시 ( ) 그 사실을 보험회사에 통지해야 한다. 1개월 이내 10영업일 이내 3영업일 이내 지체없이","box":"","c":[]},{"num":36,"q":"다음 보기의 숫자의 합으로 맞는 것은?  직업별 위험등급은 총 ( )등급으로 구분되며, 등급에 따라 ( )단계로 위험률을 차등적용하고 있다.  통지의무 불이행 시 보험회사는 그 사실을 안 날로부터 ( )개월 내에 보험료의 증액을 청구하거나 보험계약을 해지할 수 있다.  질병보험의 보험기간은 ( )년 이상이다. 15 18 19 20","box":"","c":[]},{"num":37,"q":"다음 중 암보험에 대한 설명으로 틀린 것은? 특정암을 중점적으로 보장하는 상품도 있다. 주계약과 특약의 형태로 모두 판매되고 있다. 연령이 증가함에 따라 보험료도 증가한다. 도덕적 해이의 발생가능성이 높아 1년 내에 발병시 보험금을 지급하지 않는다. 4","box":"","c":[]},{"num":38,"q":"다음 중 질병보험의 주계약에서 보장하지 않는 것은? 암수술보험금 급성심근경색 수술급여금 암사망보험금 과로사 관련 특정질병","box":"","c":[]},{"num":39,"q":"다음 중 4세대 실손의료보험에서 이전에 비해 보장이 축소된 항목으로 알맞은 것은? 급여항목 중 불임관련 질환 급여항목 중 선천성 뇌질환 급여항목 중 피부질환 비급여항목 중 도수치료","box":"","c":[]},{"num":40,"q":"다음 중 간병보험에 대한 설명 중 맞는 것은? 9월 1회 모의고사 장기요양등급에 따라 보험금을 지급하는 공보험이다. 주로 고령자 가입하는 보험이다. 간병보험은 면책기간이 존재한다. 만기환급형으로 설계가 불가능하다.","box":"","c":[]}],"18":[{"num":1,"q":"다음 중 생명보험의 역사에 대한 설명으로 틀린 것은?","box":"","c":["세계 최초의 근대적 생명보험회사는 에퀴타블생명보험회사 이다.","미국은 1955년에 최초로 생명보험회사가 설립되었다.","영국은 1870년에 생명보험주식회사법을 제정하였다."]},{"num":2,"q":"다음의 보기에서 설명하는 생명보험 이론은 무엇인가? 어떠한 사건의 발생확률은 1회나 2회의 관찰로는 예측이 어렵지만 관찰의 횟수를 늘리면 일정한 수치에 가까워진다.","box":"","c":["수지상등의 원칙","대수의 법칙","생존극한정리"]},{"num":3,"q":"다음에서 보험계약의 효력에 대한 설명으로 틀린 것은?","box":"","c":["진단계약은 건강검진을 받고 보험회사에서 승낙하더라도 제1회 보험료를 납입하지 않은 경우 보장받을 수 없다.","진단계약은 제1회 보험료를 납입하고 건강검진을 받은 경우 보험회사의 승낙과 상관없이 보장받을 수 있다.","무진단계약은 제1회 보험료를 납입한 경우 보험회사의 승낙일로부터 보장개시일이 시작된다."]},{"num":4,"q":"다음 중 사망보험금 지급사유에 해당하지 않는 것은?","box":"","c":["화재로 인한 사망시 관공서가 통보하여 사망한 것으로 인정한 경우","부재자의 생사가 1년간 분명하지 아니한 경우 법원이 실종 선고를 한 경우","선박 침몰로 인해 1년간 생사가 분명하지 아니한 때 검사의 청구에 의해 실종선고를 한 경우"]},{"num":5,"q":"다음에서 계약 전 알릴 의무 위반의 효과에 대한 설명으로 틀린 것은?","box":"","c":["회사는 계약을 해지하거나 보장을 제한할 수 있다.","계약 전 알릴 의무 위반으로 계약을 해지할 경우 계약자에게 기납입보험료를 지급한다.","다른 보험가입내역에 대한 계약 전 알릴 의무 위반을 이유로 보험계약을 해지하거나 보험금 지급을 거절하지 않는다. 1"]},{"num":6,"q":"다음 보기에서 ( )안에 들어갈 알맞은 숫자는? 회사는 계약자의 해지환급금 청구권에 대한 강제집행, 담보권 실행, 국세 및 지방세 체납처분절차에 따라 계약이 해지된 경우 당시의 보험수익자가 계약자의 동의를 얻어 계약해지로 회사가 채권자에게 지급한 금액을 회사에 지급하고 계약자 명의를 보험수익자로 변경하여 계약의 특별부활을 청약할 수 있음을 계약이 해지된 날부터 ( ) 이내에 보험수익자에게 통지해야 한다.","box":"","c":["7일","14일","15일"]},{"num":7,"q":"다음에서 보험회사의 손해배상책임에 대한 설명으로 틀린 것은?","box":"","c":["회사는 계약과 관련하여 임직원, 보험설계사 및 대리점의 책임있는 사유로 계약자에게 발생된 손해에 대해 손해배상 책임을 진다.","회사는 보험금 지급거절 및 지연지급의 사유가 없음을 알았거나 알 수 있었는데도 소를 제기하여 계약자에게 손해를 가한 경우 손해배상 책임을 진다.","보험금 지급여부 및 지급 금액에 관하여 현저하게 공정을 잃은 합의로 보험수익자에게 손해를 가한 경우에는 손해배상 책임을 지지 않는다."]},{"num":8,"q":"다음에서 클레임에 대한 설명으로 틀린 것은?","box":"","c":["공정한 보험금 지급을 위한 업무이다.","약관 및 보험관련 법·규정을 올바르게 해석하고 적용할 수 있어야 한다.","청약자의 생활환경 및 소득수준이 적정한지를 확인하여 계약을 인수한다."]},{"num":9,"q":"다음 중 보험사기의 사회적 피해에 대한 설명으로 틀린 것은?","box":"","c":["사보험 보험료의 부당한 인상","공보험인 건강보험료에는 영향이 없음","모방범죄 및 동조행위 증가"]},{"num":10,"q":"다음 중 정부의 자살예방 정책에 대한 설명으로 틀린 것은?","box":"","c":["자살예방 및 생명존중 문화 확산을 국정과제에 포함시키고 있다.","인구 10만명당 자살률 10명 이내를 목표로 하고 있다.","2018년부터 공무원에 대하여 의무적으로 게이트키퍼 교육을 실시하고 있다. ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음 보기의 ( )안에 들어갈 알맞은 숫자는? 보험업법에 따라 등록취소 처분을 2회 이상 받은 경우 최종 등록취소 처분을 받은 날부터 ( )년이 지나지 아니한 자는 보험설계사가 되지 못한다.","box":"","c":["1년","2년","3년"]},{"num":12,"q":"다음에서 생명보험대리점에 대한 설명으로 옳은 것은?","box":"","c":["보험설계사 또는 보험중개사로 등록된 자는 보험대리점이 되지 못한다.","보험대리점은 일사전속제도가 적용된다.","보험계약자를 위하여 보험계약의 체결을 대리하는 자이다."]},{"num":13,"q":"다음 중 ‘보험계약 체결 또는 모집에 관한 보험설계사의 금지행위’에 해당하는 사례를 모두 고른 것은? (가) A설계사는 신입설계사와 동행하여 모집행위를 보조하였다. (나) B설계사는 본인이 직접 상품설명서 자료를 제작하고, 보험 회사의 준법감시인의 승인 절차는 생략한 채 사용하였다. (다) C설계사는 지인인 타사 설계사를 본인이 소속된 지점으로 스카우트하였다. (라) D설계사는 변액보험판매자격이 없어 같은 지점 내 동료 설계사의 명의를 이용하여 보험계약을 모집하였다.","box":"","c":["(가), (라)","(나), (다)","(나), (라)"]},{"num":14,"q":"다음 중 현행 우수인증설계사제도의 인증기준으로 틀린 것은?","box":"","c":["인증기간은 3년이다.","생명보험협회의 인증기준을 충족해야 한다.","2008년부터 우수인증설계사 제도가 도입되었다. 2"]},{"num":15,"q":"다음 중 보험소비자 보호제도에 대한 설명으로 맞는 것은?","box":"","c":["생명보험협회에서는 생존자에 대한 보험가입조회제도를 운영하고 있다.","금융위원회는 금융회사가 파산 등의 사유로 예금 등을 지급할 수 없는 상황에 대처하기 위해 예금자보호제도를 운영하고 있다.","생명보험협회에서는 금융회사와 금융소비자 사이에 발생 하는 금융관련 분쟁의 조정에 관한 사항을 심의, 의결하기 위해 금융분쟁조정위원회를 운영하고 있다."]},{"num":16,"q":"적기시정조치 등 법령에 의한 주요 조치사항의 공시 기한은?","box":"","c":["발생일로부터 1년 이내","발생일로부터 3개월 이내","발생 즉시"]},{"num":17,"q":"다음에서 생명보험민원에 대한 설명으로 틀린 것은?","box":"","c":["금융감독원은 2002년부터 금융민원 현황을 발표하고 있다.","매년 금융민원 중 보험업권이 차지하는 비중이 가장 높다.","금융회사와의 민원·분쟁발생시 생명보험협회에 분쟁조정을 신청할 수 있다."]},{"num":18,"q":"다음 중 상속 및 증여와 관련된 보험세제에 대한 설명으로 옳은 것은?","box":"","c":["상속세는 상속개시일 현재의 상속재산에 대하여 부과한다.","상속받은 보험금은 금융재산 상속공제를 받을 수 없다.","증여받은 재산이 10억원일 경우 50%의 세율이 적용된다."]},{"num":19,"q":"금융소득(이자·배당소득) 종합과세가 적용되는 기준금액은 얼마인가?","box":"","c":["1천만원 초과","2천만원 초과","3천만원 초과"]},{"num":20,"q":"다음 중 보험설계사의 세제 내용에 대한 설명으로 틀린 것은?","box":"","c":["보험설계사의 소득은 사업소득에 해당되어 원칙적으로 다음연도 5월중에 종합소득세 신고를 해야 한다.","해당 과세기간에 지급한 사업소득 수입금액에 대하여 경비 공제율을 곱하여 계산한다.","연말정산 대상 사업소득 외에 다른 종합소득이 없는 경우 연말정산으로 납세의무가 종결된다. 9월2회모의고사"]},{"num":21,"q":"다음에서 생명보험 관련 법규에 대한 설명으로 맞는 것은?","box":"","c":["생명보험표준약관은 「보험업법 시행령」을 토대로 작성 된다.","「독점규제 및 공정거래에 관한 법률」은 국민건강보험의 독점적 지위를 규제하는 근거 법률이다.","「금융산업의 구조개선에 관한 법률」은 보험업 인허가 근거 법률이다.","생명보험업의 감독은 「금융위원회의 설치 등에 관한 법률」에 근거한다."]},{"num":22,"q":"다음 중 생명보험 상품의 기능적 특성에 대한 설명으로 틀린 것은?","box":"","c":["중도해지시 계약자가 필요한 본래의 가입목적에 도달하지 못할 수도 있다.","계약이 체결된 이후에는 계약자에게 정보가 제공되지 않는 특성을 가지고 있다.","공산품처럼 구매에 따른 효과를 바로 느끼기가 어렵다.","전문성을 갖춘 모집인이 보험상품 설명서 등의 안내자료를 통해 소비자에게 상품을 설명하고 청약을 권유함으로써 판매가 이루어진다."]},{"num":23,"q":"다음 중 기초서류에 해당하지 않는 것은?","box":"","c":["보험약관","청약서","사업방법서","보험료 및 책임준비금 산출방법서"]},{"num":24,"q":"다음 중 특별계정에 대한 설명으로 틀린 것은?","box":"","c":["변액보험과 퇴직보험이 대표적인 특별계정에서 운용되는 상품이다.","계정 간 자산을 엄격히 구분하고 발생하는 손익을 명확하게 구분하기 위함이다.","보험계약자 간의 형평성이 어긋나는 경우도 있다.","연금저축보험은 특별계정에서 별도로 관리한다."]},{"num":25,"q":"다음 중에서 종신보험에 대한 설명으로 틀린 것은?","box":"","c":["특약부가가 자유롭다.","보장기간이 평생(종신)이다.","보장성보험이다.","대표적인 생존보험상품이다. 3"]},{"num":26,"q":"변액연금보험에서 피보험자가 연금개시 전 제1보험기간 내에 사망시 지급하는 보험금은 무엇인가?","box":"","c":["기본보험금과 특별계정에서 적립된 계약자적립금을 더하여 사망보험금 지급","해약환급금에 공시이율을 적용한 금액을 사망보험금 지급","기본보험금에 공시이율을 적용한 금액을 사망보험금 지급","유족에게 연금 지급"]},{"num":27,"q":"다음 중 장애인전용보험의 주요 보장내용에 해당하지 않는 것은?","box":"","c":["암진단금","사망보험금","재해장해급여금","실손의료비"]},{"num":28,"q":"다음 보기의 ( )안에 들어갈 알맞은 숫자는? 기업형 IRP는 상시근로자 ( )인 미만 사업장에 한해 적용되는 제도이다.","box":"","c":["5","10","15","20"]},{"num":29,"q":"다음 보기의 ( )안에 들어갈 알맞은 용어는 무엇인가? 변액연금보험에서 특별계정의 투자운용 결과 연금개시시점의 계약자적립금이 ( )보다 적을 경우 ( ) 등 일정수준의 재원을 연금적립금으로 최저보장한다.","box":"","c":["해약환급금","기본보험금","기납입보험료","사망보험금"]},{"num":30,"q":"다음에서 다양한 생명보험 상품에 대한 설명으로 틀린 것은?","box":"","c":["저축성 변액보험은 사망보험금을 책임준비금과 비교하여 큰 금액을 지급한다.","변액연금보험은 제1보험기간 내에 사망할 경우 기본보험금과 특별계정에서 적립한 계약자적립금을 더하여 사망보험금으로 지급한다.","연금보험은 보험료 납입시 세제혜택이 없으나, 세제적격 연금저축은 보험료 납입시 세액공제를 적용받을 수 있다.","일반계정에서 운용되는 유니버설보험은 기본보험금에 공시이율을 적용하여 추가적립된 금액을 보험금으로 지급 한다. 9월2회모의고사"]},{"num":31,"q":"다음에서 보험업 겸영에 대한 설명으로 틀린 것은?","box":"","c":["화재보험과 생명보험은 겸영할 수 있다.","상해보험과 자동차보험은 겸영할 수 있다.","질병보험과 연금보험은 겸영할 수 있다.","간병보험과 생명보험은 겸영할 수 있다."]},{"num":32,"q":"다음에서 책임준비금을 지급하는 경우가 아닌 것은?","box":"","c":["상해보험 피보험자의 일반사망시","질병보험 피보험자의 자동차사고 사망시","상해보험 피보험자의 상해와 관련이 없는 질병사망시","질병보험의 중도해지시"]},{"num":33,"q":"다음 중 생명보험과 상해보험에 대한 설명으로 틀린 것은?","box":"","c":["생명보험의 보험사고는 사람의 생사이다.","생명보험은 계약자와 보험회사 간 다툼이 생길 여지가 크다.","상해보험의 보험사고는 사람의 신체에 입은 상해이다.","상해보험은 상해 인정여부가 중요한 쟁점이 된다."]},{"num":34,"q":"다음의 상해보험 주요 보장내용 중 ( )안에 들어갈 단어가 알맞게 연결된 것은? · 재해사망보험금 : 피보험자가 보험기간 중 발생한 재해를 ( ) 원인으로 사망하였을 경우 보상 · 재해수술급여금 : 피보험자가 보험기간 중 재해분류표에서 정하는 재해를 ( ) 원인으로 수술을 받았을 경우 보상","box":"","c":["직접적인, 간접적인","간접적인, 간접적인","간접적인, 직접적인","직접적인, 직접적인"]},{"num":35,"q":"다음 중 상해보험 피보험자 직업·직무 변경시 통지의무에 대한 설명으로 틀린 것은?","box":"","c":["피보험자의 직업이 위험한 직종으로 변경된 경우 보험계약자 또는 피보험자는 보험회사에 즉시 알려야 한다.","직업·직무 변경 통지를 게을리 한 경우 보험회사는 그 사실을 안 날로부터 1개월 내에 보험료의 증액을 청구하거나 보험계약을 해지할 수 있다.","보험사고가 변경된 직업·직무와 관계가 없는 경우 보험회사에 직업·직무 변경 사실을 알리지 않았다면 보험금 지급이 제한된다.","보험회사에 통지하여야 하며 보험설계사에게 알리는 것만으로는 법적효력이 없다. 4"]},{"num":36,"q":"다음 중 질병보험에서 보상하지 않는 것은?","box":"","c":["뇌혈관질환 수술비","암진단비","특정질병 진단비","재해장해급여금"]},{"num":37,"q":"다음 중 암보험에 대한 설명으로 맞는 것은?","box":"","c":["암사망보험금은 주계약으로 설계한다. ➁ 암의 직접적인 치료에는 암의 제거 및 증식 억제 치료를 받기 위해 필수불가결한 면역력 강화 치료를 포함한다. ➂ 대부분의 상품 보험기간은 10년 이내이고 가입가능연령은 15세 이상이다. ➃ 보험료는 연령별로 차이를 두지 않고 동일하게 책정된다."]},{"num":38,"q":"다음에서 제3보험계약의 소멸사유에 해당하지 않는 것은?","box":"","c":["간병보험의 간병연금 수령 종료","암보험 가입자의 교통사고 사망","상해보험 피보험자의 일반사망","실손의료보험의 중복가입"]},{"num":39,"q":"다음에서 공적 장기간병보험에 대한 설명으로 맞는 것은?","box":"","c":["민영 장기간병보험보다 먼저 판매되었다.","만 60세 이상 노인을 대상으로 한다.","장기간의 간병·요양 문제를 사회연대원리에 따라 국가와 사회가 분담하는 제도이다.","만 65세 이상이 되어야 보상을 받을 수 있다."]},{"num":40,"q":"다음 중 제3보험에 대한 설명으로 옳은 것은?","box":"","c":["암보험은 주계약으로만 판매된다.","실손의료보험은 과잉의료이용을 방지하기 위해 중복계약 체결을 금지하고 있다.","생명보험회사에서 판매하는 상해보험은 감염병 예방법에 따른 1급 감염병까지 보장하는 재해를 보장하므로 손해보험 회사의 상해보험과 비교하여 보장범위가 넓다.","간병보험의 면책기간 중에는 어떤 이유로도 보장하지 않는다. 9월2회모의고사"]}],"19":[{"num":1,"q":"다음 중 생명보험 자산운용의 원칙이 아닌 것은?","box":"","c":["생명보험 자산의 일부를 유동성이 높은 자산인 부동산으로 보유하고 있다.","중도해지시나 보험사고 발생시 반드시 보험금이나 해약 환급금 등으로 지급되어야 하므로 신탁재산적인 성격이 있다.","수많은 계약자의 소액자금이 모여서 형성된 것이기 때문에 공공성이 강하다."]},{"num":2,"q":"다음 보험료 납입기간에 대한 설명이 바르게 연결된 것은? 보험료 납입기간이 ( 가 )과 동일한 경우를 전기납, ( 가 )보다 보험료 납입기간이 짧은 경우를 ( 나 )이라고 한다.","box":"","c":["(가) 보장기간, (나) 일시납","(가) 보험기간, (나) 일시납","(가) 보험기간, (나) 단기납"]},{"num":3,"q":"다음 보기의 전문금융소비자에 대한 설명에서 ( )에 알맞은 단어가 바르게 연결된 것은? 보험상품(금융상품)에 관한 전문성 또는 ( ) 등에 비추어 금융상품 계약에 따른 ( )이 있는 금융소비자로서 국가, 한국은행, 금융회사, 주권상장법인, 지방자치단체, 단체보험 계약자 등이 해당된다.","box":"","c":["자산규모, 대출능력","매출규모, 약정이행능력","소유자산규모, 위험감수능력"]},{"num":4,"q":"다음 중 보험금 지급기일에 대한 설명 중 틀린 것은?","box":"","c":["보험금 청구와 관련된 구비서류 접수시 접수일로부터 3영업일 이내에 지급하여야 한다.","분쟁조정신청 접수시 접수일로부터 60영업일 이내에 지급 하여야 한다.","보험금 지급사유 조사·확인 필요시 접수일로부터 10영업일 이내에 지급하여야 한다. 1"]},{"num":5,"q":"다음 중 납입최고의 전자문서 안내에 대한 설명 중 맞는 것은?","box":"","c":["전자문서로 안내하고자 할 경우에는 계약자의 동의없이 전자문서를 송신할 수 있다.","회사는 전자문서가 수신되지 않은 것을 확인한 경우에는 납입최고절차를 다시 거쳐야 한다.","계약자의 수신여부와 관계없이 안내 후 일정시간이 지나면 송신한 것으로 본다."]},{"num":6,"q":"다음 보험계약의 내용 변경에 대한 설명 중 맞는 것은?","box":"","c":["보험수익자를 변경할 때는 보험회사의 승낙이 필요하지 않다.","보험계약자를 변경할 때는 보험회사의 승낙이 필요하지 않다.","보험계약자는 보험종목의 변경을 할 수 없다."]},{"num":7,"q":"다음 약관의 해석에 대한 설명 중 틀린 것은?","box":"","c":["회사는 신의성실의 원칙에 따라 공정하게 약관을 해석하여야 한다.","보험계약자나 피보험자에게 불리하거나 부담을 주는 내용은 확대하여 해석하여야 한다.","약관의 뜻이 명확하지 아니한 경우에는 계약자에게 유리하게 해석한다."]},{"num":8,"q":"다음 중 클레임 업무에 해당하는 것은?","box":"","c":["보험사고의 조사","보험계약의 체결","계약적부의 확인"]},{"num":9,"q":"다음에서 보험계약 체결·유지단계의 정보제공에 대한 설명 중 틀린 것은?","box":"","c":["보험계약 청약단계에서는 상품설명서를 제공하여야 한다.","보험회사는 보험계약관리내용을 연 1회 이상 보험소비자에게 제공하여야 한다.","보험안내자료상의 예상수치는 실제 적용되는 이율이나 수익률 등과 다를 수 있다는 점을 분명하게 설명해야 한다. 10월1회모의고사"]},{"num":10,"q":"다음에서 보험사기에 대한 설명 중 틀린 것은?","box":"","c":["보험설계사 등이 연루된 보험사기는 일반범죄에 비해 모방 범죄에 대한 파급력이 크지 않다.","보험설계사는 보험계약자와 접촉시 보험사기 유발가능성 등을 파악할 수 있다.","보험설계사가 연루된 보험사기는 보험에 대한 높은 이해와 전문성을 바탕으로 한다. ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음 중 보험대리점에 소속되어 보험계약의 체결을 중개 하는 자는?","box":"","c":["보험설계사","보험대리점","보험중개사"]},{"num":12,"q":"다음 중 생명보험 설계사의 등록요건으로 맞는 것은?","box":"","c":["금융위원회에서 실시하는 설계사 등록자격시험에 합격한 자","생명보험 관계업무에 1년 이상 종사한 경력이 있고 교육을 이수한 자","설계사 등록자격시험에 합격하고 교육 과정을 10시간 이상 이수한 자"]},{"num":13,"q":"다음의 ‘생명보험 공정경쟁질서 유지에 관한 협정‘에 대한 설명에 해당하는 것은? 보험계약자의 청약이 없음에도 계약자 또는 피보험자의 명의를 가명, 도명 또는 차명으로 하여 보험모집종사자가 보험계약 청약서를 임의로 작성하여 성립시키는 것","box":"","c":["작성계약","경유계약","승환계약"]},{"num":14,"q":"다음 중 우수인증설계사의 인증기간으로 맞는 것은?","box":"","c":["해당연도 1월 1일부터 12월 31일까지","해당연도 5월 1일부터 다음연도 4월 30일까지","해당연도 6월 1일부터 다음연도 5월 31일까지"]},{"num":15,"q":"다음 중 금융분쟁조정위원회에 대한 설명으로 맞는 것은?","box":"","c":["금융위원회에서 금융관련 분쟁의 조정에 관한 사항을 심의·의결하기 위하여 운영하고 있다.","분쟁조정의 신청내용이 이미 법원에 제소된 사건은 분쟁 조정위원회에 회부하지 않을 수 있다.","조정안을 제시받은 날부터 20일 이내에 수락하지 않은 경우에는 조정안을 수락한 것으로 본다. 2"]},{"num":16,"q":"다음 중 ( )에 들어갈 공시기간으로 맞는 것은? 결산공시는 결산일로부터 3개월 이내에 공시하고 분기별 임시 결산공시는 분기결산일로부터 ( ) 이내 공시한다.","box":"","c":["1개월","2개월","3개월"]},{"num":17,"q":"다음 중 보험민원에 대한 설명으로 틀린 것은?","box":"","c":["금융민원 중 보험민원의 비중이 가장 높다.","금융민원을 제기하고자 하는 소비자는 우편, 팩스 및 인터넷, 직접 방문을 이용하여 접수할 수 있다.","보험회사와의 민원·분쟁 발생시 보험협회에 직접 신고할 수 있다."]},{"num":18,"q":"다음 중 연금계좌에 대한 세액공제 대상에 해당하지 않는 것은?","box":"","c":["확정기여형 퇴직연금","연금저축보험","확정급여형 퇴직연금"]},{"num":19,"q":"다음 중 사적연금소득의 분리과세요건에 대한 설명으로 맞는 것은?","box":"","c":["55세 이후 수령","가입일로부터 10년 경과 후 수령","연금수령연차가 6년 이상인 경우 연간 연금수령한도 미적용"]},{"num":20,"q":"다음 보험설계사의 세제에 대한 설명 중 틀린 것은?","box":"","c":["보장성보험에 대한 세액공제를 적용받을 수 있다.","간편장부대상자의 경우 원천징수의무자가 해당 소득에 대하여 연말정산을 함으로써 납세의무가 종결된다.","연금계좌 세액공제를 적용 받을 수 있다. ＜생명보험＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 4점)"]},{"num":21,"q":"다음 보기의 ( )에 들어갈 말이 바르게 연결된 것은? 현재 사용되고 있는 생명보험( 가 )은 제4편(보험)의 「상법」의 규정을 토대로 작성되었으며, 규정보다 보험계약자의 권리를 ( 나 )하고 있다. 「상법」","box":"","c":["(가) 개별약관, (나) 축소","(가) 개별약관, (나) 확대","(가) 표준약관, (나) 축소","(가) 표준약관, (나) 확대 10월1회모의고사"]},{"num":22,"q":"다음 생명보험의 특성에 대한 설명 중 맞는 것은?","box":"","c":["대부분 계약체결에 따른 효용을 바로 느낄 수 있다.","계약의 성립요건으로 특별한 형식이나 절차를 요구하는 요식계약이다.","보험회사의 보험금 지급책임은 장래의 우연한 사고의 발생에 달려있다.","계약자의 청약만으로 계약이 성립된다."]},{"num":23,"q":"다음 생명보험 상품구성에 대한 설명 중 맞는 것은?","box":"","c":["주계약을 임의로 가입하지 않아도 계약은 성립한다.","특약만을 가입하는 것은 불가능하다.","주계약에는 특약이 반드시 부가되어야 한다.","실손의료비특약과 같은 제도성 특약이 있다."]},{"num":24,"q":"다음 중 특별계정에서 운용하는 상품을 모두 고르시오. (가) 변액보험 (나) 교육보험 (다) 연금저축보험 (라) 퇴직연금","box":"","c":["(가), (다)","(나), (다)","(가), (다), (라)","(가), (라)"]},{"num":25,"q":"다음 종신보험에 대한 설명 중 틀린 것은?","box":"","c":["종신보험은 보장기간이 평생이다.","보장성보험이기 때문에 사망시 지급되는 사망보험금은 이미 납입한 보험료를 초과하지 않는다.","피보험자 사망시 유가족이 처하게 될 경제적 곤궁을 해결 해주는 상품이다.","계약자의 소득수준 및 라이프사이클에 맞게 다양한 보장의 조합이 가능한 맞춤형 보험상품이다."]},{"num":26,"q":"다음 중 변액보험에 대한 설명으로 틀린 것은?","box":"","c":["특별계정에서 별도로 관리하고 있다.","대표적인 실적배당형보험 상품이다.","변액보험은 유가증권 등에 투자하고 운용실적을 매일 평가 하여 보험금에 반영한다.","자산연계형보험은 변액보험보다 높은 수익률을 기대할 수 있다."]},{"num":27,"q":"다음 보험상품에 대한 설명 중 틀린 것은?","box":"","c":["교육보험은 각종 인성 프로그램 등을 추가한 상품이 있다.","어린이보험은 골절, 화상 등을 보장한다.","어린이보험은 만 15세 미만 사망 시 사망보험금을 지급한다.","교육보험은 판매량이 감소하고 있다. 3"]},{"num":28,"q":"다음 중 세제적격 연금저축에 대한 설명으로 틀린 것은?","box":"","c":["최소보험료 납입기간이 단축되었다.","보험료 공제는 소득공제 방식으로 한다.","가입나이 제한이 삭제되었다.","금융기관 간 이전이 가능하다."]},{"num":29,"q":"다음 중 변액보험에 대한 설명으로 틀린 것은?","box":"","c":["변액보험은 2001년 7월부터 판매되기 시작하였다.","변액보험 계약자는 적립금을 운용할 펀드를 선택할 수 있다.","변액보험은 일반 상품과 달리 안정성보다는 수익성을 좀 더 중시한다.","변액보험은 중도해지시 지급되는 해약환급금을 최저보증 한다."]},{"num":30,"q":"다음 중 생명보험 상품에 대한 설명으로 맞는 것은?","box":"","c":["장애인전용보험은 위험률을 우대 적용하여 보험료가 저렴 하다.","연금보험은 위험보장기간(제1보험기간)에 사망시 해약 환급금을 지급하고 계약은 소멸된다.","어린이보험은 만 15세 미만 사망시 납입한 보험료 전액과 책임준비금 중에서 큰 금액을 지급하고 계약은 소멸한다.","기업형 IRP는 상시근로자 5인 미만 사업장에 한해 적용되는 제도이다. ＜제3보험＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 4점)"]},{"num":31,"q":"다음 중 제3보험 상품이 아닌 것은?","box":"","c":["암보험","단독 실손의료보험","교통재해보험","정기보험"]},{"num":32,"q":"다음 중 제3보험으로 [보험업법]과 [상법]에서 동시에 근거가 마련되어 있는 것으로 맞게 짝지어진 것은?","box":"","c":["상해보험, 질병보험","질병보험, 간병보험","생명보험, 상해보험","질병보험, 손해보험 10월1회모의고사"]},{"num":33,"q":"다음 중 상해보험에 대한 설명으로 틀린 것은?","box":"","c":["정의 : 사람의 질병 또는 질병으로 인한 입원·수술 등의 위험에 관하여 금전 및 그 밖의 급여를 지급할 것을 약속하고 대가를 수수하는 보험","구분 : 순수보장형 상품, 만기환급형 상품","종류 : 일반재해보장형, 교통사고보장형, 각종 레포츠사고 보장형","요건 : 급격성, 우연성, 외래성"]},{"num":34,"q":"다음 중 상해보험에 대한 설명으로 틀린 것은?","box":"","c":["단일률, 군단율을 이용하여 보험료를 산출할 수 있다.","직업에 대한 위험등급은 3등급으로 구분된다.","보장하지 않는 원인에 의한 사망시 책임준비금을 지급하고 계약은 소멸된다.","상해보험의 보험기간은 일반적으로 1년 이상이다."]},{"num":35,"q":"다음 중 피보험자의 직업·직무 변경 통지 의무에 대한 설명으로 틀린 것은?","box":"","c":["보험회사는 직업·직무 변경 사실을 인지한 후 언제든지 보험계약을 해지할 수 있다.","보험계약자 또는 피보험자는 직업·직무 변경시 그 사실을 보험회사에 통지하여야 한다.","직업이 변경되면 보험료와 보장범위가 달라질 수 있다.","직업·직무 변경 사실을 보험설계사에게 알렸다고 하더라도 법적효력이 없다."]},{"num":36,"q":"다음 중 질병보험에 대한 설명으로 맞는 것은?","box":"","c":["질병보험의 보험기간은 10년 이상이다.","질병보험의 가입가능연령은 만 20세 이상이다.","보험료는 연령과 관계가 없다.","질병보험은 암보험, 실손의료보험, 치아보험이 하나로 통합 되어 주로 판매되고 있다."]},{"num":37,"q":"다음 중 암보험에 대한 설명으로 틀린 것은?","box":"","c":["보장개시일 이전에 암으로 확정진단되고, 보장개시일 이후에 그 암으로 인하여 사망할 경우 암사망보험금을 지급한다.","특정암을 집중적으로 보장하는 상품도 존재한다.","연령이 증가함에 따라 보험료도 크게 증가한다.","가입후 일정기간 동안 보장하지 않는 상품도 있다. 4"]},{"num":38,"q":"다음 중 실손의료보험에 대한 설명으로 틀린 것은?","box":"","c":["계약자가 부담하는 의료비 중 자기부담금이 설정되어 있다.","입원 및 통원에 대해 각각 보상한도가 설정되어 있다.","상법의 실손보상원칙에 따라 다수의 계약시 각각의 계약에서 비례하여 보험금을 지급한다.","가입 전 중복가입여부 확인은 필수이므로 고객의 별도 동의가 없어도 해당사항을 확인 할 수 있다."]},{"num":39,"q":"다음 보기의 ( )에 들어갈 숫자는? 중증치매상태란 재해 또는 질병으로 중증치매상태가 되고, 이로 인해 인지기능의 장애(CDR척도검사 결과가 ( )점 이상)가 발생한 상태를 말한다.","box":"","c":["3","2","1","4"]},{"num":40,"q":"다음 중 질병보험에 대한 설명으로 틀린 것은?","box":"","c":["질병의 원인은 신체에 내재되어 있으므로 도덕적 해이 발생 가능성이 적다.","특화된 질병만을 보장하는 상품이 있다.","평균수명의 연장으로 노인인구가 증가하면서 질병기간이 장기화되고 있다.","질병에 대한 진단확정, 수술, 입원, 요양에 따른 비용 등을 보장한다. 10월1회모의고사"]}],"20":[{"num":1,"q":"다음 중 우리나라 생명보험산업의 현황에 대한 설명으로 틀린 것은?","box":"","c":["2021년 기준 수입보험료 총액은 세계 7위이다.","보험밀도는 국민 1인당 보험료를 말한다.","보험침투율은 GDP 대비 보험료 비율을 의미한다."]},{"num":2,"q":"다음 보기의 ( ) 안에 들어갈 단어가 알맞게 연결된 것은? 생명보험은 ( )에 처한 사람들이 합리적인 금액을 모아 공동 기금을 형성하고 우연한 사고를 당한 구성원에게 보험 등의 급여를 지급하기 위해서는 ( ) 가입자로 구성된 보험단체가 존재해야 한다.","box":"","c":["동질의 위험–다수의","이질적인 위험–다수의","동질의 위험–소수의"]},{"num":3,"q":"다음에서 피보험자에 대한 설명으로 옳은 것은?","box":"","c":["계약 전 알릴 의무가 없다.","사망보장계약에서 서면으로 동의를 한 경우 언제든지 장래를 향하여 철회할 수 있다.","강제집행에 따라 계약이 해지된 경우 부활 청약을 할 수 있다."]},{"num":4,"q":"다음 중 보험료 납입에 대한 설명으로 틀린 것은?","box":"","c":["제1회 보험료를 납입해야 보험회사의 보장이 개시된다.","보험회사는 계약자가 보험료를 납입한 경우 영수증을 교부 해야 한다.","보험료는 매월 1회 납입하는 것이 원칙이다."]},{"num":5,"q":"다음 보기의 진단계약에서 보장개시일로 맞는 것은? · 청약일 : 9월 2일(월) · 제1회 보험료 납입일 : 9월 3일(화) · 진단일 : 9월 4일(수) · 승낙일 : 9월 5일(목)","box":"","c":["9월 3일","9월 4일","9월 5일 1"]},{"num":6,"q":"다음 중 보험금 지급기일에 대한 설명으로 틀린 것은?","box":"","c":["보험금 지급사유 조사·확인 필요시 서류접수일로부터 10영업일 이내","보험금 청구와 관련하여 소송이 제기된 경우 서류접수일로부터 30영업일 이내","회사는 만기보험금의 지급시기가 되면 지급시기 7일 이전에 보험수익자에게 알려야 한다."]},{"num":7,"q":"다음 중 보험계약의 부활에 대한 설명으로 틀린 것은?","box":"","c":["보험중개사가 행한 부당한 보험계약의 전환은 부활제도가 적용되지 않는다.","보험대리점에 속한 보험설계사가 행한 부당한 보험계약의 전환은 부활제도가 적용되지 않는다.","부당한 보험계약의 전환으로 인한 부활은 기존 보험계약의 소멸과 새로운 보험계약의 체결이 동일한 보험회사를 대상으로 하여 이루어진 경우에만 적용된다."]},{"num":8,"q":"다음에서 언더라이팅에 대한 설명으로 틀린 것은?","box":"","c":["언더라이팅 업무 담당자는 반드시 관련 전문자격증을 보유 해야 한다.","직장에서 진단받은 건강검진 결과를 토대로 심사할 수 있다.","계약적부 확인은 양질의 계약을 확보하고 보험사고 발생시 분쟁을 최소화하기 위해 실시한다."]},{"num":9,"q":"다음 중 보험설계사의 고객에 대한 책임에 대한 설명으로 틀린 것은?","box":"","c":["고객의 주민등록번호는 고객의 동의를 받고 마케팅 목적으로 사용할 수 있다.","보험계약의 유지, 부활, 보험금 지급 등 판매 이후에도 지 속적인 고객관리에 주의를 기울여야 한다.","고객에게 보험료·보험금·수익률 등 상품과 관련된 내용을 안내할 때는 객관적인 근거자료를 바탕으로 해야 한다. 10월2회모의고사"]},{"num":10,"q":"다음 중 보험사기 방지활동에 대한 설명으로 틀린 것은?","box":"","c":["경찰청은 보험사기 수사역량 강화를 위해 전문수사팀을 지정하고 있다.","보험범죄수사협의회는 금융감독원과 보험협회로 구성되어 있다.","금융감독원과 보험회사는 보험범죄 신고센터를 설치하여 운영하고 있다. ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음에서 말소에 대한 설명으로 틀린 것은?","box":"","c":["보험회사와 보험설계사간 위촉계약을 해지하는 것을 말한다.","보험설계사 말소는 보험회사를 통하거나 본인이 직접 말소를 신청할 수 있다.","말소처리가 종료된 이후에 타 보험회사에 등록할 수 있다."]},{"num":12,"q":"다음에서 교차모집시 보험회사의 금지행위에 해당하지 않는 것은?","box":"","c":["교차모집설계사에게 정당한 사유없이 위탁계약 해지 등 불이익을 주는 행위","소속 보험설계사에게 완전판매할 것을 권유하는 행위","교차모집설계사에게 자사 소속의 보험설계사로 전환하도록 권유하는 행위"]},{"num":13,"q":"다음 중 승환계약의 제재대상에서 제외되는 총 계약 건수는? [해당 보험설계사 기준] - 배우자 계약 : 3건 - 본인의 부모계약 : 3건 - 형제의 계약 : 2건 - 본인의 계약 : 4건","box":"","c":["6건","10건","12건"]},{"num":14,"q":"다음 중 현행 우수인증설계사 제도의 인증기준으로 틀린 것은?","box":"","c":["보험계약 유지율은 13회차 90%, 25회차 80% 이상이어야 한다.","금융감독원의 인증기준을 충족해야 한다.","2008년부터 우수인증설계사 제도가 운영되고 있다. 2"]},{"num":15,"q":"다음 중 보험소비자 보호제도에 대한 설명으로 맞는 것은?","box":"","c":["생명보험협회에서는 생존자에 대한 보험가입조회제도를 운영하고 있다.","금융위원회는 금융회사가 파산 등의 사유로 예금 등을 지급할 수 없는 상황에 대처하기 위해 예금자보호제도를 운영하고 있다.","생명보험협회에서는 금융회사와 금융소비자 사이에 발생 하는 금융관련 분쟁의 조정에 관한 사항을 심의, 의결하기 위해 금융분쟁조정위원회를 운영하고 있다."]},{"num":16,"q":"다음 중 수시공시에 대한 설명으로 틀린 것은?","box":"","c":["회사는 홈페이지를 통해 고객들에게 보험안내자료를 제공 한다.","공시일로부터 3년간 공시한다.","재산, 채권채무관계, 투자·출자관계 등 손익구조의 중대한 변동에 관한 사항이 대상이 된다."]},{"num":17,"q":"다음에서 생명보험 민원에 대한 설명으로 틀린 것은?","box":"","c":["금융감독원은 2002년부터 금융민원 현황을 발표하고 있다.","매년 금융민원 중 보험업권이 차지하는 비중이 가장 높다.","금융회사와의 민원·분쟁발생시 생명보험협회에 분쟁조정을 신청할 수 있다."]},{"num":18,"q":"다음에서 연금계좌에 해당하지 않는 것은?","box":"","c":["개인형 퇴직연금","연금저축보험","저축성보험"]},{"num":19,"q":"다음 중 금융소득 및 연금소득의 과세방법에 대한 설명으로 맞는 것은?","box":"","c":["사망할 때까지 연금수령하는 종신계약에 따라 받는 연금 소득의 원천징수세율은 4%(지방소득세 별도)이다.","비과세 및 분리과세 소득을 포함한 금융소득이 2천만원을 초과하는 경우 금융소득 전체를 종합과세한다.","연금소득과 금융소득을 합산하여 2천만원 미만인 경우 분리과세로 납세의무가 종결된다. 10월2회모의고사"]},{"num":20,"q":"다음 보기의 내용에서 틀린 것은 무엇인가? 보험설계사가 (가)연말정산 대상 사업소득 외에 다른 종합소득 이 있는 경우, (나)직전 과세기간의 수입금액이 7,500만원 이 상인 경우에는 연말정산으로 납세의무가 종결되지 않으므로, 반드시 (다)다음연도 3월에 종합소득세 확정신고를 해야 한다.","box":"","c":["(가)","(나)","(다) ＜생명보험＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 4점)"]},{"num":21,"q":"다음 생명보험 관련 법규에 대한 내용 중 ( )안에 알맞은 말이 올바르게 연결된 것은? 보험회사의 ( )와 관련하여 「독점규제 및 공정거래에 관한 법률」을 적용받고, ( )에 대해서는 「자본시장과 금융투자업에 관한 법률」을 적용받고 있다.","box":"","c":["불법행위–퇴직연금","불공정행위–종신보험","공동행위–변액보험","탈법행위–정기보험"]},{"num":22,"q":"다음 중 생명보험계약의 특성에 대해 틀리게 설명한 것은?","box":"","c":["유상계약성 : 보험료, 보험금이라는 대가성 재산을 지급하는 금전거래가 수반된다.","낙성계약성 : 계약당사자 간에 의사표시가 합치하기만 하면 계약이 성립된다.","사행계약성 : 보험금 지급책임이 장래의 우연한 사고의 발생에 달려있다.","부합계약성 : 보험계약자는 보험료 납입, 보험회사는 보험금 지급의무를 지닌다."]},{"num":23,"q":"다음 중 보장을 추가·확대하기 위한 특약에 해당하지 않는 것은?","box":"","c":["우량체 할인특약","휴일재해보장특약","입원특약","암보장특약"]},{"num":24,"q":"다음 중 생명보험 상품에 대한 설명으로 틀린 것은?","box":"","c":["보장성보험은 순수보장성보험과 만기환급형보험으로 설계 할 수 있다.","생명보험회사와 손해보험회사는 제3보험 상품을 판매할 수 있다.","변액종신보험과 변액유니버설보험(보장형)은 저축성보험으로 분류된다.","단체보험은 보험료 일괄납입 등 계약관리가 편리하기 때문에 보험료가 저렴하다. 3"]},{"num":25,"q":"다음 중 종신보험에 대한 설명으로 맞는 것은?","box":"","c":["사망보험이므로 모든 사람이 가입 가능하다.","특약을 부가하여 가입해야 한다.","노후대비를 위한 저축성보험으로도 설계할 수 있다.","피보험자가 언제 사망하더라도 약정된 보험금을 지급한다."]},{"num":26,"q":"다음 중 교육보험에 대한 설명으로 맞는 것은?","box":"","c":["부모 생존시에는 보험금을 지급하지 않는다.","아동기 안전사고 및 청소년기 범죄로의 노출 위험도 보장이 가능하다.","부모 사망시에는 교육자금 및 양육자금이 지급된다.","어린이와 청소년기에 나타날 수 있는 각종 질병과 상해 등을 중점 보장한다."]},{"num":27,"q":"다음 중 장애인보험에 대한 설명으로 틀린 것은?","box":"","c":["보험회사는 장애인이라는 이유만으로 보험가입을 차별할 수 없다.","장애인을 피보험자로 하는 보험계약의 보험금은 연간 4천만원 한도 내에서 증여세를 비과세한다.","장애인을 피보험자로 하는 장애인전용 보장성보험의 보험료에 대해서는 세액공제를 받을 수 있다.","일반보험에 비해 보험료가 저렴하다."]},{"num":28,"q":"다음에서 세제적격 연금저축에 대한 설명으로 틀린 것은?","box":"","c":["가입나이 제한이 삭제되었다.","최소보험료 납입기간이 2013부터 5년에서 10년으로 늘어났다.","근거법령이 조세특례제한법에서 소득세법으로 변경되었다.","보험료 납입한도가 분기한도에서 연간한도로 변경되었다."]},{"num":29,"q":"다음 보기의 변액보험에 관한 내용 중 맞는 것을 모두 고른 것은? (가) 계약자는 보험기간 중 다른 펀드로 변경할 수 있다. (나) 사망보험금에 대해서는 최저보증을 설정하고 있다. (다) 계약자는 가입시 펀드를 직접 선택할 수 있다.","box":"","c":["(가), (나)","(나), (다)","(가), (다)","(가), (나), (다) 10월2회모의고사"]},{"num":30,"q":"다음에서 다양한 생명보험 상품에 대한 설명으로 틀린 것은?","box":"","c":["저축성 변액보험은 사망보험금을 책임준비금과 비교하여 큰 금액을 지급한다.","변액연금보험은 제1보험기간 내에 사망할 경우 기본보험금과 특별계정에서 적립한 계약자적립금을 더하여 사망보험금으로 지급한다.","연금보험은 보험료 납입시 세제혜택이 없으나, 세제적격 연금저축은 보험료 납입시 세액공제를 적용받을 수 있다.","일반계정에서 운용되는 유니버설보험은 기본보험금에 공시 이율을 적용하여 추가적립된 금액을 보험금으로 지급한다. ＜제3보험＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 4점)"]},{"num":31,"q":"다음 보기의 ( )안에 들어갈 내용으로 알맞지 않은 것은? 질병보험은 사람의 ( ) 등의 위험에 관하여 금전 및 그 밖의 급여를 지급할 것을 약속하고 대가를 수수하는 보험이다.","box":"","c":["질병으로 인한 사망","질병으로 인한 입원","질병으로 인한 수술","질병"]},{"num":32,"q":"다음 중 피보험이익에 대한 설명으로 맞는 것은?","box":"","c":["보험회사는 피보험이익을 최고한도로 책임을 진다.","피보험이익은 금전으로 산정할 수 없다.","존재여부나 귀속이 보험사고 후에 확정되어야 한다.","일반적으로 생명보험에서는 필수적인 요소이다."]},{"num":33,"q":"다음 중 상해보험에서 보상을 받을 수 있는 자는 누구인가? 갑. 급격중독 을. 질병으로 인한 사망 병. 자해로 인한 상해","box":"","c":["아무도 보상받을 수 없다.","갑","을","병"]},{"num":34,"q":"다음에서 급격, 우연, 외래의 요건을 모두 갖추어야 보상받을 수 있는 상품은 무엇인가?","box":"","c":["교통재해보험","장기간병보험(LTC)","화재보험","치아보험 4"]},{"num":35,"q":"다음 중 상해보험 피보험자 직업·직무 변경시 통지의무에 대한 설명으로 틀린 것은?","box":"","c":["보험계약자 또는 피보험자가 직업·직무 변경사실을 알리지 않은 경우 보험금 지급이 제한될 수 있다.","보험회사에 통지하여야 하며, 보험설계사에게 알리는 것 만으로 법적효력이 있다.","직업·직무 변경시 보험계약자 또는 피보험자는 지체없이 그 사실을 보험회사에 알려야 한다.","사고가 변경된 직업·직무와 관계가 없는 경우에는 보험금이 삭감되지 않고 전액 지급된다."]},{"num":36,"q":"다음 중 질병보험에 대한 설명으로 틀린 것은?","box":"","c":["질병보험은 순수보장형과 만기환급형으로 설계할 수 있다.","연령이 증가함에 따라 보험료가 높아진다.","상법에서는 질병보험의 보험기간 및 가입가능연령에 대한 제한이 있다.","일반적으로 외래성은 인정되지 않는다."]},{"num":37,"q":"다음 중 암의 직접적인 치료에 해당하는 것은?","box":"","c":["항암방사선치료, 항암화학치료 ➁ 의사의 진단에 의하지 않은 식이요법, 명상요법 ➂ 면역력 강화 치료 ➃ 암이나 암 치료로 인해 발생한 합병증의 치료"]},{"num":38,"q":"다음에서 현행 실손의료보험에 대한 설명으로 틀린 것은?","box":"","c":["급여의 자기부담금 비율은 20%이다.","비급여의 자기부담금 비율은 30%이다.","급여와 비급여를 분리하여 보장받을 수 있다.","급여 진료 횟수가 과다할 경우 보험료가 할증된다."]},{"num":39,"q":"다음 중 보험기간 중도에 회사가 보험료를 조정하기 위해 거쳐야 할 제도적 절차는 무엇인가?","box":"","c":["금융위원회의 인가","금융감독원의 승인","생명보험협회의 승인","기획재정부의 허가"]},{"num":40,"q":"다음 중 제3보험에 대한 설명으로 틀린 것은?","box":"","c":["상해보험은 상해의 정도에 따라 일정한 보험금액을 지급하는 정액보험의 성격을 가지고 있다.","질병보험은 순수보장형과 만기환급형으로 설계할 수 있다.","제3보험 상품은 상해와 질병이 함께 보장되는 종합형 상품이 많다.","실손의료보험은 소비자가 실제 부담한 의료비의 전부를 보험회사가 보상하는 상품이다. 10월2회모의고사"]}],"21":[{"num":1,"q":"다음 우리나라의 생명보험 역사에 대한 설명 중 맞는 것은?","box":"","c":["1921년 조선생명보험주식회사를 설립하면서 우리나라에 생명보험 도입이 시작되었다.","1970년대는 생명보험산업의 발전으로 보험시장도 개인보험 위주로 전환되었다,","2003년을 보험의 해로 지정하면서 생명보험회사의 자산 규모와 수입보험료가 대폭 증가하였다."]},{"num":2,"q":"다음 중 재무설계의 필요성에 대한 설명으로 틀린 것은?","box":"","c":["소득의 흐름과 소비지출의 흐름은 불일치한다.","중년기의 가계소득이 생애주기 전체에서 가장 높다.","자산의 유동성을 상승시키기 위해 부동산에 투자한다."]},{"num":3,"q":"다음 표에서 설명하는 것은 무엇인가? 2010년 4월부터 계약유지율, 판매량, 투자수익률 등 다양한 가격요소를 반영하여 보험료를 산출하는 방식을 도입하였다.","box":"","c":["현금흐름방식","3이원방식","최적산출방식"]},{"num":4,"q":"다음 중 청약철회가 가능한 보험은 무엇인가?","box":"","c":["보험기간이 1년인 보험","보험기간이 90일 이내인 보험","법률에 따라 가입의무가 부과되는 보험"]},{"num":5,"q":"다음 중 보험회사의 의무가 아닌 것은?","box":"","c":["보험약관의 교부·설명 의무","보험금 지급의무","계약 전 알릴 의무 1"]},{"num":6,"q":"다음의 납입최고(독촉)기간에 대한 설명 중 맞는 것으로 짝지어진 것은? 가. 보험기간이 1년 미만인 경우 7일 이상의 기간을 납입최고 (독촉)기간으로 정한다. 나. 보험료를 납입하지 아니할 경우 납입최고(독촉)기간이 끝나는 날에 계약은 해지된다. 다. 전자문서로 안내하고자 할 경우에는 전자서명으로 동의를 얻어 수신확인을 조건으로 전자문서를 송신하여야 한다. 라. 납입최고(독촉)기간 안에 발생한 보험사고에 대해서는 보험 수익자에게 약정한 보험금을 지급한다.","box":"","c":["가, 나","나, 다","가, 다, 라"]},{"num":7,"q":"다음 중 약관의 해석에 대한 설명으로 틀린 것은?","box":"","c":["신의성실의 원칙에 따라 공정하게 약관을 해석하여야 한다.","공평한 계약을 위하여 계약자에 따라 다르게 해석한다.","보험계약자나 피보험자에게 불리하거나 부담을 주는 내용은 확대 해석하지 않는다."]},{"num":8,"q":"다음 중 언더라이팅에 대한 설명으로 틀린 것은?","box":"","c":["피보험자를 적절한 위험집단으로 분류하고 보험료 및 가입 조건 등을 결정하는 과정이다.","보험을 가입하고자 하는 자의 가입 가능 여부와 부담할 보험료를 결정한다.","언더라이팅 시 보험가입자 간의 부담을 공평하게 유지할 수 없다."]},{"num":9,"q":"다음 중 계약체결·유지 단계의 정보제공에 대한 설명으로 틀린 것은?","box":"","c":["상품설명서는 보험계약 청약단계에서 반드시 제공하여야 한다.","안내자료상의 예상수치는 실제 적용되는 이율이나 수익률 등과 다를 수 있다는 점을 분명하게 설명해야 한다.","1년 이상 유지된 보험계약에 대해 보험계약관리내용을 연 1회 이상 보험소비자에게 제공해야 한다. 11월1회모의고사"]},{"num":10,"q":"다음 중 보험협회의 보험사기 방지활동으로 바르지 못한 것은?","box":"","c":["경찰청, 금융감독원, 보험협회, 보험회사로 구성된 보험범죄 수사협의회를 운영하고 있다.","보험사기 취약계층에 대한 교육 및 대국민 홍보활동을 강화하고 있다.","보험범죄신고센터를 통해 신고된 보험사기에 대해 신고 포상금을 지급하고 있다. ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음 중 보험중개사에 대한 설명으로 틀린 것은?","box":"","c":["독립적으로 보험계약의 체결을 중개하는 자이다.","보험중개사가 되고자 하는 자는 금융감독원에 등록신청 하여야 한다.","자산이 부채를 초과하는 법인은 보험중개사가 될 수 없다."]},{"num":12,"q":"다음 중 보험설계사의 등록·말소에 대한 설명으로 틀린 것은?","box":"","c":["해촉신청서를 회사로 발송하거나 해촉증명서를 발급받은 후, 협회 지역본부 방문 또는 보험협회 홈페이지를 통해 직접 말소를 신청한다.","보험설계사 시험 합격 및 등록교육 이수 후 생명보험협회에 직접 등록신청 한다.","경력등록은 보험 관계업무에 1년 이상 종사한 경력이 있는 사람(등록신청일로부터 3년 이내)만 가능하다."]},{"num":13,"q":"다음 중 「생명보험 공정경쟁질서 유지에 관한 협정」에 대한 설명으로 틀린 것은?","box":"","c":["협정의 적용범위는 협정 체결당사자인 보험회사와 그 소속 모집종사자(임직원 및 보험설계사)이다.","보험회사 및 소속 모집종사자의 보험모집과 관련한 준수 사항을 규정하고 있다.","피해를 본 경우 위반행위가 있는 날로부터 6개월 이내 금융감독원에 신고할 수 있다."]},{"num":14,"q":"다음 중 우수인증설계사 인증기준에 대한 설명으로 맞는 것은?","box":"","c":["보험계약 유지율은 13회차 95%, 25회차 90% 이상이어야 한다.","직전 3년간 품질보증해지·민원해지·무효 ‘0건’이어야 한다.","신청일로부터 3년 이내 「보험업법」에 의한 사고모집인 기록, 금융 및 신용질서 문란사실 없어야 한다. 2"]},{"num":15,"q":"다음 보기의 예금자보호법에 대한 설명 중 맞는 것을 모두 고른 것은? 가. 예금자 등을 보호하고 금융제도의 안정성을 유지하고자 제정되었다. 나. 예금보험공사는 예금자보호제도 운영을 위해 평상시 보호 대상 금융회사로부터 예금보험료를 받아 적립해둔다. 다. A은행에 예금한 1억원과 이에 대한 이자가 200만원일 때, A은행 파산시 예금자보호법에 의하여 5천만원을 보장받을 수 있다. 라. A은행의 예금 5천만원과 B보험회사로 계약이전된 만기 환급금 5천만원의 보험이 있는 경우 A은행 해산 시 예금 보험공사로부터 1억원을 보장받을 수 있다.","box":"","c":["가, 다","나, 라","가, 나, 다"]},{"num":16,"q":"다음 중 경영공시에 대한 설명으로 맞는 것은?","box":"","c":["1/4분기 임시결산공시는 당해연도 결산공시 전까지 공시한다.","수시공시는 공시일로부터 3년간 공시한다.","결산공시내용은 생명보험협회에만 공시할 수 있다."]},{"num":17,"q":"다음 중 보험민원에 대한 설명으로 틀린 것은?","box":"","c":["금융감독원은 2002년부터 금융민원 현황을 발표하고 있다.","금융민원 중 보험업권이 차지하는 비중이 가장 높다.","금융소비자는 금융회사와의 민원·분쟁발생시 생명보험협회에 직접 접수하여야 한다."]},{"num":18,"q":"장애인 등을 보험수익자로 하는 보험금에 대한 증여세 비과세한도는 얼마인가?","box":"","c":["연 2천만원","연 3천만원","연 4천만원"]},{"num":19,"q":"다음 연금소득 분리과세에 대한 설명 중 틀린 것은?","box":"","c":["세율 적용시 2가지 이상에 동시 적용되는 경우에는 낮은 세율을 적용한다.","연금계좌에서 연금외 형태로 지급 받는 경우에는 연금소득이 아닌 퇴직소득으로 과세한다.","연금수령연차가 11년 이상인 경우에는 한도를 미적용한다."]},{"num":20,"q":"다음 보기의 ( )안에 들어갈 단어가 바르게 짝지어진 것은? 보험회사 등 원천징수의무자는 보험설계사에게 매월 모집수당 등을 지급할 때 ( 가 )%(지방소득세 별도)를 원천징수하여 다음 달 ( 나 )일까지 관할세무서에 신고·납부하여야 한다.","box":"","c":["(가) 3, (나) 10","(가) 5, (나) 10","(가) 3, (나) 7 11월1회모의고사"]},{"num":21,"q":"다음 보기의 ( ) 안에 들어갈 말은? ( ) 제2조에서는 “보험상품이란 ( )을 목적으로 우연한 사건 발생에 관하여 금전 및 그 밖의 급여를 지급할 것을 약정 하고 대가를 수수하는 계약”으로 정의하고 있다.","box":"","c":["상법, 위험보장","보험업법, 생활보장","상법, 생활보장","보험업법, 위험보장"]},{"num":22,"q":"다음의 생명보험 및 생명보험상품의 특징에 대한 설명으로 틀린 것은?","box":"","c":["생명보험은 무형의 상품이기 때문에 보험가입자의 정확한 이해가 중요하다.","계약이 체결된 이후에도 정기적으로 지속적인 정보가 제공 되어야 하는 상품이다.","보험회사의 니즈에 맞춰 필요한 위험보장 및 재정설계가 가능하다.","생명보험계약은 쌍방의 의사가 합치되면 성립하는 특성을 지닌다."]},{"num":23,"q":"다음 보기의 ( ) 안에 들어갈 말은? 생명보험 상품은 인간의 ( )과 ( )을/를 보험의 목적으로 하기 때문에 대수의 법칙, 수지상등의 원칙 등을 기초로 하여 과학적이고 합리적인 방법으로 개발되고 있다.","box":"","c":["생명, 재산","재산, 신체","생명, 신체","생존, 사망"]},{"num":24,"q":"다음 중 갱신형 상품에 대한 설명으로 틀린 것은?","box":"","c":["일정기간 경과시 연령과 위험률을 변경하여 보험료를 다시 산정한다.","위험률 변동이 너무 커 갱신시 보험료 조정을 통해 안정적인 보험계약 운용을 위해 도입되었다.","계약 갱신 전에 자동갱신안내장을 계약자에게 발송하여 안내하여야 한다.","대부분의 생명보험 상품은 갱신형 상품이다. 3"]},{"num":25,"q":"다음 중 유니버설보험에 대한 설명으로 맞는 것은?","box":"","c":["기본보험금에 예정이율을 적용하여 추가적립된 금액을 보험금으로 지급한다.","저축성보험에만 유니버설 기능을 추가할 수 있다.","보험료 추가납입이 가능하다.","일반계정에서 운용되지 않는다."]},{"num":26,"q":"다음 중 교육보험에 대한 설명으로 틀린 것은?","box":"","c":["부모의 생존시에는 각종 학자금 등 교육자금이 지급된다.","각종 인성 프로그램과 진학상담 서비스 등의 추가로 판매가 증가하고 있다.","자녀의 교육자금을 종합적으로 보장한다.","부모 사망시에는 교육자금 및 양육자금이 지급된다."]},{"num":27,"q":"다음 중 장애인전용보험에 대한 설명으로 틀린 것은?","box":"","c":["일반보험에 비해 보험료가 저렴하다.","보장성 보험에 대한 세제혜택을 받을 수 있다.","가입당시의 건강상태 등을 고려하여 보험가입 가능여부 및 인수조건을 결정한다.","암보험에 대한 가입은 불가하다."]},{"num":28,"q":"다음 중 퇴직연금에 대한 설명으로 틀린 것은?","box":"","c":["근로자의 퇴직금을 외부의 금융기관에 적립하여 운용한다.","확정급여형(DB형), 확정기여형(DC형), 개인형 퇴직연금 제도(IRP)로 구분된다.","퇴직연금 가입자는 개인형 퇴직연금(IRP) 가입이 불가하다.","전 사업장을 대상으로 한다."]},{"num":29,"q":"다음 중 변액보험에 대한 설명으로 틀린 것은?","box":"","c":["투자실적 악화시 환급금이 원금에도 미치지 못할 수 있다.","예금자보호법의 적용을 받지 않지만 보험회사가 최저보증 하는 보험금에 한하여 예금보험공사가 보호한다.","보험기간 중 다른 펀드로 변경할 수 있다,","적립된 금액을 월 1회 평가하여 계약자별로 배분하게 된다."]},{"num":30,"q":"다음 중 생명보험 상품에 대한 설명으로 틀린 것은?","box":"","c":["어린이보험은 사망을 보장하는 급부설계를 할 수 없다.","세제적격 연금저축은 조세특례제한법에 적용받는다.","변액보험은 보험금이 자산운용성과에 따라 변동하는 보험 계약이다.","연금보험은 위험보장기간과 연금지급기간으로 구분된다. 11월1회모의고사"]},{"num":31,"q":"다음 중 제3보험 사고가 아닌 것은?","box":"","c":["중대질병","계약자 채무불이행","대중교통사망","재해사망"]},{"num":32,"q":"다음 중 보험의 구분에 대한 설명으로 맞는 것은?","box":"","c":["생명보험 상품을 판매하기 위해서는 생명보험협회에 등록 하고, 제3보험 상품을 판매하기 위해서는 손해보험협회에 등록하여야 한다.","생명보험에는 피보험이익이 반드시 존재한다.","보험업법에서 보험업은 생명보험업, 손해보험업, 제3보험업 으로 구분되어 있다.","제3보험업은 별도로 독립된 제3보험회사를 설립하여 운영 할 수 없다."]},{"num":33,"q":"다음의 생명보험과 상해보험을 비교한 내용 중 알맞은 것은? 생명보험 상해보험 (가) 발생여부 확정 확정 (나) 발생시기 불확정 불확정 (다) 발생원인 불확정 확정 (라) 피해정도 확정 확정","box":"","c":["(가)","(나)","(다)","(라)"]},{"num":34,"q":"다음 중 상해보험의 주계약에서 보장하지 않는 것은?","box":"","c":["재해사망보험금","질병사망보험금","재해장해급여금","재해입원급여금"]},{"num":35,"q":"다음 보기의 ( )안에 들어갈 숫자는? 직업·직무 변경 통지를 게을리 한 경우 보험회사는 그 사실을 안 날로부터 ( )개월 내에 보험료의 증액을 청구하거나 보험 계약을 해지할 수 있다.","box":"","c":["1","2","3","6"]},{"num":36,"q":"다음 중 질병보험의 일반적인 가입조건으로 틀린 것은?","box":"","c":["보험기간이 10년 이상이다.","연령이 증가함에 따라 보험료가 높아진다.","지급사유가 발생하기 전에 사망한 경우에는 기납입보험료를 지급한다.","「상법」에서는 질병보험의 가입가능연령에 대한 제한이 없다. 4"]},{"num":37,"q":"다음 중 암보험에 대한 설명으로 틀린 것은?","box":"","c":["순수보장형과 만기환급형으로 구분된다.","특정암을 집중적으로 보장하는 형태의 상품도 있다.","고액암과 소액암으로 구분하는 경우도 있다.","가입가능연령은 30세 이상이다."]},{"num":38,"q":"다음 중 실손보상 급부에 대한 설명으로 틀린 것은?","box":"","c":["초과이익 금지를 위해 본인이 부담한 치료비를 상품별로 보상책임액 비율에 따라 비례보상한다.","가입시 실손의료보험 중복가입여부를 확인하여야 한다.","실손의료보험은 단독형 상품으로만 판매되고 있다.","중복계약한 모든 제3보험 상품은 비례보상한다."]},{"num":39,"q":"다음 중 민영 장기간병보험에 대한 설명으로 틀린 것은?","box":"","c":["가입가능연령은 일반적으로 30세 이후이다.","위험률 변동제도를 채택하고 있다.","연령에 따라 보험료의 차이가 발생한다.","피보험자의 사망이나 간병연금수령 종료시 계약은 소멸된다."]},{"num":40,"q":"다음 중 제3보험의 주계약에서 보장하지 않는 것은?","box":"","c":["부인과 질환","일상생활장해상태로 인한 간병비","변액보험의 변동보험금","암 진단금 11월1회모의고사"]}],"22":[{"num":1,"q":"다음 중 우리나라 생명보험의 역사에 대한 설명으로 틀린 것은?","box":"","c":["우리나라에 생명보험이 도입된 것은 일본과 강화도조약을 체결한 이후이다.","1950년대 들어 생명보험회사가 국민저축기관으로 지정 되면서 개인보험이 크게 성장하였다.","우리나라 최초의 생명보험회사는 1921년에 설립된 조선 생명보험회사이다."]},{"num":2,"q":"다음 중 생명보험산업에 대한 설명으로 맞는 것은?","box":"","c":["2021년 수입보험료 기준 한국 생명보험산업은 미국, 중국, 일본, 영국에 이어 세계 7위에 랭크되어 있다.","보험밀도는 국민 1인당 보험료로, 한국은 2021년 기준 16위에 랭크되어 있다.","보험침투율은 GDP대비 보험료 비율로, 한국의 보험산업은 2021년 기준 세계 6위에 랭크되어 있다."]},{"num":3,"q":"다음 중 보험안내자료상 배당에 대한 설명으로 맞는 것은?","box":"","c":["보험안내자료에 보험회사의 장래이익배당 또는 잉여금 분배에 대한 예상을 기재하지 못하도록 규정되어 있으며, 이에 대한 예외를 두고 있지 않다.","계약자배당이 있는 연금보험의 경우 직전 3개년도 실적을 근거로 장래의 계약자배당을 예시할 수 있다.","보험계약자가 오해하지 않도록 장래의 계약자배당금은 예상 금액이므로 실제 금액과 차이가 있을 수 있음을 명시하여야 한다."]},{"num":4,"q":"다음 중 보험계약이 무효인 경우에 해당하는 것은?","box":"","c":["만 17세인 미성년자의 사망을 보험금 지급사유로 한 계약의 경우","보험계약의 청약철회 기간이 지난 다음 청약을 철회한 경우","타인의 사망을 보험금 지급사유로 하는 보험계약을 체결한 이후 피보험자인 타인의 서면동의를 받는 경우 1"]},{"num":5,"q":"다음 표의 (가), (나), (다)안에 들어갈 용어를 순서대로 맞게 나열한 것은? 일반실종이란 부재자의 생사가 ( 가 )간 분명하지 아니한 때에 ( 나 )이/가 이해관계인이나 검사의 청구에 의해 실종선고를 하고 ( 다 )한 것으로 보는 제도를 말한다.","box":"","c":["(가) 5년, (나) 법원, (다) 실종","(가) 3년, (나) 관공서, (다) 사망","(가) 5년, (나) 법원, (다) 사망"]},{"num":6,"q":"다음 중 통지의무(계약 후 알릴 의무)에 대한 설명으로 틀린 것은?","box":"","c":["계약자 또는 보험수익자는 주소 또는 연락처가 변경된 경우에는 지체없이 보험회사에 알려야 한다.","계약자 등이 주소 또는 연락처 변경 통지의무를 위반한 경우 보험회사의 보험금 지급책임이 면제된다.","계약자 또는 피보험자나 보험수익자는 보험금 지급사유가 발생하였을 때에는 지체없이 이를 보험회사에 알려야 한다."]},{"num":7,"q":"다음 중 일반적인 언더라이팅에서 활용하는 정보에 해당하지 않는 것은?","box":"","c":["청약서상 계약 전 알릴 사항","종교활동 참여 여부","의적 진단보고서"]},{"num":8,"q":"다음 중 클레임 업무에 해당하지 않는 것은?","box":"","c":["보험금 지급 업무","보험사고 조사","보험대상자 위험도 분류"]},{"num":9,"q":"다음 중 보험사기와 구별되는 유형은?","box":"","c":["역선택","보험사고의 고의적 유발","보험금 과다청구"]},{"num":10,"q":"다음 중 자살예방 게이트키퍼에 대한 설명으로 틀린 것은?","box":"","c":["생명보험사회공헌위원회에서 자살예방 게이트키퍼 교육을 실시하고 있다.","자살예방 게이트키퍼란 주변사람의 자살 신호를 재빨리 인지하여 전문가에게 연계하도록 훈련 받은 사람이다.","한국형 자살예방 교육프로그램인 ‘보고듣고말하기’ 교육을 수료하면 인증 받을 수 있다. ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음 표의 (가)~(다)에 들어갈 내용을 맞게 나열한 것은? 생명보험설계사란 생명보험회사 등을 위하여 보험계약의 체결을 중개하는 자로서 ( 가 )에 따라 ( 나 )의 업무를 위탁받은 ( 다 )에 등록하고 있다.","box":"","c":["(가)『상법』, (나) 금융감독원, (다) 보험연수원","(가)『보험업법』, (나) 금융위원회, (다) 생명보험협회","(가)『보험업감독규정』, (나) 생명보험협회, (다) 해당생명 보험회사"]},{"num":12,"q":"다음 중 금융기관보험대리점에 대한 설명으로 틀린 것은?","box":"","c":["대리점 계약을 체결한 보험회사에 영업보증금을 예탁하여야 한다.","보험회사의 대리점 자격으로 보험계약의 체결을 대리하는 은행 등의 금융기관을 말한다.","일반적으로 프랑스어의 은행(Banque)과 보험(Assurance)의 합성어인 ‘방카슈랑스(Bancassurance)라고 부른다."]},{"num":13,"q":"다음 중 승환계약의 제재대상에서 제외되는 총 계약건수는? [해당 보험설계사 기준] - 배우자 계약 : 3건 - 본인의 부모계약 : 3건 - 형제의 계약 : 2건 - 본인의 계약 : 4건","box":"","c":["6건","10건","12건"]},{"num":14,"q":"“김생명”이 다음 사례에서 예금보험공사를 통해 지급받을 수 있는 총 금액은? (가) “김생명”은 A저축은행에 5천만원의 예금을 가입하였는데, 이후에 A저축은행이 B저축은행과 합병되었다. (나) “김생명”은 C생명보험회사에 최저사망보험금 6천만원을 보증받는 변액보험에 가입하였는데, 이후 C생명보험회사가 보험금의 지급정지 조치를 받은 후 D생명보험회사로 전건 계약이 이전되었다. (다) “김생명”은 E은행 F지점에 예금 3천만원과 대출 1천만원, 같은 은행 G지점에 예금 2천만원을 가지고 있던 중 E은행이 파산하였다.","box":"","c":["4천만원","5천만원","1억 5천만원 2"]},{"num":15,"q":"다음 중 우수인증설계사 제도에 대한 설명으로 맞는 것은 무엇인가?","box":"","c":["설계사의 성실성과 책임감 등으로 평가하므로 모집실적은 인증기준에 포함되지 않는다.","생명보험협회는 매년 5월에 우수인증설계사 신청을 받아 심사한 후 인증을 부여하고 있다.","동일한 회사에 1년 이상 위촉되어 활동하고 있으면 인증신청 대상이다."]},{"num":16,"q":"다음 중 생명보험 광고심의절차에 대한 설명으로 틀린 것은?","box":"","c":["브랜드광고는 심의대상이 아니다.","금융위원회는 접수된 광고물에 대해 심의 후 심의결과를 통보한다.","온라인매체, 방송매체 등 광고물에 대해 보험회사 내 준법 감시인 등의 확인을 거쳐 생명보험협회에 심의신청한다."]},{"num":17,"q":"다음 중 발생 즉시 공시하는 사항에 해당하지 않는 것은?","box":"","c":["적기시정조치","출자관계의 중대한 변동에 관한 사항","재보험 관련 사항"]},{"num":18,"q":"다음 중 종합과세 대상에 해당하지 않는 소득은 무엇인가?","box":"","c":["양도소득","근로소득","사업소득"]},{"num":19,"q":"다음 중 종합소득 계산시 42%(지방소득세 별도)의 세율을 적용하는 경우로 맞는 것은?","box":"","c":["과세표준이 3억원 초과 5억원 이하","과세표준이 5억원 초과 10억원 이하","과세표준이 10억원 초과"]},{"num":20,"q":"다음 표에서 ( ) 안에 들어갈 숫자로 맞는 것은? 보험설계사의 직전 과세기간 수입금액이 ( )만원 미만인 경우 해당 소득에 대하여 연말정산을 함으로써 납세의무가 종결된다.","box":"","c":["7,500","8,000","8,500 11월2회모의고사"]},{"num":21,"q":"다음 중 생명보험계약 관련법규에 대한 설명으로 틀린 것은?","box":"","c":["「예금자보호법」은 생명보험 계약관계를 규율하는 근거 법률이다.","「보험업법」은 보험업 인허가 및 감독 관련 근거법률이다.","보험사의 공동행위와 관련하여 「독점규제 및 공정거래에 관한 법률」이 적용된다.","변액보험에 대하여 「자본시장과 금융투자업에 관한 법률」이 적용된다."]},{"num":22,"q":"다음 중 생명보험 상품의 기능적 특성에 대한 설명으로 틀린 것은?","box":"","c":["계약자의 라이프사이클에 맞춘 다양한 설계는 불가능하다.","형태가 보이지 않는 상품이기 때문에 가입자의 정확한 이해가 필수적이다.","계약체결 이후에도 지속적인 관리가 필요하다.","완전한 상품 판매를 위하여 생명보험계약 체결과정에서 가입 전 심사 등 여러 절차를 거치게 된다."]},{"num":23,"q":"다음 중 (가), (나)에 들어갈 내용을 맞게 나열한 것은? 보험상품을 개발하여 판매하고자 할 때에는 ( 가 )을/를 작성 한다. 다만 보험업법령상 정해진 경우에는 금융위원회에 판매 전 ( 나 )를 하여야 한다.","box":"","c":["(가) 기초서류 (나) 신고","(가) 보험증권 (나) 인가","(가) 기초서류 (나) 인가","(가) 상품설명서 (나) 신고"]},{"num":24,"q":"다음 보기에서 설명하는 준비금의 이자적립방식으로 맞는 것은? 보험료적립금을 펀드로 운영하여 유가증권 등에 투자하고 그 실적을 평가하여 보험금에 반영하는 방식","box":"","c":["금리확정형","실적배당형","금리연동형","자산연계형"]},{"num":25,"q":"다음 중 종신보험에 대한 설명으로 틀린 것은?","box":"","c":["보험료가 저렴한 저해지환급형으로 설계된 상품도 판매되고 있다.","기준연령요건에서 생존시 지급되는 보험금의 합계가 이미 납입한 보험료를 초과하는 경우도 있다.","원칙적으로 15세 미만은 가입이 불가능하다.","특약부가를 통해 종합형 보험설계도 가능하다. 3"]},{"num":26,"q":"다음 중 교육보험에 대한 설명으로 맞는 것은?","box":"","c":["부모 생존시에는 보험금을 지급하지 않는다.","아동기 안전사고 및 청소년기 범죄로의 노출 위험도 보장이 가능하다.","부모 사망시에는 교육자금 및 양육자금이 지급된다.","어린이와 청소년기에 나타날 수 있는 각종 질병과 상해 등을 중점 보장한다."]},{"num":27,"q":"다음 중 연금보험에 대한 설명으로 틀린 것은?","box":"","c":["종신연금형은 피보험자의 생존기간 동안 평생 연금이 지급 된다.","대부분의 연금보험은 위험보장기간과 연금지급기간으로 구분된다.","확정연금형은 피보험자의 생존기간에 적립금의 이자만 지급하는 연금지급방법이다.","위험보장기간에 사망시 책임준비금(사망보험금)을 지급하고 계약은 소멸된다."]},{"num":28,"q":"다음 중 (가)~(다)에 들어갈 숫자를 모두 합하면 얼마인가? · 연금보험에서 연금을 지급하는 기간을 제( 가 )보험기간이라고 한다. · 장애인을 보험수익자로 하는 보험계약의 보험금은 연간 ( 나 ) 천만원 한도 내에서 증여세를 비과세 한다. · 세제적격 연금저축은 2013년부터 최소보험료 납입기간이 10년에서 ( 다 )년으로 단축되었다.","box":"","c":["9","10","11","12"]},{"num":29,"q":"다음 중 변액보험에 대한 설명으로 틀린 것은?","box":"","c":["보험업법 과 자본시장과 금융투자업에 관한 법률 을 동시에 적용받는다.","일정수준 이상의 해약환급금과 연금재원을 보증한다.","별도의 판매자격시험에 합격한 사람만이 판매할 수 있다.","보험료 중 사업비와 위험보험료 등을 제외한 금액이 특별 계정으로 투입되어 운영된다."]},{"num":30,"q":"다음 중 생명보험 상품에 대한 설명으로 틀린 것은?","box":"","c":["변액종신보험은 연금전환특약을 이용하여 연금으로 전환 할 수 있다.","어린이보험에 가입한 피보험자가 만 15세 미만 사망시에는 책임준비금과 기납입보험료 중 큰 금액을 지급한다.","교육보험은 종신보험의 활성화 등으로 판매량이 감소하고 있다.","장애인전용 연금보험은 일반 종신연금보다 적은 연금액을 지급한다. 11월2회모의고사"]},{"num":31,"q":"다음 중 제3보험에 대한 설명으로 맞는 것은?","box":"","c":["제3보험이라는 용어는 『상법』에 정의되어 있다.","간병보험은 『상법』의 손해보험절에 반영되어 있다.","『상법』에는 상해보험과 질병보험에 대한 규정이 반영되어 있다.","인보험은 제3보험의 하위 개념이다."]},{"num":32,"q":"다음 중 일반적인 보험계약 소멸사유가 아닌 것은?","box":"","c":["질병보험 – 일반사망","상해보험 – 재해수술","간병보험 – 상해사망","간병보험 – 간병연금수령 종료"]},{"num":33,"q":"다음 표에서 (가)~(나)에 들어갈 내용이 바르게 나열된 것은? 상해보험은 직업·직무의 성격에 따라 사고 발생위험이 달라지며 직업별 위험등급은 총 ( 가 )으로 구분되며 등급에 따라 ( 나 )로 위험률을 차등 적용하고 있다.","box":"","c":["3등급, 5단계","7등급, 3단계","5등급, 3단계","5등급, 5단계"]},{"num":34,"q":"다음 보기의 ( )에 들어갈 내용으로 맞는 것은? 생명보험에서 판매하는 상해보험은 감염병 예방법 제2조 제2호에 따른 ( )급 감염병까지 ‘재해’로 보장하므로 손해보험회사의 상해보험과 비교하여 보장범위가 넓다.","box":"","c":["5","3","2","1"]},{"num":35,"q":"다음 중 상해보험의 직업·직무 변경통지에 대한 내용으로 (가), (나)에 들어갈 내용이 맞는 것은? 상해보험에서 위험이 감소한 경우에는 ( (가) )에 정한 방법에 따라 계산된 금액을 회사가 안 날부터 ( (나) )영업일 이내에 계약자에게 반환하여야 한다.","box":"","c":["(가) 보험료 및 책임준비금 산출방법서 (나) 3","(가) 보험료 및 책임준비금 산출방법서 (나) 5","(가) 보험약관 (나) 3","(가) 보험약관 (나) 5 4"]},{"num":36,"q":"다음 중 질병보험에 대한 설명으로 틀린 것은?","box":"","c":["보장내용에 따라 암보험, 실손의료보험 등이 있다.","물건을 들다가 허리를 다친 경우는 질병보험의 보장대상이 아니다.","대부분 상품의 보험기간은 10년 이상이며, 연령 및 건강상 태와 상관없이 가입 가능하다.","일반사망보험금이 없기 때문에 상대적으로 저렴한 보험료 로 각종 질병에 대한 보장을 받을 수 있다."]},{"num":37,"q":"다음 중 암보험에 대한 설명으로 맞는 것은?","box":"","c":["대부분 암사망보험금이 주계약으로 설계되어 있다.","암보험표준약관에서는 “암의 적접적인 치료”에 암의 제거 및 증식억제 치료를 받기위해 필수불가결한 면역력 강화 치료를 포함시키고 있다.","보험기간은 일반적으로 10년 이하로 설계되며, 가입가능 연령은 15세 이상이다.","연령에 상관없이 동일한 위험률을 적용하여 보험료를 산출 한다."]},{"num":38,"q":"다음 중 우리나라의 실손의료보험 도입순서를 순서대로 맞게 나열한 것은? (가) 손해보험회사의 개인실손의료보험 (나) 생명보험회사의 개인실손의료보험 (다) 생명보험회사의 표준형 단독실손의료보험 (라) 생명보험회사의 단체실손의료보험","box":"","c":["(가) → (라) → (나) → (다)","(가) → (나) → (다) → (라)","(나) → (라) → (다) → (가)","(나) → (가) → (라) → (다)"]},{"num":39,"q":"다음 중 타인의 간병을 필요로 하는 상태를 보장하는 보험은 무엇인가?","box":"","c":["치매보험","치아보험","연금보험","교통재해보험"]},{"num":40,"q":"다음 중 제3보험에 대한 일반적인 설명으로 틀린 것은?","box":"","c":["암보험은 일반적으로 가입 후 일정기간 이후부터 보장이 개시된다.","실손의료보험 특약은 기본형을 가입해야 추가로 가입할 수 있다.","질병보험은 연령증가시 보험료 변동이 클 수 있으므로 갱신형으로 설계할 수
