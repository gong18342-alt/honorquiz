<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HONOR ENTERPRISE 모의고사</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap');
:root {
  --bg:#0c0e14; --card:#161820; --card2:#1e2030; --border:#272a3a;
  --accent:#5b8dee; --accent2:#8b5cf6;
  --green:#22c55e; --red:#f43f5e;
  --text:#e4e6f0; --text2:#7c82a0; --text3:#555870; --r:14px;
  --sidebar:220px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.screen { display:none; }
.screen.on { display:flex; flex-direction:column; min-height:100vh; }

/* ── HOME ── */
#home {
  align-items:center; justify-content:center; padding:48px 20px;
  background:radial-gradient(ellipse 80% 60% at 50% -10%, rgba(91,141,238,.18) 0%, transparent 70%);
}
.logo-tag { font-size:11px; font-weight:700; letter-spacing:4px; color:var(--accent); text-transform:uppercase; margin-bottom:14px; }
.home-title { font-size:clamp(28px,7vw,48px); font-weight:900; text-align:center; line-height:1.2; margin-bottom:36px; }
.home-title span { background:linear-gradient(130deg,#5b8dee,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.setup-card { width:100%; max-width:420px; background:var(--card); border:1px solid var(--border); border-radius:20px; padding:28px 24px; }
.field { display:flex; flex-direction:column; gap:7px; margin-bottom:16px; }
.field label { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text2); }
.field input { background:var(--card2); border:1px solid var(--border); border-radius:9px; padding:11px 14px; color:var(--text); font-family:inherit; font-size:14px; outline:none; transition:border-color .2s; }
.field input:focus { border-color:var(--accent); }
.btn-primary { width:100%; padding:14px; border-radius:10px; border:none; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; transition:opacity .15s,transform .1s; margin-top:4px; }
.btn-primary:hover { opacity:.92; transform:translateY(-1px); }

/* 시험 영역 선택 */
.exam-type-wrap { margin-bottom:16px; }
.exam-type-label { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text2); margin-bottom:8px; }
.exam-type-btns { display:flex; gap:6px; }
.type-btn {
  flex:1; padding:9px 4px; border-radius:8px;
  border:1.5px solid var(--border); background:transparent;
  color:var(--text2); font-family:inherit; font-size:12px; font-weight:600;
  cursor:pointer; transition:all .15s; text-align:center;
}
.type-btn:hover { border-color:var(--accent); color:var(--accent); }
.type-btn.active { background:rgba(91,141,238,.15); border-color:var(--accent); color:var(--accent); }

/* ── EXAM LAYOUT ── */
#exam { background:var(--bg); flex-direction:column; }

.exam-top {
  background:var(--card); border-bottom:1px solid var(--border);
  padding:10px 16px; display:flex; align-items:center; gap:10px;
  position:sticky; top:0; z-index:100;
}

#exam .review-header {
  top: 49px;
}
.exam-badge { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-size:13px; font-weight:700; padding:4px 12px; border-radius:100px; white-space:nowrap; }
.prog-wrap { flex:1; display:flex; flex-direction:column; gap:4px; }
.prog-bar { height:3px; background:var(--border); border-radius:3px; overflow:hidden; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:3px; transition:width .3s; }
.prog-label { font-size:11px; color:var(--text2); }
.btn-end { padding:6px 12px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text2); font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all .15s; }
.btn-end:hover { border-color:var(--red); color:var(--red); }

/* ── EXAM BODY: 사이드바 + 메인 ── */
.exam-body {
  display:flex;
  flex:1;
  min-height:0;
}

/* ── 왼쪽 사이드바 (문제 번호 목록) ── */
.sidebar {
  width:var(--sidebar);
  min-width:var(--sidebar);
  background:var(--card);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  position:sticky;
  top: var(--top-offset, 49px);
  height: calc(100vh - var(--top-offset, 49px));
  overflow:hidden;
  flex-shrink:0;
}
.sidebar-list {
  flex:1;
  overflow-y:auto;
  padding:6px 8px 4px;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
  /* 최소 높이 0으로 flex 줄어들 수 있게 */
  min-height:0;
}
.sidebar-title {
  font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
  color:var(--text3); padding:12px 12px 6px; text-align:center;
}
.sidebar-list::-webkit-scrollbar { width:4px; }
.sidebar-list::-webkit-scrollbar-track { background:transparent; }
.sidebar-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* 10개씩 묶음 행 */
.srow {
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:4px;
  margin-bottom:4px;
}

.sitem {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  padding:5px 2px;
  border-radius:7px;
  cursor:pointer;
  transition:background .15s;
}
.sitem:hover { background:var(--card2); }
.sitem.active { background:rgba(91,141,238,.15); }

.sitem-num {
  width:30px; height:30px; border-radius:7px; border:1.5px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:var(--text2);
  transition:all .15s;
}
.sitem.active .sitem-num { background:var(--accent); border-color:var(--accent); color:#fff; }
.sitem.answered .sitem-num { border-color:var(--accent); color:var(--accent); background:rgba(91,141,238,.1); }
.sitem.correct .sitem-num { background:rgba(34,197,94,.15); border-color:var(--green); color:var(--green); }
.sitem.wrong .sitem-num { background:rgba(244,63,94,.15); border-color:var(--red); color:var(--red); }

.sitem-ox {
  font-size:11px; font-weight:900; line-height:1;
  display:none;
}
.sitem.correct .sitem-ox { display:block; color:var(--green); }
.sitem.wrong .sitem-ox { display:block; color:var(--red); }

/* 채점 버튼 항상 하단 고정 보장 */
.sidebar-submit {
  padding:10px;
  border-top:1px solid var(--border);
  flex-shrink:0;
}
.btn-submit-side {
  width:100%; padding:11px; border-radius:9px; border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff; font-family:inherit; font-size:13px; font-weight:700;
  cursor:pointer; transition:opacity .15s;
}
.btn-submit-side:hover { opacity:.9; }

/* ── 오른쪽 메인 영역 ── */
.main-area {
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}
.q-wrap { flex:1; display:flex; flex-direction:column; padding:20px 20px 20px; max-width:680px; width:100%; margin:0 auto; }

.q-counter { font-size:12px; font-weight:700; letter-spacing:2px; color:var(--text3); text-transform:uppercase; margin-bottom:10px; text-align:center; }
.q-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; margin-bottom:16px; }
.q-header { padding:18px 20px 0; }
.q-num { font-size:11px; font-weight:700; color:var(--accent); letter-spacing:1px; margin-bottom:8px; text-align:center; }
.q-text { font-size:15px; line-height:1.75; color:var(--text); font-weight:500; white-space:pre-line; text-align:center; }
.q-box { background:var(--card2); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin:10px 0 0; font-size:13px; line-height:1.7; color:var(--text2); white-space:pre-line; }

/* CHOICES — 애니메이션 없음 */
.choices { padding:14px 16px 18px; display:flex; flex-direction:column; gap:8px; }
.choice-btn {
  display:flex; align-items:flex-start; gap:10px;
  padding:12px 14px; border-radius:10px; border:1.5px solid var(--border);
  background:transparent; cursor:pointer; text-align:left; width:100%;
  color:var(--text); font-family:inherit; font-size:14px; line-height:1.6;
  /* transition 제거 → 모핑 없음 */
}
.choice-btn:hover:not(:disabled) { border-color:var(--accent); background:rgba(91,141,238,.06); }
.choice-num {
  width:22px; height:22px; min-width:22px; border-radius:50%;
  border:1.5px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:var(--text2); margin-top:1px;
}
.choice-btn:hover:not(:disabled) .choice-num { border-color:var(--accent); color:var(--accent); }
.choice-btn.selected { border-color:var(--accent); background:rgba(91,141,238,.1); }
.choice-btn.selected .choice-num { background:var(--accent); border-color:var(--accent); color:#fff; }
.choice-btn.correct { border-color:var(--green); background:rgba(34,197,94,.08); }
.choice-btn.correct .choice-num { background:var(--green); border-color:var(--green); color:#fff; }
.choice-btn.wrong { border-color:var(--red); background:rgba(244,63,94,.08); }
.choice-btn.wrong .choice-num { background:var(--red); border-color:var(--red); color:#fff; }
.choice-btn.show-ans .choice-num { border-color:var(--green); color:var(--green); }

/* FEEDBACK */
.feedback-bar { padding:12px 16px; border-radius:10px; margin:0 0 16px; font-size:13px; font-weight:600; line-height:1.5; display:none; }
.feedback-bar.correct { background:rgba(34,197,94,.1); color:var(--green); border:1px solid rgba(34,197,94,.2); }
.feedback-bar.wrong { background:rgba(244,63,94,.1); color:var(--red); border:1px solid rgba(244,63,94,.2); }

/* NAV */
.q-nav { display:flex; gap:10px; padding-bottom:16px; }
.btn-prev,.btn-next { flex:1; padding:13px; border-radius:10px; border:none; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; transition:opacity .15s; }
.btn-prev { background:var(--card2); border:1.5px solid var(--border); color:var(--text2); }
.btn-prev:hover { border-color:var(--text2); color:var(--text); }
.btn-next { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
.btn-next:hover { opacity:.9; }

/* ── RESULT ── */
#result { align-items:center; justify-content:center; padding:40px 20px; background:radial-gradient(ellipse 70% 50% at 50% 0%, rgba(91,141,238,.12) 0%, transparent 60%); }
.result-card { width:100%; max-width:440px; background:var(--card); border:1px solid var(--border); border-radius:20px; padding:36px 28px; text-align:center; }
.result-badge { font-size:12px; font-weight:700; letter-spacing:3px; color:var(--accent); text-transform:uppercase; margin-bottom:6px; }
.result-name { font-size:18px; font-weight:700; margin-bottom:28px; }
.donut-wrap { position:relative; width:130px; height:130px; margin:0 auto 28px; }
.donut-svg { transform:rotate(-90deg); }
.donut-bg { fill:none; stroke:var(--border); stroke-width:10; }
.donut-fill { fill:none; stroke-width:10; stroke-linecap:round; transition:stroke-dasharray .8s ease; }
.donut-label { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.donut-score { font-size:34px; font-weight:900; line-height:1; }
.donut-unit { font-size:12px; color:var(--text2); margin-top:2px; }
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
.stat { background:var(--card2); border-radius:10px; padding:14px 8px; }
.stat-v { font-size:22px; font-weight:900; display:block; margin-bottom:3px; }
.stat-v.g{color:var(--green);} .stat-v.r{color:var(--red);} .stat-v.b{color:var(--accent);}
.stat-l { font-size:11px; color:var(--text2); }
.pass-chip { display:inline-block; padding:7px 22px; border-radius:100px; font-size:13px; font-weight:700; margin-bottom:24px; }
.pass-chip.pass { background:rgba(34,197,94,.12); color:var(--green); border:1px solid rgba(34,197,94,.25); }
.pass-chip.fail { background:rgba(244,63,94,.12); color:var(--red); border:1px solid rgba(244,63,94,.25); }

/* 상세 배점 내역 */
.score-detail {
  background:var(--card2); border:1px solid var(--border);
  border-radius:10px; padding:14px 16px; margin-bottom:16px;
  text-align:left; width:100%;
}
.score-detail-title {
  font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  color:var(--text2); margin-bottom:10px;
}
.score-rows { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
.score-row {
  display:flex; justify-content:space-between; align-items:center;
  font-size:13px; color:var(--text);
}
.score-row .sr-label { color:var(--text2); font-size:12px; }
.score-row .sr-val { font-weight:700; }
.score-row .sr-val.hit  { color:var(--green); }
.score-row .sr-val.miss { color:var(--red); }
.score-total-row {
  display:flex; justify-content:space-between; align-items:center;
  border-top:1px solid var(--border); padding-top:10px;
  font-size:14px; font-weight:700; color:var(--text);
}
#score-total-pts { color:var(--accent); font-size:16px; }
.result-btns { display:flex; flex-direction:column; gap:9px; }
.btn-review { padding:13px; border-radius:9px; border:none; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; }
.btn-home2 { padding:13px; border-radius:9px; border:1.5px solid var(--border); background:transparent; color:var(--text2); font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }

/* 모바일 대응 */
@media(max-width:600px){
  :root { --sidebar:180px; }
}

/* 해설 박스 */
.explanation-box {
  margin-top:12px; padding:14px 16px;
  background:rgba(91,141,238,.08); border:1px solid rgba(91,141,238,.25);
  border-radius:10px; font-size:13px; line-height:1.65;
  color:var(--text2);
}
.explanation-box .exp-title {
  font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  color:var(--accent); margin-bottom:6px;
}

/* ── 보험종목 탭 ── */
.ins-tab-wrap { display:flex; gap:6px; margin-bottom:16px; }
.ins-tab {
  flex:1; padding:11px 4px; border-radius:8px;
  border:1.5px solid var(--border); background:transparent;
  color:var(--text2); font-family:inherit; font-size:13px; font-weight:700;
  cursor:pointer; transition:all .15s; text-align:center;
}
.ins-tab:hover { border-color:var(--accent); color:var(--accent); }
.ins-tab.active { background:linear-gradient(135deg,rgba(91,141,238,.2),rgba(139,92,246,.2)); border-color:var(--accent); color:var(--text); }
.ins-tab.life.active { background:linear-gradient(135deg,rgba(34,197,94,.15),rgba(16,185,129,.15)); border-color:var(--green); color:var(--text); }


/* ── 오답보기 토글 ── */
.review-header {
  display:flex; align-items:center;
  padding:10px 16px; background:var(--card); border-bottom:1px solid var(--border);
  position:sticky; top:49px; z-index:99;
}
/* sidebar는 exam-top + review-header 합산 높이 기준 */
#exam .sidebar {
  top: var(--top-offset, 49px);
  height: calc(100vh - var(--top-offset, 49px));
}
.review-title { font-size:13px; font-weight:700; color:var(--text2); }
.toggle-wrap { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text2); }
.toggle-switch { position:relative; width:40px; height:22px; cursor:pointer; }
.toggle-switch input { opacity:0; width:0; height:0; }
.toggle-slider {
  position:absolute; inset:0; background:var(--border); border-radius:22px;
  transition:.2s;
}
.toggle-slider:before {
  content:''; position:absolute; width:16px; height:16px; border-radius:50%;
  background:#fff; left:3px; top:3px; transition:.2s;
}
.toggle-switch input:checked + .toggle-slider { background:var(--accent); }
.toggle-switch input:checked + .toggle-slider:before { transform:translateX(18px); }

/* 오답보기 모드: 정답/오답 강조 */
.review-only-wrong { display:none; }


/* ── 유형 선택 모드 토글 ── */
.mode-toggle-wrap {
  display:flex; gap:6px; margin-bottom:4px;
}
.mode-btn {
  flex:1; padding:9px 4px; border-radius:8px;
  border:1.5px solid var(--border); background:transparent;
  color:var(--text2); font-family:inherit; font-size:12px; font-weight:700;
  cursor:pointer; transition:all .15s; text-align:center;
}
.mode-btn.active {
  background:linear-gradient(135deg,rgba(91,141,238,.2),rgba(139,92,246,.2));
  border-color:var(--accent); color:var(--text);
}

/* ── 유형 선택 화면 ── */
#form-select { }
.form-select-card {
  background:var(--card); border-radius:16px; padding:20px 16px;
  border:1px solid var(--border); max-width:420px; margin:0 auto;
  display:flex; flex-direction:column; gap:14px;
}
.form-select-title {
  font-size:15px; font-weight:800; color:var(--text); text-align:center;
}
.form-select-subtitle {
  font-size:12px; color:var(--text3); text-align:center; margin-top:-8px;
}
.form-grid {
  display:grid; grid-template-columns: repeat(4, 1fr); gap:6px;
}
.form-btn {
  padding:8px 4px; border-radius:8px;
  border:1.5px solid var(--border); background:transparent;
  color:var(--text2); font-family:inherit; font-size:12px; font-weight:600;
  cursor:pointer; transition:all .15s; text-align:center;
}
.form-btn:hover { border-color:var(--accent); color:var(--text); }
.form-btn.selected {
  background:linear-gradient(135deg,rgba(91,141,238,.25),rgba(139,92,246,.25));
  border-color:var(--accent); color:var(--text);
}
.form-select-back {
  background:transparent; border:1.5px solid var(--border);
  color:var(--text2); border-radius:9px; padding:10px;
  font-family:inherit; font-size:13px; cursor:pointer; width:100%;
  transition:all .15s;
}
.form-select-back:hover { border-color:var(--accent); color:var(--text); }


/* ── 오답 노트 버튼 (홈) ── */
.btn-wrong-note {
  width:100%; padding:11px; border-radius:9px;
  border:1.5px solid var(--border); background:transparent;
  color:var(--text2); font-family:inherit; font-size:13px; font-weight:700;
  cursor:pointer; transition:all .18s; display:flex;
  align-items:center; justify-content:center; gap:6px; margin-top:6px;
}
.btn-wrong-note:hover { border-color:var(--accent); color:var(--text); }
.wrong-note-badge {
  background:var(--accent); color:#fff; border-radius:10px;
  padding:1px 7px; font-size:11px; font-weight:800;
}

/* ── 오답 노트 화면 ── */
#wrong-note { }
.wrong-note-card {
  background:var(--card); border-radius:16px; padding:20px 16px;
  border:1px solid var(--border); max-width:480px; margin:0 auto;
  display:flex; flex-direction:column; gap:14px;
}
.wn-header {
  display:flex; align-items:center; justify-content:space-between;
}
.wn-title { font-size:15px; font-weight:800; color:var(--text); }
.wn-clear-btn {
  font-size:11px; color:var(--text3); background:transparent;
  border:1px solid var(--border); border-radius:6px;
  padding:3px 8px; cursor:pointer; font-family:inherit;
  transition:all .15s;
}
.wn-clear-btn:hover { border-color:#ef4444; color:#ef4444; }
.wn-tabs {
  display:flex; gap:6px;
}
.wn-tab {
  flex:1; padding:9px; border-radius:8px;
  border:1.5px solid var(--border); background:transparent;
  color:var(--text2); font-family:inherit; font-size:12px; font-weight:700;
  cursor:pointer; transition:all .15s; text-align:center;
}
.wn-tab.active {
  background:linear-gradient(135deg,rgba(91,141,238,.2),rgba(139,92,246,.2));
  border-color:var(--accent); color:var(--text);
}
.wn-stats {
  display:flex; gap:8px;
}
.wn-stat {
  flex:1; background:var(--bg); border-radius:10px;
  padding:10px 8px; text-align:center; border:1px solid var(--border);
}
.wn-stat-num {
  font-size:22px; font-weight:800; color:var(--accent); line-height:1;
}
.wn-stat-label {
  font-size:10px; color:var(--text3); margin-top:3px;
}
.wn-list {
  max-height:280px; overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
  display:flex; flex-direction:column; gap:6px;
}
.wn-item {
  background:var(--bg); border-radius:10px; padding:10px 12px;
  border:1px solid var(--border); font-size:12px; color:var(--text2);
  display:flex; align-items:center; justify-content:space-between; gap:8px;
}
.wn-item-info { flex:1; min-width:0; }
.wn-item-form {
  font-size:10px; color:var(--accent); font-weight:700;
  background:rgba(91,141,238,.12); border-radius:4px; padding:1px 5px;
  margin-bottom:3px; display:inline-block;
}
.wn-item-q {
  font-size:11px; color:var(--text2);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:280px;
}
.wn-item-del {
  flex-shrink:0; background:transparent; border:none;
  color:var(--text3); font-size:14px; cursor:pointer; padding:2px 4px;
  border-radius:4px; transition:color .15s;
}
.wn-item-del:hover { color:#ef4444; }
.wn-empty {
  text-align:center; padding:24px 0; color:var(--text3); font-size:13px;
}
.wn-start-btn {
  width:100%; padding:12px; border-radius:9px; border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff; font-family:inherit; font-size:13px; font-weight:700;
  cursor:pointer; transition:opacity .15s;
}
.wn-start-btn:hover { opacity:.9; }
.wn-start-btn:disabled { opacity:.4; cursor:default; }
.wn-back {
  width:100%; padding:10px; border-radius:9px;
  border:1.5px solid var(--border); background:transparent;
  color:var(--text2); font-family:inherit; font-size:13px;
  cursor:pointer; transition:all .15s;
}
.wn-back:hover { border-color:var(--accent); color:var(--text); }

/* 결과화면 오답 노트 저장 알림 */
.wn-saved-notice {
  background:rgba(91,141,238,.1); border:1px solid rgba(91,141,238,.3);
  border-radius:10px; padding:10px 14px; font-size:12px; color:var(--text2);
  text-align:center; margin-top:4px;
}


/* ── 타이머 ── */
.exam-timer {
  font-size:12px; font-weight:700; color:var(--text3);
  background:var(--bg); border:1px solid var(--border);
  border-radius:7px; padding:3px 9px; letter-spacing:.5px;
  font-variant-numeric:tabular-nums; flex-shrink:0;
}
.exam-timer.warn { color:#f59e0b; border-color:#f59e0b; }
.exam-timer.danger { color:#ef4444; border-color:#ef4444; animation:pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.result-time {
  text-align:center; font-size:13px; color:var(--text3); margin-top:-4px; margin-bottom:4px;
}
.result-time strong { color:var(--text); font-weight:700; }






/* ══════════════════════════════════════════
   모바일 전용 레이아웃 (max-width: 700px)
   구조: [상단 exam-top] [문제영역 스크롤]
         [채점하기 버튼] [문제번호 가로스크롤]
══════════════════════════════════════════ */
@media (max-width: 700px) {

  /* ── 전체 화면 구조 ── */
  #exam {
    display: flex;
    flex-direction: column;
    height: 100svh;
    height: 100vh;
    overflow: hidden;
    --top-offset: 0px !important;
  }

  /* ── 상단바 ── */
  .exam-top {
    flex-shrink: 0;
    position: relative !important;
    top: auto !important;
    padding: 8px 12px;
    gap: 6px;
    z-index: 10;
  }
  .exam-badge  { font-size: 11px; padding: 3px 8px; }
  .exam-timer  { font-size: 11px; padding: 2px 7px; }
  .btn-end     { font-size: 11px; padding: 5px 10px; }
  .prog-wrap   { display: none; }

  /* ── review-header ── */
  .review-header {
    flex-shrink: 0;
    position: relative !important;
    top: auto !important;
  }

  /* ── exam-body: 세로 flex ── */
  .exam-body {
    flex: 1;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }

  /* ── 사이드바 → 하단 영역으로 ── */
  .sidebar {
    width: 100% !important;
    min-width: 0 !important;
    height: auto !important;
    max-height: none !important;
    position: relative !important;
    top: auto !important;
    border-right: none !important;
    border-top: 1px solid var(--border);
    flex-direction: column;
    flex-shrink: 0;
    overflow: visible;
  }

  /* 사이드바 타이틀 숨김 */
  .sidebar-title { display: none; }

  /* 채점 버튼 */
  .sidebar-submit {
    padding: 8px 10px;
    border-top: none;
  }
  .btn-submit-side {
    padding: 11px;
    font-size: 13px;
  }

  /* 문제번호 목록: 가로 한 줄 스크롤 */
  .sidebar-list {
    flex: none !important;
    overflow-x: auto !important;
    overflow-y: hidden !important;
    white-space: nowrap;
    padding: 6px 8px 8px !important;
    display: flex !important;
    flex-direction: row !important;
    gap: 4px;
    min-height: 0;
    scrollbar-width: thin;
    -webkit-overflow-scrolling: touch;
  }

  /* srow: 가로 배치 */
  .srow {
    display: contents !important;
  }

  /* 번호 아이템 */
  .sitem {
    width: 36px !important;
    height: 36px !important;
    flex-shrink: 0 !important;
    padding: 2px !important;
    display: inline-flex !important;
  }
  .sitem-num { font-size: 10px !important; }
  .sitem-ox  { font-size: 9px !important; }

  /* ── 메인 문제 영역: 스크롤 ── */
  .main-area {
    flex: 1 !important;
    overflow-y: auto !important;
    min-height: 0;
    -webkit-overflow-scrolling: touch;
  }

  /* ── 문제 카드 ── */
  .q-wrap { padding: 12px 12px 8px; }

  .q-counter {
    font-size: 12px;
    margin-bottom: 8px;
  }

  .q-card {
    margin-bottom: 10px;
    border-radius: 12px;
  }

  .q-header {
    padding: 14px 14px 10px;
  }

  .q-num {
    font-size: 11px;
    margin-bottom: 6px;
  }

  /* 문제 텍스트 */
  .q-text {
    font-size: 14px !important;
    line-height: 1.7 !important;
    text-align: left !important;
  }

  /* 예시 박스 */
  .q-box {
    font-size: 12px !important;
    padding: 10px 12px !important;
    margin: 8px 0 4px !important;
  }

  /* ── 선택지 ── */
  .choices { padding: 0 0 4px; }

  .choice {
    padding: 11px 14px !important;
    font-size: 13px !important;
    line-height: 1.5 !important;
    gap: 10px !important;
  }

  .choice-num {
    width: 24px !important;
    height: 24px !important;
    font-size: 12px !important;
    flex-shrink: 0;
  }

  /* ── 피드백 ── */
  .feedback-bar {
    font-size: 12px !important;
    padding: 10px 12px !important;
    margin-bottom: 8px !important;
  }

  .explanation-box {
    font-size: 12px !important;
    padding: 10px 12px !important;
  }

  /* ── 이전/다음 버튼 ── */
  .q-nav {
    padding: 4px 0 12px;
    gap: 8px;
  }

  .btn-prev, .btn-next {
    font-size: 13px !important;
    padding: 10px 16px !important;
    flex: 1;
  }

}

</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen on">
  <div class="logo-tag">HONOR ENTERPRISE</div>
  <h1 class="home-title" id="home-title">손해보험<br><span>모의고사</span></h1>
  <div class="setup-card">
    <div class="ins-tab-wrap">
      <button class="ins-tab active" id="tab-nonlife" onclick="setIns('nonlife')">🏢 손해보험</button>
      <button class="ins-tab life" id="tab-life" onclick="setIns('life')">💚 생명보험</button>
    </div>
    <div class="field">
      <label>사원번호</label>
      <input type="text" id="in-empno" placeholder="사원번호를 입력하세요" maxlength="20" oninput="refreshWnBadgesForHome()">
    </div>
    <div class="field">
      <label>이름</label>
      <input type="text" id="in-name" placeholder="홍길동" maxlength="10">
    </div>
    <div class="exam-type-wrap">
      <div class="exam-type-label" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <span>시험 영역</span>
        <div class="mode-toggle-wrap" style="margin-bottom:0;gap:5px;">
          <button class="mode-btn active" id="mode-random" onclick="setMode('random')" title="무작위 유형으로 출제">🎲 랜덤유형</button>
          <button class="mode-btn" id="mode-select" onclick="setMode('select')" title="원하는 유형 직접 선택">📋 선택유형</button>
        </div>
      </div>
      <div class="exam-type-btns" id="type-btns-nonlife">
        <button class="type-btn active" id="type-all"   onclick="setType('all')">전체 (50문제)</button>
        <button class="type-btn"        id="type-fire"  onclick="setType('fire')">손해보험 (1~33번)</button>
        <button class="type-btn"        id="type-third" onclick="setType('third')">제3보험(손보) (18~50번)</button>
      </div>
      <div class="exam-type-btns" id="type-btns-life" style="display:none">
        <button class="type-btn active" id="type-life-all"    onclick="setType('all')">전체 (40문제)</button>
        <button class="type-btn"        id="type-life-life"   onclick="setType('lifeonly')">생명보험 (1~30번)</button>
        <button class="type-btn"        id="type-life-third"  onclick="setType('lifethird')">제3보험(생보) (1~20,31~40번)</button>
      </div>
    </div>
    <button class="btn-primary" id="btn-start" onclick="startExam()">시험 시작 →</button>
    <button class="btn-wrong-note" id="btn-wrong-note-home" onclick="openWrongNote()">
      📒 오답 노트 <span class="wrong-note-badge" id="wn-badge-home">0</span>
    </button>
  </div>
</div>

<!-- FORM SELECT -->
<div id="form-select" class="screen">
  <div class="logo-tag">HONOR ENTERPRISE</div>
  <h1 class="home-title" id="form-select-title">시험 유형 선택</h1>
  <div class="form-select-card">
    <div>
      <div class="form-select-title" id="fs-title">유형을 선택하세요</div>
      <div class="form-select-subtitle" id="fs-subtitle">응시할 시험 유형을 하나 선택해주세요</div>
    </div>
    <div class="form-grid" id="form-grid"></div>
    <button class="btn-primary" id="fs-start-btn" onclick="startExamWithForm()" disabled style="opacity:.4">시험 시작 →</button>
    <button class="form-select-back" onclick="show('home')">← 돌아가기</button>
  </div>
</div>


<!-- WRONG NOTE -->
<div id="wrong-note" class="screen">
  <div class="logo-tag">HONOR ENTERPRISE</div>
  <h1 class="home-title">오답 노트</h1>
  <div class="wrong-note-card">
    <div class="wn-header">
      <span class="wn-title">📒 누적 오답 목록</span>
      <button class="wn-clear-btn" onclick="clearWrongNote()">전체 삭제</button>
    </div>
    <div class="wn-tabs">
      <button class="wn-tab active" id="wn-tab-nonlife" onclick="setWnTab('nonlife')">🏢 손해보험</button>
      <button class="wn-tab" id="wn-tab-life" onclick="setWnTab('life')">💚 생명보험</button>
    </div>
    <div class="wn-stats">
      <div class="wn-stat">
        <div class="wn-stat-num" id="wn-total">0</div>
        <div class="wn-stat-label">누적 오답</div>
      </div>
      <div class="wn-stat">
        <div class="wn-stat-num" id="wn-forms">0</div>
        <div class="wn-stat-label">관련 유형 수</div>
      </div>
    </div>
    <div class="wn-list" id="wn-list"></div>
    <button class="wn-start-btn" id="wn-start-btn" onclick="startWrongNoteExam()">오답만 다시 풀기 →</button>
    <button class="wn-back" onclick="goBackFromWrongNote()">← 돌아가기</button>
  </div>
</div>


<!-- EXAM -->
<div id="exam" class="screen">
  <div class="exam-top">
    <div class="exam-badge" id="exam-badge">01형</div>
    <div class="exam-timer" id="exam-timer">00:00</div>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="prog-label" id="prog-label">0 / 50 답변</div>
    </div>
    <button class="btn-end" onclick="confirmEnd()">종료</button>
  </div>

  <div id="review-header" class="review-header" style="display:none">
    <div class="toggle-wrap">
      <span>오답만 보기</span>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle-wrong-only" onchange="toggleWrongOnly(this.checked)">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>
  <div class="exam-body">
    <!-- 왼쪽 사이드바: 문제 번호 목록 -->
    <div class="sidebar">
      <div class="sidebar-title">문제 목록</div>
      <div class="sidebar-list" id="sidebar-list"></div>
      <div class="sidebar-submit">
        <button class="btn-submit-side" id="btn-submit-side" onclick="submitExam()">채점하기</button>
      </div>
    </div>

    <!-- 오른쪽 메인 -->
    <div class="main-area" id="main-area">
      <div class="q-wrap">
        <div class="q-counter" id="q-counter">문제 1 / 50</div>
        <div class="q-card" id="q-card">
          <div class="q-header">
            <div class="q-num" id="q-num">Q1</div>
            <div class="q-text" id="q-text"></div>
            <div class="q-box" id="q-box" style="display:none"></div>
          </div>
          <div class="choices" id="choices"></div>
        </div>
        <div class="feedback-bar" id="feedback"></div>
        <div class="q-nav">
          <button class="btn-prev" onclick="goQ(-1)">← 이전</button>
          <button class="btn-next" id="btn-next" onclick="goQ(1)">다음 →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-card">
    <div class="result-badge" id="res-badge"></div>
    <div class="result-name" id="res-name"></div>
    <div class="donut-wrap">
      <svg class="donut-svg" width="130" height="130" viewBox="0 0 130 130">
        <circle class="donut-bg" cx="65" cy="65" r="55"/>
        <circle class="donut-fill" id="donut-fill" cx="65" cy="65" r="55" stroke="#5b8dee" stroke-dasharray="0 346" stroke-dashoffset="0"/>
      </svg>
      <div class="donut-label">
        <span class="donut-score" id="donut-score">0</span>
        <span class="donut-unit">점</span>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><span class="stat-v g" id="r-ok">0</span><span class="stat-l">정답</span></div>
      <div class="stat"><span class="stat-v r" id="r-ng">0</span><span class="stat-l">오답</span></div>
      <div class="stat"><span class="stat-v b" id="r-sc">0점</span><span class="stat-l">점수</span></div>
    </div>
    <!-- 상세 배점 내역 (영역별 시험일 때만 표시) -->
    <div class="score-detail" id="score-detail" style="display:none">
      <div class="score-detail-title" id="score-detail-title"></div>
      <div class="score-rows" id="score-rows"></div>
      <div class="score-total-row">
        <span>합계</span>
        <span id="score-total-pts">0점 / 100점</span>
      </div>
    </div>
    <div class="pass-chip" id="pass-chip"></div>
    <div class="result-time" id="result-time"></div>
    <div class="result-btns">
      <button class="btn-review" onclick="reviewWrong()">📋 오답 보기</button>
        <button class="btn-wrong-note" id="btn-wrong-note-result" onclick="openWrongNote()" style="margin-top:0">
          📒 오답 노트 <span class="wrong-note-badge" id="wn-badge-result">0</span>
        </button>
        <div class="wn-saved-notice" id="wn-saved-notice" style="display:none">
          ✅ 이번 시험 오답이 오답 노트에 저장됐습니다
        </div>
      <button class="btn-home2" onclick="goHome()">홈으로</button>
    </div>
  </div>

 계약에 따라 가입대상시설의 관리책임과 권한을 부여받은 자가 있는 경우 보험가입의무자는 관리자이다","보험가입의무자에는 소유자, 점유자, 관리자가 있다"]},{"num":4,"q":"다음 중 도난보험에서 보상하는 손해에 해당하는 것은?","box":"","c":["도난손해가 생긴 후 60일 이내에 발견하지 못한 손해","강도 또는 절도의 도난 행위로 입은 직접손해","사기 또는 횡령으로 인한 손해","보험계약자 및 피보험자의 고의 또는 중과실로 생긴 도난"]},{"num":5,"q":"컨틴전시보험의 종류에 해당하지 않는 것은?","box":"","c":["상금보험","복권보험","날씨보험","행사취소보상보험"]},{"num":6,"q":"장기손해보험의 특징으로 맞는 것은?","box":"","c":["보험계약의 부활시에는 계약체결시와 달리 보험계약자에게 고지의무가 적용되지 않는다","보험계약자가 제2회 이후의 보험료를 납입하지 않은 경우 보험회사는 30일 이상의 기간을 납입최고기간으로 정하여 연체보험료를 납입할 것을 안내해야 한다","만기환급금은 보험기간 만료시 지급하지만 만기 전 계약이 소멸되는 경우 지급하지 않는다","보험료 납입연체(미납)으로 계약이 해지된 경우 해지일로 부터 2년 이내에 부활이 가능하다"]},{"num":7,"q":"장기손해보험의 보험료 구성과 그에 대한 설명으로 틀린 것은?","box":"","c":["위험보험료는 사고발생시 보험금지급의 재원이 되는 보험료이다","부가보험료는 신계약비, 유지비, 수금비로 구성된다","유지비는 점포유지비, 내근직원 인건비, 물건비 등의 재원이 된다","장기손해보험의 순보험료는 저축보험료와 부가보험료로 구성된다"]},{"num":8,"q":"장기화재보험에서 계약 후 알릴 의무(통지의무)에 해당하지 않는 것은?","box":"","c":["보험의 목적물을 양도하는 경우","건물을 계속해서 15일 이상 수선할 때","보험기간 중 피보험자의 직업이 바뀐 경우","보험목적을 수용하는 건물을 30일 이상 비울 때"]},{"num":9,"q":"장기손해보험의 가지급보험금에 대한 설명으로 틀린 것은?","box":"","c":["상해·질병 등 신체손해보험은 일정한 조건에서 회사는 추정 보험금의 50% 상당액을 가지급보험금으로 미리 지급한다","상해·질병 등 신체손해보험에서 회사가 가지급보험금을 미리 지급하는 때는 보험금 지급을 위한 회사의 추가적인 조사 및 확인으로 인해 지급기일이 초과되는 경우, 피보험자 또는 보험수익자의 청구가 있을 때이다","배상책임 및 재산종합보험에서 일정한 조건에서 회사는 추정 보험금의 40% 상당액을 가지급보험금으로 미리 지급한다","배상책임 및 재산종합보험에서 회사가 가지급보험금을 미리 지급하는 때는 지급보험금이 결정되기 전에 피보험자의 청구가 있는 때이다"]},{"num":10,"q":"연금저축보험의 세제에 대한 설명으로 틀린 것은?","box":"","c":["특약보험료는 다른 보험의 보장성보험료와 합산하여 세액공제 받을 수 있다","연간 연금수령금액이 1,200만원을 초과하는 경우 계약자의 다른 소득과 합산하여 종합과세한다","연금수령요건을 충족하지 못하는 금액은 기타소득세 15% (지방소득세 제외)를 부과한다","소득세법에서 정하는 연금수령요건에 해당하는 금액은 이자소득세를 부과한다"]},{"num":11,"q":"연금저축보험의 세제에 관한 설명 중 맞는 것은?","box":"","c":["세제개편에 따라 2023년부터 연금저축 세액공제 납입한도 금액이 400만원에서 600만원으로 증가하였다","특약보험 보험료는 연간 300만원 한도로 세액공제된다","연금수령시 연금수령금액은 소득세 과세대상에서 제외된다","퇴직연금과 합산하여 연간 400만원까지 소득공제 된다"]},{"num":12,"q":"퇴직연금보험의 부담금납입에 대한 설명 중 맞는 것은?","box":"","c":["확정급여형은 70% 이상 사외적립","확정기여형은 50% 이상 사외적립","확정기여형은 100% 사외적립","확정급여형은 60% 이상 사외적립"]},{"num":13,"q":"자동차사고에 따른 권리와 의무에 대하여 바르게 설명한 것은?","box":"","c":["교통사고처리특례법은 교통사고 발생시 가해자와 피해자간 합의만 있으면 형사처벌을 면제하도록 규정하고 있다","민법 제756조에 따른 배상책임을 진 사용자는 피용자에 대하여 구상권을 행사할 수 없다","자동차 소유자는 직접 운전을 하지 않은 경우에도 본인 소유의 자동차사고에 대해 자동차손해배상보장법상의 손해배상책임을 질 수 있다","고의와 달리 경과실에 따른 위법행위로 타인에게 손해를 가한 자는 그 손해를 배상할 책임이 없다"]},{"num":14,"q":"다음은 자동차보험의 어떤 담보종목에 대한 설명인가?","box":"피보험자가 무보험자동차에 의하여 생긴 사고로 사망하거나 다쳤을 때 그 손해에 대하여 배상의무자가 있는 경우에 보상","c":["대인배상","자기신체사고","자기차량손해","무보험차상해"]},{"num":15,"q":"자동차보험 의무보험 가입의무에 관한 설명 중 틀린 것은?","box":"","c":["본인이 면허정지된 시점 이후부터의 기간에 대해서도 의무보험 가입의무가 있다","본인이 외국에 장기간 체류 중인 경우에는 출입국 기록만 제출하면 의무보험 가입의무가 면제된다","공휴일 기간 중 만료된 계약이라 할지라도 미가입에 따른 과태료 부과대상이 되므로 공휴일 이전에 보험을 갱신하여야 한다","법원의 상속포기 판결을 받은 가족은 피상속인의 자동차에 대하여 의무보험 가입의무가 없다"]},{"num":16,"q":"자동차보험 우량할인 및 불량할증에 관한 설명으로 맞는 것은?","box":"","c":["단체할인 및 할증 적용대상의 보험료는 평가대상기간 말일의 익년 4월 1일부터 익익년 3월 31일 사이에 적용되는 계약에 적용한다","단체할인 및 할증의 평가대상기간은 전전계약 만료일 3개월 전부터 전계약 만료일 3개월 전까지이다","개별할인 및 할증은 사고점수와 관계없이 최근 3년간 실적 손해율을 기준으로 차등 적용한다","개별할인 및 할증은 담보종목별로 구분하여 피보험자 단위로 사고실적을 평가하여 적용한다"]},{"num":17,"q":"자동차손해배상보장사업에 대한 설명 중 틀린 것은?","box":"","c":["자동차손해배상보장사업의 보상금액은 대인배상Ⅰ 약관지급기준이 적용된다","차량이 파손된 경우에도 보장사업 청구가 가능하다","자동차사고 피해가족에 대한 지원금제도가 있다","보장사업을 청구할 수 있는 기간은 통상 사고일로부터 3년이다"]},{"num":18,"q":"모집자실명제 및 상품설명제에 대한 설명으로 틀린 것은? [ 4점 ]","box":"","c":["금융상품판매업자 등은 전문보험계약자에게 보험계약체결을 권유하는 경우 설명해야 한다","모집종사자는 보험계약자에게 제공하는 설명서에 소속, 성명 등을 기재하여야 한다","모집자실명제를 위반하면 1천만원 이하의 과태료를 부과받을 수 있다","최초 계약시 설명의무를 이행한 갱신계약(기존 보험계약과 동일조건)은 설명의무를 이행한 것으로 본다"]},{"num":19,"q":"보험계약 체결시 각 단계별로 제공하여야 하는 보험안내 자료에 대한 내용이 틀린 것은?","box":"","c":["보험계약 체결 단계 - 보험증권","보험계약 체결 권유 단계 - 상품설명서","보험계약 체결 단계 - 계약자 보관용 청약서","보험계약 체결 권유 단계 - 보험약관"]},{"num":20,"q":"대리점이 보험설계사 위촉시 위탁계약서를 작성하지 않았을 경우 처벌은?","box":"","c":["100만원 이하 과태료","500만원 이하 과태료","1천만원 이하 과태료","3천만원 이하 과태료"]},{"num":21,"q":"장애인 차별행위로 인한 시정권고 불이행시 시정명령을 하는 사람은?","box":"","c":["법무부장관","국가인권위원회 위원장","금융감독원 원장","금융위원회 위원장"]},{"num":22,"q":"( ) 안에 들어갈 용어로 알맞은 것은?","box":"( )은/는 타인이 본인의 이름으로 법률행위의 의사 표시를 하거나 의사표시를 받음으로써 그 법률효과가 곧바로 본인에게 발생한다","c":["중개","약정","소개","대리"]},{"num":23,"q":"손해보험설계사 시험을 응시하지 않고 교육을 이수한 것만으로 손해보험설계사로 등록할 수 있는 사람은?","box":"","c":["A는 3년 전 1년 이상 법인보험대리점의 대표로 근무한 적이 있다","B는 2년 전에 손해보험중개사로 1년 이상 영업한 적이 있다","C는 최근 2년 동안 생명보험회사의 직원으로 근무하였다","D는 1년 전에 제3보험설계사 시험에 합격하였다"]},{"num":24,"q":"장기손해보험의 환급금지급에 대한 설명으로 맞는 것은?","box":"","c":["계약자 등의 청구시 청구일로부터 10영업일 이내에 지급한다","해약환급금 지급사유 발생일 다음날부터 지급청구일까지의 기간이 1년 이내인 경우에는 평균공시이율의 50%로 계산한 이자를 더하여 지급한다","만기환급금 지급사유 발생일 다음날부터 지급청구일까지의 기간이 1년을 초과할 경우에는 2%로 계산한 이자를 더하여 지급한다","회사는 환급금 지급시기 3일 전에 사유와 지급 금액을 계약자에게 알려야 한다"]},{"num":25,"q":"효과적인 보험판매를 위한 프로세스에 관한 설명으로 가장 올바른 것은?","box":"","c":["고객과의 첫 만남을 위해 먼저 잠재 고객에 대한 정보수집에 힘쓴다","계약체결은 보험판매의 최종단계로 영업활동의 원동력이 된다","소개확보는 증권전달이 포함되며 새로운 가망고객의 확보단계이다","고객의 재무정보에 관계없이 고객의 니즈에 맞추어 위험보장을 설계하여야 한다"]},{"num":26,"q":"위험을 순수위험과 투기위험으로 구분할 때 차이점을 잘못 설명한 것은?","box":"","c":["순수위험은 위험이 현실화되면 언제나 손해이지만 투기위험은 경우에 따라 이익이 될 수도 있다","순수위험은 일반적으로 대수의 법칙이 적용되는데 투기위험은 대수의 법칙이 적용되는 경우가 드물다","순수위험은 손해액을 원칙적으로 예측할 수 있는데 비해 투기위험은 일정 금액으로 제한할 수 있다","순수위험은 우발적이기 때문에 통제하기 어려우나 투기위험은 위험부담 주체의 주관적 의사에 의하여 결정된다"]},{"num":27,"q":"화재보험을 1억원 보상한도로 가입한 경우 5천만원의 화재 손해시 보상받는 원칙과 관련이 깊은 것으로 짝지어진 것은?","box":"a. 위험의 분담원칙 b. 수지상등의 원칙 c. 실손보상의 원칙 d. 적합성의 원칙 e. 이득금지의 원칙 f. 비례보상의 원칙","c":["a, c, e","c, e, f","c, d, f","b, c, e"]},{"num":28,"q":"나이롱환자 근절을 위한 자동차손해배상 보장법의 내용 중 틀린 것은?","box":"","c":["외출·외박시 교통사고로 입원한 환자는 의료기관의 허락을 받아야 한다","의료기관은 교통사고 입원환자의 외출·외박 관련사항을 기록·관리하여야 한다","의료기관이 외출·외박 기록의무를 위반한 경우 300만원 이하의 과태료가 부과된다","외출 또는 외박에 관한 기록은 1년간 원본대로 수록, 보존해야 한다"]},{"num":29,"q":"교통사고 특정범죄가중처벌법에 대한 설명으로 틀린 것은?","box":"","c":["종합보험에 가입되어 있더라도 중상해 사고 발생시에는 형사처벌의 대상이 된다","음주운전으로 타인에게 상해를 입힌 경우 1년 이상 15년 이하의 징역 또는 1천만원 이하의 벌금에 처해진다","음주 교통사고의 감소를 위하여 음주운전을 위험운전치사상죄로 규정하고 있다","음주운전으로 사망사고 발생시 무기 또는 3년 이상의 징역에 처해진다"]},{"num":30,"q":"보험약관의 교부 및 설명의무에 관한 설명으로 옳은 것은?","box":"","c":["보험회사는 보험계약 체결시에 피보험자에게 보험약관을 교부하고, 그 중요한 내용을 알려주어야 한다","중요한 내용은 일반적으로 보장개시일, 보험금 지급사유, 해지사유, 면책사유 등이다","약관교부 및 설명의무를 위반한 경우 보험계약자는 계약성립일로부터 6개월 내에 계약을 취소할 수 있  설명으로 옳은 것은?","box":"","c":["보험가입금액이 보험가액보다 많은 경우에는 보험가입금액을 한도로 보상한다","도난손해는 도난사실을 경찰서에 신고하면 그 즉시 보험금 청구가 가능하다","도난으로 인해 보험금을 지급한 후 그 자동차를 찾은 경우 피보험자동차에 대한 권리는 피보험자에게 자동으로 귀속된다","전손사고 또는 보험회사가 보상하여야 할 금액이 보험가입 금액 전액일 경우 보험계약은 사고발생시점에서 종료된다"]},{"num":18,"q":"청약 후 약관 및 계약자 보관용 청약서를 서면, 우편 또는 전자우편 등으로 교부하는 경우 준수사항으로 틀린 것은?","box":"","c":["보험계약자가 전자적 방법에 의한 보험계약 자료의 교부에 동의하여야 한다","전자적 방법에 의해 교부되는 보험계약 자료는 위조 및 변조가 불가능하도록 보안시스템을 갖추어야 한다","보험계약 자료를 전자적으로 재생하는 방법, 청약철회 및 계약취소의 방법에 대하여 안내서면으로 교부하여야 한다","전자우편 등 전자적 방법으로 교부하는 경우에 한해 보험계약자의 자필서명이 필요한 경우 자필서명을 생략할 수 있다"]},{"num":19,"q":"실손의료보험에 관한 설명으로 틀린 것은?","box":"","c":["상품판매 단계에서 중복가입시 보험금 비례보상 등 보장방법에 관한 세부사항을 보험계약자에게 충분히 설명해야 함","보험계약자 또는 피보험자의 동의를 거쳐 중복보험 가입여부를 확인해야 함","질병이나 상해로 치료시 국민건강보험 급여항목 중 본인부담액을 보상받는 것을 충분히 설명해야 함","비례보상에 관한 설명을 보험계약자에게 설명하고 서명, 기명날인 등의 방법으로 확인받아야 함"]},{"num":20,"q":"보험업법 제97조에서 규정하고 있는 보험계약자의 체결 또는 모집에 관한 금지행위에 해당하지 않는 것은?","box":"","c":["보험계약자에게 보험상품의 내용을 사실과 다르게 알린 경우","보험계약자에게 보험상품의 중요한 사실을 알리는 것을 방해하거나 알리지 아니하는 경우","보험계약자와 금전대차의 관계를 이용하여 보험계약을 청약하는 행위","보험계약자의 자필서명을 권고하는 행위"]},{"num":21,"q":"손해보험 공정경쟁질서유지에 관한 상호협정에서 무자격 모집행위를 한 경우 부과되는 제재금 최고 한도액은?","box":"","c":["3천만원","1천만원","2천만원","5천만원"]},{"num":22,"q":"( ) 안에 들어갈 용어로 알맞은 것은?","box":"( )는 타인이 본인의 이름으로 법률행위의 의사 표시를 하거나 의사표시를 받음으로써 그 법률효과가 곧바로 본인에게 발생한다","c":["중개","약정","소개","대리"]},{"num":23,"q":"손해보험대리점 등록제한 사유에 해당하는 자는?","box":"","c":["화물자동차운송사업자","수입차 판매업자","중고차 판매업자","업무정지 처분을 받은 보험대리점 소속 임직원이였던 자로서 업무정지 처분이 있었던 날로부터 2년이 경과한 자"]},{"num":24,"q":"보험모집 프로세스에 관한 설명으로 틀린 것은?","box":"","c":["보험모집 프로세스는 ＜가망고객 발굴 → 접근 → 정보수집 → 가입권유 → 계약체결 → 소개확보＞의 순서로 진행된다","접근 단계는 고객에 대한 상세하고 체계적인 정보를 수집하는 단계이다","가입권유 단계에서는 고객의 니즈와 재무정보를 토대로 최적의 위험보장 설계를 제시한다","증권전달 및 사후관리 등을 통한 소개확보는 새로운 영업활동의 원동력이 된다"]},{"num":25,"q":"손해보험 우수인증설계사 및 대리점제도의 인센티브가 아닌 것은?","box":"","c":["인증자에 대해서는 우수인증 로고에 대한 사용권한이 부여된다","보험설계사는 보수교육 등 일부 법정의무가 면제된다","계약실적 및 소득수준이 협회에서 정한 요건을 충족해야 한다","소속 보험회사에서 이직하는 경우 기존 우수인증설계사 자격은 효력이 상실된다"]},{"num":26,"q":"보험의 성립요건에 관한 설명 중 잘못된 것은?","box":"","c":["보험사고는 우연적이고 불확실한 것이어야 한다","보험은 다수의 다양한 위험의 결합을 필요로 한다","위험발생을 대수의 법칙에 의해 예측하고 산정한다","손해보험은 특정한 우연적 사고에 대한 불안정을 제거, 경감하기 위한 경제적 제도이다"]},{"num":27,"q":"다음 ( ) 안에 들어갈 용어로 올바른 것은?","box":"자동차보험과 같이 보험기간이 통상 1년인 보험은 ( )라 하며, 연금보험처럼 오랜 기간에 걸쳐 보험료를 납입하는 형태의 보험은 ( )이라 한다","c":["단기보험, 장기보험","단기보험, 혼합보험","구간보험, 장기보험","혼합보험, 장기보험"]},{"num":28,"q":"나이롱환자 근절을 위한 자동차손해배상 보장법의 내용 중 틀린 것은?","box":"","c":["교통사고로 입원한 환자는 외출․외박시 의료기관의 허락을 받아야 한다","의료기관은 교통사고 입원환자의 외출․외박 관련사항을 기록․관리하여야 한다","외출․외박 기록에는 환자의 서명․날인은 필요하지만, 의료인의 서명․날인은 불필요하다","의료기관이 외출․외박 기록의무를 위반한 경우 300만원 이하의 과태료를 부과한다"]},{"num":29,"q":"다음 특정범죄가중법 설명 중 틀린 것은?","box":"","c":["종합보험에 가입해 있으면 교통사고 발생시 형사처벌이 무조건 면제된다","음주운전으로 타인을 사상케 한 경우 위험운전치사상죄가 적용된다","음주 또는 약물운전은 위법 사항이다","난폭운전시 처벌 받을 수 있다"]},{"num":30,"q":"보험계약 관계자에 대한 설명 중 틀린 것은?","box":"","c":["보험계약을 체결하는 당사자는 보험회사와 보험계약자이다","보험계약자는 보험료 납입의무를, 보험회사는 보험금 지급의무를 진다","손해보험에서는 보험금 청구권을 피보험자가 가지지만, 인보험에서는 보험수익자가 가진다","보험계약자는 고지의무가 있으나, 피보험자와 보험수익자는 고지의무가 없다"]},{"num":31,"q":"보험계약의 무효 사유로 맞는 것은?","box":"","c":["보험계약자의 사기로 인한 초과보험, 중복보험","보험계약자의 고지의무 위반","보험회사의 파산","보험계약자의 위험 변경, 증가 사실에 대한 통지의무 위반"]},{"num":32,"q":"보험자 대위에 대한 설명으로 맞는 것은?","box":"","c":["제3자에 의한 손해발생시 보험자 대위는 손해액 한도 내에서 이루어진다","인보험에서는 원칙적으로 보험자 대위가 인정되지 않는다","보험자 대위로 인한 목적물의 권리이전 시기는 보험사고 발생시이다","제3자의 불법행위로 인한 손해배상의무를 부담하는 경우는 해당하지 않는다"]},{"num":33,"q":"보험관련 기관에 대한 설명 중 틀린 것은?","box":"","c":["순보험요율의 산출·검증 및 제공은 보험연수원의 주요 업무 중 하나이다","금융위원회의 지도 및 감독을 받아 금융감독원은 금융기관에 대한 검사, 감독 업무를 수행한다","손해보험협회는 손해보험에 관한 제도개선과 보험범죄방지 대책 추진업무를 담당하고 있다","금융분쟁조정위원회는 금융감독원에 설치되어 있다"]},{"num":34,"q":"제3보험에 해당하지 않는 것은?","box":"","c":["질병보험","상해보험","배상책임보험","간병보험"]},{"num":35,"q":"제3보험에 대한 설명으로 바르지 않은 것은?","box":"","c":["보험업을 겸영하기 위해서는 금융위원회의 허가를 받아야 한다","생명보험의 재보험은 겸영이 가능하다","상해 및 질병으로 인한 신체손해를 보상하는 보험이다","제3보험의 재보험은 겸영이 불가능하다"]},{"num":36,"q":"손해보험회사에서 저축성보험으로 개발이 가능한 보험종목에 해당하는 것은?","box":"","c":["보험기간 20년 이하의 상해보험","보험기간 20년 이하의 질병보험","보험기간 15년 이하의 질병보험","보험기간 15년 이하의 상해보험"]},{"num":37,"q":"제3보험 중 상해보험에 가입하여 약관에서 보장하지 않는 원인으로 사망할 경우 지급되는 금액은?","box":"","c":["기납입보험료 전액","해지환급금","보험가입금액의 50%","책임준비금"]},{"num":38,"q":"손해보험회사에서 영위하는 질병사망특약 보험금액의 한도로 올바른 것은?","box":"","c":["개인당 4억원 이내","개인당 3억원 이내","개인당 2억원 이내","개인당 1억원 이내"]},{"num":39,"q":"상해보험에서 보험사고의 구성요건에 해당하는 것은?","box":"","c":["급격, 질병, 결과","우연, 인과, 신체","우연, 급격, 외래","급격, 우연, 질병"]},{"num":40,"q":"상해보험에 대한 설명으로 올바른 것은?","box":"","c":["사망보험금은 피보험자의 실제 소득을 감안하여 보험금을 지급한다","후유장해보험금은 장래소득 상실분을 감안하여 지급한다","보험가입금액은 있으나, 보험가액은 존재하지 않는다","단체상해보험에서 타인의 사망보험계약은 반드시 그 타인의 동의를 받아야 한다"]},{"num":41,"q":"상해보험에서 피보험자의 직업, 직무 또는 동호회 활동 목적으로 생긴 손해는 보험사에서 면책하나, 예외적으로 보상하는 손해에 해당되는 경우는?","box":"","c":["글라이더 조종, 스쿠버다이빙을 하는 동안 발생한 상해","자동차 또는 오토바이 경기 중 발생한 상해","공용도로상에서 자동차 시운전을 하는 동안 발생한 손해","선박승무원의 직무상 선박에 탑승 중 발생한 상해"]},{"num":42,"q":"상해보험의 후유장해보험금 지급에 대한 설명으로 올바른 것은?","box":"","c":["같은 사고로 두가지 이상의 후유장해 발생시 각각의 지급률을 합산하지 않는다","한시적인 후유장해보험금은 영구 후유장해보험금 지급률의 30%를 보험가입금액에 곱하여 산출한 금액을 지급한다","후유장해보험금은 피보험자의 직업, 소득을 고려하여 초과이득이 발생하지 않도록 결정한다","동일 신체부위에 2가지 이상의 장해가 발생한 경우 그 중 높은 지급률을 적용 한다"]},{"num":43,"q":"2021년 7월 출시한 개인 실손의료보험(4세대)의 재가입주기에 해당하는 것은?","box":"","c":["3년","5년","10년","15년"]},{"num":44,"q":"상해보험의 보험금 지급에 대한 설명으로 틀린 것은?","box":"","c":["보험금 청구서류를 접수한 때에는 접수증을 교부하고, 접수한 날로부터 보험금은 5영업일 이내에 지급","보험금 지급기일 초과가 명백히 예상되는 경우 구체적 사유 및 보험금 지급예정일을 피보험자 또는 수익자에게 즉시 통지","보험금 지급을 위한 조사가 필요한 경우 피보험자 또는 보험수익자의 청구에 따라 추정보험금의 50% 상당액을 가지급보험금으로 지급","보험금 지급기일 내에 보험금을 지급하지 않은 경우에는 소정의 이자를 보험금에 더하여 지급"]},{"num":45,"q":"대중교통 이용 중 상해보험에서 대중교통수단에 포함되지 않는 것은?","box":"","c":["항공기","개인택시","전세버스","농어촌버스"]},{"num":46,"q":"단체상해보험에 대한 설명으로 틀린 것은?","box":"","c":["단체의 구성원이 명확하여 계약의 일괄적인 관리가 가능한 단체로서 5인 이상의 단체를 규약단체라고 한다","단체계약 체결 후 피보험자를 증가, 감소, 교체할 때에는 보험회사의 승인을 받아야 한다","비영리법인단체, 동업자단체는 3종 단체에 해당한다","급여관계단체는 1종 단체로서 관공서, 기업체 등이 해당된다"]},{"num":47,"q":"암보험에 대한 설명으로 틀린 것은?","box":"","c":["15세 미만자에 대해서는 대기기간을 설정하지 않는다","기타피부암은 대기기간없이 보험기간 시작일부터 보상한다","대기기간 중 암진단 확정시에는 보험계약은 무효이며, 계약 무효시에는 이미 납입한 보험료를 환급한다","진단계약은 보험계약자가 보험계약의 철회를 요청할 수 있다"]},{"num":48,"q":"2021년 7월 출시한 개인 실손의료보험(4세대)의 의료기관별 공제금액(급여의료비 기준)으로 맞는 것은?","box":"","c":["의원 : 1만원과 보장대상의료비의 20% 중 큰 금액","보건소 : 2만원과 보장대상의료비의 20% 중 큰 금액","종합병원 : 2만원과 보장대상의료비의 30% 중 큰 금액","상급종합병원 : 3만원과 보장대상의료비의 30% 중 큰 금액"]},{"num":49,"q":"다음 중 어린이보험의 태아 가입 특약에 대한 설명으로 틀린 것은?","box":"","c":["출생 전 태아는 법인격이 없으므로 피보험자가 불가능하나 태아의 출생을 조건으로 태아시기에 보험계약 체결이 가능하다","고령의 임산부 증가를 고려하여 장애, 기형 등 선천질환을 가진 신생아가 보험혜택을 받을 수 있도록 임신 사실을 알기 전에 보험에 가입할 수 있다","태아가입 특별약관 중 선천성 질환 수술 특약은 선천성 기형, 변형 및 염색체 이상(선천 이상)으로 수술시 수술비를 보장한다","태아가입 특별약관 중 출생 전 질환특약은 출생 전 질병으로 입원한 경우도 보장한다"]},{"num":50,"q":"다음 중 노인장기요양보험 수급대상의 등급을 판정하는 기관은?","box":"","c":["국민건강보험공단","손해보험협회","금융감독원","보험개발원"]}],"22":[{"num":1,"q":"화재보험 계속계약에 대한 설명 중 옳지 않은 것은?","box":"","c":["계속하여 보험계약을 갱신하는 경우 해당계약 보험료의 95% 적용","동일 보험회사, 동일 구내의 위험에 적용","보험기간이 2년인 보험계약에 한하여 적용","동일 보험목적에 대해 기존계약을 중도해지 후 체결한 새로운 계약에는 적용하지 않음"]},{"num":2,"q":"주택화재보험을 예시와 같이 가입한 후 화재가 발생한 경우 지급보험금의 합계액은?","box":"[예시] 보험가입금액 1억원(전부보험), 재산손해액 8,000만원, 잔존물 제거비용 2,000만원, 잔존물 보전비용 500만원","c":["9,300만원","9,500만원","1억원","1억 500만원"]},{"num":3,"q":"화재보험에 관한 설명 중 틀린 것은?","box":"","c":["보험기간이 시작된 후라도 보험료를 받기 전에 생긴 손해는 보상하지 않는다","보험계약자가 고의로 손해방지의무를 게을리한 때에는 보험금 청구권을 상실한다","화재손해가 생긴 경우 보험계약자는 보험회사에 지체없이 통지해야 한다","화재손해가 생긴 경우 보험계약자는 보험회사가 손해조사를 위해 요구하는 서류를 제출해야 한다"]},{"num":4,"q":"다음 재난배상책임보험에 관한 설명 중 틀린 것은?","box":"","c":["재난배상책임보험은 화재, 폭발, 붕괴로 인한 타인의 신체 또는 재산피해를 보상한다","재난배상책임보험 가입대상은 주택법령에 따른 15층 이하 임대아파트, 도서관, 주유소 등 19종 시설이다","소유자·점유자가 보험가입 대상시설의 동일한 경우 보험가입 의무자는 소유자이며, 다른 경우에는 점유자가 보험가입의무자이다","인명피해 발생시 사망 1인당 1억원 한도, 재산피해 발생시 1사고당 10억원 한도 내에서 보상한다"]},{"num":5,"q":"동산종합보험의 가입대상에 포함되는 것은?","box":"","c":["특정 장소에 있어서의 가재 포괄계약","자동차, 선박 및 항공기","공장 내에 장치된 리스업자의 리스시설","특정구간 수송 중의 위험만을 대상으로 하는 동산"]},{"num":6,"q":"장기손해보험에 대한 설명 중 틀린 것은?","box":"","c":["금리연동형의 경우 만기환급금은 계약시 예상금액보다 많거나 적어질 수 있다","장기손해보험의 부가보험료는 특별계정에 의해 운용된다","일반보험과는 달리 자동복원 및 보험계약대출제도가 있다","보험료 납입방법 및 납입주기가 다양하다"]},{"num":7,"q":"장기손해보험의 해지환급금에 대한 설명으로 틀린 것은?","box":"","c":["보험계약자가 보험계약의 해지 의사표시를 한 경우 보험회사는 해지시까지 적립한 해지환급금을 지급한다","보험계약자가 보험료 미납으로 해지시 보험회사는 해지시까지 적립한 해지환급금을 지급한다","보험계약자의 고지의무/통지의무 위반 등으로 계약이 해지된 경우 보험회사는 해지시까지 적립한 해지환급금을 지급한다","보험회사는 보험계약자가 고의 또는 중대한 과실로 중요한 내용을 보험회사에 알릴의무를 위반한 경우 보험회사는 그 사실을 안 날부터 2개월이 경과하기 전에 해지환급금을 지급하고 계약을 해지할 수 있다"]},{"num":8,"q":"장기손해보험의 부가보험료에 해당하지 않는 것은?","box":"","c":["신계약비","유지비","수금비","책임준비금"]},{"num":9,"q":"장기화재보험의 인수제한 물건에 해당하는 것은?","box":"","c":["법률에서 정한 특수건물","주택의 가재수용용 부속건물","실외에 쌓아둔 동산","공장 구내의 기숙사"]},{"num":10,"q":"연금저축보험의 세제적격 요건에 해당하는 가입대상으로 올바른 것은?","box":"","c":["만 25세 이상 국내거주자","만 20세 이상 국내거주자","가입대상 제한 없음","만 15세 이상 국내거주자"]},{"num":11,"q":"연간 연금수령한도 금액 산출식으로 올바른 것은?","box":"","c":["(연금계좌 평가액) ÷ (11 - 연금수령연차) × (90 ÷ 100)","(연금계좌 평가액) ÷ (11 - 연금수령연차)","(연금계좌 평가액) ÷ (11 - 연금수령연차) × (110 ÷ 100)","(연금계좌 평가액) ÷ (11 - 연금수령연차) × (120 ÷ 100)"]},{"num":12,"q":"다음 중 퇴직연금사업자로 등록할 수 없는 곳은?","box":"","c":["신용협동조합중앙회","저축은행","보험회사","새마을금고연합회"]},{"num":13,"q":"민법과 자동차손해배상보장법과의 관계에 대한 설명 중 맞는 것은?","box":"","c":["자동차손해배상보장법은 형법의 특별법으로 형법보다 우선하여 적용된다","자동차손해배장보장법에서 법률상 책임관계의 입증책임은 피해자가 부담한다","민법과 자동차손해배상보장법은 대인사고에만 적용된다","자동차손해배상보장법은 조건부 무과실책임주의가 적용된다"]},{"num":14,"q":"무보험자동차에 의한 상해를 입었을 경우, 보상받을 수 있는 보험금액 한도로 맞는 것은?","box":"","c":["무한 보상","2억원","개별 보험회사의 약관에 따라 다름","1억원"]},{"num":15,"q":"자동차보험 보험요율과 관련하여 틀린 것은?","box":"","c":["군대에서 운전병으로 근무한 경력은 보험가입 경력으로 인정되지만 외국에서의 보험가입경력은 인정되지 않는다","가입자특성요율은 보험가입 기간이나 법규위반경력에 따라 적용되는 요율이다","특약요율은 운전자의 제한범위를 제한하는 특약, 가족을 운전자로 한정하는 특약 등 가입시에 적용하는 요율이다","우량할인·불량할증요율은 사고발생 실적에 따라 적용하는 요율이다"]},{"num":16,"q":"자동차보험 대물배상 보험금 지급기준에서 대차료에 대한 설명 중 옳은 것은?","box":"","c":["지급대상은 사업용자동차이다","대차하지 아니하는 경우에는 보험금이 지급되지 아니한다","수리가 가능한 경우 대차료 인정기간은 30일 한도로 한다","수리가 불가능한 경우 대차료 인정기간은 10일을 한도로 한다"]},{"num":17,"q":"자동차손해배상보장사업에 대한 설명으로 틀린 것은?","box":"","c":["뺑소니차 또는 무보험차에 의한 사고로 사망하거나 부상당한 피해자를 보상대상으로 하여, 22년 1월 28일부터는 차량 낙하물 사고 피해자도 보상된다","가해자가 가입한 자동차보험에서 보상받을 수 있는 경우에는 보상받을 수 없다","관련 주무 정부부처는 금융위원회이다","자동차사고 피해가족에 대한 지원금 제도가 있다"]},{"num":18,"q":"다음 중 보험의 모집과 관련된 설명 중 틀린 것은?","box":"","c":["보험업법에서는 보험회사가 아닌 자와의 보험계약 체결을 제한하고 있다","보험계약의 체결을 중개 또는 대리하는 것을 모집이라고 한다", ","해지환급금의 범위 내에서 보험계약대출이 가능하다"]},{"num":7,"q":"장기손해보험의 해지환급금에 대한 설명으로 틀린 것은?","box":"","c":["보험계약자가 보험계약의 해지 의사표시를 한 경우 보험회사는 해지시까지 적립한 해지환급금을 지급한다","보험계약자가 보험료 미납으로 해지시 보험회사는 해지시까지 적립한 해지환급금을 지급한다","보험계약자의 고지의무/통지의무 위반 등으로 계약이 해지된 경우 보험회사는 해지시까지 적립한 해지환급금을 지급한다","보험회사는 보험계약자가 고의 또는 중대한 과실로 중요한 내용을 보험회사에 알릴의무를 위반한 경우 보험회사는 그 사실을 안 날부터 2개월이 경과하기 전에 해지환급금을 지급하고 계약을 해지할 수 있다"]},{"num":8,"q":"장기손해보험의 보험료 구성과 그에 대한 설명으로 틀린 것은?","box":"","c":["장기손해보험의 부가보험료는 신계약비, 유지비, 수금비로 구성된다","예정사업비율은 과거 사고통계를 기초로 장래 사고율을 예측한 위험률을 말한다","장기손해보험의 보험료는 순보험료와 부가보험료로 구성된다","장기손해보험의 순보험료는 위험보험료와 저축보험료로 구성된다"]},{"num":9,"q":"장기화재보험에서 인수대상 물건에 대한 설명에 대해 틀린 것은?","box":"","c":["주택물건 중 연립(다세대)주택,아파트로써 각 호(실)가 모두 주택으로 쓰이는 것은 인수대상 물건이다","주택물건 중 투잭의 부속건물로써 가재만을 수용하는데 쓰이는 것은 인수대상 물건이다","무게나 부피가 휴대할 수 있으며 점당 300만원 이상인 귀중품은 보험증권에 기재하지 않아도 인수대상 물건이 된다","작업장(광업소, 발전소, 변전소, 개폐소 포함)의 구내에 있는 건물에 수용된 동산도 인수대상 물건이다"]},{"num":10,"q":"연금저축보험의 세제적격 요건 중 맞는 것은?","box":"","c":["가입대상은 만 18세 이상 국내거주자","연금수령기간은 15년 이상","불입한도는 매월 300만원 이내","보험료불입기간은 5년 이상"]},{"num":11,"q":"연금저축 가입 후 연금수령시 연금소득세율 중 올바른 것은?","box":"","c":["70세 이전 수령 11%(지방소득세 제외)","70세 이전 수령 5.0%(지방소득세 제외)","70세 이전 수령 2.0%(지방소득세 제외)","80세 이후 비과세"]},{"num":12,"q":"DC형(확정기여형) 퇴직연금에서 중도인출이 가능한 경우가 아닌 것은?","box":"","c":["무주택자인 가입자가 본인 명의로 주택을 구입하는 경우","담보를 제공하는 날부터 역산하여 5년 이내에 가입자가 파산선고를 받은 경우","담보를 제공하는 날부터 역산하여 3년 이내에 가입자가 개인회생절차 개시 결정을 받은 경우","가입자 또는 가입자의 배우자와 생계를 같이하는 부양가족이 질병 또는 부상으로 6개월 이상 요양을 하는 경우"]},{"num":13,"q":"자동차보험에서 일반적으로 적용되는 보험기간은?","box":"","c":["보험기간 첫날 오후 4시부터 마지막날 오후 4시","보험기간 첫날 0시부터 마지막날 0시","보험기간 첫날 24시부터 마지막날 24시","보험료를 받은 시점부터 보험기간 마지막날 오후 4시"]},{"num":14,"q":"자동차보험료 산정요소에 대한 설명으로 틀린 것은?","box":"","c":["사고건수별 특별요율은 직전 3년간 사고유무 및 사고건수에 따라 적용하는 요율이다","특약요율은 운전자의 연령범위와 가족으로 운전자를 한정하는 특약 등 가입시에 적용하는 요율이다","기본보험료는 차량의 종류 및 배기량, 용도만을 고려하여 미리 정해 놓은 기본적인 보험료이다","가입자특성요율은 보험가입기간이나 법규위반경력에 따라 적용되는 요율이다"]},{"num":15,"q":"자동차의 종류상 다음 보기와 관련이 있는 것은?","box":"콘크리트믹서트럭, 타이어식굴삭기, 타이어식기중기","c":["의무가입 건설기계","일반건설기계","특정용도 자동차","특수작업용 자동차"]},{"num":16,"q":"자동차보험에 대한 설명으로 틀린 것은?","box":"","c":["자기신체사고 발생시 단독사고(또는 일방과실사고)와 쌍방과실사고의 지급보험금 계산방법에는 차이가 없다","자기차량손해 발생시 전손사고 또는 보험회사가 보상하여할 금액이 보험가입금액 전액일 경우 보험계약은 사고발생시점에서 종료된다","대인배상Ⅰ 사망보험금의 경우 과실상계 후 금액이 2천만원에 미달하면 2천만원을 보상한다","대물배상 보험금 지급시 대차료는 동급의 대여자동차 중 최저 대여자동차를 빌리는데 소요되는 통상의 요금을 지급한다"]},{"num":17,"q":"자동차손해배상보장사업에 대한 설명으로 틀린 것은?","box":"","c":["뺑소니사고 피해자는 10개 손해보험회사에 피해보상을 청구할 수 있다","가해자가 가입한 자동차보험에서 보상받을 수 있는 경우에는 보상받을 수 없다","관련 주무 정부부처는 금융위원회이다","자동차사고 피해가족에 대한 지원금 제도가 있다"]},{"num":18,"q":"보험계약 단계별 설명의무에 대한 설명 중 맞는 것은?","box":"","c":["단계별 설명의무는 보험계약 체결 권유, 보험계약 체결, 보험금 청구, 보험금 심사 · 지급 단계로 구분된다","모집종사자의 보험계약 체결대리권 존재여부는 보험계약 체결 권유단계에서 설명하여야 한다","보험계약 체결단계에서는 보장성 상품의 내용, 보험료의 감액 청구 등을 설명하여야 한다","일반보험계약자가 설명을 거부하는 경우에는 음성녹음으로 설명내용을 확인하여야 한다"]},{"num":19,"q":"모집종사자의 권한에 대한 설명 중 틀린 것은?","box":"","c":["보험설계사는 계약체결권은 있으나 보험료수령권은 없다","보험대리점은 계약체결권이 있으나, 보험설계사는 계약체결권이 없다","보험설계사와 보험중개사는 보험료수령권이 없다","보험중개사는 고지의무수령권이 없다"]},{"num":20,"q":"보험설계사의 등록에 관한 설명 중 틀린 것은?","box":"","c":["보험업법에 따라 등록이 취소된 후 2년이 경과되지 아니한 자는 등록이 제한된다","최근 3년 이내에 보험 관계업무에 1년 이상 종사한 경력이 있는 경우에는 설계사 자격시험을 면제받을 수 있다","파산선고를 받은 경우에도 1년이 경과하면 보험설계사로 등록할 수 있다","보험설계사는 보험업법에 따라 금융위원회에 등록하여야 한다"]},{"num":21,"q":"다음 금소법상 상품유형의 설명 중 틀린 것은?","box":"","c":["보험상품은 보장성상품에 해당한다","예금성상품이란 은행법상 예금 등을 말한다","보험계약대출은 보장성상품에 해당한다","투자성상품이란 자본시장법상 금융투자상품 등을 말한다"]},{"num":22,"q":"재무설계의 필요성으로 적절하지 않은 것은?","box":"","c":["다양하고 복잡한 금융상품의 출현","저금리시대에 체계적이고 다양한 금융상품 준비 필요","특정계층의 금융관련 고급정보 독점에 따른 불안감 해소","조기퇴직에 따른 안정적 미래소득 확보 곤란"]},{"num":23,"q":"보험회사 영업행위 윤리준칙에서 보험영업 활동의 기본 원칙에 대한 설명 중 잘못된 것은?","box":"","c":["보험회사는 보험상품을 판매하고 서비스를 제공하는 일련의 과정에서 보험소비자의 권익이 침해되는 일이 발생하지 않도록 노력하여야 한다","모집종사자는 금융인으로서 사명감과 윤리의식을 가져야 한다","모집종사자는 보험상품 판매를 최우선 가치로 삼고 영업활동을 수행하여야 한다","보험회사는 모집종사자의 도입, 양성, 교육, 관리 등에 있어서 법령을 준수하고 건전한 금융거래질서가 유지될 수 있도록 노력하여야 한다"]},{"num":24,"q":"실손보상의 원칙을 바르게 설명한 것은?","box":"","c":["보험회사가 납부받은 보험료로 보험금을 지급하는데 과부족이 없어야 한다는 원칙","보험회사의 순보험료 총액은 지급보험금의 총액과 일치하여야 한다는 원칙","보험사고시 보험가입금액의 한도 내에서 실제 발생한 손해액을 보상한다는 원칙","보험가액에 대한 보험가입 ":"제3보험 상품은 보장성보험에 한하여 개발 가능 ② ③질병사망 → 상해사망 ④저축성보험 개발시 15년 이내로 가능","13":"자동차손해배상보장법 민법의 특별규정 가해자의 책임 범위 확대(피해자 보호) - 173 자동차사고에 대한 손해배상책임 주체 : 운행자","38":"질병사망특약의 영위 조건 80세 만기, 개인당 2억원, 보장성보험","14":"대인배상Ⅰ과 대물보상(1사고당 2천만원)을 말한다 ③ ②④대인배상Ⅰ은 피해자 1인에 대한 보상한도 유한(1사고 당 - 179 한도는 없음), 대물배상은 1사고당 2천만원 한도","39":"상해보험 사고의 성립요건 내재성은 질병보험의 특성","15":"피보험자의 범위 기명피보험자, 친족피보험자, 승낙피보험자, 사용피보험자, - 183 운전피보험자","40":"상해보험의 보험료 산출 상해보험은 직업 및 직무의 위험도를 감안하여 3등급으로 구 분하여 보험료 책정","16":"수리비, 열처리 도장료 사고 직전 가액의 120% 한도 지급 - 199 수리비는 실제 수리비용 열처리 도장료는 전액 지급(차령무관)","41":"보험회사의 면책사항 실손의료비 상해입원 및 상해통원 보장상품 중 산재보험에서 보상받는 의료비","17":"치료비는 전액을 지급한다 ②1천만원 이하의 과태료 ③일반보험계약자가 설명을 거부","42":", 기본계약에서는 상해사망만 가능하고 질병사망보장은 특약으 225 로만 운용 가능 한시적 장해시 지급률","18":"1천만원 이하의 과태료 ③일반보험계약자가 설명을 거부 ① 하는 경우 설명을 하지 않아도 됨 ④승낙거절시 거절사유 - 89 설명은 보험계약체결단계에서의 중요설명 사항","43":"한시적 장해시 지급률 한시장해보험금 : 5년 이상 지급률 : 20%","19":"모집질서 관련 금지사항 아닌 것 기초서류에 근거한 보험료 할인 기초서류에 근거한 특별이익 제공","44":"보장대상의료비의 30% 또는 최소 자기부담금(3만원) 중 큰 ③ 금액","20":"승환계약시 처벌 , 보험업법 : 1천만원 이하 과태료 100 자율규제 : 건당 1백만원 제재금","45":"대중교통수단 렌트카는 대중교통 수단 제외","21":"장애인 차별금지 신고가능자 : 장애인, 장기기증자 본인, 그 대리인","46":"1종단체(급여단체) : 동일한 회사, 사업장, 관공서, 국영기업체, 조합 등 5인 이상의 근로자를 고용하고 있는 단체","22":"보험대리점은 계약체결권 있음 ② 보험설계사는 고지의무 ③ 수령권 없음 ④보험설계사는 금융위원회에 등록해야 함","47":"보험나이는 계약일 현재 만 연령으로 계산하며 6개월 미만은 버리고 6개월 이상은 1년으로 계산한다","23":"보험대리점 영업보증금 1억원(법인보험대리점은 3억원)의 한도 내에서 정함 - 16 금융기관보험대리점은 예탁의무가 면제","48":"보험금의 지급 보험금 청구서류를 접수한 경우 · 접수한 날로부터 3영업일 이내","24":"최적의 위험보장설계 단계 : 가입권유 ③ ②완전판매의 실현단계 : 증권전달 및 사후관리 - 25 ④정보수집 단계 : 정보수집","49":"치아보험은 회사별 보험상품 종류에 따라 0세부터 75세까지 가입이 가능(보험회사별로 상이)한 상품이다","25":"계약실적의 향상이 아닌 보험소비자의 권익 보호를 최우선 가치로 삼아야 함","50":"간병보험의 보상손해 회사가 보장하는 보험금 지급사유로 인한 경우는 보상"},"04":{"1":"손해방지비용은 비용손해에 해당","26":"투기위험은 위험부담주체의 주관적 의사에 의하여 결정되므로 통계측정이 불가능하다","2":"보험가입금액이 보험가액의 80% 해당액과 같거나 클 때 손해액 - 115 전액을 보상","27":"보험의 기본원칙 실손보상의 원칙 : 실제손해액만큼을 보상 이득금지의 원칙 : 실제손해액 이상으로 보상받을 수 없다 비례보상의 원칙 : 보험가입금액의 비율(부보비율)로 손해를 보상","3":"가입대상시설의 소유자와 점유자가 동일한 경우 가입의무자는 소유자 도난보험","28":"나이롱환자 근절 외출 또는 외박에 관한 기록은 3년간 마이크로필름 또는 광디스크 - 47 등에 원본대로 수록 및 보존","4":"특별약관에 기재된 사고로 피보험자가 입은 손해를 보상 · 동산특약(동산의 절도 또는 강도의 도난행위로 입은 직접손해) · 현금 및 유가증권 (현금 및 유가증권의 절도 또는 강도의 도난행위로 입은 직접손해) · 수탁물 배상책임 보상","29":"특정범죄가중법 음주운전을 위험운전치사상죄로 규정 상해 : 1년 이상 15년 이하의 징역 또는 1천만원 이상 3천만원 이하의 벌금 사망 : 무기 또는 3년 이상의 징역","5":"· 수탁물 배상책임 보상 (수탁물의 절도 또는 강도의 도난행위로 입은 직접손해) 컨틴전시보험의 종류 스포츠(경기 결과), 날씨(온도), 행사취소를 대상으로 함","30":"사망 : 무기 또는 3년 이상의 징역 피보험자 →보험계약자 ③6개월 내 →3개월 내 ② ④보험료와 이자를 합한 금액을 지급","6":"고지의무는 적용된다 ③ ②30일 이상 →14일 이상 - 148 ④2년 이내 →3년 이내","31":"피보험자 또는 보험수익자의 보험금청구권의 소멸시효 : 3년 보험계약자의 보험료 또는 적립금의 반환청구권의 소멸시효 : 3년 보험회사의 보험료청구권의 소멸시효 : 2년","7":"보험료 구성 보험료 = 순보험료 + 부가보험료 - 150 순보험료 = 위험보험료 + 저축보험료","32":"보험가입금액 : 보험계약상 보상의 최고한도액 보험증권상에 임의로 정하여 놓은 금액 보험료 산정의 기준","8":"계약 후 알릴 의무(통지의무) 피보험자의 직업 변경은 통지의무 사항에 해당하지 않음 일반화재보험의 통지의무내용과 동일","33":"근로자퇴직급여보장법에 의한 퇴직연금은 겸영이 가능한 보험종목이다","9":"배상책임 및 재산종합보험의 가지급보험금 피보험자의 청구가 있는 경우 지급 추정보험금의 50% 상당액 미리 지급","34":"제3보험은 사람이 질병에 걸리거나 상해를 입었을 때 또는 질병이나 상해가 원인이 되어 간병이 필요한 상태가 되었을 때 보장하는 보험으로 상해보험·질병보험·간병보험으로 구분된다","10":"연금수령시 소득세 소득세법에서 정하는 연금수령요건에 해당하는 금액은 연금소득세 부과 - 162 연금수령요건을 충족하지 못하는 금액은 기타소득세 부과","35":"②질병사망은 특약으로 가능 ④ ③제3보험에 해당되지 않음","11":"특약보험료는 보장성보험료 세액공제로 100만원 한도 ① ③연금수령금액은 연금소득세 부과 - 162 ④연간 400만원 →연간 900만원","36":"제3보험의 정의 2003년 보험업법 및 보험업법시행령 개정으로 제3보험의 정의가 신설됨 보험업법 : 보험의 종류를 생명보험, 손해보험, 제3보험으로 구분","12":"확정급여형(2018년 : 80% 이상, 2019~2020년 : 90% 이상, 2021년 이후 : 100% 이상) 사외적립 확정기여형 100% 사외적립","37":"상법상 사망담보 무효요건 만 15세 미만자, 심신박약자, 심신상실자의 사망담보는 무효","13":"사망사고, 사고 후 도주, 12대 중과실 사고인 경우 합의와 상관없이 형사처벌 ②사용자 또는 감독자는 피용자에 대하여 구상권 ③ - 170 행사가 가능 ④고의 또는 과실로 인한 위법행위로 타인에게 손해를 가한 자는 그 손해를 배상할 책임이 있음","38":"제3보험의 상품설계기준 손해보험회사만 상해보험에 대해 저축성보험으로 개발 가능 · 다만 보험기간은 15년 이내로만 개발 · 생명보험의 제3보험은 보장성으로만 개발 가능","14":"무보험자동차에 의한 상해 피보험자가 무보험자동차에 의해 사고로 사망하거나 다친 때 배상의무자가 있는 경우 보상","39":"상해보험의 특징 타인의 사망보험 계약시 개인계약은 피보험자의 서면동의 필요 · 단체가 규약에 따라 구성원의 전부 또는 일부를 피보험자로 하는 생명보험계약을 체결하는 경우에는 예외","15":"외국 체류 중이더라도 당해 차량을 말소하거나 법령에서 ② 정하고 있는 경우이외에는 의무보험 의무가 면제되지 않는다","40":"하는 생명보험계약을 체결하는 경우에는 예외 상해1급 ③상해3급 ① ④단체상해보험은 등급을 나누지 않고 (지방소득세 별도) 부과 - 162 ②연간 600만원 한도 ④10% →15%(지방소득세 별도)","35":"제3보험의 정의 2003년 보험업법 및 보험업법시행령 개정으로 제3보험의 정의가 신설됨 보험업법 : 보험의 종류를 생명보험, 손해보험, 제3보험으로 구분","11":"부득이한 사유로 연금 수령 사유 : 천재지변, 계약자의 사망, 해외이주, 3개월 이상의 요양, 파산, 개인회생절차 개시 등 연금소득세 3 ~ 5% 납입, 종합과세대상 아님","36":"제3보험 상품개발기준 상해보험만 보장성과 저축성(만기 15년 이내)으로 개발이 가능","12":"자영업자, 직역연금 가입자 등 사실상 모든 취업자가 가입이 가능","37":"손해보험회사의 질병사망은 특약으로만 영위할 수 있으며, 80세까지 가능 상해보험과 질병치료비보험은 기본계약으로 영위 가능","13":"형사처벌 특례 적용 불가능한 경우 사망사고, 뺑소니, 중상해사고, 12대 중과실 사고는 특례 적용 불가능 - 172 신호 또는 지시위반사고, 추월방법 위반사고는 12대 중과실 사고에 해당","38":"상해사고의 요건 : 우연성, 외래성, 급격성","14":"무보험자동차에 의한 상해 : 피보험자가 무보험자동차에 의해 사 고로 사망하거나 다친 때 배상의무자가 있는 경우 보상 ①과거 사고유무 및 내용에 따라 등급 결정 ②보험회사별로","39":"상해보험의 수익자 변경 보험수익자를 지정할 수 있는 사람은 보험계약자","15":"다르게 적용 ④장기무사고 보험가입자의 경우 사고점수 1점 - 191 이하의 사고시에는 등급의 차감이 없으며 사고 점수 2점 이상의 사고시에는 최초 1점을 뺀 나머지 점수로 등급 계산","40":"상해급여의료비는 실손보장방식을 적용한다","16":"상실수익액, 가정간호비는 후유장애보험금에서 보상한다 ①미군 보유차는 보장사업 대상 제외 ②도로가 아닌 장소에서만","41":"1급 : 사무직 근로자 ②2급 : 항공기정비공 ③ ④4급이란 개념은 없음","17":"미군 보유차는 보장사업 대상 제외 ②도로가 아닌 장소에서만 운행하는 자동차사고 피해자는 보장사업 대상에서 제외 ③산재보 ④ 험 등 그 밖에 다른 법률에 의해 보상받을 수 있는 경우는 보장사 업에서 제외","42":"상해의 직접결과로써 사망한 경우 지급 ②보험수익자에게 지급 ④ , ③실종선고를 받은 경우 법원에서 인정한 실종기간이 227 끝나는 때에 사망한 것으로 봄","18":"업에서 제외 체결대리권 존재여부 설명 : 체결단계 ③보장성 상품의 내용, ① 보험료의 감액청구 : 보험계약 체결 권유단계 ④계약자의 설명","43":"4세대 실손 보장종목 구성 : 기본형(상해·질병급여) + 특약(상해·질 병 비급여, 3대 비급여)","19":"거부시 설명하지 않아도 됨 보험계약의 중요사항을 알리는 것을 권유하는 건 금지행위가 아니다","44":"(급여) 의원 : 1만원, 종합병원 : 2만원 / 비급여 : 3만원","20":"모집질서 관련 준수사항 특별이익 제공금지 무자격자 모집위탁 금지 경유처리 금지 자기계약 금지 등","45":"기타 교통수단 이륜자동차는 자동차에 해당","21":"특별이익 제공에 해당하는 금액 최초 1년간 납입보험료의 100분의 10보다 크거나 3만원을 넘는 금액(연간보험료=2만원×12개월=24만원, 2개월분 4만원으로 납입보험료의 10%와 3만원을 모두 초과)","46":"단체상해보험 비영리법인단체는 2종 단체 (법정단체)에 해당 단체계약을 맺은 후 피보험자를 증가, 감소, 교체하고자 하는 경우 계약자는 피보험자의 동의 및 보험회사의 승낙을 얻어 피보험자 변경 가능","22":"보험대리점은 계약체결권, 고지의무수령권, 보험료수령권까지 모두 갖고 있다 ②보험중개사는 독립적으로 보험계약의 체결을 중개하는 ④ 자이다 ③보험회사의 대표이사, 감사 및 감사위원은 보험을 모집할 수 없다","47":"5년이 지난 후 약관에 따라 보장한다","23":"미성년자는 보험설계사 등록 가능","48":"입원급여금(요양급여금) 질병으로 진단확정, 질병 치료를 직접적인 목적으로 입원한 경우 입원일부터 1일당 보  대인배상으로 보상을 받을 ① 수 있으므로 자동차손해배상보장 사업의 보상을 받을 수 없다 -207 ④대물손해는 보상제외","42":"비급여의료비의 경우 1만원과 보장대상의료비의 30% 중 큰 금액을 공제금액으로 한다","18":"설명의무 위반시 : 계약취소 가능 ③주계약 보험료는 보험계약 체결 권유단계에서, 보험계약 ② 승낙거절시 거절사유는 보험계약 체결단계에서 설명 ④녹취, 기명날인도 가능","43":"4세대 실손 보장종목 구성 : 기본형(상해·질병급여) + 특약(상해·질병 비급여, 3대 비급여)","19":"독립적으로 → 보험회사, 보험대리점 또는 보험중개사에 소속되어 ② ③체결을 대리하는 자 → 체결을 중개하는 자 ④보험회사에 소속되어 → 독립적으로","44":"농업기계가 작업 중이 아니라 도로 운행 중에 발생한 사고이므로 보상한다","20":"손해보험모집에 관한 교육만으로 등록 가능한 사람 손해보험 관계업무에 1년 이상 종사자(등록신청일부터 3년이내) 제3보험 관계업무에 1년 이상 종사자(등록신청일부터 3년이내) [개인보험대리점] 손해보험 관계업무에 2년 이상 종사자(등록신청일부터 4년이내)","45":"3종 단체(규약단체) : 단체의 구성원이 명확하여 계약의 일괄적인 관리가 가능한 단체로서 5인 이상의 구성원이 있는 단체","21":"말소 → 해촉","46":"대기기간은 질병보험에서 가장 유효하게 적용된다","22":"공제조합은 금융기관보험대리점으로 등록할 수 없는 금융기관이다","47":"상해비급여는 입·통원 합산 연간 5천만원 한도 보장한다","23":"최적의 위험보장설계 단계 : 가입권유 ③ ②완전판매의 실현단계 : 증권전달 및 사후관리 ④정보 수집단계 정보수집","48":"암으로 인하여 80% 이상의 장해상태가 되었을 경우 암사망 보험금 지급","24":": 고의방화는 도덕적 위태에 해당","49":"어린이보험 가입연령은 0~15세이다","25":"상해보험 중 인보험의 경우 적용되지 않음","50":"치매로 진단 확정되고, 보험기간이 끝난 이후라도 그날을 포함하여 일정 기간 계속되었을 때 보험수익자에게 보험가입금액을 치매간병비로 지급한다"},"08":{"1":"건물의 부착물(간판, 네온사인, 안테나, 선전탑 등)은 자동담보 물건에 해당","26":"①대수의 법칙 ②이득금지의 원칙 ④실손보상의 원칙","2":"공장 내의 기숙사는 공장물건에 해당 -117","27":"혼합보험 기간과 구간으로 혼합되어 있는 보험 종류 : 조립보험, 건설공사보험, 여행자보험 등","3":"특수건물화재보험 대상 : 일정 규모 이상의 다중이용시설건물 의무보험 특수건물 소유주가 가입 도난보험에서 보상하지 않는 손해","28":"보험사기이득액 이하에 상당하는 벌금을 병과할 수 있다","4":"고의, 중대한 과실로 생긴 도난 손해 사기 또는 횡령으로 인한 손해 보관장소를 72시간 이상 비워 둔 동안에 생긴 도난 손해 망실 또는 분실 손해 화재, 폭발이 발생했을 때 생긴 도난손해","29":"외출, 외박하는 자 또는 허락하는 자(의료인, 의료기관 종사 자)는 서명, 날인하는 등 기록사항 확인을 의무화 ② ③의료인의 서명·날인 필요 ④보험회사의 열람 거부시 과태료 300만원","5":"도난 손해가 생긴 후 30일 이내에 발견하지 못한 손해 등 잡위험 : 비(雨), 담수유(淡水濡), 강설, 수해, 연기손해, 건물의 붕괴, 누손, 기타 면책(화재, 도난, 파손, 폭발, 파열, 항공기 추락이나 접촉, 차량의 충돌 등)을 제외한 위험","30":"피보험자 ·피보험이익의 주체 ·보험금 청구권자","6":"계약의 부활을 위해선 연체보험료와 연체이자 납입과 회사의 -148 승인 필요","31":"보험계약자의 사기로 초과보험이 체결된 경우 해당 계약 전체가 무효처리 된다","7":"④무효 사유 ①장기손해보험의 보험료는 순보험료와 부가보험료로 구성","32":"보험계약 당시에 보험사고가 이미 발생하였으나 보험계약 당사자 쌍방과 피보험자가 이를 알지 못한 때에는 해당계약은 유효하다","8":"②순보험료는 위험보험료와 저축보험료로 구성 -150 ④유지비  65세 이상 : 5,000만원","41":"상해보험에서 면책하는 손해 계약자, 피보험자, 수익자의 고의 전쟁, 외국의 무력행사 피보험자의 임신, 출산, 산후기","17":"가불금 : 보험회사의 보험금 지급의무가 발생하지 아니하는 것이 객관적으로 명백한 경우 지급하지 않을 수 있음","42":"보험회사의 면책사항 실손의료비 상해입원 및 상해통원 보장상품에서 자동차보험 (공제 포함)에서 보상받는 의료비","18":"실손의료보험 계약 절차 가입설계서 작성 → 의료비 조회동의서 사전 징구 →중복가입조회 및 결과안내 →비례보상 설명 →청약서작성","43":"후유장해보험금 한시적으로 나타나는 장해시 지급 그 기간이 5년 이상인 경우 해당 장해 지급률의 20%를 보험가입금액에 곱하여 산출","19":"보험을 모집할 수 있는 자 보험설계사, 보험대리점, 보험중개사, 보험회사 임직원 (대표이사, 사외이사, 감사 및 감사위원 제외)","44":"④ 질병급여 통원의 연간 치료횟수는 제한 없음","20":"손해보험모집에 관한 교육만으로 등록 가능한 사람 손해보험 관계업무에 1년 이상 종사자(등록신청일부터 3년 이내) 제3보험 관계업무에 1년 이상 종사자(등록신청일부터 3년 이내)","45":"장기요양대상자 중 1~2등급 판정자","21":"집행이 종료되거나 집행이 면제된 후 2년이 경과되지 않았다면 등록이 제한","46":"추가조사가 필요한 경우 지급기일이 늦어질 수 있다 ⇨지연사유, 지급예정일 즉각 통지 ②50% 상당액을 가지급보험금으로 지급 ③ ④보험사고에 따른 보험금 청구서류를 접수한 때에는 접수증을 교부하고, 서류를 접수한 날로부터 3영업일 이내에 보험금을 지급","22":"고객정보를 소중하게 생각하고 철저하게 보호 · 다른 사람과의 공유 금지","47":"교부하고, 서류를 접수한 날로부터 3영업일 이내에 보험금을 지급 교통상해보험의 기타 교통수단 선박, 항공기, 엘리베이터, 기차, 전동차, 케이블카, 리프트 등","23":"정신적 위태에 대한 설명이다.","48":"단체의 종류 : 1종 단체(급여단체) / 2종 단체(법정단체) / 3종 단체(규약단체)","24":"의무보험에 속함 ③상법 →보험업법 ② ④ 위험보장과 저축기능은 장기보험의 특징","49":"질병보험의 보상 보험기간 중의 질병으로 인한 입원, 수술 등 위험을 보장 ·질병사망은 특약에서 보장","25":"연성사기 →경성사기 ③ 경성사기 →연성사기 ① ④ 3억원 →5억원","50":"회사는 피보험자가 보험기간 중에 '중증치매상태'로 진단 확정되고, 보험기간이 끝난 이후라도 그 날을 포함하여 일정기간 이상 계속 되었을 때에는 보험수익자에게 보험가입금액을 치매간병비로 지급"},"10":{"1":"보험가액 →보험가입금액","26":"투기위험은 대수의 법칙을 적용하는 것이 어려우며, 따라서 특수한 경우를 제외하고는 보험의 대상이 될 수 없음","2":"보험가입금액이 보험가액의 80% 해당액과 같거나 클 때 손해액 -115 전액을 보상","27":"보험기간에 따른 분류 : 장기보험, 단기보험, 구간보험, 혼합보험","3":"화재보험은 보험금 청구서류를 접수 받은 날로부터 7일 이내 지급 해야 한다","28":", 자동차보험 입원환자 관리의무는 의료기관에게 있다 46-47","4":"의무배상책임보험 : 가스사고, 유·도선사업자, 체육시설, 학원시설, 다중이용업소, 개인정보보호, 승강기사고, 맹견소유자","29":"면허 취소 ③면허 취소(2년간 면허 취득 불가) ② ④면허 취소(2년간 면허 취득 불가)","5":"컨틴전시보험의 정의 특정한 사건, 즉 날씨, 온도, 경기 결과, 행사 등을 전제로 예정된 사건이 현실화되었을 때 발생하는 금전적 손실을 보상하는 보험","30":"피보험이익은 손해보험에만 인정된다 ②피보험이익 →보험가입 ③ 금액 ④현존하는 이익뿐만 아니라 장래의 이익도 확정할 수 있는 것이면 피보험이익이 될 수 있다.","6":"갱신형보험은 보험가입 후 일정기간 경과시 연령과 위험률을 변경하여 보험료를 다시 산정해 유지하는 보험이다","31":"중복보험에 대한 설명"," :"정액보상 상품 : 사망보험금, 후유장해보험금, 진단보험금, 입 - 228 원보험금, 수술보험금, 간병보험금 등","19":"최종 등록취소 처분을 받은 날로 3년이 지나면 등록이 가능","44":"특약에만 가입하는 것은 불가능","20":"은행법·저축은행법상 예금 및 이와 유사한 것은 예금성 상품에 해당","45":"④ 할증률 200%","21":"② 2년 → 1년 ③ 대상은 보험설계사와 개인전속대리점 - 29 ④ 인증기관은 보험협회","46":"보장한도는 회당 100만원","22":"이득금지의 원칙은 손해보험 고유의 원칙이다 - 37","47":"교통상해보험의 기타 교통수단 선박, 항공기, 엘리베이터, 기차, 전동차, 케이블카, 리프트 등 ① 계약자는 피보험자의 동의 및 보험회사의 승낙을 얻어","23":"건강보험, 산재보험은 공영보험의 일종이나 상해보험은 민영보험에 해당한다","48":"피보험자의 변경 가능 ② 타인의 사망을 보험계약으로 하는 경우 타인의 서면에 의한 동의를 얻어야 하나 단체상해보험의 경우에는 생략 가능 ③ 단체의 종류는 1종 단체, 2종 단체, 3종 단체(4종 단체란 개념은 없음)","24":"보험범죄의 사회적 피해 차량 자체에 도난방지시스템이 부족하여 적발에 어려움을 - 46 겪고 있음","49":"암보험의 대기기간 2006년 1월 1일부터 만 15세 미만자는 암보험 대기기간을 설정하지 않음","25":"특정범죄가중처벌법 , 51-53 종합보험에 가입했더라도 형사처벌이 무조건 면제되는 것은 아님","50":"경증치매보장의 경우 진단보험금이 ʻ중증치매ʼ 진단보험 금보다 낮게 설계된다"},"14":{"1":"폭발 및 파열에 따른 손해는 주택화재보험의 담보내용이다. ①보험가입금액 → 재산손해액 ③100% → 80%","26":"보험사기방지특별법에 의해 가중처벌된다. 자동차손해배상 - 44 보장법과는 관련이 없다.","2":"보험가입금액 → 재산손해액 ③100% → 80% ④재산손해보험금과 잔존물제거비용의 합계액은 보험가입금액을 ② - 115 한도로 하고 잔존물 보전비용은 보험가입 금액을 초과하는 경우에도 지급함","27":"0.03~0.08%미만 : 1년이하의 징역/5백만원 이하 벌금 - 53","3":"다중이용업소의 가입대상 다중이용업소가 ʻ화재로 인한 재해보상과 보험가입에 법률ʼ 관한 시행령 제2조에 따른 특수건물에 입점해 있는 경우는 보험가입 대상에서 제외","28":"보험금청구권 소멸시효는 3년이므로 1년간 미행사할 경우 면책되지 않는다.","4":"임원배상책임보험은 배상청구기준에 해당한다.","29":"고지사항 피보험자의 연령, 직업, 건강상태, 과거병력 또는 피보험 건물의 종류, 구조, 사용목적 등","5":"제1회 보험료를 받은때 보장 개시 ②도난손해는 보상하나 , ③ 분실손해는 보상하지 않는다. ④질병사망은 특별약관에서 150 보장한다.","30":"보험자대위에 대한 설명이다.","6":"보험가입금액 80% 미만인 경우에는 여러 번의 사고가 발생하여도 보험가입금액의 공제(감액)없이 잔여기간 동안 보험사고 전의 보험가입금액을 동일하게 보장한다.","31":"실손의료보험은 중복가입 확인을 위한 절차를 준수해야 한다.","7":"고지의무가 동일하게 적용된다 ③30일 → 14일 ① -161 ④2년 → 3년","32":"보험계약 인수거절은 정상적인 행위에 해당한다. - 100","8":"위험보험료 → 부가보험료 ②부가보험료 → 저축보험료 ③ - 164 ④순보험료 → 유지비","33":"3천만원이다.","9":"통화, 유가증권, 인지, 우표, 자동차, 법률에서 정한 특수건물은 인수제한 물건에 해당된다.","34":"보험업법에서 제3보험에 대한 근거를 규정하고 있다.","10":"인수제한 물건에 해당된다. 연간 1,800만원 한도로 변경되었음(분기기준 폐지)","35":"실손보상방식에 대한 설명이다.","11":"③ 70세 이전 수령 5.0% ④80세 이후 3% (지방소득세 ② 제외)","36":"제3보험의 약관에서 보장하지 않는 원인으로 사망할 경우 책임준비금을 지급하고 계약은 소멸한다.","12":"개인형퇴직연금(IRP)에 대한 설명이다. 보험회사는 보험료 전액 또는 제1회 분할보험료를 받고","37":"특약으로만 가능하고, ②2억원 이내 ④생명보험회사와는 ③ 다르다.","13":"보험회사는 보험료 전액 또는 제1회 분할보험료를 받고 청약을 승낙하기 전에 발생한 사고에 대하여는 그 청약을 거절할 사유가 없는 한 보상한다. 하지만 보험료를 받지","38":"생명보험, 제3보험의 경우 보험가액은 없다.","14":"않았다면 보상할 책임은 없다. 사망 / 부상 / 후유장해 각각 1억 5,000만원 / 3,000만원 / 1억 5,000만원이다","39":"지속성, 내재성 등은 해당 요건이 아니다. 상해보험의 면책손해","15":"승낙피보험자에 대한 설명이다.","40":"상해보험의 면책손해 피보험자의 직업, 직무 또는 동호회 활동목적으로 생긴 손해는 상해보험에서 보상하지 않는 손해 선박승무원이 직무상 선박에 탑승하고 있는 동안은 면책","16":"①콤바인은 농기계 ②살수자동차는 화물차 - 201 ③소방차는 승용차, 승합자동차, 특정용도자동차로 구분 적용","41":"상해의 직접결과로써 사망한 경우 지급 ②보험수익자에게 , 지급 ④ 225 ③실종선고를 받은 경우 법원에서 인정한 실종기간이 끝나는 때에 사망한 것으로 봄","17":"자기부담금=정률×차량손해액(20%×500만원=100만원) 최대한도가 50만원이므로 50만원 적용","42":"때에 사망한 것으로 봄 장해지급률이 확정되지 않은 경우 180일이 되는 날의 의사 - 226 진단에 기초해 결정한다.","18":"보험대리점에 대한 설명이다.","43":"보장대상의료비의 30% 또는 최소 자기부담금(3만원) 중 큰 금액","19":"해촉 후 협회에 말소신청을 해야 타 보험회사로 이직할 수 있다. 보험대리점의 분류","44":"주사료는 연간 250만원(50회) 한도로 보상한다.","20":"영위종목별 분류 : 생보, 손보, 제3보험 영위업종별 분류 : 전업, 겸업 유형별 분류 : 전속, 비전속","45":"덤프트럭(9종 건설기계)이 도로운행 중 발생한 사고이므로 보상한다.","21":"운영주체별 분류 : 개인, 법인 개인대리점의 업무폐지는 보험회사를 통한 방법과 본인이 ③ 직접 보험협회를 방문하는 방법 두 가지가 있다. ②④보험회사와 계약해지를 한 후 보험협회에 업무폐지 신청을 해야 한다.","46":"비영리법인단체는 2종단체에 해당한다.","22":"불리한 내용을 설명하지 않는 것은 상식적으로 맞지 않는 내용이다.","47":"중증치매는 질병보험에서 보장하는 내용이 아니다.","23":"발생약관이란 문제를 위해 억지로 만들어 낸 지문으로 보여진다.","48":"20만원을 지급한다.","24":"손해보험과 인보험으로 구분 ②인보험에 속함 ④ ③자동차보험은 손해보험에 속함","49":"치아보험(질병보험)의 경우 감액기간 및 면책기간을 운영하고 있다.","25":"보험가입금액이 보험가액보다 큰 보험이다. - 40","50":"장기요양등급 1,2등급 상태(중증치매)는 보상하는 경우에 해당한다."},"15":{"1":"피보험자 소유의 야적의 동산은 명기물건(보험가입증서에 기재하여야 보험의 목적이 됨)에 해당 잔존물 제거비용 보험금","26":"고지의무 위반시 보험회사는 위반의 사실을 안 날로부터 1개월, 계약이 성립한 날로부터 3년 이내에 계약을 해지할 수 있다","2":"한도 : 손해액의 10%, 300만원(3,000만원 × 10%) 실제 잔존물 제거비용 보험금 4,000만원(보험가입금액) = 200만원(잔존물 제거비용)× 1억원(보험가액)의 80%","27":"보험증권의 미수령은 무효사유에 해당되지 않음 ② ③보험료를 받은 경우 보험회사는 보상책임을 가짐 ④지급하지 않음","3":"= 100만원 손해방지의무 위반시 : 방지 또는 경감할 수 있었을 것으로 - 121 밝혀진 금액을 손해액에서 제외하고 보험금을 지급","28":"작성자이익의 원칙 →작성자불이익의 원칙","4":"체육시설업자배상책임보험 체육도장업, 골프연습장업, 체력단련장업, 당구장업은 보험 의무가입대상이 아님","29":"보험가액의 일부를 보험에 가입한 경우 보험회사가 취득한 권리는 보험금액의 보험가액에 대한 비율에 따라 정한다","5":"레저활동 기간 동안 발생한 상해사고, 용품손해 및 배상책임에 따른 손해를 보상하고 분실손해는 보상 제외됨","30":"실손의료보험 계약 절차 가입설계서 작성 →의료비 조회동의서 사전 징구 → 중복가입조회 및 결과안내 → 비례보상 설명 → 청약서작성","6":"청약철회 보험증권을 받은 날부터 15일 이내에 청약을 철회 가능","31":"보험을 모집할 수 있는 자 ③전화를 이용하여 모집할 경우 우편이나 팩스 등을 통해 자필서명 받아야 함 ② - 92 ④통신수단을 이용하여 해지를 할 경우 계약체결 전에 통신수단을 이용한 계약해지에 동의해야 함","7":"보험금청구권, 보험료 또는 환급금 반환청구권 : 3년 보험회사의 보험료청구권 : 2년","32":"이용한 계약해지에 동의해야 함 ④단체보험의 경우 가입설계서 제공의무 없음","8":"보험료 = 순보험료 + 부가보험료 - 152 순보험료 = 위험보험료 + 저축보험료","33":"실제 명의인이 아닌 자의 보험계약을 모집하거나 실제 명의인의 동의가 없는 보험계약을 모집하는 행위 위반시 : 1천만원 이하의 과태료를 부과","9":"96시간 이내 →72시간 이내 - 159","34":"제3보험의 보험종목 : 상해보험, 질병보험, 간병보험","10":"세제적격 요건 5년 이상 납입, 55세 이후 수령 부득이한 사유로 연금 수령","35":"실손보상 : 통원의료비 정액보상 : 입원일당액, 후유장해보험금, 사망보험금 제3보험의 가입제한","11":"부득이한 사유로 연금 수령 사유 : 천재지변, 계약자의 사망, 해외이주, 3개월 이상의 - 164 요양, 파산, 개인회생절차 개시 등 연금소득세 3 ~ 5% 납입, 종합과세대상 아님","36":"제3보험의 가입제한 원칙적으로 가입연령 등의 제한사항이 없음 - 218 예외 : 상품별로 보험회사가 설정한 제한사항과 법률에 의한 사망담보 가입제한 등이 존재","12":"연금규약 작성 사용자는 근로자대표의 동의를 얻어 퇴직연금규약을 작성 고용노동부장관에 신고","37":"보장하지 않는 원인으로 사망 책임준비금 지급","13":"자동차손해배상보장법이 민법의 특별법 ④ ②입증책임 : 가해자(운행자) ③대인, 대물사고 모두 적용","38":"질병사망특약의 영위 조건 보장성보험(만기환급금은 납입보험료 합계액의 범위 이내)으로 보험기간은 80세, 보험금액 개인당 2억원 이내","14":"보험계약의 승계 자동승계되지 않고, 계약승계 요청과 승인이 있어야 함 다만, 책임보험은 양도된 날로부터 15일째 되는 날의 24시 까지 승계된 것으로 간주 · 일시적인 무보험상태 방지","39":"상해사고의 요건 우연성 : 원인 또는 결과가 예견되지 않는 상태","15":"6,000만원 → 5,000만원 ③포함된다 ② ④사망보험금은 최고 1억5천만원 ~ 최저 2,000만원이다","40":"사무직 근로자는 상해 1급 ②영업용 자동차 운전자는 상해 3급 ④ ③직업 및 직무의 위험도에 따라 3등급으로 구분하여 보험료 책정 (3급의 위험도가 가장 높음)","16":"보험가입 경력요율 외국 보험가입경력, 군운전병 근무경력, 법인체 운전직 근무 기간은 가입경력으로 인정","41":"상해보험에서 면책하는 손해 계약자, 피보험자, 수익자의 고의 전쟁, 외국의 무력행사 피보험자의 임신, 출산, 산후기","17":"자동차손해배상보장사업 : 국토교통부에서 보장사업업무 지도 및 감독 - 206","42":"치과, 한방치료에서 급여치료비는 보상 ㄱ. 한시적으로 나타나는 장해의 기간이 5년 이상인 경우","18":"보험대리점은 계약체결권, 고지의무수령권 모두 갖는다 ④ ②보험중개사는 독립적으로 보험계약의 체결을 중개하는 자이다 ③보험회사의 대표이사는 보험을 모집할 수 없다","43":"보험금을 지급 - 226 ㄹ. 동일한 질병 또는 상해로 두 가지 이상의 후유장해가 생긴 경우에는 후유장해지급률을 합산하여 지급","19":"일사전속의 원칙에 의해 타 보험회사로 이직하거나 모집을 그만두고자 할 경우 말소가 필요","44":"최초 10회 보장하고, 이후 객관적이고 일반적으로 인정되는 검사결과 등을 통대로 증상의 개선, 병변호전 등이 확인된 경우에 한하여 10회단위로 연간 50회까지 보상","20":"생명보험상품은 모집할 수 없음 ③등록이 제한됨 , ② 14 ④보험대리점 시험(보험연수원 주관) 합격 요건을 면제해주고 있음 정보수집","45":"(급여) 의원 : 1만원, 종합병원 : 2만원 / 비급여 : 3만원 단체의 종류","21":"정보수집 고객에 대한 상세하고 체계적인 정보 수집단계 정보수집 후 보험가입을 권유하는 것이 자연스러움","46":"단체의 종류 2종 단체(법정단체) : 비영리법인단체 또는 변호사회, 의사회 등 동업자단체로서 5인 이상의 구성원이 있는 단체","22":"사고 : 손해의 직접적인 원인 ex) 폭풍우, 화재","47":"③은 상해보험에서 보상","23":"보험기간에 따른 분류 장기보험, 단기보험, 구간보험, 혼합보험","48":"추정하는 보험금의 50% 상당액을 가지급 보험금으로 지급한다 김손보씨는 기타피부암이 가입 후 1년 미만이 경과한 시점에서","24":"①입원환자는 과태료 부과대상 아님 - 48","49":"암진단을 받았기 때문에 기타피부암 보험금 100만원의 50%를 지급받는다. 1 1 1,000만원× (10%)× (50%) = 50만원 10 2","25":"모든 차의 운전자는 회전교차로에 진입하려는 경우 서행하거나 일시정지하여야 하며, 이미 통행하고 있는 - 53 다른 차가 있는 때에는 그 차에 진로를 양보하여야 한다","50":"10 2 치매보장보험에서 대리청구인은 보험가입초기 또는 유지 중에 ① 미리 지정한다"},"16":{"1":"손해방지비용은 비용손해에 해당","26":"보험약관의 교부 및 설명의무 보험계약자에게 보험약관을 교부하고 그 중요한 내용을 알려야함 보험증권을 받지 못했다 해도 보험계약의 효력에는 영향이 없음","2":"중도해지 후 체결한 새로운 계약은 적용 제외 ② ③동일한 보험회사, 동일 구내의 위험에 대해 적용 ④보험료의 5% 할인 가능(해당계약 연 보험요율의 95% 적용)","27":"②1년 → 3년 ③2년 →3년 ④ 3년 →2년","3":"특수건물 특별약관 태풍, 폭풍, 홍수, 해일, 범람 및 이와 유사한 풍재와 수재를 보상 항공기 등에서 떨어진 물체로 인한 손해를 보상","28":"보험회사의 허가 → 보험사업의 허가","4":"①②④는 임의로 가입","29":"화재보험, 책임보험, 상해보험, 간병보험 : 100억원 해상보험 : 150억원","5":"컨틴전시보험의 정의 : 특정한 사건, 즉 날씨, 온도, 경기 결과, 행사 등을 전제로 예정된 사건이 현실화되었을 때 발생하는 금전적 손실을 보상하는 보험","30":"보험기간이 시작되기 전에 보험료를 수납하는 것이 원칙 ④ ②국내판례가 아닌 현지 관례를 따라야 함 ③1개월이 경과하면 자동 부도처리하여야 한다","6":"저축보험료가 특별계정에서 운용되며, 위험보험료와 부가보험료는 특별계정 운용에서 제외(만기환급금 가능)","31":"①②③은 특별이익 제공금지행위에 해당하지 않는다","7":"보험 계약시 이미 보험사고가 발생한 경우 보험 계약은 무효에 해당한다.","32":"보험계약의 중요사항을 알리는 것을 권유하는 건 금지행위가 아니다","8":"지급사유 발생일 다음 날부터 지급청구일까지의 기간 ⇨1년 이내의 기간은 평균공시이율의 50% 적용","33":"보험대리점 검사업무 위탁 금융감독원의 보험대리점 검사 업무 중 일부 영업행위에","9":"⇨1년 초과기간은 1% 적용 ③보험증권에 기재하여야만 보험의 목적이 되는 물건에 해당 총 급여 5,500만원 초과 1억 2,000만원 이하일 경우의","34":"대한 검사 일부를 손해보험협회로 위탁 ①②③은 손해보험에 해당한다 제3보험에서는 질병사망을 특약형식으로만 운영 가능","10":"공제율 : 12%* 총 급여 5,500만원 이하 근로자의 공제율 : 15%* * 지방소득세 별도","35":", · 질병사망을 특약형식으로만 운영하는 것은 제3보험업을 영위하는 218 모든 회사에 적용되므로 손해보험회사, 생명보험회사 공히 특약의 형식으로만 운영(단, 상해사망은 기본계약 또는 특약으로 운영 가능)","11":"부득이한 사유로 연금 수령 사유 : 천재지변, 계약자의 사망, 해외이주, 3개월 이상의 요양, 파산, 개인회생절차 개시 등 연금소득세 3~5% 납입, 종합과세대상 아님","36":"제3보험의 보상방식 질병보험(제3보험)의 사망보험금, 진단급여금 등은 정액보상 통원, 외래의 의료비는 실손보상","12":"연금소득세 3~5% 납입, 종합과세대상 아님 담보를 제공하는 날부터 역산하여 5년 이내에 가입자가 개인 회생절차 개시 결정을 받은 경우 ①보험가입 여부를 가입자 및 보험회사가 임의로 선택 가능","37":"상법상 사망담보의 무효 요건 사망담보 보험계약의 무효 요건은 상법에 규정","13":"③뺑소니, 12대 중과실, 중상해의 경우 교통사고처리특례법의 -183 적용 불가 ④가족운전자 한정특약 및 운전자 연령한정운전특약 위반시 보상되지 않음","38":"제3보험의 상품설계기준 손해보험회사와 생명보험회사의 구별없이 제3보험은 실손형뿐만 아니라 정액형으로도 개발이 가능","14":"부상보험금 : 구조수색비, 치료관계비, 위자료, 휴업손해, 간병비, 기타 손해배상금 -197 (30만원 + 150만원 + 20만원) × 60% = 120만원","39":"타인의 사망보험 계약시 개인계약은 피보험자의 서면동의 필요 · 단체가 규약에 따라 구성원의 전부 또는 일부를 피보험자로 하는 생명보험계약을 체결하는 경우에는 예외","15":"(30만원 + 150만원 + 20만원) × 60% = 120만원 대차를 하지 않는 경우에는 대여자동차 요금의 35% 상당액","40":"하는 생명보험계약을 체결하는 경우에는 예외 상해보험에서의 보험료산출은 보험료를 책정한 직업 및 직무의 위험도를 감안하여 3개 등급으로 구분함 보험회사의 면책손해","16":"무면허운전 사고시 부담금 · 대인배상 I : 300만원 / 대인배상Ⅱ: 1억원 · 대물배상 : 5,100만원","41":"보험회사의 면책손해 사망을 보험사고로 한 계약에서 보험계약자, 피보험자, -224 보험수익자의 중과실은 보상하지만 보험계약자, 피보험자, 보험수익자의 고의로 인한 사고는 보상에서 제외","17":"무보험자동차, 도난자동차 및 무단운전 중인 자동차사고 ② 피해도 해당 ③보유자가 손해배상책임을 면한 경우에만 해당 -206 ④손해배상을 받은 경우에는 청구 불가","42":"상해보험의 사망보험금 피보험자가 보험기간 중에 상해의 직접결과로써 사망한 경우 보험가입금액을 보험수익자에게 사망보험금으로 지급","18":"보험대리점 등록 제한 보험설계사 등록제한 사유에 해당하는 자 보험설계사 또는 보험중개사로 등록된 자","43":"치료종결 후 한시적으로 나타나는 장해에 대해 그 기간이 5년 이상인 경우, 해당 장해지급률의 20%를 보험가입금액에 곱하여 산출한 금액을 지급","19":"설계사 등록 제한사유 벌금 이상의 형을 선고받고 그 집행이 종료되거나 집행이 면제된 후 2년이 지나지 아니한 자","44":"④질병급여 통원의 연간 치료횟수는 제한 없음","20":"손해보험대리점 등록제한 : 국가기관과 특별법에 의하여 설립된 기관 및 동기관의 퇴직자로 구성된 법인 또는 단체","45":"보험금지급 기일 내 지급하지 못하는 경우 : 보험계약대출(약관대출) 이율을 연단위 복리로 계산한 금액을 보험금에 더하여 지급","21":"접근 : 고객과의 첫 만남 유리한 환경과 여건을 조성하는 과정은 접근의 단계","46":"대중교통수단의 이용을 위해 승강장 내 대기 중 일어난 교통사고로 인한 상해손해는 보상 대상","22":"보험의 본래 기능 피해자보호 : 배상책임보험 등을 통해 배상능력이 없는 가해자를 대신하여 피해자의 손해를 배상함으로써 피해자 보호기능을 수행","47":"급여 →비급여 ③ ②상해급여, 질병급여로 구성 ④특약만 별도로 분리하여 가입할 수 없음","23":"완전보험 →전부보험 ② 초과보험의 경우 실손보상한다 ③ ④ 일부보 "특정범죄가중법 음주운전을 위험운전치사상죄로 규정 종합보험에 가입했더라도 형사처벌이 무조건 면제되는 것은 아님","5":"여행보험 - 보통약관상 보장 보험기간 중에 생긴 상해·후유장해사고 보장","30":"고지의무자는 보험계약자, 피보험자 및 이들의 대리인이다","6":"④보험금이 납입한 보험료를 초과하는 상품","31":"무효의 경우 보험계약 당시 보험사고 이미 발생 보험계약자의 사기로 인한 초과보험, 중복보험 타인의 사망 보험계약에서 피보험자의 서면 동의 얻지 아니할시","7":"계약의 부활(효력회복) 부활시 계약체결시와 마찬가지로 고지의무(계약 전 알릴 - 150 의무)를 이행","32":"손해액 한도 → 지급한 금액의 한도 ③보험자 대위로 인한 목적물에 대한 권리이전의 시기는 보험금액을 전부 지급한 때이다 ② ④제3자의 불법행위라 함은 불법행위뿐 아니라 채무불이행으로 인한 손해배상의무를 부담하는 경우를 포함한다","8":"신체상해보험의 경우 통지의무 사항 ②3일 →30일 ④ ③5일 →15일","33":"보험개발원 : 순보험요율의 산출·검증 및 제공","9":"보상하지 아니하는 손해 고의 또는 중과실, 화재시 도난 및 분실, 자연발화, 폭발 및 파열(전용주택 제외)","34":"제3보험은 상해보험, 질병보험, 간병보험으로 구분된다","10":"연금저축보험의 세제 퇴직연금의 근로자 추가 납입액과 합산하여 적용 400만원까지는 연금저축 납입액과 합산하여 적용 퇴직연금에 납입한 부담금은 300만원 추가 공제","35":"제3보험의 재보험은 겸영이 가능 - 215","11":"①소득공제가 세액공제로 변경 - 164","36":"손해보험회사의 저축성보험 개발은 상해보험에서만 가능(보험기 간15년 이내)","12":"2개월 이상 → 6개월 이상 ①사망사고, 사고후 도주, 12대 중과실 사고인 경우 합의와","37":"보장하지 않는 원인으로 사망시 책임준비금을 지급","13":"사망사고, 사고후 도주, 12대 중과실 사고인 경우 합의와 상관없이 형사처벌 ②사용자 또는 감독자는 피용자에 대하여 ③ - 172 구상권 행사가 가능 ④고의 또는 과실로 인한 위법행위로 타인에게 손해를 가한 자는 그 손해를 배상할 책임이 있음","38":"질병사망특약의 영위 조건 손해보험회사만의 조건 · 한도 : 개인당2억원 이내","14":"타인에게 손해를 가한 자는 그 손해를 배상할 책임이 있음 ④기명피보험자 또는 친족피보험자 →기명피보험 - 183 다른 자동차 운전담보 특약","39":"상해사고의 요건 : 우연성, 외래성, 급격성","15":"다른 자동차의 범위 : 자가용자동차, 피보험자동차와 동일한 차종 보상책임 : 대인배상Ⅱ, 대물, 자기신체사고 피보험자 : 기명피보험자, 기명피보험자의 배우자","40":"실제소득을 감안 →보험가입금액 , ③ ②장래소득 상실분 →장해급수에 따라 지급 225 ④단체상해보험에서 타인의 사망보험계약은 동의 및 생략 가능","16":"대인 사망, 부상1급 : 건당4점 물적사고 할증기준금액초과 사고 & 자기차량손해사고손해액 1억원 초과 : 건당2점 물적사고 할증기준금액 이하 사고 : 건당0.5점","41":"상해보험의 면책손해 피보험자의 직업, 직무 또는 동호회 활동목적으로 생긴 손해는 상해보험에서 보상하지 않는 손해 선박승무원이 직무상 선박에 탑승하고 있는 동안은 면책","17":"보험가입금액 →보험가액 ②도난손해 : 경찰서에 신고하고 ④ 30일 경과 후 보험금 청구 가능 ③이미 받은 보험금을 반환하 - 201 고 피보험자동차를 되찾을 수 있다","42":"합산하여 지급 ④ ②지급률의20%를 보험가입금액에 곱하여 산출한 금액을 지급 - 226 ③신체의 장해정도에 따라 장해분류표의 구분에 준하여 지급액 결정","18":"고 피보험자동차를 되찾을 수 있다 전자적 방법 교부 또는 수령 가능 · 자필서명 또는 전자서명을 받아야 함","43":"신체의 장해정도에 따라 장해분류표의 구분에 준하여 지급액 결정 ② 5년 후 재가입하며, 보험료는 1년마다 갱신","19":"실손의료보험 판매시 준수사항 실손의료보험은 실제 손해액( const LI_QUESTIONS = {"01":[{"num":1,"q":"다음 중 우리나라의 불안한 노후보장체계에 대한 설명으로 바른 것을 모두 고르시오. (가) 2020년 기준 우리나라의 노인빈곤율은 OECD 국가 중 가장 높은 수준이다. (나) 두 차례의 연금개혁으로 국민연금의 명목소득대체율이 2028년까지 40%로 하향 조정될 예정이다. (다) 국민건강보험의 보장률은 60%를 조금 상회하는 수준에 머무르고 있다.","box":"","c":["(가), (나)","(나), (다)","(가), (나), (다)"]},{"num":2,"q":"다음 중 수지상등의 원칙에 대한 설명으로 틀린 것은?","box":"","c":["다수의 동일 연령의 피보험자가 같은 보험종류를 동시에 계약했을 때 보험기간이 끝나면 수입과 지출의 균형이 맞도록 순보험료를 계산하는 것을 의미한다.","보험회사의 지출비용은 보험료와 보험금에 비해 적은 금액이라 감안하지 않는다.","대수의 법칙과 함께 생명보험의 기본원리를 이루는 원칙이다."]},{"num":3,"q":"다음 보기의 내용에서 설명하는 것은? 계약자에게 배당금을 지급하지 않는 대신 보험료 계산시 미리 배당을 감안하여 실제 경험률과 비슷하게 설정하여 보험료를 할인하는 보험","box":"","c":["유배당보험","무배당보험","저배당보험"]},{"num":4,"q":"다음 중 통지의무에 대한 설명으로 틀린 것은?","box":"","c":["계약자 또는 피보험자나 보험수익자는 보험금 지급사유가 발생하였을 때 보험회사에 알려야 한다.","계약자 또는 보험수익자는 주소 또는 연락처가 변경된 경우 즉시 보험회사에 알려야 한다.","계약자 등이 주소변경 통지를 하지 않았을 경우 보험회사의 보험금 지급책임이 면제된다."]},{"num":5,"q":"다음 중 보험계약의 해지에 대한 설명으로 틀린 것은?","box":"","c":["계약자가 보험계약을 해지할 경우 보험회사는 보험료 및 책임준비금 산출방법서에 따라 해지환급금을 계약자에게 지급한다.","계약의 임의해지는 보험회사에서 정한 사유에 해당하는 경우에 가능하다.","사망을 보험금 지급사유로 하는 계약에서 피보험자의 서면동의 철회로 계약이 해지되어 회사가 지급해야 할 해지환급금이 있다면 이를 계약자에게 지급한다."]},{"num":6,"q":"다음 중 언더라이터 업무수칙에 해당하지 않는 것은?","box":"","c":["보험고유의 성질인 다수의 동일 피보험체 위험집단을 구성하는 역할을 충실히 수행한다.","전문화된 지식과 실무능력을 갖추도록 노력하며 보험전문가 로서 자리매김할 수 있도록 지속적인 자기개발을 한다.","직무상 취득한 개인정보를 다양한 목적으로 활용하여 계약자의 이익향상을 위하여 노력한다."]},{"num":7,"q":"다음 중 보험설계사가 준수해야 할 보험관련 법규와 윤리에 대한 설명으로 틀린 것은?","box":"","c":["법규준수란 보험설계사가 고객에게 보험을 판매함에 있어 명문화된 법규를 지키는 것이다.","보험설계사는 관련법규를 준수해야 하는 것은 물론이고 상식에도 귀를 기울여야 한다.","계약자의 이익을 위해 초회보험료 대납을 통해 특별이익을 제공해야 한다."]},{"num":8,"q":"다음 표의 ( )안에 들어갈 내용이 바르게 나열된 것은? 「보험사기방지특별법」상 보험사기행위에 해당할 경우에는 ( ) 이하의 징역 또는 ( ) 이하의 벌금에 처할 수 있다.","box":"","c":["10년, 5천만원","5년, 3천만원","3년, 2천만원"]},{"num":9,"q":"다음 중에서 보험사기에 대한 설명으로 사실과 다른 것은?","box":"","c":["사고 발생 후 상당기간이 경과한 후에 보험금을 청구하기 때문에 입증이 매우 어렵다.","다수의 선의의 피해자가 발생한다.","최근에는 개인의 단독 보험사기범죄가 증가하고 있다. 1월1회모의고사"]},{"num":10,"q":"다음 중 생명보험사회공헌재단의 자살예방사업에 해당하지 않는 것은?","box":"","c":["농약안전보관함 보급","SOS생명의 전화  보험기간은 단기이며, 손해보험계약은 보험기간이 장기이다.","생명보험계약은 실손보상을, 손해보험계약은 정액보상을 주된 보상원칙으로 한다.","생명보험계약은 확정기간 내의 보험사고에 대해 보장받으며, 손해보험계약은 종신동안 보장받는다.","생명보험계약은 사람의 생존과 사망을, 손해보험계약은 재산상의 손해를 보장대상으로 한다."]},{"num":22,"q":"다음 중 생명보험 관련 법규에 대한 설명으로 맞는 것은?","box":"","c":["생명보험 계약관계를 규율하는 근거법률은 자본시장과 금융투자업 에 관한 법률이다.","보험회사의 공동행위와 관련하여 독점규제 및 공정거래에 관한 법률 을 적용받고 있다.","보험회사의 건전한 경영을 도모하고 보험회사의 권익을 보호하기 위한 감독법규 체계가 필요하다.","보험업 허가 및 감독관련 근거 법률은 보험업법 과 예금자보호법 이다."]},{"num":23,"q":"다음 중 특약의 구분과 내용이 바르게 연결된 것은?","box":"","c":["보장을 추가·확대하기 위한 특약 - 우량체 할인특약","제도성 특약 - 선지급서비스특약","제도성 특약 - 휴일재해보장특약","보장을 추가·확대하기 위한 특약 - 연금전환특약"]},{"num":24,"q":"다음 중 특별계정에서 운용되는 보험상품은 무엇인가?","box":"","c":["종신보험","상해보험","실손보험","변액보험"]},{"num":25,"q":"다음 중 종신보험에 대한 설명으로 틀린 것은?","box":"","c":["다양한 특약 부가를 통해 종합보장형 설계가 가능하다.","피보험자의 유가족이 처하게 될 경제적 어려움에 대비할 수 있다.","피보험자가 일정시점에 생존한 경우에만 약정된 보험금을 지급한다.","보장성보험료 세액공제를 받을 수 있다."]},{"num":26,"q":"다음 중 생명보험 상품에 대한 설명으로 옳은 것은?","box":"","c":["금리확정형보험 - 변액보험을 제외한 대부분의 저축성보험에 적용되는 이자 적립방식","금리연동형보험 - 최초 가입시 정한 이율로 만기까지 이자를 적립하는 보험","자산연계형보험 - 최저보증이율을 설정해 놓고 연계자산의 수익률에 따라 추가로 이율을 지급하는 보험","실적배당형보험 - 특정자산의 운용실적에 연계하여 투자성과를 지급하는 보험"]},{"num":27,"q":"다음 중 교육보험에 대한 설명으로 틀린 것은?","box":"","c":["자녀의 교육기간 동안 자녀의 교육자금을 보장한다.","각종 인성프로그램, 진학상담 서비스를 추가한 상품도 판매된다.","부모 사망시 양육자금 및 교육자금을 지급한다.","생사혼합보험에 해당하고 보장성보험으로 분류된다."]},{"num":28,"q":"다음 중 유니버설보험에 대해 잘못 설명한 것은?","box":"","c":["보험료의 추가납입이 가능하다.","중도인출을 할 수 있다.","기본보험금에 공시이율을 적용하여 추가 적립된 금액을 보험금으로 지급하는 상품이다.","일반계정에서는 운용되지 않는다."]},{"num":29,"q":"다음의 장애인보험에 대한 설명에서 ( )안에 들어갈 용어가 알맞게 연결된 것은? ( )시행에 따라 장애인에 대한 차별적 요소를 제거하기 위한 법적 장치가 마련되었으며, 이와 관련하여 ( )은/는 장애인 보험가입차별 방지를 위한 신고센터를 운용하고 있다.","box":"","c":["장애인복지법 – 생명보험협회","장애인차별금지 및 권리구제 등에 관한 법률 - 금융감독원","장애인복지법 – 금융감독원","장애인차별금지 및 권리구제 등에 관한 법률 –생명보험협회"]},{"num":30,"q":"다음 중 변액보험 상품과 설명을 바르게 연결한 것은? (가) 변액종신보험 a. 제1보험기간과 제2보험기간으로 구분 (나) 변액연금보험 - b. 연금으로 전환가능 (다) 변액유니버설보험 c. 보험료 추가납입 및 중도인출 가능","box":"","c":["(가) - c","(나) - a","(다) - b","(가) - a 1월1회모의고사"]},{"num":31,"q":"다음 중 제3보험에서 보장하지 않는 것은?","
