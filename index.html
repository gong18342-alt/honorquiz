없다.","현재 간병보험은 위험률 산출 경험데이터가 충분치 않아 위험률 변동제도를 채택하고 있다. 11월2회모의고사"]}],"23":[{"num":1,"q":"다음 중 FY2021 생명보험 산업현황에 대한 설명으로 맞는 것은?","box":"","c":["2021년 우리나라 생명보험 수입보험료 총액은 세계 8위이다.","보험밀도는 해당 국가의 GDP 대비 보험료 비율이다.","보험침투율은 한 국가의 국민 1인이 평균적으로 지출하고 있는 보험료를 나타낸 것이다."]},{"num":2,"q":"다음 보기의 ( ) 안에 들어갈 내용으로 알맞은 것은? ( ) = 1년간의 사망자수 ÷ 연초의 생존자수","box":"","c":["생존율","사망률","출생률"]},{"num":3,"q":"다음 중 청약철회가 가능한 계약에 해당하는 것은?","box":"","c":["보험증권을 교부받고 10일, 청약일로부터 20일이 경과한 계약","보험기간이 60일 이내인 계약","계약체결 전에 건강상태 진단을 지원하는 계약"]},{"num":4,"q":"다음 중 보험계약의 무효사유에 해당하지 않는 것은?","box":"","c":["타인의 사망을 보험금 지급사유로 하는 보험계약에서 계약을 체결할 때까지 피보험자의 서면에 의한 동의를 전자서명으로 받은 경우","만 15세 미만자를 피보험자로 하여 사망을 보험금 지급 사유로 한 계약의 경우","도박을 목적으로 보험계약을 체결한 경우"]},{"num":5,"q":"다음 중 보험계약자 등에 대한 보험회사의 의무가 아닌 것은?","box":"","c":["보험약관의 교부, 설명의무","보험금 지급의무","계약 전 알릴 의무"]},{"num":6,"q":"다음 보기의 ( ) 안에 들어갈 알맞은 단어는? 계약을 부활(효력회복)할 경우 책임개시일, 회사의 승낙거절시 보험료 반환, 계약 전 알릴 의무 등은 신계약 절차와 동일하게 이루어지는데, 그 이유는 계약부활(효력회복)시 일반적으로 부활(효력회복) 청약자의 고의에 의한 ( ) 개연성이 높아 이를 방지하기 위해서이다.","box":"","c":["도덕적 해이","보험사기","역선택"]},{"num":7,"q":"다음 중 보험나이에 대한 설명으로 틀린 것은?","box":"","c":["피보험자의 나이는 보험나이를 기준으로 한다.","만 15세 미만자를 피보험자로 하여 사망을 보험금 지급 사유로 한 계약의 경우에는 실제 만 나이를 적용한다.","보험나이는 매년 1월 1일에 증가한다."]},{"num":8,"q":"다음 보기 중 언더라이팅 정보의 원천에 해당하는 것을 모두 고른 것은? (가) 계약 전 알릴 의무 고지사항 (나) 판매채널의 모집보고서 (다) 계약적부 확인에 의한 조사보고서 (라) 계약자의 가족관계 정보","box":"","c":["(가), (다), (라)","(가), (나), (다)","(가), (나), (라)"]},{"num":9,"q":"다음 중 보험계약의 완전판매를 위한 3대 기본지키기를 맞게 나열한 것은?","box":"","c":["보험약관 교부 및 중요한 내용 설명, 청약서 부본 전달, 자필서명 안내 및 확인","부당한 계약전환 금지, 청약서 부본 전달, 자필서명 안내 및 확인","고객정보의 보호, 부당한 계약전환 금지, 보험약관 교부 및 중요한 내용 설명"]},{"num":10,"q":"다음 중 생명보험업계의 자살예방을 위한 노력에 대한 설명으로 맞는 것은?","box":"","c":["2010년 생명보험사회공헌위원회를 설립하였다.","자살예방 게이트키퍼를 양성한다.","생명보험사회공헌재단을 통해 농약안전보관함을 보급하고 있다. ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음 중 보험업법령상 교차모집제도와 관련한 교차모집 보험설계사의 금지사항으로 틀린 것은?","box":"","c":["교차모집을 위탁한 보험회사에 대하여 다른 교차모집보험 설계사 유치를 조건으로 대가를 요구하는 행위","모집을 위탁한 보험회사에 대하여 회사가 정한 수수료 외에 추가로 대가를 요구하는 행위","TV 또는 홈쇼핑에 출연하여 보험상품에 대해 설명하는 행위"]},{"num":12,"q":"다음 중 보험대리점에 대한 설명으로 틀린 것은?","box":"","c":["보험대리점은 보험회사를 위해 보험계약의 체결을 대리하는 자를 말한다.","보험업종에 따라 개인보험대리점 및 법인보험대리점으로 구분된다.","보험대리점은 일사전속제가 적용되지 않는다."]},{"num":13,"q":"다음 특별이익 제공에 대한 설명 중 틀린 것은?","box":"","c":["상법 제682조에 따른 제3자에 대한 청구권 대위행사의 포기 등의 특별이익을 제공하여서는 아니 된다.","기초서류에서 정한 보험금액보다 많은 보험금액의 지급을 약속하여서는 아니 된다.","특별이익 제공으로 처벌대상이 되는 금품은 최초 1년간 납입되는 보험료의 15%와 3만원 중 적은 금액을 초과하는 금품이다."]},{"num":14,"q":"다음 중 우수인증설계사에 대한 설명으로 틀린 것은?","box":"","c":["불완전판매비율은 3% 미만이어야 한다.","보험계약 유지율이 13회차 90%, 25회차 80%이어야 한다.","인증기간은 1년이다."]},{"num":15,"q":"다음 중 예금자보호에 해당하지 않은 상품은?","box":"","c":["개인형퇴직연금(IRP)","변액보험의 주계약","변액보험의 특약"]},{"num":16,"q":"다음 중 보험상품에 관하여 광고를 하는 경우에 반드시 포함해야 하는 내용에 해당하지 않는 것은?","box":"","c":["금융상품에 관한 계약을 체결하기 전에 상품설명서 및 약관을 읽어볼 것을 권유하는 내용","광고의 유효기간이 있는 경우 해당 유효기간","장래에 있을 이익의 배당 또는 잉여금의 분배에 대한 예상에 관한 사항"]},{"num":17,"q":"다음 중 온라인 보험슈퍼마켓(보험다모아)에 대한 설명 으로 틀린 것은?","box":"","c":["보험다모아는 금융감독원에서 운영하고 있다.","IT와 금융이 결합된 핀테크에 대한 관심을 반영하여 보험 소비자의 편의를 위해 개발되었다.","보험종목을 8가지로 분류하여 보험소비자가 보다 저렴한 상품을 손쉽게 비교하여 가입할 수 있도록 가입경로를 안내하고 있다."]},{"num":18,"q":"다음 중 보장성보험료 세액공제에 대한 설명으로 옳은 것은?","box":"","c":["연간 소득금액이 100만원을 초과하는 부양가족을 피보험 자로 하여 보장성보험에 가입하고 보험료를 납입한 경우 세액공제 대상에 해당한다.","기본공제대상자에 해당하지 않는 부양가족을 피보험자로 하여 보장성보험에 가입하고 보험료를 납입한 경우 세액 공제 대상에 해당한다.","근로소득자인 김생명씨가 태아를 피보험자로 하여 일반 보장성보험에 가입한 경우 공제대상에 해당하지 않는다."]},{"num":19,"q":"다음 중 종합과세 대상에 해당하지 않는 소득은 무엇인가?","box":"","c":["양도소득","근로소득","사업소득"]},{"num":20,"q":"다음 중 연금계좌에 납입한 퇴직금을 연금 외 형태로 수령하는 경우 과세되는 소득으로 맞는 것은?","box":"","c":["연금소득","퇴직소득","기타소득 12월1회모의고사"]},{"num":21,"q":"다음 보기의 내용 중 생명보험계약의 특징으로 맞는 것을 모두 고른 것은? (가) 사람의 생존과 사망 보장 (나) 재산상의 손해 보장 (다) 최대 종신까지 보장","box":"","c":["(가), (나)","(나), (다)","(가), (다)","(가), (나), (다)"]},{"num":22,"q":"다음 중 생명보험계약에서 역선택을 방지하기 위한 방법에 해당하지 않는 것은?","box":"","c":["건강검진","계약 전 알릴 의무","언더라이팅","적합성 원칙"]},{"num":23,"q":"다음 중 가입자의 편의를 위한 제도성 특약이 아닌 것은?","box":"","c":["우량체 할인특약","선지급서비스특약","입원특약","연금전환특약"]},{"num":24,"q":"다음 중 변액보험에 대한 설명으로 틀린 것은?","box":"","c":["특별계정에서 별도로 관리하고 있다.","대표적인 실적배당형보험 상품이다.","변액보험은 유가증권 등에 투자하고 운용실적을 매일 평가 하여 보험금에 반영한다.","자산연계형보험은 변액보험보다 높은 수익률을 기대할 수 있다."]},{"num":25,"q":"다음 중 종신보험에 대한 설명으로 틀린 것은?","box":"","c":["유가족의 경제적 곤궁을 해결해주는 생활보장 상품이다.","특약 부가를 통해 하나의 보험으로 여러 개의 보험을 가입한 효과가 있다.","종합보장형 보험설계가 불가능하다.","연금전환 특약을 활용하여 연금전환이 가능하다."]},{"num":26,"q":"다음 중 장애인전용 보장성보험의 세액공제율(지방소득세 별도)은?","box":"","c":["12%","15%","20%","24%"]},{"num":27,"q":"다음 보기의 ( ) 안에 들어갈 상품이 알맞게 연결된 것은? 퇴직금 등을 일시에 납입하면 바로 연금 수령이 개시되는 ( ), 특별계정의 운용실적에 따라 보험금이 변동하는 ( ), 보험료 납입과 연금 수령이 달러화 등 외국통화로 이루어지는 ( ) 등 소비자의 다양한 수요에 부응하는 연금보험 상품이 판매되고 있다.","box":"","c":["세제적격 연금저축 - 변액연금보험 - 외화연금보험","세제적격 연금저축 - 변액유니버설보험 - 외화정기보험","일시납 즉시연금보험 - 변액연금보험 - 외화연금보험","일시납 즉시연금보험 - 변액유니버설보험 - 외화정기보험"]},{"num":28,"q":"다음 중 퇴직연금의 적립금 운용방법이 아닌 것은?","box":"","c":["보험회사 실적배당형상품","상호저축은행 적금","부동산 투자","원리금보장형 ELB"]},{"num":29,"q":"다음 중 변액유니버설보험의 특징이 아닌 것은?","box":"","c":["추가납입, 중도인출이 가능하다.","변액유니버설보험(적립형)은 장기투자 목적으로 가입한다.","중도에 보험계약 해지시 최저보증이 이루어지지 않는다.","변액유니버설보험의 변동보험금 계산방식은 모두 동일하다."]},{"num":30,"q":"다음 보기에서 설명하는 변액보험은 무엇인가? (가) 피보험자 사망시 사망보험금을 기납입보험료와 비교하여 더 큰 금액을 지급한다. (나) 중도인출, 추가납입 기능이 있다.","box":"","c":["변액종신보험","변액연금보험","변액유니버설보험(적립형)","변액유니버설보험(보장형) 12월1회모의고사"]},{"num":31,"q":"다음에서 제3보험에 대한 설명으로 틀린 것은?","box":"","c":["1977년 보험업법 개정으로 처음으로 법체계에 편입되었다.","사람의 신체에 대한 보험이므로 생명보험의 성격을 가지고 있다.","실손보상적 측면에서 손해보험의 성격을 가지고 있다.","생명보험업에 대한 모든 보험종목에 대하여 허가를 받은 경우 제3보험업을 영위할 수 있다."]},{"num":32,"q":"다음 중 보험업에 대한 설명으로 맞는 것은?","box":"","c":["생명보험업은 단기・거대한 위험을 대상으로 한다.","보험업법에서는 생・손보 겸영에 대해 특별한 제한을 하지 않고 있다.","생명보험과 손해보험의 상이한 리스크를 고려하여 겸영이 금지되어 있다.","제3보험은 겸영이 금지되어 있다."]},{"num":33,"q":"다음의 생명보험과 상해보험을 비교한 내용 중 알맞은 것은? (가) 발생여부 확정 확정 (나) 발생시기 불확정 불확정 (다) 발생원인 불확정 확정 (라) 피해정도 확정 확정 생명보험 상해보험","box":"","c":["(가)","(나)","(다)","(라)"]},{"num":34,"q":"다음 중 상해보험과 질병보험에 대한 설명으로 맞는 것은?","box":"","c":["질병보험은 약정한 사망보험금을 지급한다.","상해보험은 상해사고의 발생원인이 신체에 내재되어 있어야 한다.","상해보험은 상해사고의 결과로 발생한 질병은 보장한다.","질병보험은 보험업법상 생명보험 상품에 해당한다."]},{"num":35,"q":"다음 중 상해보험과 질병보험의 공통점이 아닌 것은?","box":"","c":["보장성보험에 해당한다.","피보험자의 직업・직무에 따라 상이한 위험률을 적용한다.","피보험자는 보험사고의 대상이 되는 자를 말한다.","질병으로 인한 사망은 특약을 통해서만 보장받을 수 있다."]},{"num":36,"q":"다음 표의 ( ) 안에 들어갈 용어를 맞게 나열한 것은? 보험계약자 및 피보험자는 직업・직무 변경시 ( 가 ) 그 사실을 보험회사에 통지하여야 하며, 통지를 게을리 한 경우 보험회사는 그 사실을 안 날로부터 ( 나 ) 내에 보험계약을 해지할 수 있다.","box":"","c":["(가) 지체없이, (나) 3개월","(가) 지체없이, (나) 1개월","(가) 3개월 내, (나) 1개월","(가) 3개월 내, (나) 3개월"]},{"num":37,"q":"다음 중 질병보험에 대한 설명으로 틀린 것은?","box":"","c":["질병의 원인은 신체에 내재되어 있으므로 도덕적 해이 발생 가능성이 적다.","특화된 질병만을 보장하는 상품이 있다.","평균수명의 연장으로 노인인구가 증가하면서 질병기간이 장기화되고 있다.","질병에 대한 진단확정, 수술, 입원, 요양에 따른 비용 등을 보장한다."]},{"num":38,"q":"다음 중 암보험에 대한 설명으로 틀린 것은?","box":"","c":["순수보장형과 만기환급형으로 구분된다.","특정암을 집중적으로 보장하는 형태의 상품도 있다.","고액암과 소액암으로 구분하는 경우도 있다.","가입가능연령은 30세 이상이다."]},{"num":39,"q":"다음 중 실손의료보험 계약전환용 상품 가입 프로세스를 순서대로 맞게 나열한 것은? (가) 계약체결(종전 실손담보는 해지) (나) 대리점/설계사에 전환 요청 (다) 가입설계(필요시 인수심사) (라) 전환 전・후 상품 비교안내 및 전환의사 재확인","box":"","c":["(가) → (라) → (나) → (다)","(가) → (나) → (다) → (라)","(나) → (라) → (다) → (가)","(나) → (가) → (라) → (다)"]},{"num":40,"q":"다음 중 질병보험의 주계약에서 보장하지 않는 것은?","box":"","c":["암수술보험금","급성심근경색 수술급여금","암사망보험금","과로사 관련 특정질병 12월1회모의고사"]}],"24":[{"num":1,"q":"다음에서 생명보험을 필요로 하는 사회적 배경에 해당 하지 않는 것은?","box":"","c":["충분한 공적 사회보장체계","핵가족화","재해와 성인병 증가"]},{"num":2,"q":"다음 중 ( ) 안에 들어갈 내용으로 알맞은 것은? 생애주기에서 중년기에는 ( 가 )이 ( 나 )보다 많아 ( 다 )이 발생한다.","box":"","c":["(가) 소득 (나) 소비지출 (다) 잉여소득","(가) 소비지출 (나) 소득 (다) 여유소득","(가) 근로소득 (나) 사업소득 (다) 잉여소득"]},{"num":3,"q":"다음 중 보험계약의 단체취급에 대한 설명으로 틀린 것은?","box":"","c":["동일한 단체에 소속된 계약자 또는 피보험자를 대상으로 한다.","계약자 또는 피보험자 3인 이상을 대상으로 한다.","동일한 상품을 구입하는 경우를 대상으로 한다."]},{"num":4,"q":"다음 중 보험약관의 설명의무에 대한 설명으로 틀린 것은?","box":"","c":["보험약관의 설명의무를 위반하였을 경우에 계약이 성립한 날로부터 1년 이내에 그 계약을 취소할 수 있다.","보험계약자에게 설명해야 할 약관의 중요한 내용은 보험 종류에 따라 다르다.","거래상 일반적이고 공통적인 내용은 설명의무의 대상에서 제외된다."]},{"num":5,"q":"다음 중 계약 전 알릴 의무에 대한 설명으로 틀린 것은?","box":"","c":["계약 전 알릴 의무 대상이 되는 중요한 사항은 청약서의 질문표를 사용한다.","중요한 사항은 보험가입금액 한도 제한, 일부 보장 제외, 보험금 삭감 등 계약승낙에 영향을 미칠 수 있는 사항을 말한다.","중요한 사항을 알릴 의무자는 보험계약자와 보험수익자이다."]},{"num":6,"q":"다음 ( ) 안에 들어갈 숫자의 합으로 알맞은 것은? 비교안내를 충실히 이행했음에도 기존 보험계약이 소멸된 날부터 ( )개월 이내에 새로운 보험계약을 청약하게 하거나 새로운 보험계약을 청약하게 한 날부터 ( )개월 이내에 기존 보험계약을 소멸하게 한 경우 부당한 계약전환에 해당될 수 있다.","box":"","c":["2","3","6"]},{"num":7,"q":"다음의 설명 중 내용이 잘못된 것은?","box":"","c":["2006년 1월 1일생은 2020년 7월 1일부터 사망을 담보하는 보험계약의 피보험자가 가능하다.","2006년 1월 1일생의 경우 2020년 8월 1일의 보험나이는 15세이다.","보험나이는 6개월 미만의 끝수는 버리고 6개월 이상의 끝수는 1년으로 계산한다."]},{"num":8,"q":"다음 중 언더라이팅에 대한 설명으로 틀린 것은?","box":"","c":["보험설계사는 1차 위험선택의 기능을 수행한다.","계약인수 과정상 건강진단을 필요로 하는 경우 서류진단은 직장에서 진단받은 근로자 건강검진 결과로 대신할 수 없다.","언더라이터는 보험계약내용 및 조건, 보험료 등을 최종 결정한다."]},{"num":9,"q":"다음 중 보험회사의 내부신고제도 운영과 관련하여 주요 신고대상 행위가 아닌 것은?","box":"","c":["금융기관보험대리점 모집종사자 ‘갑’은 보험회사 판매담당 직원인 ‘을’에게 해당 보험회사의 상품만 모집하는 조건으로 금품을 요구하였다.","판매담당 직원인 ‘갑’은 같은 부서 ‘을’ 관리자로부터 보험 계약 모집과정에 위법성이 있었는지 검토하라는 지시를 받았다.","판매담당 직원인 ‘갑’은 같은 부서 ‘을’관리자로부터 ‘병’ 보험소비자가 가입한 보험계약의 보험료 지원을 지시받았다. 12월2회모의고사"]},{"num":10,"q":"다음 중 보험협회의 보험사기 방지활동으로 바르지 못한 것은?","box":"","c":["경찰청, 금융감독원, 보험협회, 보험회사로 구성된 보험범죄 수사협의회를 운영하고 있다.","보험사기 취약계층에 대한 교육 및 대국민 홍보활동을 강화하고 있다.","보험범죄 신고센터를 통해 신고된 보험사기에 대해 신고 포상금을 지급하고 있다. ＜보험법규＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 3점)"]},{"num":11,"q":"다음 중 생명보험설계사의 등록요건으로 맞는 것은?","box":"","c":["금융위원회에서 실시하는 생명보험설계사 등록자격시험에 합격한 자","생명보험 관계업무에 1년 이상(등록신청일로부터 3년 이내) 종사한 경력이 있고 교육을 이수한 자","설계사 등록자격시험에 합격하고 교육 과정을 10시간 이상 이수한 자"]},{"num":12,"q":"다음 중 ( ) 안에 들어갈 보험설계사 등록절차를 순서대로 나열한 것은? 보험회사의 신입 도입 → ( ) → ( ) → ( ) → 보험설계사 활동","box":"","c":["협회 등록 신청 →협회 등록 및 보험회사와 위촉계약 체결 → 보험설계사 시험합격 및 등록교육 이수","협회 등록 신청 →보험설계사 시험합격 및 등록교육 이수 → 협회 등록 및 보험회사와 위촉계약 체결","보험설계사 시험합격 및 등록교육 이수 →협회 등록 신청 → 협회 등록 및 보험회사와 위촉계약 체결"]},{"num":13,"q":"다음 중 금융기관보험대리점의 모집방법에 대한 설명으로 틀린 것은?","box":"","c":["금융기관 점포 내의 지정된 장소에서 2인까지만 판매가 가능하다.","모든 금융기관보험대리점은 전화, 우편, 컴퓨터 통신, 방문 판매, 인터넷 홈페이지를 이용하여 불특정 다수의 고객을 대상으로 보험상품을 안내 또는 설명하여 모집하는 것이 가능하다.","은행법에 의해 설립된 은행, 상호저축은행은 금융기관보험 대리점 등록이 가능하다."]},{"num":14,"q":"다음 중 ｢생명보험 공정경쟁질서 유지에 관한 협정｣에 대한 설명으로 틀린 것은?","box":"","c":["적용범위는 보험회사와 그 소속 모집종사자이다.","협정 위반시 피해를 본 보험회사는 위반행위가 있는 날로부터 6개월 이내에 생명보험협회에 신고할 수 있다.","신고 접수시 생명보험협회 내에 설치된 공정경쟁질서유지 심의・의결을 위원회의 거쳐 과태료를 부과한다."]},{"num":15,"q":"다음 중 우수인증설계사의 인증기준에 해당되는 자는?","box":"","c":["영업실적 연간소득 4,000만원 이상","직전 1년 불완전판매건수 1건인 자","법인전속대리점 소속인 자"]},{"num":16,"q":"다음 중 생명보험 광고심의절차에 대한 설명으로 틀린 것은?","box":"","c":["브랜드광고는 심의대상이 아니다.","금융위원회는 접수된 광고물에 대해 심의 후 심의결과를 통보한다.","온라인매체, 방송매체 등 광고물에 대해 보험회사 내 준법 감시인 등의 확인을 거쳐 생명보험협회에 심의를 신청한다."]},{"num":17,"q":"다음 중 보험회사의 상품공시에 대한 설명으로 틀린 것은?","box":"","c":["보험상품을 소개하고, 서로 비교할 수 있도록 정보를 제공 한다.","가격공시실을 통하여 소비자가 직접 가입설계를 하고 보험료를 조회할 수 있다.","보험소비자가 자신의 니즈에 적합한 보험상품을 선택할 수 있도록 보험안내자료를 제공하고 있다."]},{"num":18,"q":"다음 보기에서 ( ) 안에 들어갈 숫자의 합은? 보장성보험료에 대한 세액공제액 [일반 보장성보험의 보험료] × ( )%* + [장애인전용 보장 성보험의 보험료] × ( )%* * 지방소득세 별도","box":"","c":["24","27","30"]},{"num":19,"q":"다음 보기의 ( ) 안에 들어갈 가장 알맞은 용어는? 피상속인의 사망으로 인하여 지급받는 보험금으로 피상속인이 보험계약자인 보험계약에 따라 받는 것은 ( )으로 본다.","box":"","c":["상속재산","증여재산","근로재산 12월2회모의고사"]},{"num":20,"q":"다음 표에서 ( ) 안에 알맞은 숫자를 순서대로 맞게 나열한 것은? 보험회사는 보험설계사에게 매월 모집수당을 지급할 때 ( 가 )% (지방소득세 별도)를 원천징수하여, 다음달 ( 나 )일까지 관할 세무서에 신고・납부하여야 한다.","box":"","c":["(가) 3, (나) 10","(가) 5, (나) 10","(가) 3, (나) 30 ＜생명보험＞ 물음에 적합한 것 하나만 골라 그 번호를 답안지에 표기하시오. (1문제당 4점)"]},{"num":21,"q":"다음 보기의 ( ) 안에 들어갈 말이 바르게 연결된 것은? 현재 사용되고 있는 생명보험( 가 )은 ｢상법｣ 제4편(보험)의 규정을 토대로 작성되었는데, ｢상법｣의 규정보다 보험계약자의 권리를 ( 나 )하고 있다.","box":"","c":["(가) 개별약관, (나) 축소","(가) 개별약관, (나) 확대","(가) 표준약관, (나) 축소","(가) 표준약관, (나) 확대"]},{"num":22,"q":"다음 중 작성자 불이익의 원칙이 적용되는 생명보험계약의 법적 특성은 무엇인가?","box":"","c":["불요식계약성","부합계약성","낙성계약성","선의계약성"]},{"num":23,"q":"다음 표의 ( ) 안에 들어갈 내용으로 맞는 것은? 특약에는 보험료 부담없이 가입자의 편의성을 도모하기 위한 ( )이 있다.","box":"","c":["무담보 특약","무료특약","편의특약","제도성 특약"]},{"num":24,"q":"다음 중 특별계정에서 운영되는 생명보험 상품이 아닌 것은?","box":"","c":["연금저축보험","퇴직보험","자산연계형보험","장기간병보험"]},{"num":25,"q":"다음 중 ( ) 안에 들어갈 내용으로 알맞은 것은? 종신보험은 ( 가 )을 보장하는 ( 나 ) 상품이다.","box":"","c":["(가) 사망 (나) 보장성보험","(가) 생존 (나) 저축성보험","(가) 생존 및 사망 (나) 보장성보험","(가) 사망 (나) 저축성보험"]},{"num":26,"q":"｢장애인 법률｣에 다음 중 차별금지 const LI_EXPLANATIONS = {"01":{"1":"이로 인해 노후생활을 준비하는 수단으로 생명보험에 대한 수요는 지속될 것으로 예상된다.","26":"①금리연동형보험에 대한 설명 ②금리확정형보험에 대한 설명 ④자산연계형보험에 대한 설명","2":"대한 수요는 지속될 것으로 예상된다. 계약자가 납입하는 보험료 총액과 보험회사가 지급하는","27":"대한 설명 ④자산연계형보험에 대한 설명 교육보험은 생존보험에 해당하고 저축성보험으로","28":"분류된다. 유니버설보험은 일반계정과 특별계정으로 모두","3":"/ 무배당보험에 대한 설명","4":"변경된 주소를 통지하지 않았다고 해서 보험회사의 보험금 지급책임이 면제되는 것은 아니다.","29":"장애인에 대한 차별적 요소를 제거하기 위한 법적 장치는 장애인차별금지 및 권리구제 등에 관한 법률이며","5":"계약자는 계약이 소멸하기 전에 언제든지 계약자의","30":"(가) - b, (나) - a, (다) - c","6":"/ 정보를 취득한 목적 외에는 활용하거나 노출하지 않아야 한다.","31":"/ 변액보험은 생명보험 상품으로 제3보험에서 보장하지 않는다.","7":"않아야 한다. 고객의 보험료를 보험설계사가 대납하는 행위는","32":"않는다. 보험금은 주로 정액보상과 실손보상 방법으로 지급한다.","33":"①직업·직무 변경 사실을 보험설계사에게 알렸을 경우","8":"10년 이하의 징역, 5천만원 이하의 벌금에 처할 수 있다.","9":"개인의 단독범죄 보다는 여러 사람이 공모하는","10":"경우가 대부분이다. 게이트키퍼는 한국생명존중희망재단에서 양성한다.","11":"→ / 금융감독원 금융위원회","34":"/ (가)교통재해보험은 상해보험, (라)간병보험은 간병보험","12":"국회와 정부에서 보장성보험에 대해서는 방카슈랑스","35":"상해보험의 보장내용이다.","36":"①만기환급형으로 설계할 수 있다. ③연령이 증가함에","13":"6개월 → 1년","14":"보험금 청구단계에서 설명해야 하는 사항","37":"동일한 암의 직접적인 치료를 목적으로 2회 이상","15":"통신수단을 이용한 보험계약을 청약한 경우 청약철회, 계약내용 확인, 계약해지도 통신수단을 이용할 수 있다.","16":"①설명의무는 / 일반보험계약자에게 적용되며, 전문보험 계약자는 제외한다. ②구두 → 서명, 기명, 녹취의 방법","38":"/ 제3보험 상품 중 실손보상 급부가 있는 계약에 한정된다.","17":"계약자는 제외한다. ②구두 → 서명, 기명, 녹취의 방법 2년 이상 → 3년 이상","39":"한정된다. 4세대 실손의료보험은 비급여의 경우 입원·통원 합산","18":"①③은 생명보험회사에서 공시하며, ②은 생명보험 협회의 기타공시 내용 중 하나이다.","19":"협회의 기타공시 내용 중 하나이다. 연금보험 - 이자소득, 연금저축 – 연금소득","40":"이내에서 실제 지출한 의료비의 일부를 보상한다. 재가급여 → 시설급여","20":"①70세 미만인 경우 5%(지방소득세 별도) ②80세 이상인 경우 3%(지방소득세 별도)","21":"①②③은 / 생명보험계약과 손해보험계약 내용이 서로 바뀌어 설명하고 있다.","22":"바뀌어 설명하고 있다. ①자본시장과 금융투자업에 관한 법률 → 상법 제4편 (보험) ③보험회사의 권익 보호 → 보험계약자의 권익 보호","23":"예금자보호법 → 금융위원회의 설치 등에 관한 법률 ② / ①우량체 할인특약은 제도성 특약 ③휴일재해보장 특약은 보장을 추가·확대하기 위한 특약 ④연금전환특약은","24":"제도성 특약이다. / 대부분의 생명보험 상품은 일반계정에서 운용되며 변액보험, 연금저축보험, 퇴직보험 등이 특별계정에서","25":"운용된다. 종신보험은 피보험자가 언제 어떤 경우로 사망하더라도 약정된 보험금을 지급하는 것이 특징이다."},"02":{"1":"①장기자금의 성격 ②소수 계약자 → 수많은 계약자의 소액자금","28":"②만 15세 미만 사망시 납입한 보험료 전액과 책임준 비금 중에서 큰 금액을 지급하고 계약은 소멸한다. ③어린","2":"소액자금 과거에는 모든 생명보험회사가 동일한 배당률을 적용 하였지만 2000년 4월부터 보험가격 자유화가 시행됨에 따","3":"라 완전 자유화되었다. ①정신적인 ②일시적으로 / 훼손상태도 포함한다. 나타","29":"험은 사망을 보장하는 급부설계를 할 수 없다. → / 장애인복지법 상속 및 증여세법","30":"변액보험은 법적으로 「보험업법」과 「자본시장과","4":"만 15세 미만자","5":"납입최고(독촉)기간 내에 연체보험료가 납입되지 아니 할 경우 납입최고(독촉)기간이 끝나는 날의 다음 날에 계약","31":"①겸영을 금지하고 있다. ③상법에는 상해보험과 질 병보험 관련 규정이 반영되어 있으나, 간병보험에 대한 규","6":"이 해지된다. ②보장을 받기 위해서는 계약 성립 완료 이후 제1회 보 험료를 납입해야 한다. ③계약자와 수익자가 다른 경우 수","32":"보증보험, 해상보험, 재보험 모두 손해보험업의 보험","7":"저축성보험도 보험계약대출이 가능하다.","8":"표준체보다 위험이 낮은 경우를 우량체라고 한다.","33":"(가)80세 만기, (나)2억원 = 80+2 = 82","9":"②,③ 외에 자필서명 안내 및 확인이 있다.","34":"상해보험의 보장내용 중 재해입원급여금에 대한 설명","10":"“보고듣고말하기”는 한국생명존중희망재단에서 개발·","35":"①만기환급금의 유무에 따라 순수보장형과 만기환급 ②상해란","11":"보급한다. 유예기간이 종료된 자는 보험설계사가 될 수 있다.","12":"②보험중개사는 특정 보험회사에 소속되지 않고 독립","36":"가 완만하거나 연속적으로 발생한다면 보상하지 않는다. ①질병보험에 대한 내용 ②상해보험에 대한 내용 ③ 상해보험과 질병보험 모두 만기환급형으로 설계할 수 있","13":"모집인이 직접 작성한 보험안내자료를 사용하기 위해","37":"질병보험은 외래성이 인정되지 않는다.","14":"/ 금융분쟁조정위원회는 금융감독원에서 운영한다.","38":"①암직접치료를 / 위한 입원과 통원보험금 등을 보장한","15":"보험상품 광고시 금지사항에 해당하는 내용","16":"①결산공시 - 공시일로부터 3년간 ③상반기 결산공시","39":"국민건강보험 급여항목 중 본인부담액과 비급여항목","17":"계약의 성립 및 해지 유형에 해당되는 민원이다.","18":"연금계좌 세액공제율에 대한 설명이다.","40":"위험률 변동제도에 대한 설명","19":"이자소득 = 이자수입금액","20":"3월 → 5월","21":"「금융중심지의 법률」은 / 조성 및 발전을 위한 생명 보험 관련 법규와 관련이 없다.","22":"보험 관련 법규와 관련이 없다. 보험계약자와 보험회사가 모두 의무를 지니는 것은","23":"쌍무계약의 특성이다. 연금전환특약, 우량체할인특약, 선지급서비스특약은 가입자의 편의를 위한 제도성 특약이다.","24":"①준비금의 이자적립방식 - 금리확정형보험, 금리연 동형보험 ②주계약의 보험사고 - 생존보험, 사망보험 ③보","25":"험가입의 주목적 - 보장성보험, 저축성보험 특별계정은 보험계약자 간 형평성 및 보험경영의 투명성을 제고하기 위한 제도적 장치이다.","26":"대부분의 생명보험 상품은 비갱신형 상품이다.","27":"①저축성보험 → 보장성보험 ②질병보험 → 사망보험 ④보장성보험에 대한 세액공제를 받을 수 있다."},"03":{"1":"총인구 중 노인인구(65세 이상)의 구성비가 14% 이상인 사회를 고령사회, 20% 이상인 사회를 초고령사회라고 한다.","25":"① 종신보험의 보장기간은 종신이므로 납입기간과 보장기간은 일치하지 않는다. ② 변액보험으로도 판매되고","26":"있다. ④ 다양한 특약부가를 할 수 있다. 부모 사망시에는 교육자금 및 양육자금이 지급된다.","2":"보험기간이란 보험계약에 따라 보장을 받는 기간으로","27":"일반보장성보험의 보험료 세액공제를 받았더라도","3":"위험기간, 책임기간이라고도 한다. 건강상태 진단을 지원하는 계약, 보험기간이 90일 이내인","28":"연금보험은 제1보험기간에 사망시 책임준비금(사망보","29":"험금)을 지급하고 계약은 소멸한다. ② 보험기간 중에 언제든지 펀드를 변경할 수 있다.","4":"→ / 1년 이내 3개월 이내","5":"10일 이상 → 7일 이상","6":"위험선택은 모두 신계약과 동일하게 이루어진다.","30":"조세특례제한법 → 소득세법","7":"현저하게 공정을 잃은 합의로 수익자에게 손해를 가한 경우 배상책임이 있다.","31":"① 제3보험은 온전히 어느 한 분야에 속했다고 보기 어려운 보험이다. ② 손해보험 → 생명보험 ④ 상법 →","8":"경우 배상책임이 있다. (라) 계약자의 가족관계 정보는 언더라이팅 정보의","32":"제3보험 상품과 제3보험업은 보험업법에 정의되어","9":"① 보험사기 피해는 보험회사에 한정되지 않고 선의의","33":"② ③ / 3가지 모두를 동시에 충족해야 한다. 질병이 원인이 되어 발생한 상해사고는 보장에서 제외된다. ④ 상해보험은","10":"매우 어렵다. ‘보고듣고말하기’ 프로그램은 한국생명존중희망재단","34":"제3보험 상품이다. 한정한다. → 한정하지 않는다.","35":"상해보험에서 직업·직무 변경통지를 게을리 한 경우","11":"보험회사 대표이사, 사외이사, 감사는 모집을 할 수","12":"없으며, 금융투자상담사도 보험모집을 할 수 없다. 보험설계사는 보험계약의 체결을 중개하는 자이다.","36":"해지할 수 있고, 해지시 해지환급금을 지급한다. 질병보험은 진단확정시, 수술시, 입원시, 요양에 따른","13":"①, ②는 / 대표적인 불공정영업행위 금지 사항에","37":"① 상해보험에 적용된다. ③ 갱신시 보험료 변동이 클","14":"② 금융위원회 → 생명보험협회 ③ 1월 1일부터 12월 31일","15":"→ 6월 1일부터 다음해 5월 31일까지 1년이다. ② 금융위원회 → 예금보험공사 ③ 생명보험협회 → 금융감독원","38":"주계약 → 특약 ② / 국민건강보험 급여항목 중 본인부담액과 비급여항목 합계액의 일부를 보험회사가 보상한다.","16":"운용설명서, 상품요약서 등은 상품공시 항목에 해당 한다.","39":"간병보험은 가입자의 나이와 관계없이 갱신형으로 설계할 수 있다.","17":"/ 청구한 보험금을 수령했을 때는 보험민원 발생 경우와 거리가 멀다.","40":"① / 직종별 위험등급체계가 적용되는 것은 상해보험이다. ② 상해사고의 발생원인은 외부적 요인에 기인해야 한다.","18":"거리가 멀다. 피상속인인 계약자이며 피보험자이기 때문에","19":"사망보험금은 상속재산에 해당한다. 금융소득 종합과세의 기준금액은 개인별 연간 금융소득 2천만원이다.","20":"① 이자소득 ③ 배당소득","21":"보험업법 제2조의 보험상품에 대한 정의","22":"/ 부합계약성에 대한 설명이다.","23":"보험업법령상 신고사항에 해당하는 경우에는 금융위원회에 신고해야 한다.","24":"전부 → 실제 비용 및 손실 금액만큼"},"04":{"1":"보험다모아는 생명보험협회 및 손해보험협회가 공동으로 운영한다.","27":"② 사기 노출 → 청소년기 범죄 노출 ③ 납입한 보험료 전액과 책임준비금 중 큰 금액을 지급한다. ④ 원칙적으로","2":"공동으로 운영한다. ① 무배당보험 → 유배당보험 ③ 과거에는 모든","28":"① 기납입보험료 → 책임준비금 ② 확정연금형 → 상속연금형 ③ 10년 → 5년","3":"/ 파산자를 보험계약자로 한 계약은 무효사유에","29":"→ / 저축성보험 보장성보험","30":"전통적인 어린이보험은 보장기간이 30세까지이지만","4":"① 해지할 수 없다. ② 기납입보험료 → 해지환급금","5":"보험계약자를 변경하지 위해서는 보험회사의","31":"생명보험협회 → 금융위원회","6":"/ 보험나이는 매년 계약해당일에 나이가 증가하는 것으로 한다.","32":"/ 생명보험 - (나) 사망보험, (마) 연금보험 / 손해보험 - (다) 화재보험","7":"것으로 한다. 보험계약 위험의 분류는 언더라이팅의 업무에 해당한다.","33":"손해보험 - (다) 화재보험 상해보험의 보장내용 중 재해입원급여금에 대한 설명","8":"② 금융감독원 → 보험회사 ③ 금융위원회 → 금융감독원과 보험회사","34":"① 직업·직무 변경시 위험도에 따라 보험료는 변경된다. ② 발생한 사고가 변경된 직업·직무와 관계가 없는 경우","9":"금융감독원과 보험회사 중도보험금, 만기보험금, 입원보험금에 대한 설명","10":"②생명보험사회공헌재단의 자살예방사업에 해당한다. ③한국생명존중희망재단의 역할","11":"/ 우체국은 금융기관보험대리점으로 등록할 수 없다.","35":"/ 질병보험은 외래성을 인정하지 않으므로 물건을 들다가","12":"모집종사자가 제작한 보험안내자료는 보험회사가","36":"제자리암은 암관련보험금의 10~20%가 지급된다.","13":"형제·자매의 계약은 제재대상에 해당한다.","37":"보험금의 지급사유가 발생하기 전에 사망한 경우에는","14":"금융감독원 → 생명보험협회","15":"보험금 대리청구인 지정은 본인을 위한 본인의","38":"실손의료보험의 비례보상에 대한 설명","39":"제4세대 실손의료보험의 자기부담률은 급여 20%, 비급여 30%이다.","16":"/ 보험회사에서 가격공시실을 운영한다.","40":"/ 위험률 변동제도는 보험기간 중도에 회사가","17":"금융감독원에 직접 방문하여 접수도 가능하다.","18":"일반 보장성보험료의 세액공제율은 12%(지방소득세 별도)이며, 장애인 전용 보장성보험료의 세액공제율은","19":"15%(지방소득세 별도)이다 (가) 300만원 + 400만원 = 700만원","20":"(나) 400만원 + 200만원 = 600만원 직전 과세기간의 수입금액이 7,500만원 미만인","21":"보험설계사는 간평장부대상자에 적용된다. 보험기간의 단기, 확정성은 손해보험계약의 특성이다.","22":"② 계약의 성립요건으로 특별한 형식이나 절차를 요구하지 않는 불요식계약이다. ③ 무형의 상품이기 때문에 공산품처럼 구매에 따른 효과를 곧바로 느끼기 어렵다.","23":"공산품처럼 구매에 따른 효과를 곧바로 느끼기 어렵다. 계약자의 청약과 보험회사의 승낙으로 계약은 성립된다. ② / 보장성보험에 대한 설명","24":"우량체 할인특약은 가입자의 편의를 위한 제도성","25":"특약에 해당한다. 저해지환급형 상품에 대한 설명이다.","26":"종신보험은 피보험자가 언제 어떤 경우로 사망하더라도 약정된 보험금을 지급하는 것이 특징이다."},"05":{"1":"사회보험의 급여는 공영보험이므로 법률로 규정되어","24":"사망을 보장하는 보험 중에는 정기보험도 있다.","25":"②사기 노출 → 청소년기 범죄 노출 ③납입한 보험료","2":"현금흐름방식은 우리나라, 미국, 캐나다, 호주 등이","3":"사용하며 3이원방식은 일본, 대만에서 사용하고 있다. 무진단계약의 경우 보장개시일은 청약과 제1회 보험료","26":"사망을 보장하는 급부설계는 할 수 없다. 비장애인과 동일한 심사절차를 거쳐 진행된다.","27":"/ 세제적격 연금저축의 가입나이 제한은 없다.","4":"보험금 가지급제도에 대한 설명","28":"소득공제 → 세액공제","5":"끝나는 날 → 끝나는 날의 다음날","29":"변액보험의 해약환급금은 최저보증이 이루어지지","6":"①주소 또는 연락처 변경에 따른 통지는 피보험자가","30":"10인 → 5인","31":"④생명보험영역 → / 손해보험영역","32":"질병사망은 특약에서 보장한다.","7":"언더라이터에 대한 설명","33":"피보험이익은 생명보험, 제3보험에서는 존재하지","8":"②어떤 경우라도 계약 체결과 관련한 수수료를 고객에","34":"외관상 분명한 상처자국을 남기는 것에 한정하지 않는다.","9":"①계약이 성립된 날부터 3개월 이내에 취소하고 납입한","35":"①질병보험 ②상해보험 ④간병보험","36":"①기납입보험료 → 책임준비금 ②10년 이상 → 1년 ③사고발생 이상 위험성이 연령별 차이가 미미할 것으로 일반적으로 인정되는 경우 단일률, 군단율을 이용하여","10":"있다. ②보험약관 전달과 중요한 내용에 대한 설명으로 보관용 청약서 전달을 대신할 수 없다. 보험금 지급지연 감소는 보험사기와 관련 없는 내용이다.","37":"일반적으로 인정되는 경우 단일률, 군단율을 이용하여 보험료를 산출할 수 있다. ①위험 직업으로 변경된 사실을 통지하였으므로 보험료 등이 조정되어 보험금 지급이 제한되지 않는다. ②질병으로","11":"내용이다. 음주운전으로 사고를 일으켰다고 해서 보험설계사로","38":"된다. ④정상적으로 보험금이 지급된다. 암보험, 치아보험 - 질병보험 / 교통재해보험 -","12":"→ / 1개의 대리점 보험회사","13":"보험모집을 할 수 있는 자이어야 한다.","14":"금융기관보험대리점은 점포별로 2인까지만 모집에","39":"①상법에서는 질병보험의 보험기간 및 가입가능연령에","15":"종사하게 할 수 있다. 가입한 계약 중 본인을 위한 계약의 경우 해당 보험회사에 연락하여 대리청구인 지정제도를 신청할 수","40":"재해로 인하여 일상생활장해상태가 되거나 중증치매","16":"생명보험 상품 비교공시에 대한 설명이다.","17":"/ 우편, 팩스, 인터넷, 직접 방문 접수 모두 가능하다.","18":"기본보험료의 선납기간이 6개월 이내일 것","19":"장애인을 보험수익자로 하는 보험계약의 보험금은","20":"연간 4천만원을 한도로 증여세가 비과세된다. ①저축성보험의 보험차익은 이자소득 ③집합투자기 구로부터의 이익은 배당소득","21":"생명보험 계약관계를 규율하는 법률은 상법 제4편(보험) 이다.","22":"/ 보험계약자는 보험료 납입, 보험회사는 보험금 지급의무를 지니게 되므로 계약당사자 간 의무가 수반되는","23":"쌍무(雙務)계약이다. 단체보험은 일정한 조건을 구비한 단체의 구성원을 주피보험자로 하여 단체 또는 단체의 대표자가 가입하는 보험이다."},"06":{"1":"부동산 투자는 유동성을 저하시킨다.","26":"①보험업법 → 장애인복지법 ② 장애인이란 이유만으로","2":"보수적인 표준기초율 가정은 3이원방식에 대한 설명이다.","3":"타인의 사망을 보험금 지급사유로 하는 계약에서","27":"3천만원 이하의 벌금 금융위원회 → 생명보험협회","4":"/ 분쟁조정신청의 경우 보험금 지급기일을 적용하지 않는다.","28":"/ 변액종신보험은 계약자적립금이 특별계정의 투자실적에 따라 변동된다.","5":"않는다. 납입최고(독촉)가 끝나는 날 → 납입최고(독촉)기간이","29":"투자실적에 따라 변동된다. 공통으로 들어갈 용어는 ‘책임준비금’이다.","30":"변동보험계약은 별도의 추가보험료 부담이 없다.","6":"보험계약자는 계약이 해지된 날부터 3년 이내에","31":"「상법」 인보험(제3장)에서는 간병보험 규정이 없음","32":"①생명보험은 ②보험 / 원칙적으로 장기, 안정적 위험 업법에서는 생·손보 겸영을 금지하고 있다. ④제3보험업에","33":"대해서는 겸영 허용 ①외래성에 대한 설명 ③외래성 → 급격성","7":"계약자는 계약이 소멸하기 전에 언제든지 계약을 해지할 수 있다.","8":"(라) 계약자의 가족관계 정보는 언더라이팅 정보의","34":"중대질병 수술비는 질병보험에서 보장받을 수 있다.","35":"상법에서는 보험계약자 또는 피보험자의 직업․직무","9":"/ 보험설계사는 판매하는 상품에 대한 모집자격 이외에도 다양한 분야의 전문지식을 갖추어야한다.","10":"다양한 분야의 전문지식을 갖추어야한다. 보험사고는 공보험과 밀접한 관계를 갖고 있다.","36":"있다. 질병보험의 보험기간은 10년 이상이며 단일률,","11":"보험회사의 임원(대표이사, 사외이사, 감사 및","37":"약정한 암수술보험금이 지급되기 때문에 지출한","12":"②보험대리점은 여러 생명·손해보험회사와 계약을","38":"②중복계약의 체결을 금지하는 것은 과잉진료 방지 목적이 아니라 중복보상이 되지 않으므로 계약자 보호","13":"/ 모집과 관련 없는 금융거래를 통하여 취득한 개인정 보를 동의를 받고 이용하는 행위는 금지행위에 해당하지","14":"않는다. 1건당 50만원 → 1건당 100만원","39":"으로만 판매되고 있다. 일상생활장해보장의 면책기간은 90일, 중증치매보장은","15":"(나) 보험계약 유지율 : 13회차 90%, 25회차 80% 이상","40":"제3보험도 만기환급형으로 개발할 수 있으므로","16":"6개월 → 1년","17":"3개월간 → 3년간","18":"②배우자는 ③배우자의 / 직계존속과 공동상속인이 된다. 법정상속분은 직계비속 또는 직계존속의 상속분에 5할을","19":"가산한다. 4% → 5%","20":"7,500만원 미만","21":"손해보험에서 재산상의 손해를 실손보상한다.","22":"생명보험계약은 계약자가 청약을 하고 이를 보험회사가 승낙하면 계약이 성립된다.","23":"/ 우량체 할인특약, 연금전환특약은 제도성 특약이고 휴일재해보장특약은 보장을 추가․확대하기 위한 특약에","24":"해당한다. 보장성보험 → 생사혼합보험","25":"종신보험은 사망을 보장하는 보장성보험 상품이다."},"07":{"1":"사회보험에는 국민건강보험, 국민연금, 산재보험, 고용보험이 있고, 사회서비스는 그 대상에 따라 노인복지,","23":"보험회사에서 보험상품을 개발하여 판매하고자 할 때에 사업방법서, 보험약관, 보험료 및 책임준비금 산출방법서","2":"장애인복지, 아동복지, 가정복지 등으로 나누어진다. ① 보험기간은 보장을 받는 기간을 의미한다.","24":"만기 생존시 보험금이나 연금이 지급되는 저축기능을","25":"강화한 상품은 저축성보험이다. ① 종신보험은 대표적인 보장성보험이다.","3":"보수적인 표준기초율 가정은 3이원방식의 내용에","26":"교육보험은 부모 사망시 계약이 소멸되는 것이","4":"① 보험료를 받은 날 → 청약일 ② 15일 이내 → 30일 이내","5":"→ / 60영업일 30영업일","27":"/ 어린이보험은 사망을 보장하는 설계를 할 수 없으며","6":"계약 전 알릴 의무는 신계약과 동일하게 이루어진다.","7":"분할지급액을 일시금으로 지급하는 경우에는","28":"최소보험료 납입기간은 5년이다.","8":"1차 선택은 모집조직(보험설계사)에 의한 선택,","29":"개인형 퇴직연금인 IRP에 대한 설명이다.","30":"보장성 선택특약은 변액종신보험과 일반종신보험에","9":"의한 선택이다. ① 회사 이름으로 된 영수증을 교부해야 한다. ③ 일일수금 방식과 같은 변칙적인 방법으로 보험료를","31":"차이가 없다. ① 별도로 독립된 제3보험회사를 설립하여 운영하거나 생명보험회사, 손해보험회사에서 허가를 받아 영위할 수","10":"수령해서는 안 된다. (가) 병원종사자에 의한 보험사기에 해당한다.","11":"② 공시주의 → 실질적 감독주의 ③ 실질적 준거주의 → 실질적 감독주의","32":"② 금전으로 산정할 수 있어야 한다. ③ 보험사고 전에 확정되어야 한다. ④ 손해보험에서는 필수적인","12":"→ 실질적 감독주의 우체국은 우체국보험을 취급하고 있으므로","13":"금융기관보험대리점으로 등록할 수 없다. 통신수단을 이용한 모집에 대하여 동의를 한 자를","33":"않는다고 본다. 생명보험 상품과 제3보험 상품을 판매하기 위해서는","14":"대상으로 모집하여야 한다. 예금이 지급정지된 경우(1종 보험사고) 및 인허가","34":"생명보험협회에 등록해야 모집이 가능하다. 제3보험 상품에 대한 예시이다.","35":"신체 상해의 발생원인이 피보험자 자신의 신체에","15":"보험금 대리청구인 지정은 본인을 위한 본인의 보험상품(보험계약자=피보험자=보험수익자)에 가입한","36":"과정이 외부적 요인에 기인해야 한다. 사무직보다 위험한 직종인 농업종사자로","16":"1억원이다. 필수안내사항 등 준수사항과 금지사항","37":"① 종신보험 시장이 포화됨에 따라 질병중심의 ② 제3보험 시장으로 전환되고 있다. 질병형태의 변화는","17":"제재금이 부과될 수 있다. ②③결산공시는 결산일로부터 3개월 이내에 공시하며","38":"암직접치료입원보험금에 대한 설명","18":"보험회사는 정확한 사실관계 확인을 바탕으로 관련법규 및 기준에 근거하여 민원을 객관적·합리적으로","39":"실손의료보험은 2018년 4월부터 단독형 상품으로만 판매되고 있다.","40":"① 일반적으로 30세 이후이다. ② 보험기간은 대부분","19":"일반보장성보험의 세액공제는 개인보험계약에 대한","20":"세제에 해당한다. 3% 원천징수","21":"실손보상 → 정액보상","22":"부합계약성에 대한 설명"},"08":{"1":"1960년대 생명보험회사가 국민저축기관으로 지정되면서 단체보험이 크게 성장하기 시작하였다.","26":"교육보험은 자녀의 교육자금을 종합적으로 보장하는 대표적인 저축성보험이다.","2":"단체보험이 크게 성장하기 시작하였다. 중년기에는 소득이 소비지출보다 많아 잉여소득이","27":"대표적인 저축성보험이다. 장애인도 일반보험에 가입할 수 있다.","28":"①연금저축은 연간 1,800만원 한도, 연금보험은 한도","3":"보험회사에 대한 설명이다.","4":"/ 보험증권을 받은 날로부터 15일, 청약일로부터 30일 이내인 경우 청약철회 가능하다.","5":"이내인 경우 청약철회 가능하다. 진단계약의 경우 제1회 보험료와 건강진단을 받은","29":"충족시 보험금 수령시 비과세 혜택이 제공된다. 보험계약체결 권유 단계에서 변액보험 운용설명서를","6":"날로부터 보장이 개시된다. ②사망보험금 → 해지환급금 ③보험수익자 변경시","30":"제공한다. 장애인의 평균수명이 일반인에 비해 짧은 것을","7":"보험회사의 승낙이 필요하지 않다. 일시금을 분할하여 지급하는 경우 : 평균공시이율을","31":"①상법 → 보험업법 ②간병보험만이 현행 상법에","8":"공시이율로 할인하여 지급한다. ② 신체적 언더라이팅 ③ 재정적 언더라이팅","9":"청약서 부본은 보험계약자에게 전달한다.","32":"①과 ②는 서로 바뀐 설명 ④상법 → 보험업법","10":"생명보험사회공헌위원회 → 한국생명존중희망재단","33":"상해보험의 보장은 재해의 직접적인 원인으로 사망,","11":"생명보험설계사 등록제도에 대한 설명이다.","12":"/ TV, 홈쇼핑 채널에서 보험상품 판매를 하는 행위는 금지행위에 해당하지 않는다.","34":"직업·직무와 / 변경된 관계가 없는 경우에는 보험금이 삭감되지 않고 전액 지급된다.","13":"금지행위에 해당하지 않는다. 보험업종 → 설립형태","35":"삭감되지 않고 전액 지급된다. 질병보험은 연령과 건강상태에 따라 위험률이 현저히","14":"신용카드업자(겸영여신업자 제외)만 전화, 우편, 컴퓨터","36":"①암보험은 일반적으로 일정기간 이후부터 보장이 개시된다. ③연령이 증가함에 따라 보험료도 크게 증가한다.","37":"질병사망(암사망)은 특약을 통해서만 보장이 가능하다. ③ / 치료를 받던 중 보험기간이 만료되었을 때에도","15":"→ / 과태료 제재금","16":"①금융분쟁조정위원회 → 금융감독원 ②수락한 경우","38":"①2018년 4월 1일부터 단독형 상품으로만 판매되고","17":"분기별 결산공시 – 분기결산일로부터 2개월 이내, 결산공시 – 결산일로부터 3개월 이내","18":"결산공시 – 결산일로부터 3개월 이내 ①금융민원 중 보험업권 민원이 가장 높다. ②민원은","39":"손해보험 개인실손 → 단체실손 → 생명보험 단체실손 → 개인실손 → 표준형 단독실손 순서로 도입되었다.","19":"/ 단기자금의 높은 수익은 관련 없다.","40":"/ 장기요양등급은 장기요양 1등급 또는 2등급 적용으로","20":"① 근로소득 → 사업소득 ② 기타소득의 소득률 → 연말정산 사업소득의 소득률","21":"생명보험계약관계를 규율하는 근거법률은 상법 제4편 (보험)이다.","22":"(보험)이다. 유상·쌍무계약성에 대한 설명이다.","23":"우량체할인특약은 가입자의 편의를 위한 제도성 특약으로 추가적으로 보험료를 납입하지 않는다.","24":"/ 보험기간을 정함의 여부에 따라 보험기간을 미리 정해 놓고 피보험자가 보험기간 내에 사망하였을 때 보험금을 지급하는 정기보험과 일정한 기간을 정하지 않는 종신보험으로","25":"구분된다. 계약자 사망시 → 피보험자 사망시"},"09":{"1":"공공부조 : 기초생활보장, 의료급여 제공, 사회서비스 : 노인복지, 장애인복지, 아동복지, 가정복지","23":"개인보험과 단체보험은 보험계약의 대상에 의한 분류이다. 개인보험은 피보험자를 개인으로 한정하는 보험이고, 단체","2":"사회서비스 : 노인복지, 장애인복지, 아동복지, 가정복지 ②동일인 여부는 상관없음 ③보험회사 → 보험계약자","3":"할증 → 할인","4":"사망의 추정·인정제도로 일반실종과 특별실종에 대한","24":"보장성보험은 만기환급금이 기납입보험료를 초과하지 않는(≦) 초과(＞)하는","5":"설명이다. 보험기간이 1년 미만인 경우 납입최고기간은 7일 이상","25":"보험이고, 저축성보험은 보험이다. 정기보험에 대한 설명","26":"사망을 보장하는 급부설계를 할 수 없다.","6":"보험계약대출에 의하여 해지환급금이 차감되었으나","27":"변동보험금 → 기본보험금","28":"연금지급기간에 피보험자 사망시 사망보험금이 아닌","7":"/ 만 15세 이상자를 피보험자로 한 사망보험 계약은","29":"퇴직연금제도에 대한 설명","8":"①우량체 → 표준체 ②보험금 삭감 방법뿐만 아니라","30":"①변액보험은 계약자가 납입한 보험료에서 사업비와","9":"보험료 할증이나 부담보로도 인수할 수 있다. 다른 모집종사자의 명의를 사용하여 계약을 체결하는 경유계약 행위는 모집에 관한 금지행위에 해당한다.","10":"①보험설계사 등이 연루된 보험사기는 일반범죄에 비하여 모방에 의한 파급효과가 크게 나타나는 특성을","31":"①법원 → 금융위원회 ②제3보험회사 → 손해보험회사 ④판매할 수 없다.","32":"/ 손해보험에서 피보험이익은 필수요소이다.","11":"파산선고 후 복권이 되었거나, 유예기간이 종료되었거나, 보험료를 다른 용도로 유용하고 3년이 지난 자는 보험설계사로","33":"제3보험도 만기환급형으로 개발할 수 있으므로 만기 환급금이 없는 순수보장성보험으로만 개발해야 하는 것은","12":"등록할 수 있다. 신용카드업자는 가능하나 겸영여신업자는 제외한다.","34":"아니다. 상해사고의 요건 중 하나인 우연성에 대한 설명","13":"특별이익은 최초 1년간 납입되는 보험료의 10%와 3만원","35":"위험성이 낮은 직업으로 변경될 경우에 보험료는","36":"낮아진다. 질병보험은 외래성을 인정하지 않으므로 물건을 들다가","14":"상품권을 제공하는 경우 특별이익 제공에 해당된다. 우수인증설계사는 생명보험협회의 인증기준을 충족해야 한다.","37":"허리를 다친 경우에는 보상하지 않는다. (나)상해보험은 직종별 위험등급체계 적용 (다)질병보험의 가입기간은 10년 이상","15":"장래에 있을 이익의 배당 또는 잉여금의 분배에 대한","38":"암사망보험금은 특약으로 보장한다.","39":"의료취약계층 보호를 위해 차등 적용에서 제외한다.","40":"①민영장기간병보험의 경우 보험회사 자체 판단기준에","16":"경영실적, 재무상황, 재무제표는 정기공시 항목을 통해 파악할 수 있다.","17":"①보험회사의 / 상품개발 및 판매정책 등에 영향을 받는다. ③감독당국과 보험회사의 민원감축을 위한 노력에도 불구하고","18":"보험민원 건수의 절대치는 쉽게 줄어들지 않고 있다. <1순위> 직계비속(자녀, 손자), <2순위> 직계존속(부모, 조부모 등), <3순위> 형제자매, <4순위> 4촌 이내의 방계혈족","19":"이고 배우자는 1순위인 직계비속과 공동상속인이 된다. 보험료 납입을 아버지가 하고 어머니의 사망에 의한 보험금이 보험수익자인 김생명씨에게 지급된 것이므로 해당","20":"보험금에 대해서는 증여세가 과세된다. 퇴직소득 → 기타소득","21":"①상법, 제4편 ②보험회사의 공동행위와 관련한 사항","22":"금융기관의 구조조정에 관한 사항 ③ / 보험계약은 낙성계약이기 때문에 계약당사자 간의 의사표시가 합치하기만 하면 계약이 성립된다."},"10":{"1":"노인빈곤율은 65세 이상 인구 중 중위소득 50% 이하의 비율을 말한다.","21":"금융중심지의 조성과 발전에 관한 법률은 생명보험과 관련이 없는 법률이다.","2":"비율을 말한다. 청약을 철회한 이후에는 보험료 반환과 관계없이","22":"관련이 없는 법률이다. 생명보험계약의 성립은 특별한 형식이나 절차를 요구","3":"보험회사는 보장하지 않는다. 건강상태 진단을 지원하는 계약, 보험기간이 90일 이내인","23":"/ 연금전환특약은 가입자의 편의를 위한 제도성 특약에 해당한다.","24":"해당한다. 보험가입의 주목적 → 주계약의 보험사고","4":"수사기관의 조사가 필요한 경우에는 3개월 이내가 아니라 보험금 지급기일을 적용하지 않는다.","25":"사망보험과 생존보험의 장단점을 서로 보완한 상품은 생사혼합보험에 대한 설명이다.","5":"/ 계약 전 알릴 의무는 보험계약자와 피보험자가 의무자이다.","26":"/ 납입한 보험료 전액과 책임준비금 중 큰 금액을 지급 하고 계약은 소멸한다.","6":"의무자이다. ②보험계약자를 변경하기 위해서는 보험회사의 승낙을 얻어야 한다. ③제1회 보험료를 납입한 때부터 1년 이상 지난 유효한 계약일 경우 계약자는 보험회사에 변경을 요청할 수","27":"하고 계약은 소멸한다. ①장애인도 일반보험에 가입할 수 있다. ②별도의 심사절차 → 비장애인과 동일한 심사과정을 거치도록 하고 있다. ④가입당시 건강상태를 고려하여 가입 가능여부를","7":"유효한 계약일 경우 계약자는 보험회사에 변경을 요청할 수 있다. 보험회사는 임직원, 보험설계사, 보험대리점의 책임있는","28":"있다. ④가입당시 건강상태를 고려하여 가입 가능여부를 결정한다. 퇴직연금은 일시금은 물론 연금으로도 수령할 수 있다.","29":"사망보험금을 기납입보험료와 비교하여 더 큰 금액을","8":"①우량체 → ②보험금 / 표준체 삭감 방법뿐만 아니라 보험료 할증이나 부담보로도 계약을 인수할 수 있다.","9":"보험료 할증이나 부담보로도 계약을 인수할 수 있다. 인터넷뿐만 아니라 전화, 우편, 팩스 등을 통해서도","30":"장애인전용 연금보험이 일반 종신연금보다 더 많은","10":"‘보고듣고말하기’ 프로그램은 한국생명존중희망재단","31":"제3보험은 정액보상과 실손보상이 모두 가능하다.","11":"보험중개사는 영업개시 7일 전까지 금융감독원에","32":"제3보험은 보장성상품이다.","33":"생명보험과 상해보험 모두 발생시기는 불확정이다.","12":"/ 보험회사는 소속 보험설계사에게 특정 보험회사를","34":"/ 질병사망보험금은 특약으로 보장한다.","35":"상해보험에서 직업·직무 변경통지를 게을리 한 경우","13":"①, ②은 대표적인 모집에 관한 금지행위에 해당한다.","14":"(나) 13회차 90%, 25회차 80% 이상 (다) 직전 3년간","36":"생명보험에서도 실손보상하는 질병보험(실손의료","15":"(가) 예금 지급정지는 보호를 받을 수 있으나, B저축","37":"암보험은 도덕적 해이 발생가능성이 높아 일정기간 이후 보장이 개시된다.","38":"/ 실손의료보험은 질병보험이므로 연령이 증가함에 따라 보험료는 높아진다.","39":"보험료는 높아진다. 장기간병보험은 제3보험으로 생명보험과 손해보험회사","16":"대출 1,000만원을 제외한 4,000만원이 보호대상이다. ①주요 경영현황은 정기공시항목으로 결산일로부터 3개월 이내 공시 ②수시공시항목이므로 발생 즉시 공시해야","40":"에서 모두 취급할 수 있다. ①암보험과 같은 특정 질병을 보장하는 상품은 면책 기간이 존재한다. ③주계약 및 특약 형태로 모두 판매되고","17":"한다. 생명보험협회 → 금융감독원, 한국소비자원","18":"①저축성보험은 / 보험금 수령시 보험차익 비과세 혜택이 있다. ③보장성보험은 납입한 보험료에 대해 세액공제","19":"혜택을 받을 수 있다. 퇴직소득과 양도소득은 분류과세하고, 연금소득은 원칙적으로 종합과세한다.","20":"원칙적으로 종합과세한다. 매년 → 매월"},"11":{"1":"소득의 흐름과 소비지출 흐름의 불일치를 완화하려면","22":"개별약관 후순위 원칙은 생명보험과 관련이 없다.","23":"무형의 상품이라는 특성에 해당되는 설명","24":"암보장특약, 정기특약, 재해사망특약은 보장을","2":"이월할 필요가 있다. ①예외적으로 연금보험의 경우 직전 5개년도 실적을 ②직전","25":"추가·확대하기 위한 특약에 해당한다. 정기보험, 변액종신보험, 종신보험 모두 보장성보험,","26":"사망보험인 특징을 갖고 있다. ①다양한 특약 부가가 가능하다. ③피보험자 → 유가족","3":"①보험료를 받은 날 → 청약일 ②15일 이내 → 30일 이내","4":"영구히 고정된 증상은 아니지만 치료 종결 후","27":"해약환급금 → 책임준비금","28":"장애인도 일반보험과 동일한 심사과정을 거친다.","29":"/ 변액보험 운용설명서를 제공하여 해당 변액보험 상품의","5":"①해약환급금을 수령한 경우 보험계약을 부활시킬 수 없다. ③보험중개사가 행한 부당한 보험계약의 전환은","30":"일반계정 → 특별계정","6":"①보험안내자료 내용과 약관의 내용이 다른 경우","31":"다른 보험업종을 포괄하는 개념은 보험업이다.","32":"제3보험 질병사망특약 부가요건 중 손해보험의","7":"따라 다르게 해석하지 않는다. 서류진단은 직장(또는 병원)에서 진단받은 근로자","33":"보험기간은 80세, 생명보험의 보험금액은 제한이 없다. 생명보험은 피보험자의 생사가 보험사고이므로","8":"건강검진 결과를 토대로 가입여부를 심사하는 방법이다. 양질의 계약을 확보하고 보험사고 발생시 분쟁을 최소화하며 보험금을 신속하게 지급하는데 목적이 있다.","9":"계약 전 고지의무를 위반하여 보험을 가입하는 행위는","34":"신체 상해의 발생원인이 피보험자 자신의 신체에","10":"①한국생명존중희망재단은 2021년 중앙자살예방센터와","35":"외부적 요인에 기인해야 한다. 재해사망보험금에 대한 설명","11":"/ 보험중개사는 특정 보험회사에 소속되지 않고 독립적으로 보험계약의 체결을 중개한다.","36":"/ 상해보험의 보험기간은 일반적으로 1년 이상이고, 직업·직무 변경통지를 게을리 할 경우 보험회사는 그 사실을","12":"독립적으로 보험계약의 체결을 중개한다. 사망 또는 장해를 보장하는 보험계약은 자필서명을","13":"면제받을 수 없다. 200만원 → 100만원","37":"보험계약을 해지할 수 있다. 위험률 변동제도는 간병보험에 적용되는 내용이다.","14":"매 3년마다 → 매년","38":"①암진단보험금을 받았더라도 계약이 소멸되지는","15":"보험계약자 및 보험료납부자가 법인인 보험계약, 재보험계약 등은 보호대상에서 제외된다.","16":"/ 경영공시제도는 기업 경영의 투명성을 확보하고 이해관계자의 참여기회를 확대하여 기업의 경영효율성을","39":"/ 보험금 누수가 큰 도수치료, 영양제 등 일부 비급여 항목에 대해서는 과잉 의료이용 방지를 위해 보장이 제한","17":"높이고자 마련된 제도이다. 직접방문뿐만 아니라 우편, 팩스 및 인터넷을 이용하여 민원을 접수할 수 있다.","40":"되었다. ①우리나라에서는 정액보상 형태로만 판매된다. ②장기요양 1등급, 2등급 판정은 보험금 지급사유에","18":"민원을 접수할 수 있다. ①연간 소득금액이 100만원 이하인 경우 공제가능","19":"피보험자가 기본공제대상자 요건 충족시 공제가능 ② / 기타소득의 경우 소득금액이 연 300만원을 초과하는","20":"경우 종합과세한다. 보험설계사 원천징수세율은 3%로 다음 달 10일까지 관할세무서에 신고납부해야 한다.","21":"①자본시장과 금융투자업에 관한 법률 → 상법 제4편(보험) ②보험회사의 권익 보호 → 보험계약자의 권익 보호 ③생명보험계약은 예금자보호법을 적용받는다."},"12":{"1":"전 국민이 의무적으로 납입한 → 다수의 일반국민,","24":"보장성보험에 대한 정의이다.","25":"사망을 보장하는 상품이라고 해서 모두 종신보험은","2":"배당예시 금지의 예외항목으로 계약자 배당이 있는","26":"납입한 보험료 전액과 책임준비금 중 큰 금액을 지급하고 계약은 소멸한다.","3":"/ 단기여행자보험(90일 이내인 보험)은 청약철회가 불가능한 보험상품에 해당한다.","27":"/ 장애인도 비장애인과 동일하게 가입당시의 건강상태 등을 고려하여 보험가입 가능여부 및 인수조건을 결정하므로","4":"불가능한 보험상품에 해당한다. ①국외의 의료관련법에서 정한 의료기관에서 발급한 것도 인정된다. ③반드시 보험수익자가 직접 청구하지 않아도","5":"대리인도 청구할 수 있다. ①보험금 / 지급사유 발생 통지는 계약자, 피보험자,","28":"일시에 납입하고 바로 연금액을 수령하는 상품은 일시납 즉시연금보험에 대한 설명이다.","6":"②보험회사의 서면 동의 → 피보험자의 서면 동의 ③제1회 보험료를 납입한 때부터 1년 이상 지난 유효한","29":"변액보험이란 보험금이 자산운용성과에 따라 변동하는 보험계약으로 유가증권 등에 투자하여 발생한 이익을","7":"계약일 경우 계약자는 보험회사에 변경을 요청할 수 있다. (나) 계약자에게 유리한 내용으로 계약이 성립된 것으로 본다. (다) 기납입보험료 → 해지환급금","30":"배분해주는 실적배당형 보험을 의미한다. 연금보험은 일반계정에서 운영되며, 세제적격 연금저축은 특별계정에서 운영한다.","8":"/ FKLU 자격증은 언더라이터 전문자격제도이다.","31":"/ 생명보험업이나 손해보험업에 해당하는 보험종목의","9":"주주가치 극대화는 보험인의 윤리강령과는 관련이 없다.","10":"최근 조직적인 보험사기가 증가하는 추세이다.","11":"보험계약 인수심사와 보험금 지급심사 업무를 보험대리점의 역할이 아니다.","32":"제3보험의 질병사망특약 설계시 생명보험회사는 만기와 보험금액에 제한이 없지만 손해보험회사는","12":"보험대리점의 역할이 아니다. 보험 종목별 → 보험계약의 종류","13":"특별이익에 해당하는 금품은 최초 1년간 납입하는 보험료의 10%와 3만원 중 적은 금액을 초과하는 금품이다.","33":"(다) 상법에는 간병보험 관련 규정이 없다. (라) 상해와 질병이 함께 보장되는 종합형 상품이 많다.","14":"/ 더 많은 수당을 제공하는 것은 우수인증설계사 도입취지와는 관련이 없는 내용이다.","34":"/ 상해보험은 급격성, 우연성, 외래성의 3요건을 모두 충족하고 사고의 발생과 신체의 상해 사이에 인과관계가","15":"도입취지와는 관련이 없는 내용이다. ①,③는 ｢예금자보호법｣에 따른 예금자보호 대상이","35":"직업별 위험등급은 총 5등급으로 구분되며 등급에 따라 3단계로 위험률을 차등 적용하고 있다.","16":"않는다. ①분기별 임시결산공시 항목은 결산시 작성하는 항목","36":"따라 3단계로 위험률을 차등 적용하고 있다. ①노화로 인한 요통은 질병에 해당한다. ③상해에","17":"중 일부만 공시한다. ③3개월 → 2개월 ②금융감독원에 직접 방문하여 접수할 수 있다. ③생명보험협회 →","37":"해당한다. ④노화로 인한 건강훼손은 질병에 해당한다. ①암보험은 도덕적 해이 발생가능성이 높다. ②암보험은","18":"금융감독원, 한국소비자원 연금계좌는 연금저축계좌와 퇴직연금계좌를 통칭하는","38":"②3~4등급 → 1~2등급 ③④해당사항 없다.","19":"퇴직소득과 양도소득은 분류과세한다.","39":"①민영장기간병보험이 먼저 판매되었다. ②만 65세","20":"간편장부대상자에 대한 설명으로 직전 과세기간의 수입금액이 7,500만원 미만인 보험설계사가 해당된다.","21":"보험감독의 근거는 ｢금융위원회의 설치 등에 관한","40":"①생명보험회사에서도 단체실손의료보험을 판매하고 ②장기요양","22":"내용은 보험회사 구조조정의 근거이다. 보험계약은 보험회사가 미리 마련한 정형화된 약관에 따라야 하는 부합계약성으로 인해 작성자 불이익의 원칙이","23":"적용된다. 보험상품 개발시 작성해야 하는 기초서류는 사업방법서, 보험약관, 보험료 및 책임준비금 산출방법서이다."},"13":{"1":"1921년 우리나라 최초의 생명보험회사인 조선생명보험 주식회사가 설립되었다.","24":"①생존보험은 대부분 피보험자가 보험기간 중 사망하면 사망보험금을 지급받을 수 있도록 각종 사망보장이 부가되어","2":"주식회사가 설립되었다. 보험기간의 전 기간에 걸쳐 보험료를 납입하는 경우를","25":"보험료가 비교적 저렴하다. ③저축성보험 → 보장성보험 유가증권에 투자하는 방식은 실적배당형보험에 대한","3":"/ 청약 거절시에는 이미 받은 보험료에 보험료를 받은","26":"①보험료를 재산정한다. ②대부분의 생명보험은 비갱신형 상품이다. ③계약 갱신 전에 보험료 변동내역 등을","4":"만 15세 미만자를 피보험자로하여 사망을 보험금 지급","27":"종신보험의 활성화로 교육보험의 판매량이 감소하고","5":"/ 국외 의료기관이 발급한 사망진단서도 인정된다.","6":"계약자 또는 보험수익자는 주소 또는 연락처가 변경된 경우에는 즉시 보험회사에 알려야 한다.","28":"장애인전용 연금보험은 일반 종신연금보다 많은 연금액을 지급한다.","7":"②피보험자 변경은 불가능하다. ③보험회사의 승낙을","29":"분기한도에서 연간한도(1,800만원)로 변경되었다.","30":"확정급여형(DB형)은 퇴직급여가 사전에 확정된다.","8":"계약적부 확인은 언더라이팅 업무이다.","31":"제3보험의 업무영위에 대한 설명이다.","9":"①보험설계사가 고객으로부터 보험료를 수령할 경우 보험회사의 이름으로 된 영수증을 교부해야 한다. ③일일수금","32":"①보험연수원 → 생명보험협회 ②금융감독원 → 생명·손해보험협회 중 한 곳 ③모집에 관한 연수과정은","10":"등 변칙적인 방법으로 보험료를 받아서는 안 된다. 보험사고는 공보험과 밀접한 관계를 갖고 있다.","33":"보험업법 시행령과 보험업감독규정에 의해 운영된다. ①상법의 인보험장에는 간병보험에 대한 규정이","11":"보험설계사는 시험합격 및 등록교육 이수 후 보험회사를","12":"통해서만 보험협회에 등록할 수 있다. 작성계약에 대한 설명이다.","34":"대해서는 겸영을 허용하고 있다. 피보험이익에 대한 설명","13":"우수인증설계사 인증기간은 해당연도 6월 1일부터","35":"②상해사고의 원인은 자신의 신체에 내재되어 있지","14":"다음해 5월 31일까지 1년이다. 보험료납부자가 법인인 보험계약과 재보험계약은 ｢예금자보호법｣에","15":"의해 보호되는 보험계약에서 제외된다. 상시모니터링 제도가 적용되는 것은 홈쇼핑 판매방송 이다.","36":"수 없어야 한다. 상해보험에서 재해수술 사유가 발생했다고 해서 계약이 소멸되지는 않는다.","16":"상반기 임시결산공시는 당해연도 결산공지 전까지 공시한다.","37":"상해보험의 보험기간은 일반적으로 1년 이상이며, 직업·직무 변경 통지를 게을리한 경우 보험회사는 그 사실을","17":"공시한다. 보험회사와 계약자를 연결하는 판매채널이 존재하므로","38":"상해보험에 대한 설명이다.","18":"월적립식 저축성보험의 보험차익 비과세 요건에","39":"전부 → 일부를 보상한다.","40":"/ 노인성질병을 가진 만 65세 미만자도 보장대상에 포함된다.","19":"이하여야 한다. 종합소득 과세표준 8,800만원 초과 1억 5,000원","20":"이하인 경우 세율은 35%이다. ①보장성보험료 세액공제는 근로소득자에게 한하므로 보험설계사는 보장성보험료 세액공제를 받을 수 없다.","21":"보험설계사가 지급받는 소득은 사업소득에 해당한다. ① / 생명보험, 손해보험, 제3보험에 대한 근거법률은 ｢보험업법｣이다.","22":"무형의 상품이기 때문에 약관 등에 대한 충분한 설명이 필요하다.","23":"우량체 할인특약은 제도성 특약이고 ①,②,④는 보장을 추가․확대하기 위한 특약이다."},"14":{"1":"② 파스칼 → 핼리 ③ 핼리 → 파스칼","26":"교육보험은 생존보험으로 저축성보험에 해당한다.","2":"개인의 경우에는 보험사고 발생확률이 불확실하지만","27":"금융위원회 → 생명보험협회","28":"확정연금형 → 상속연금형","29":"① 생명보험과 투자상품의 성격을 모두 가지고 있다.","3":"3인 → 5인","4":"→ / 3년 5년","30":"→ / 확정기여형 확정급여형","5":"고지의무의 당사자는 계약자와 피보험자이며 고의 또는 중대한 과실로 고지의무 위반시 계약을 해지하거나 보장을","31":"화재보험은 손해보험회사에서만 영위할 수 있는 상품이다.","32":"① 만기환급형으로도 설계할 수 있다. ③ 저축성보험으로","6":"역선택 개연성이 높아 이를 방지하기 위해 신계약절차와","33":"/ 일정한 보험금액을 지급하는 것은 정액보험, 실제","7":"계약자에게 유리한 내용으로 계약이 성립된 것으로 본다.","8":"보험금 삭감은 보험가입 후 일정기간 내에 보험사고 발생시 미리 정해진 비율로 보험금을 감액하여 지급하는","34":"① 재해분류표 → 장해분류표 ③ 장해분류표 → 재해분류표 ④ 질병이 원인이 되어 발생한 상해는 보장대상","9":"방법으로 체감성 위험에 대해 적용하는 방식이다. ① 공정한 민원처리와 구제절차는 보험소비자를 위한","35":"에서 제외된다. 3개월 → 1개월","36":"질병의 원인은 신체에 내재되어 있으므로 외래성은","10":"① 사기적인 보험계약의 체결 유형 ③ 보험금 과다청구","37":"①암 / 치료로 인하여 발생한 합병증의 치료는 직접적인","11":"여신전문금융업법에 의하여 허가를 받은 신용카드업자는 등록 가능한 기관에 해당하지만 겸영여신업자는 제외된다.","12":"보험설계사 등록은 반드시 보험회사를 통해서만 할 수 있다.","13":"할 수 있다. 저축성보험의 사업비 수준이나 해약환급금에 관한","38":"수 있다. 의료비 전액 → 의료비의 일부","39":"일상생활장해보장의 면책기간은 90일, 중증치매보장의 경우 2년이다.","14":"/ (나) 13회차 90%, 25회차 80% 이상 (다) 직전 3년간 → 직전 1년간","40":"/ 변액보험은 생명보험 상품으로 제3보험의 주계약과는 관련이 없다.","15":"→ 직전 1년간 보험안내자료의 내용 결정은 광고심의위원회의 업무에","16":"해당하지 않는다. ① 5년간 → 3년간 ③ 3년간 → 당해연도 결산공시 전까지","17":"보험회사와 계약자 간의 중간에서 보험회사와 계약자를 연결하는 판매채널이 존재하기 때문에 보험민원을 유발하는","18":"원인이 된다. 확정기여형은 전액 손금으로 인정받고, 일정 한도 내에서 손금으로 인정받는 퇴직연금제도는 확정급여형(DB형)이다.","19":"집합투자기구로부터의 이익은 배당소득에 해당한다.","20":"보험설계사의 소득은 사업소득에 해당한다.","21":"계약자 → 피보험자","22":"보험계약자별로 보험약관을 새로 작성하는 것은 사실상 불가능하다.","23":"/ 생명보험 상품은 인간의 생명과 신체를 보험의 목적으로 한다.","24":"목적으로 한다. 보장성보험에 대한 정의이다.","25":"종신보험은 보장성보험이므로 생존시 지급하는 보험금의 합계액이 이미 납입한 보험료를 초과하지 않는 보험이다."},"15":{"1":"①콜레기아에 대한 설명 ②이탈리아 은행가인 톤티가","27":"분기한도 → 연간한도","28":"②안정성 → 수익성 ③매년 1회 이상 → 분기별로","2":"현금흐름방식은 산출방법이 복잡하고 전산시스템 관련","29":"①계약자가 납입한 보험료에서 사업비와 위험보험료","3":"보험회사는 보험가입금액 제한, 일부보장 제외, 보험금","30":"아닌 계약자가 부담한다. 매일 5인 → 10인","4":"사망의 추정·인정제도로 일반실종과 특별실종에 대한","31":"②제3보험업을 판매하기 위해서는 별도의 자격과정을","5":"설명이다. 주소변경 통지의무는 계약자 또는 보험수익자의","32":"①기획재정부 → ②생명보험 / 보험협회 관계업무","6":"계약 전 알릴 의무는 신계약과 동일하게 이루어진다.","7":"‘김생명’씨의 나이는 만 15세 미만에 해당하기 때문에","33":"급격성에 대한 설명이다.","8":"계약적부확인은 언더라이팅 업무이다.","34":"①외관상 분명한 상처자국을 남기는 것에 한정 도적 장치이다.","25":"종신보험은 대표적인 사망보험상품이다.","26":"기본보험금 + 계약자적립금을 지급한다.","27":"장애인전용보험의 주요 담보에는 사망보험금, 암진단 금, 입원비, 통원비, 암사망보험금, 재해장해급여금, 재해 사망보험금, 입원급여금, 재해수술자금, 연금개시 이후 생","28":"활비 목적의 연금 또는 피보험자 부모 사망시 연금지급 등 이 있다. 기업형 IRP는 상시근로자 10인 미만 사업장에 한해 적용된다. 5"},"19":{"1":"부동산 → 예금이나 단기채권 등 22.","22":"① 생명보험은 형태가 보이지 않는 무형의 상품이기","2":"보험료 납입기간이 보험기간과 동일한 경우를 전기납, 보험기간보다 보험료 납입기간이 짧은 경우를 단기납이라고","3":"한다. 보험상품(금융상품)에 관한 전문성 또는 소유자산규모","23":"① 주계약을 가입하지 않고 계약은 성립할 수 없다. ③ 주계약만으로 보험가입이 가능하다. ④ 제도성 특약에는","4":"지방자치단체, 단체보험계약자 등이 해당된다. 분쟁조정신청시에는 보험금 지급기일을 적용하지 않는다.","5":"① 계약자에게 서면 또는 전자서명으로 동의를 얻어 24.","24":"교육보험은 일반계정에서 운용된다.","25":"사망시 지급되는 사망보험금 → 기준연령요건에서 생존시 지급되는 보험금의 합계액","26":"생존시 지급되는 보험금의 합계액 자산연계형보험은 변액보험보다는 안정적이면서","6":"② 보험계약자를 변경하기 위해서는 보험회사의 승낙을 얻어야 한다. ③ 계약자가 제1회 보험료를 납입한 때부터 1년","27":"/ 어린이보험은 만 15세 미만 사망시 납입한 보험료 전액과 책임준비금 중에서 큰 금액을 지급하고 계약은","7":"한 때에는 변경할 수 있다. 보험계약자나 피보험자에게 불리하거나 부담을 주는","28":"소득공제 방식 → 세액공제 방식","8":"② 클레임은 보험금 청구에서 지급시까지 이루어지는 29. 일련의 업무이므로 보험계약 체결은 해당하지 않는다.","29":"변액보험을 중도에 해지하는 경우에 지급되는 해약 환급금은 최저보증이 이루어지지 않는다.","30":"① 위험률 → 사업비율과 이자율 ② 해약환급금 →","9":"상품설명서 → 보험계약청약서 부본 및 보험약관","10":"/ 보험설계사 등 보험모집조직이 연루된 보험사기는 일반 31. 범죄에 비하여 모방에 의한 파급효과가 크게 나타나는","31":"/ 정기보험은 피보험자가 보험기간 내에 사망하였을 때 보험금을 지급하는 생명보험 상품이다.","32":"보험금을 지급하는 생명보험 상품이다. 상법 : 인보험 = 생명, 상해, 질병 / 보험업법 : 제3보험","11":"② 보험회사를 위하여 보험계약의 체결을 대리하는 자","33":"질병보험에 대한 정의이다.","12":"① → ③ / 금융위원회 보험협회 시험에 합격한 자는 34. 합격일부터 1년 이내에 교육 이수 요건(교육 과정을 20시","34":"/ 직업별 위험등급은 총 5등급으로 구분되며 등급에 따라 3단계로 위험률을 차등 적용하고 있다.","35":"3단계로 위험률을 차등 적용하고 있다. 직업·직무 변경 통지를 게을리 한 경우 보험회사는 그","13":"작성계약에 대한 설명이다.","14":"해당연도 6월 1일부터 다음연도 5월 31일까지 1년이다.","15":"① 금융위원회 → 금융감독원 ③ 신청인을 비롯한 관계 36. 당사자가 조정안을 제시받은 날부터 20일 이내에 수락하지","36":"② 만 15세 이상인 상품이 대부분이다. ③ 일반적으로 연령이 증가함에 따라 보험료가 높아진다. ④ 질병관련 상품을","16":"않은 경우에는 조정안을 수락하지 않은 것으로 본다. / 보험회사는 분기결산일로부터 2개월 이내에 주요 경영 37. 지표 및 재무제표를 중심으로 간략한 분기별 임시결산자료를","37":"세분화하여 다양한 주계약 및 특약 형태로 판매하고 있다. / 일반적으로 피보험자가 보험기간 중 암보장개시일 이후에 암으로 확정진단되고, 그 암으로 인하여 사망할 경우 약정한","17":"공시하여야 한다. 보험협회 → 해당 금융회사, 금융감독원, 한국소비자원 등 38.","38":"암사망보험금을 지급한다. 고객의 정보이므로 사전동의 후 중복계약체결 확인이","18":"확정급여형(DB형) 퇴직연금은 세액공제대상 연금","39":"CDR척도검사 결과가 3점 이상","19":"② 10년 → 5년 ③ 6년 → 11년 40.","40":"도덕적 해이 발생 가능성이 높다.","20":"보장성보험료 세액공제는 근로소득자를 대상으로","21":"하므로, 보험설계사는 보장성보험료 세액공제를 받을 수 없다. 현재 사용되고 있는 생명보험표준약관은 「상법」 제4편(보험)의 규정을 토대로 작성되었으며, 「상법」의 규정보다 보험계약자의 권리를 확대하고 있다. 5"},"20":{"1":"세계 7위 → 세계 8위 26.","26":"① 부모 생존시에는 각종 학자금 등 교육자금이 지급","2":"생명보험은 다수의 가입자로 구성된 동질의 위험을 가진","27":"피보험자 → 보험수익자","3":"① 계약 전 알릴 의무는 피보험자의 주요 의무 중 하나 28.","28":"10년에서 5년으로 단축되었다.","29":"(가),(나),(다) 모두 변액보험에 대한 설명으로 맞는","4":"매월 1회 → 매년 1회","5":"진단계약의 보장개시일은 제1회 보험료 납입과 건강 30.","30":"책임준비금 → 기납입보험료","31":"/ 질병보험은 사망을 보장하는 상품이 아니므로 질병으로","6":"보험금 청구와 관련하여 소송이 제기된 경우에는 보험금","32":"② 금전으로 산정할 수 있어야 한다. ③ 보험사고 후에","7":"부활제도가 적용된다.","8":"언더라이팅 업무 담당자는 반드시 전문자격증을 보유 33. 해야만 하는 것은 아니다.","33":"급격중독은 외래의 요인(일산화탄소 등)에 의해 급격하게 중독된 상황으로 의도하지 않은 상황이므로 상해사고의","9":"주민등록번호는 고객의 동의를 받았더라도 사용이","34":"급격, 우연, 외래의 3요소를 모두 갖추어야 보상받을","10":"/ 보험범죄수사협의회는 경찰청의 전문수사팀과 금융","35":"보험설계사에게 알리는 것은 법적효력이 없다.","11":"위촉계약을 해지하는 것은 해촉에 대한 설명이다. 36.","36":"제한이 있다. → 제한이 없다.","12":"완전판매할 것을 권유하는 행위는 준수사항에 해당한다. 37.","37":"이외에도 암을 제거하거나 암의 증식을 억제하는 수술","13":"승환계약이라도 보험설계사 본인 및 배우자, 직계","38":"급여 → 비급여","39":"위험률 변동제도에 대한 질문이며, 위험률 변동제도는 금융위원회의 인가를 얻어 위험률(보험료)을 조정하는 제도이다.","14":"→ / 금융감독원 생명보험협회 40.","40":"→ / 전부 일부","15":"② 금융위원회 → 예금보험공사 ③ 생명보험협회 → 금융감독원","16":"홈페이지를 통해 보험안내자료를 제공하는 것은 상품 공시에 해당한다.","17":"→ / 생명보험협회 금융감독원, 한국소비자원, 해당 금융회사","18":"금융회사 연금계좌는 연금저축계좌와 퇴직연금계좌를 통칭하는","19":"개념으로 저축성보험은 해당하지 않는다. ② 포함한 → 제외한 ③ 이자소득과 배당소득의 합계액이 연 2천만원 이하인 경우 분리과세를 적용한다.","20":"3월 → 5월","21":"독점규제 및 공정거래에 관한 법률은 보험회사의 공동행위와 관련된 법규이고, 자본시장과 금융투자업에","22":"관한 법률은 변액보험과 관련된 법규이다. 쌍무계약성에 대한 설명이다.","23":"우량체 할인특약은 가입자의 편의를 위한 제도성 특약에 해당한다.","24":"특약에 해당한다. 변액종신보험과 변액유니버설보험(보장형)은 사망","25":"보험이므로 보장성보험으로 분류된다. ① 사망보험이기 때문에 만 15세 미만자는 가입할 수 ② 없다. 특약을 부가하지 않고 주계약으로만 가입할 수 있다. ③ 종신보험은 보장성보험이므로 저축성보험으로는 설계할 수 없다. 5"},"21":{"1":"① 우리나라의 생명보험 도입은 1876년 일본과의 강화도 32. 조약 체결 이후 일본의 생명보험회사가 국내에 대리점을","32":"① 제3보험 상품을 판매하기 위해서는 생명보험협회, 손해보험협회 모두 등록 가능하다. ② 생명보험의 경우에는","2":"설치하면서부터이다. ③ 2003년 → 1977년 부동산 투자는 유동성을 저하시킨다.","3":"현금흐름방식에 대한 설명이다.","4":"②, ③은 청약철회가 불가능한 보험상품이다. 33.","33":"상해보험은 (가)~(라) 모두 불확정적인 반면, 생명","5":"계약 전 알릴 의무는 보험계약자 등의 주요 의무이다.","6":"→ / 나. 끝나는 날 끝나는 날의 다음 날 34.","34":"/ 질병사망보험금은 특약으로 보장한다.","7":"계약자에 따라 다르게 해석하지 않는다. 35.","35":"피보험자의 직업·직무 변경 통지의무에 대한 설명이다.","8":"보험가입자 간의 부담을 공평하게 유지하기 위해 언더 36.","36":"기납입보험료 → 책임준비금","37":"가입가능연령은 15세 이상(통상 고연령은 가입 제한)","9":"상품설명서는 보험계약체결 권유 단계에 제공한다.","10":"보험범죄신고센터는 금융감독원과 보험회사에서 운영 38.","38":"중복계약에 따른 비례보상 대상계약은 제3보험 상품 중","11":"한다. 부채가 자산을 초과하는 법인은 보험중개사가 될 수 39.","39":"실손보상 급부가 있는 계약에 한정된다. 연령 → 수발필요상태","40":"/ 변액보험은 생명보험 상품으로 제3보험의 주계약과는","12":"생명보험협회에 직접 → 보험회사를 통해 보험협회에","13":"금융감독원 → 생명보험협회","14":"① 13회차 90%, 25회차 80% ② 3년 → 1년","15":"라. 1억원 → 5천만원","16":"① 분기별 결산공시는 다음 분기 임시결산 공시 전까지 공시하되, 2/4분기(상반기) 임시결산공시는 당해연도 결산 공시 전까지 공시한다. ③ 회사의 인터넷 홈페이지 경영","17":"공시실에 공시한다. 또한 생명보험협회는 전 생명보험회사의 경영공시 사항을 공시실 홈페이지에서 일괄적으로 공시하고 있다. 금융소비자는 생명보험회사를 포함한 금융회사와의 민원·분쟁발생시 해당 금융회사에 직접 민원을 제기하거나","18":"금융감독원, 한국소비자원 등에 금융민원 또는 분쟁조정을 신청할 수 있다. 연간 4천만원을 한도로 증여세가 비과세된다.","19":"퇴직소득 → 기타소득","20":"3%, 10일","21":"보험업법에서 정의하는 생명보험의 정의이다.(상법은","22":"제4편(보험)에서 보험계약관련 규정을 하고 있다.) 보험회사의 니즈 → 계약자의 라이프사이클","23":"/ 생명보험 상품개발 원칙에 대한 설명이다.","24":"현재 대부분의 생명보험 상품은 비갱신형 상품이다.","25":"① 예정이율 → 공시이율 ② 보장성보험에도 가능하다.","26":"일반계정, 특별계정에서 모두 운용한다. ② / 판매량이 감소하고 있다.","27":"비장애인과 동일하게 가입당시의 건강상태 등을 고려","28":"하여 보험가입 가능여부 및 인수조건을 결정한다. 퇴직연금에 이미 가입되어 있으면서 자기 부담으로","29":"추가 가입할 수 있다. 월 1회 → 매일","30":"조세특례제한법 → 소득세법","31":"②는 손해보험에 해당한다. 5"},"22":{"1":"1960년대 생명보험회사가 국민저축기관으로 지정되면서 25. 단체보험이 크게 성장하기 시작하였다.","25":"종신보험은 대표적인 보장성보험이므로 생존시 지급 하는 보험금의 합계액에 이미 납입한 보험료를 초과하지","2":"① 7위 → 8위 ③ 6위 → 12위","3":"① 보험계약자의 이해를 돕기 위하여 금융위원회가 필요 26. 하다고 인정하는 경우 예외를 두고 있다. ② 3개년도 → 5개년도","26":"① 부모 생존시에는 각종 학자금 등 교육자금이 지급 된다. ②, ④ 어린이보험에 대한 내용이다.","4":"① 만 17세 → 만 15세 ② 청약철회기간이 지난 다음에는 27.","27":"확정연금형 → 상속연금형","28":"(가) 2 + (나) 4 + (다) 5 = function updateTopOffset(){
  if(window.innerWidth <= 700){ return; }
  const examTop = document.querySelector('.exam-top');
  if(!examTop) return;
  let h = examTop.getBoundingClientRect().height;
  const reviewHeader = document.getElementById('review-header');
  if(reviewHeader && reviewHeader.style.display !== 'none'){
    h += reviewHeader.getBoundingClientRect().height;
  }
  document.getElementById('exam').style.setProperty('--top-offset', h+'px');
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
  if(id==='exam') requestAnimationFrame(updateTopOffset);
}




/* ════════════════════════════════════════
   오답 노트 (localStorage 기반)
   key: "wrongNote_사원번호_ins"
   value: JSON 배열 [{form, num, q, c, ans, exp}, ...]
════════════════════════════════════════ */
let G_WN_TAB = 'nonlife'; // 현재 탭

function wnKey(empno, ins){
  return 'wrongNote_' + empno + '_' + ins;
}

function loadWrongNote(empno, ins){
  try {
    const raw = localStorage.getItem(wnKey(empno, ins));
    return raw ? JSON.parse(raw) : [];
  } catch(e){ return []; }
}

function saveWrongNote(empno, ins, list){
  try { localStorage.setItem(wnKey(empno, ins), JSON.stringify(list)); }
  catch(e){ console.warn('localStorage 저장 실패', e); }
}

function getWnEmpno(){
  // S가 있으면 S.empno, 없으면 홈 입력값
  if(typeof S !== 'undefined' && S && S.empno) return S.empno;
  return document.getElementById('in-empno').value.trim() || '__guest__';
}

/* 채점 후 오답 자동 저장 */
function saveWrongToNote(){
  if(!S || !S.submitted) return;
  const empno = S.empno;
  const ins   = S.ins;
  const existing = loadWrongNote(empno, ins);

  // 기존 오답 맵 (form_num → index)
  const existMap = {};
  existing.forEach((item, i) => {
    existMap[item.form + '_' + item.num] = i;
  });

  let added = 0;
  S.questions.forEach((q, i) => {
    const correctAns = S.ANSWERS[S.form][q.num - 1];
    const userAns    = S.userAnswers[i];
    if(userAns === correctAns) return; // 정답이면 스킵

    const key = S.form + '_' + q.num;
    const exp = S.EXPLANATIONS[S.form] && S.EXPLANATIONS[S.form][String(q.num)];
    const item = {
      form: S.form, num: q.num, q: q.q, c: q.c,
      ans: correctAns, exp: exp || ''
    };

    if(key in existMap){
      existing[existMap[key]] = item; // 기존 오답 업데이트
    } else {
      existing.push(item);
      added++;
    }
  });

  saveWrongNote(empno, ins, existing);
  return added;
}

/* 정답 맞힌 오답은 노트에서 제거 */
function removeCorrectFromNote(){
  if(!S || !S.submitted) return;
  if(!S.reviewMode && !S.wrongNoteMode) return;
  const empno = S.empno;
  const ins   = S.ins;
  let list = loadWrongNote(empno, ins);
  const correctKeys = new Set();
  S.questions.forEach((q, i) => {
    const correctAns = S.ANSWERS[S.form][q.num - 1];
    if(S.userAnswers[i] === correctAns){
      correctKeys.add(S.form + '_' + q.num);
    }
  });
  list = list.filter(item => !correctKeys.has(item.form + '_' + item.num));
  saveWrongNote(empno, ins, list);
}

  if(list.length === 0){ alert('오답 데이터가 없습니다.'); return; }

  if(!empnoInput || !nameInput){
    alert('홈 화면에서 사원번호와 이름을 먼저 입력해주세요.');
    show('home');
    return;
  }

  // 승인 재확인
  const btn = document.getElementById('wn-start-btn');
  btn.textContent = '확인 중...';
  btn.disabled = true;
  try {
    const res  = await fetch(SCRIPT_URL + '?empno=' + encodeURIComponent(empnoInput));
    const data = await res.json();
    if(!data.ok){
      alert('승인되지 않은 사원번호입니다.');
      btn.textContent = '오답만 다시 풀기 →';
      btn.disabled = false;
      return;
    }
  } catch(e) {
    // 네트워크 오류는 통과 (이미 로그인한 상태)
  }
  btn.textContent = '오답만 다시 풀기 →';
  btn.disabled = false;

  // 오답 노트 데이터를 문제 형식으로 변환
  // 폼별로 묶어서 처리 (같은 form끼리)
  // 편의상 form은 첫번째 항목 기준, 오답 노트 전용 세션 생성
  const QUESTIONS = G_WN_TAB === 'nonlife' ? NL_QUESTIONS : LI_QUESTIONS;
  const ANSWERS   = G_WN_TAB === 'nonlife' ? NL_ANSWERS   : LI_ANSWERS;
  const EXPLANATIONS = G_WN_TAB === 'nonlife' ? NL_EXPLANATIONS : LI_EXPLANATIONS;

  // 오답 노트 문제들을 가상의 문제 배열로 변환
  const fakeQuestions = list.map(item => ({
    num: item.num, q: item.q, c: item.c, box: item.box || '',
    _form: item.form  // 원본 form 추적
  }));

  // 오답 노트 전용 S 생성 (form은 대표값 사용)
  const repForm = list[0].form;

  // ANSWERS 함수: 각 문제별 form이 다를 수 있으므로 직접 ans 사용
  const fakeAnswers = {};
  list.forEach((item, i) => {
    fakeAnswers[i] = item.ans; // index → 정답
  });

  // 오답 노트용 ANSWERS 래퍼
  const wnAnswers = {
    [repForm]: list.map(item => item.ans)
  };
  // 하지만 q.num이 list index와 맞지 않으므로
  // fakeQuestions[i].num === i+1 형태로 재번호 매기기
  const reNumbered = fakeQuestions.map((q, i) => ({
    ...q,
    num: i + 1,      // 1~N으로 재번호
    _origNum: q.num  // 원본 번호 보존
  }));

  // 정답 배열 (재번호 기준)
  const wnAnsArray = list.map(item => item.ans);
  const wnExp = {};
  list.forEach((item, i) => {
    if(item.exp) wnExp[String(i+1)] = item.exp;
  });

  S = {
    form: repForm,
    name: nameInput,
    empno: empnoInput,
    currentQ: 0,
    questions: reNumbered,
    userAnswers: {},
    submitted: false,
    examType: 'all',
    ins: G_WN_TAB,
    QUESTIONS, ANSWERS, EXPLANATIONS,
    reviewMode: false,
    reviewWrongList: null,
    wrongOnlyMode: false,

    ANSWERS: { [repForm]: wnAnsArray },
    EXPLANATIONS: { [repForm]: wnExp }
  };

  const insLabel = G_WN_TAB === 'nonlife' ? '손보' : '생보';
  document.getElementById('exam-badge').textContent = '📒 ' + insLabel + ' 오답노트 · ' + list.length + '문제';

  const btnSubmit = document.getElementById('btn-submit-side');

  btnSubmit.onclick = submitExam;

  buildSidebar();
  renderQ(0);
  show('exam');
  document.getElementById('review-header').style.display = 'none';
  requestAnimationFrame(updateTopOffset);
  startTimer();  // 오답 노트 시험도 타이머 시작

let _timerInterval = null;
let _timerStart    = 0;
let _timerElapsed  = 0;

function startTimer(){
  stopTimer();
  _timerStart   = Date.now();
  _timerElapsed = 0;
  _updateTimerDisplay(0);
  _timerInterval = setInterval(()=>{
    _timerElapsed = Math.floor((Date.now() - _timerStart) / 1000);
    _updateTimerDisplay(_timerElapsed);
  }, 1000);
}

function stopTimer(){
  if(_timerInterval){ clearInterval(_timerInterval); _timerInterval = null; }
}

function _updateTimerDisplay(sec){
  const el = document.getElementById('exam-timer');
  if(!el) return;
  const m = String(Math.floor(sec / 60)).padStart(2,'0');
  const s = String(sec % 60).padStart(2,'0');
  el.textContent = m + ':' + s;
  el.className = 'exam-timer';
  if(sec >= 3600) el.classList.add('danger');
  else if(sec >= 1800) el.classList.add('warn');
}

function formatTime(sec){
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if(h > 0) return h + '시간 ' + m + '분 ' + s + '초';
  if(m > 0) return m + '분 ' + s + '초';
  return s + '초';
}

/* ── 사이드바 빌드 (10개씩 묶음) ── */
function buildSidebar(){
  const list = document.getElementById('sidebar-list');
  list.innerHTML = '';
  const idxList = (S.wrongOnlyMode && S.reviewWrongList)
    ? S.reviewWrongList
    : S.questions.map((_,i)=>i);

  const wrongSet = new Set(S.reviewWrongList||[]);
  const isMobile = window.innerWidth <= 700;

  // 모바일: srow 없이 아이템 직접 list에 추가 (flex row)
  if(isMobile){
    idxList.forEach(i => {
      const q  = S.questions[i];
      const el = document.createElement('div');
      el.className = 'sitem';
      el.id = 'sitem-'+i;
      if(S.reviewMode && !wrongSet.has(i) && !S.wrongOnlyMode) el.style.opacity='0.35';
      el.innerHTML = '<div class="sitem-num">'+q.num+'</div><span class="sitem-ox" id="sitem-ox-'+i+'"></span>';
      el.onclick = (()=>{ const idx=i; return ()=>renderQ(idx); })();
      list.appendChild(el);
    });
    return;
  }

  // 데스크탑: 5개씩 srow 묶음
  const chunkSize = 5;
  for(let r=0; r<idxList.length; r+=chunkSize){
    const row = document.createElement('div');
    row.className = 'srow';
    const end = Math.min(r+chunkSize, idxList.length);
    for(let ri=r; ri<end; ri++){
      const i  = idxList[ri];
      const q  = S.questions[i];
      const el = document.createElement('div');
      el.className = 'sitem';
      el.id = 'sitem-'+i;
      // 오답보기 모드에서 정답 문제는 흐리게
      if(S.reviewMode && !wrongSet.has(i) && !S.wrongOnlyMode){
        el.style.opacity = '0.35';
      }
      el.innerHTML =
        '<div class="sitem-num">'+q.num+'</div>'+
        '<span class="sitem-ox" id="sitem-ox-'+i+'"></span>';
      el.onclick = (()=>{ const idx=i; return ()=>renderQ(idx); })();
      row.appendChild(el);
    }
    list.appendChild(row);
  }
}

function updateSidebar(){
  S.questions.forEach((q,i)=>{
    const el  = document.getElementById('sitem-'+i);
    const ox  = document.getElementById('sitem-ox-'+i);
    if(!el) return;
    const correctAns = S.ANSWERS[S.form][q.num-1];
    const userAns    = S.userAnswers[i];
    // 클래스 초기화
    el.className = 'sitem';
    ox.textContent = '';
    if(i===S.currentQ) el.classList.add('active');
    if(S.submitted && userAns!==undefined){
      if(userAns===correctAns){
        el.classList.add('correct');
        ox.textContent = 'O';
      } else {
        el.classList.add('wrong');
        ox.textContent = 'X';
      }
    } else if(userAns!==undefined){
      el.classList.add('answered');
    }
  });
  // 현재 항목으로 스크롤
  const cur = document.getElementById('sitem-'+S.currentQ);
  if(cur) cur.scrollIntoView({block:'nearest'});
}

/* ── 문제 렌더링 ── */
function renderQ(idx){
  if(!S.questions[idx]) return;
  S.currentQ = idx;
  const q     = S.questions[idx];
  const total = S.questions.length;
  const answered = Object.keys(S.userAnswers).length;

  document.getElementById('q-counter').textContent = '문제 '+(idx+1)+' / '+total;
  document.getElementById('q-num').textContent     = 'Q'+q.num;
  document.getElementById('q-text').textContent    = q.q;

  const boxEl = document.getElementById('q-box');
  if(q.box && q.box.trim()){ boxEl.textContent=q.box; boxEl.style.display='block'; }
  else { boxEl.style.display='none'; }

  document.getElementById('prog-fill').style.width = (answered/total*100)+'%';
  document.getElementById('prog-label').textContent = answered+' / '+total+' 답변';

  const correctAns = S.ANSWERS[S.form][q.num-1];
  const userAns    = S.userAnswers[idx];

  /* 보기 - 컨테이너 재사용하되 innerHTML 갱신 (스크롤 위치 이동 없음) */
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.c.forEach((choice,ci)=>{
    const n   = ci+1;
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.disabled  = S.submitted;
    if(S.submitted){
      if(n===correctAns) btn.classList.add(n===userAns?'correct':'show-ans');
      else if(n===userAns) btn.classList.add('wrong');
    } else if(n===userAns){ btn.classList.add('selected'); }
    btn.innerHTML = '<span class="choice-num">'+n+'</span><span>'+choice+'</span>';
    btn.onclick   = ()=>selectAnswer(idx,n);
    choicesEl.appendChild(btn);
  });

  showFeedback(idx);

  /* 이전/다음 버튼 */
  document.querySelector('.btn-prev').disabled = idx===0;
  const nextBtn = document.getElementById('btn-next');
  if(idx===total-1){
    nextBtn.textContent = '마지막 문제';
    nextBtn.style.opacity = '0.5';
    nextBtn.onclick = null;
  } else {
    nextBtn.textContent = '다음 →';
    nextBtn.style.opacity = '1';
    nextBtn.onclick = ()=>goQ(1);
  }

  updateSidebar();

  /* 메인 영역 상단으로 스크롤 */
  const mainArea = document.getElementById('main-area');
  mainArea.scrollTop = 0;
}

function showFeedback(idx){
  const fb = document.getElementById('feedback');
  const q  = S.questions[idx];
  const correctAns = S.ANSWERS[S.form][q.num-1];
  const userAns    = S.userAnswers[idx];
  // review 모드: submitted이고 오답이면 항상 표시
  if(!S.submitted){ fb.style.display='none'; return; }
  if(!S.reviewMode && userAns===undefined){ fb.style.display='none'; return; }
  fb.style.display='block';
  const isCorrect = (userAns===correctAns);
  let fbHtml = '';
  if(isCorrect){ fb.className='feedback-bar correct'; fbHtml='✓ 정답입니다!'; }
  else { fb.className='feedback-bar wrong'; fbHtml='✗ 오답 — 정답은 '+correctAns+'번입니다.'; }
  // 해설 추가
  const exp = S.EXPLANATIONS[S.form] && S.EXPLANATIONS[S.form][String(q.num)];
  if(exp){
    fbHtml += '<div class="explanation-box"><div class="exp-title">📖 해설</div>'+exp+'</div>';
  }
  fb.innerHTML = fbHtml;
}

function selectAnswer(idx,n){
  if(S.submitted) return;
  S.userAnswers[idx]=n;
  renderQ(idx);
}

function goQ(dir){
  const next=S.currentQ+dir;
  if(next>=0&&next<S.questions.length) renderQ(next);
}

/* ── 채점 ── */
function submitExam(){
  const unanswered = S.questions.length - Object.keys(S.userAnswers).length;
  if(unanswered>0){
    if(!confirm(unanswered+'문제가 미응답입니다. 그래도 채점할까요?')) return;
  }
  S.submitted = true;
  stopTimer();
  S.elapsedTime = _timerElapsed; // 소요시간 저장
  // 채점 버튼 텍스트 변경
  document.getElementById('btn-submit-side').textContent = '결과 다시 보기';
  document.getElementById('btn-submit-side').onclick = showResult;
  // 현재 문제 다시 렌더 (정답 표시)
  renderQ(S.currentQ);

  // 오답 노트에 저장 (오답 노트 모드로 푼 경우 → 맞힌 것 제거)
  if(S.wrongNoteMode){
    removeCorrectFromNote();
  } else {
    saveWrongToNote();
    // 저장 알림 표시 예약
    setTimeout(()=>{
      const notice = document.getElementById('wn-saved-notice');
      if(notice) notice.style.display = 'block';
    }, 300);
  }
  updateWnBadges(S.empno);

  // 바로 결과 화면으로
  showResult();
}

function confirmEnd(){
  if(confirm('시험을 종료하고 홈으로 돌아갈까요?')) goHome();
}

/* ── 결과 ── */
function calcScore(){
  // 손해보험 영역: 1~33번 (18번=4점, 나머지 32문제×3점=100점)
  // 제3보험(손보): 18~50번 (18번=4점, 나머지 32문제×3점=100점)
  // 생명보험: 1~30번 (공통1~20=3점×20 + 생보21~30=4점×10=100점)
  // 제3보험(생보): 1~20+31~40 (공통1~20=3점×20 + 제3보험31~40=4점×10=100점)
  // 전체(손보50): 비율환산
  // 전체(생보40): 비율환산
  let score = 0;
  const et = S.examType;
  const ins = S.ins;

  if(ins === 'nonlife'){
    if(et === 'fire' || et === 'third'){
      // 손보/제3보험(손보): 18번=4점, 나머지=3점
      S.questions.forEach((q,i)=>{
        const ca=S.ANSWERS[S.form][q.num-1], ua=S.userAnswers[i];
        if(ua===ca) score += (q.num===18) ? 4 : 3;
      });
    } else {
      // 전체(손보): 비율 환산 100점
      let c=0;
      S.questions.forEach((q,i)=>{ if(S.userAnswers[i]===S.ANSWERS[S.form][q.num-1]) c++; });
      score = Math.round(c/S.questions.length*100);
    }
  } else {
    // 생보
    if(et === 'lifeonly'){
      // 생명보험: 1~20번=3점, 21~30번=4점
      S.questions.forEach((q,i)=>{
        const ca=S.ANSWERS[S.form][q.num-1], ua=S.userAnswers[i];
        if(ua===ca) score += (q.num <= 20) ? 3 : 4;
      });
    } else if(et === 'lifethird'){
      // 제3보험(생보): 1~20번=3점, 31~40번=4점
      S.questions.forEach((q,i)=>{
        const ca=S.ANSWERS[S.form][q.num-1], ua=S.userAnswers[i];
        if(ua===ca) score += (q.num <= 20) ? 3 : 4;
      });
    } else {
      // 전체(생보): 비율 환산 100점
      let c=0;
      S.questions.forEach((q,i)=>{ if(S.userAnswers[i]===S.ANSWERS[S.form][q.num-1]) c++; });
      score = Math.round(c/S.questions.length*100);
    }
  }
  return score;
}

function showResult(){
  // ── 정답/오답 집계 ──
  let correct=0, wrong=0, unanswered=0;
  S.questions.forEach((q,i)=>{
    const ca=S.ANSWERS[S.form][q.num-1], ua=S.userAnswers[i];
    if(ua===ca) correct++;
    else if(ua!==undefined) wrong++;
    else unanswered++;
  });

  const et = S.examType;
  const ins = S.ins;
  const hasAreaScore = (ins==='nonlife' && (et==='fire'||et==='third'))
                    || (ins==='life'    && (et==='lifeonly'||et==='lifethird'));
  const passScore = 60;
  const tnMap = {
    fire:'손해보험', third:'제3보험(손보)', lifeonly:'생명보험', lifethird:'제3보험(생보)'
  };
  const tn = tnMap[et] || '전체';

  const score = calcScore();
  const pass  = score >= passScore;

  // ── 기본 정보 표시 ──
  document.getElementById('res-badge').textContent = S.form+'형 · '+tn+' 결과';
  document.getElementById('res-name').textContent  = S.name+' ('+S.empno+') 님';
  document.getElementById('r-ok').textContent = correct;
  document.getElementById('r-ng').textContent = wrong;
  document.getElementById('r-sc').textContent = score+'점';
  document.getElementById('donut-score').textContent = score;

  // ── 도넛 차트 (100점 기준) ──
  const circ = 2*Math.PI*55;
  const fill = circ * Math.min(score,100) / 100;
  const donut = document.getElementById('donut-fill');
  donut.setAttribute('stroke', pass?'#22c55e':'#f43f5e');
  setTimeout(()=>{ donut.setAttribute('stroke-dasharray', fill+' '+(circ-fill)); },100);

  // ── 합격 여부 ──
  const chip = document.getElementById('pass-chip');
  chip.textContent = pass
    ? '✓ 합격 ('+score+'점 ≥ '+passScore+'점)'
    : '✗ 불합격 ('+score+'점 < '+passScore+'점)';
  chip.className = 'pass-chip '+(pass?'pass':'fail');

  // ── 영역별 상세 배점 내역 ──
  const detailEl   = document.getElementById('score-detail');
  const titleEl    = document.getElementById('score-detail-title');
  const rowsEl     = document.getElementById('score-rows');
  const totalPtsEl = document.getElementById('score-total-pts');

  if(hasAreaScore){
    detailEl.style.display = 'block';
    titleEl.textContent = '배점 내역 · '+tn+' (합격기준 60점)';
    rowsEl.innerHTML = '';

    // q18 따로, 나머지 3점짜리
    let q18Hit=false, q18Exist=false;
    let threeHit=0, threeMiss=0, threeNA=0;

    S.questions.forEach((q,i)=>{
      const ca=S.ANSWERS[S.form][q.num-1], ua=S.userAnswers[i];
      if(q.num===18){
        q18Exist=true;
        q18Hit = (ua===ca);
      } else {
        if(ua===ca) threeHit++;
        else if(ua!==undefined) threeMiss++;
        else threeNA++;
      }
    });

    // 3점 문항 행
    const threeTotal = threeHit+threeMiss+threeNA;
    const threeRow = document.createElement('div');
    threeRow.className = 'score-row';
    threeRow.innerHTML =
      '<span class="sr-label">3점 문항 ('+threeTotal+'문제)</span>'+
      '<span class="sr-val hit">정답 '+threeHit+'개 × 3점 = <b>'+(threeHit*3)+'점</b></span>';
    rowsEl.appendChild(threeRow);

    const threeMissRow = document.createElement('div');
    threeMissRow.className = 'score-row';
    threeMissRow.innerHTML =
      '<span class="sr-label">&nbsp;</span>'+
      '<span class="sr-val miss">오답/미응답 '+(threeMiss+threeNA)+'개 × 0점 = <b>0점</b></span>';
    rowsEl.appendChild(threeMissRow);

    // 18번(4점) 행
    if(q18Exist){
      const q18Row = document.createElement('div');
      q18Row.className = 'score-row';
      q18Row.innerHTML =
        '<span class="sr-label">4점 문항 (18번)</span>'+
        '<span class="sr-val '+(q18Hit?'hit':'miss')+'">'+
          (q18Hit?'정답 × 4점 = <b>4점</b>':'오답 × 0점 = <b>0점</b>')+
        '</span>';
      rowsEl.appendChild(q18Row);
    }

    totalPtsEl.textContent = score+'점 / 100점';
  } else {
    detailEl.style.display = 'none';
  }

  // 소요시간 표시
  const timeEl = document.getElementById('result-time');
  if(timeEl && S.elapsedTime !== undefined){
    timeEl.innerHTML = '⏱ 소요시간 <strong>' + formatTime(S.elapsedTime) + '</strong>';
  }
  show('result');
}
function reviewWrong(){
  const wrongList = S.questions.map((_,i)=>i)
    .filter(i=>S.userAnswers[i]!==S.ANSWERS[S.form][S.questions[i].num-1]);
  if(wrongList.length===0){ alert('모든 문제를 맞혔습니다! 🎉'); return; }

  // 오답보기 모드: submitted 유지, 모든 문제 보여주되 오답만 토글 가능
  S.reviewMode = true;
  S.reviewWrongList = wrongList;    // 오답 인덱스 목록
  S.wrongOnlyMode  = false;         // 토글 초기값

  show('exam');
  document.getElementById('review-header').style.display = 'flex';
  document.getElementById('toggle-wrong-only').checked = false;

  // 채점 버튼 → 결과 다시 보기
  const btnSubmit = document.getElementById('btn-submit-side');
  btnSubmit.textContent = '결과 다시 보기';
  btnSubmit.onclick = showResult;

  // review-header가 DOM에 반영된 뒤 offset 계산
  requestAnimationFrame(updateTopOffset);

  // 사이드바 재빌드 (제출 상태 유지)
  buildSidebar();
  updateSidebar();
  // 첫 오답 문제로 이동
  renderQ(wrongList[0]);
}

function toggleWrongOnly(checked){
  S.wrongOnlyMode = checked;
  buildSidebar();
  updateSidebar();
  // 토글 시 현재 보이는 문제 유지, 오답만 보기면 첫 오답으로
  if(checked){
    renderQ(S.reviewWrongList[0]);
  } else {
    renderQ(S.currentQ);
  }
}

function goHome(){
  document.getElementById('in-empno').value='';
  document.getElementById('in-name').value='';
  setType('all');
  setIns(G_INS);
  setMode(G_MODE);
  // review 상태 초기화
  if(document.getElementById('review-header'))
    document.getElementById('review-header').style.display='none';
  stopTimer();
  document.getElementById('exam-timer').textContent = '00:00';
  const noticeEl = document.getElementById('wn-saved-notice');
  if(noticeEl) noticeEl.style.display='none';
  show('home');
  refreshWnBadgesForHome();
}
</script>
